<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bultum Academy - MCA Practice Quiz</title>
<style>
:root{--gd:#0D3D2E;--gm:#1A6B4A;--ga:#27AE72;--gp:#E8F5EF;--pu:#7C3AED;--pl:#F5F3FF;--pd:#4C1D95;--re:#DC2626;--rl:#FEF2F2;--tx:#1F2937;--mu:#6B7280;--bo:#E5E7EB;--bg:#F9FAFB;--wh:#fff;--r:12px;--p1:#1A6B4A;--p2:#7C3AED}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hdr{background:var(--gd);padding:0 1.5rem}
.hi{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:14px 0}
.logo{width:44px;height:44px;border-radius:50%;background:var(--ga);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--gd);flex-shrink:0}
.hdr h1{font-size:1.1rem;font-weight:700;color:#fff}.hdr p{font-size:.75rem;color:#A8D5BE;margin-top:1px}
.acc{height:3px;background:var(--ga)}
main{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem}
.sc{display:none}.sc.active{display:block}
.hero{text-align:center;padding:1.5rem 0 1rem}
.hero h2{font-size:1.9rem;font-weight:800;color:var(--gd)}.hero p{color:var(--mu);margin-top:.4rem}
.gg{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:.85rem;margin-top:1.2rem}
.gc{background:var(--wh);border:1.5px solid var(--bo);border-radius:var(--r);padding:1.1rem 1.3rem;cursor:pointer;transition:all .2s;text-align:left;position:relative}
.gc:hover{border-color:var(--ga);transform:translateY(-2px);box-shadow:0 6px 20px rgba(39,174,114,.15)}
.bdg{display:inline-block;background:var(--gp);color:var(--gm);font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:20px;margin-bottom:.5rem;text-transform:uppercase}
.gc h3{font-size:1.05rem;font-weight:700}.gc p{font-size:.78rem;color:var(--mu);margin-top:.25rem}
.gc .ar{position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:var(--ga);font-size:1.2rem;opacity:.5;transition:all .2s}
.gc:hover .ar{opacity:1;right:.75rem}
.stag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.68rem;font-weight:700;margin:2px 2px 0 0;text-transform:uppercase}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.75rem;margin-top:1rem}
.scard{background:var(--wh);border:2px solid var(--bo);border-radius:var(--r);padding:1rem 1.1rem;cursor:pointer;transition:all .2s;text-align:center}
.scard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.scard .si{font-size:2rem;margin-bottom:.3rem}.scard h4{font-size:.95rem;font-weight:700}
.scard p{font-size:.76rem;color:var(--mu);margin-top:.2rem}
/* Passage panel */
.passage-panel{background:#FAFBFF;border:1.5px solid #C7D7FD;border-radius:var(--r);margin-bottom:1rem;overflow:hidden}
.passage-header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:#EEF2FF;cursor:pointer;user-select:none}
.passage-header-title{font-size:.75rem;font-weight:700;color:#3730A3;text-transform:uppercase;letter-spacing:.05em}
.passage-toggle{font-size:.75rem;color:#6366F1;font-weight:600;white-space:nowrap;margin-left:.5rem}
.passage-body{padding:1rem 1.1rem;max-height:280px;overflow-y:auto;font-size:.875rem;line-height:1.65;color:var(--tx)}
.passage-body p{margin-bottom:.65rem}
.passage-body table{width:100%;border-collapse:collapse;margin:.75rem 0;font-size:.83rem}
.passage-body th,.passage-body td{border:1px solid #D1D5DB;padding:.35rem .65rem;text-align:left}
.passage-body th{background:#E8F5EF;font-weight:700;color:var(--gd)}
.passage-body caption{font-weight:700;font-size:.8rem;color:var(--gd);text-align:left;padding-bottom:.3rem}
.passage-body .source-label{font-weight:700;color:var(--gm);margin-top:.75rem;margin-bottom:.25rem;display:block;font-size:.82rem;text-transform:uppercase;letter-spacing:.04em}
.passage-body hr.divider{border:none;border-top:1.5px dashed #D1D5DB;margin:.75rem 0}
/* Quiz area */
.qt{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap}
.bk{background:none;border:1.5px solid var(--bo);border-radius:8px;padding:.35rem .8rem;cursor:pointer;font-size:.8rem;color:var(--mu);transition:all .15s}
.bk:hover{border-color:var(--tx);color:var(--tx)}
.qtl{font-weight:700;font-size:.93rem}
.scr{margin-left:auto;background:var(--pl);color:var(--pd);border-radius:20px;padding:.25rem .85rem;font-size:.79rem;font-weight:600}
.pw{background:#E5E7EB;border-radius:99px;height:6px;margin-bottom:1.3rem;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--ga),var(--pu));border-radius:99px;transition:width .4s}
.pl{font-size:.74rem;color:var(--mu);margin-bottom:.35rem;display:flex;justify-content:space-between}
.qc{background:var(--wh);border:1.5px solid var(--bo);border-radius:var(--r);padding:1.4rem;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.qn{font-size:.7rem;font-weight:700;color:var(--pu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.qt2{font-size:.97rem;font-weight:600;line-height:1.55;margin-bottom:1.1rem}
.ch{display:flex;flex-direction:column;gap:.55rem}
.cb{background:var(--bg);border:1.5px solid var(--bo);border-radius:10px;padding:.78rem 1rem;cursor:pointer;text-align:left;font-size:.9rem;font-weight:500;color:var(--tx);transition:all .17s;display:flex;align-items:center;gap:.7rem}
.cb:hover:not(:disabled){border-color:var(--pu);background:var(--pl);color:var(--pd)}
.cb.correct{border-color:#16A34A;background:#F0FDF4;color:#14532D;pointer-events:none}
.cb.wrong{border-color:var(--re);background:var(--rl);color:var(--re);pointer-events:none}
.cb.faded{opacity:.4;pointer-events:none}
.ci{width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;font-weight:700}
.cb.correct .ci{background:#16A34A;border-color:#16A34A;color:#fff}
.cb.wrong .ci{background:var(--re);border-color:var(--re);color:#fff}
.fb{margin-top:1rem;padding:.85rem 1rem;border-radius:10px;font-size:.88rem;font-weight:500;display:none;align-items:flex-start;gap:.55rem}
.fb.show{display:flex}
.fb.correct{background:#F0FDF4;color:#14532D;border:1px solid #BBF7D0}
.fb.wrong{background:var(--rl);color:var(--re);border:1px solid #FECACA}
.nx{margin-top:1rem;width:100%;background:var(--gm);color:#fff;border:none;border-radius:10px;padding:.78rem;font-size:.93rem;font-weight:600;cursor:pointer;transition:background .15s;display:none}
.nx.show{display:block}.nx:hover{background:var(--gd)}
/* Results */
.rc{background:var(--wh);border:1.5px solid var(--bo);border-radius:var(--r);padding:1.8rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.05)}
.rb{font-size:2.8rem;margin-bottom:.4rem}
.rs{font-size:2.6rem;font-weight:800;color:var(--gd);line-height:1}
.rl2c{color:var(--mu);font-size:.88rem;margin-top:.3rem}
.rm{margin-top:.9rem;font-size:.98rem;font-weight:600}
.rsb{color:var(--mu);font-size:.85rem;margin-top:.25rem}
.rbw{background:#E5E7EB;border-radius:99px;height:12px;margin:1.2rem 0;overflow:hidden}
.rba{height:100%;border-radius:99px;transition:width 1s}
.ra{display:flex;gap:.7rem;margin-top:1.2rem;flex-wrap:wrap}
.bp{flex:1;background:var(--gm);color:#fff;border:none;border-radius:10px;padding:.78rem;font-size:.88rem;font-weight:600;cursor:pointer}
.bp:hover{background:var(--gd)}
.bk2{flex:1;background:var(--pl);color:var(--pd);border:1.5px solid var(--pu);border-radius:10px;padding:.78rem;font-size:.88rem;font-weight:600;cursor:pointer}
.bs{flex:1;background:var(--wh);color:var(--tx);border:1.5px solid var(--bo);border-radius:10px;padding:.78rem;font-size:.88rem;font-weight:600;cursor:pointer}
.bd{margin-top:1.3rem;text-align:left}
.bd h4{font-size:.8rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.7rem}
.bdi{display:flex;align-items:flex-start;gap:.55rem;padding:.45rem 0;border-bottom:1px solid var(--bo);font-size:.82rem}
.bdi:last-child{border-bottom:none}
.bn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
.bn.ok{background:#F0FDF4;color:#14532D}.bn.bad{background:var(--rl);color:var(--re)}
.bq{flex:1;color:var(--tx)}.ba{font-size:.76rem;color:var(--gm);font-weight:600}
.bwr{font-size:.76rem;color:var(--re);text-decoration:line-through;margin-right:.3rem}
/* 1v1 Mode */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
.overlay.show{display:flex}
.obox{background:var(--wh);border-radius:var(--r);padding:2rem;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.obox h2{font-size:1.4rem;font-weight:800;margin-bottom:.4rem}
.obox p{color:var(--mu);font-size:.9rem;margin-bottom:1.5rem}
.mode-btns{display:flex;flex-direction:column;gap:.75rem}
.mbtn{border:none;border-radius:10px;padding:1rem 1.2rem;font-size:1rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:.7rem}
.mbtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.mbtn-solo{background:var(--gp);color:var(--gd)}
.mbtn-1v1{background:linear-gradient(135deg,var(--gp),var(--pl));color:var(--pd)}
.mbtn .mi{font-size:1.4rem}
.mbtn-text{text-align:left}
.mbtn-text strong{display:block;font-size:.95rem}
.mbtn-text span{font-size:.76rem;font-weight:400;color:var(--mu)}
.player-bar{border-radius:8px;padding:.5rem 1rem;font-size:.85rem;font-weight:700;margin-bottom:.75rem;display:none}
.player-bar.show{display:flex;align-items:center;gap:.5rem}
.player-bar.p1{background:#E8F5EF;color:var(--p1);border:1.5px solid var(--p1)}
.player-bar.p2{background:var(--pl);color:var(--p2);border:1.5px solid var(--p2)}
.p1v1sc{margin-left:auto;font-size:.78rem}
.ho-icon{font-size:3rem;margin-bottom:.5rem}
.ho-scores{display:flex;gap:1rem;justify-content:center;margin:1rem 0;flex-wrap:wrap}
.ho-score-box{border-radius:10px;padding:.6rem 1.2rem;font-weight:700;font-size:.9rem}
.ho-score-box.p1{background:#E8F5EF;color:var(--p1)}
.ho-score-box.p2{background:var(--pl);color:var(--p2)}
.ho-ready-btn{background:var(--gm);color:#fff;border:none;border-radius:10px;padding:.8rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;width:100%}
.ho-ready-btn:hover{background:var(--gd)}
.duel-scores{display:flex;gap:1rem;justify-content:center;margin:1.2rem 0;flex-wrap:wrap}
.ds-box{flex:1;min-width:130px;border-radius:var(--r);padding:1.2rem;text-align:center}
.ds-box.p1{background:#E8F5EF;border:2px solid var(--p1)}
.ds-box.p2{background:var(--pl);border:2px solid var(--p2)}
.ds-box.winner{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ds-name{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
.ds-name.p1{color:var(--p1)}.ds-name.p2{color:var(--p2)}
.ds-score{font-size:2rem;font-weight:800;line-height:1}
.ds-pct{font-size:.8rem;color:var(--mu);margin-top:.2rem}
.winner-badge{background:linear-gradient(135deg,#F59E0B,#EF4444);color:#fff;border-radius:99px;padding:2px 8px;font-size:.7rem;font-weight:700;margin-top:.4rem;display:inline-block}
@media(max-width:500px){.hero h2{font-size:1.4rem}.gg{grid-template-columns:1fr}.rs{font-size:2rem}.duel-scores{flex-direction:column}}
</style>
</head>
<body>
<header class="hdr">
<div class="hi">
<div class="logo">BA</div>
<div><h1>Bultum Academy</h1><p>MCA Practice Quiz — Grades 3–8</p></div>
</div>
</header>
<div class="acc"></div>
<main>
<div id="s0" class="sc active">
<div class="hero"><h2>MCA Practice Quiz</h2><p>Pick your grade to start — Reading, Math &amp; Science available!</p></div>
<div class="gg" id="ggg"></div>
</div>
<div id="s1" class="sc">
<div class="hero" id="sh"></div>
<div class="sg" id="sgg"></div>
<br><button class="bk" onclick="goHome()">&#8592; All Grades</button>
</div>
<div id="s2" class="sc">
<div class="player-bar" id="pbar"></div>
<div class="qt">
<button class="bk" onclick="goSubj()">&#8592; Subjects</button>
<span class="qtl" id="qtl"></span>
<span class="scr" id="scr">Score: 0/0</span>
</div>
<div class="pl"><span id="pll">Question 1</span><span id="ppc">0%</span></div>
<div class="pw"><div class="pf" id="pf" style="width:0%"></div></div>
<!-- Passage panel -->
<div class="passage-panel" id="passage-panel" style="display:none">
<div class="passage-header" onclick="togglePassage()">
<span class="passage-header-title" id="passage-title">Passage</span>
<span class="passage-toggle" id="passage-toggle">▼ Hide</span>
</div>
<div class="passage-body" id="passage-body"></div>
</div>
<div class="qc">
<div class="qn" id="qn"></div>
<div class="qt2" id="qt2"></div>
<div class="ch" id="ch"></div>
<div class="fb" id="fb"><span id="fbi"></span><span id="fbt"></span></div>
<button class="nx" id="nx" onclick="nextQ()">Next Question &#8594;</button>
</div>
</div>
<div id="s3" class="sc">
<div class="rc">
<div class="rb" id="rb"></div>
<div class="rs" id="rsc"></div>
<div class="rl2c" id="rl2"></div>
<div class="rm" id="rm"></div>
<div class="rsb" id="rsb"></div>
<div class="rbw"><div class="rba" id="rba"></div></div>
<div id="duel-res" style="display:none">
<div class="duel-scores" id="duel-scores"></div>
</div>
<div class="ra">
<button class="bp" onclick="retry()">Try Again</button>
<button class="bk2" onclick="goSubj()">Other Subjects</button>
<button class="bs" onclick="goHome()">Change Grade</button>
</div>
<div class="bd" id="bdd"></div>
</div>
</div>
</main>
<!-- Mode Selection Overlay -->
<div class="overlay" id="mode-overlay">
<div class="obox">
<h2>Choose Your Mode</h2>
<p id="mo-subj-label">Select how you want to practice</p>
<div class="mode-btns">
<button class="mbtn mbtn-solo" onclick="startSolo()">
<span class="mi">📚</span>
<span class="mbtn-text"><strong>Solo Practice</strong><span>Practice on your own at your own pace</span></span>
</button>
<button class="mbtn mbtn-1v1" onclick="start1v1()">
<span class="mi">⚔️</span>
<span class="mbtn-text"><strong>1v1 Challenge</strong><span>Two players take turns — compete for the top score!</span></span>
</button>
</div>
<br>
<button class="bk" onclick="closeOverlay('mode-overlay')" style="width:100%;justify-content:center">Cancel</button>
</div>
</div>
<!-- Handoff Overlay -->
<div class="overlay" id="handoff-overlay">
<div class="obox">
<div class="ho-icon" id="ho-icon">🔄</div>
<h2 id="ho-title">Pass to Player 2!</h2>
<p id="ho-msg">Get ready for your question</p>
<div class="ho-scores" id="ho-scores-div"></div>
<button class="ho-ready-btn" id="ho-btn" onclick="continueHandoff()">Ready &#8594;</button>
</div>
</div>
<script>
const D={"Grade 3": {"color": "#1F3864", "subjects": {"Reading": {"passages": [{"title": "Section 1 — The Library Card", "text": "<p>On Tuesday, Ms. Kim held up a stack of small envelopes. \"Your new library cards are here,\" she said. Every student in Room 12 cheered. Ava had been waiting all week. She loved the school library, but this card meant she could visit the public library after dinner and on weekends too.</p><p>When Ms. Kim called Ava's name, Ava opened her envelope quickly. Inside was a bright blue card with her name printed in black letters. She smiled so hard her cheeks felt warm. Then she heard a tiny sigh from the desk beside her. Her friend Leo was staring at an empty envelope.</p><p>\"Maybe it fell out,\" Ava whispered. Leo looked under his desk and inside his backpack. He checked the floor two times. No card. His shoulders drooped. \"My grandma said we could go tonight,\" he said quietly.</p><p>At recess, Ava could not stop thinking about Leo's face. She wanted to race home and show her card to her older sister, but she also wanted to help. After lunch, Ava asked Ms. Kim if there was a list of students who had not received their cards yet. Ms. Kim checked the office and found that Leo's card had been placed in the envelope for another class by mistake.</p><p>The next morning, Leo hurried into the room before the bell rang. He held up his library card like a tiny flag. \"I used it last night!\" he said. \"I checked out a book about space rocks.\" Ava laughed. She still loved her own blue card, but now it seemed even better that Leo had his too.</p>"}, {"title": "Section 2 — How Seeds Travel", "text": "<p>Plants cannot walk to new places, but their seeds can travel. A seed that moves away from its parent plant has a better chance of finding sunlight, water, and space to grow. Different plants use different ways to send seeds on a trip.</p><p>Some seeds travel by wind. Dandelion seeds have soft, feathery tops that act like tiny parachutes. When the wind blows, the seeds lift into the air and drift away. Maple trees also use wind. Their seeds spin as they fall, which helps them stay in the air longer.</p><p>Other seeds travel by water. A coconut can float across the ocean because it has a thick outer covering filled with air. Some plants near rivers drop seeds into the water, and the current carries the seeds downstream.</p><p>Animals can move seeds too. A burr may cling to a dog's fur or a hiker's sock. Later, the burr falls off in a new place. Birds also help. They eat fruit, fly to another area, and drop the seeds there.</p><p>No matter how a seed moves, its goal is the same: to land in a place where a new plant can grow.</p><table><tr><th>Plant</th><th>How the seed travels</th></tr><tr><td>Dandelion</td><td>Wind lifts the seed through the air</td></tr><tr><td>Coconut</td><td>Water carries the seed</td></tr><tr><td>Burr plant</td><td>Animal fur moves the seed</td></tr></table>"}, {"title": "Section 3 — Rain on the Porch (Poem)", "text": "<p style='font-style:italic;line-height:2'>Rain taps the porch rail,<br>soft as fingers on a drum.<br>A robin hops once, then waits.<br>The garden holds its breath.<br><br>Then puddles bloom on the walk.<br>The old red bucket shines.<br>Grandpa says the beans will cheer<br>when the clouds are done.</p>"}, {"title": "Section 4 — A Trip to the Farm (Paired Texts)", "text": "<strong class='source-label'>Text A: Mia's Journal</strong><p>Today our class visited Sunny Hill Farm. The barn smelled like hay and warm wood. I laughed when one goat tried to nibble the corner of my map. My favorite part was feeding the chickens. They rushed toward the grain so fast that I stepped back and almost bumped into Mrs. Torres. I was nervous at first, but by the end I wanted to stay longer.</p><hr class='divider'/><strong class='source-label'>Text B: Farm Visitor Guide</strong><p>Sunny Hill Farm welcomes school groups in spring and fall. Visitors may tour the barn, learn how chickens and goats are cared for, and see the vegetable garden. For safety, guests must walk slowly, listen to the guide, and keep food in the containers provided by staff. The most popular student activity is feeding the chickens during the morning tour.</p>"}, {"title": "Section 5 — Why Our School Needs More Recess", "text": "<p>Our school should add ten more minutes of recess each day. Recess is not just a break from class. It helps students return to learning with fresh energy.</p><p>First, more recess gives students more time to move. Running, climbing, and playing games help children stretch their bodies after sitting in class. When students have a chance to move, they often come back to the classroom ready to focus.</p><p>Second, recess helps students practice solving small problems on their own. During a game, children decide rules, take turns, and work through disagreements. These are important skills to use in class too.</p><p>Some people may worry that more recess would shorten learning time. But ten extra minutes could help students pay better attention later in the day. A short break can make work time stronger, not weaker.</p><p>Adding a little more recess would help students move, think, and work together. That is why our school should make room for it.</p>"}, {"title": "Section 6 — Learning About Pet Rabbits (Multi-Source)", "text": "<strong class='source-label'>Source A: Kids' Magazine Note</strong><p>Rabbits need fresh water, safe places to hide, and room to hop. A rabbit that sits in a tiny space all day can become stressed. Owners should make sure the rabbit has time to move and explore in a safe area.</p><hr class='divider'/><strong class='source-label'>Source B: Pet Store Poster</strong><p>\"Our bunny kit has everything your rabbit will ever need!\"<br>Includes: bowl, brush, toy ball, and small starter cage</p><hr class='divider'/><strong class='source-label'>Source C: Animal Shelter Care Sheet</strong><p>Before bringing home a rabbit, ask how much space it needs as an adult and what foods a veterinarian recommends. Rabbits need hay every day, fresh water, and a place to hide. A shelter or veterinarian can help families choose supplies that fit the rabbit's size and needs.</p>"}], "questions": [["What lesson does Ava learn in the library card story?", ["A small act of help can make someone else's day better.", "It is best to keep quiet when a problem happens.", "Library cards should stay at school only.", "Recess is the best time to solve every problem."], 0, 0], ["Which summary best tells the most important events from the library card story?", ["Ava gets her library card, notices Leo is missing his, asks for help, and Leo gets his card the next day.", "Ava loses her library card at recess and finds it in the office.", "Leo teaches Ava how to check out a book about space rocks.", "Ms. Kim gives every student two library cards instead of one."], 0, 0], ["Why does the author include the part about recess in the library card story?", ["To show that Ava keeps thinking about Leo and decides to help", "To explain the rules of the playground game", "To prove that Ava forgot about the library", "To tell why Leo missed school the day before"], 0, 0], ["How does the story's point of view help the reader in the library card story?", ["It lets the reader understand what Ava notices and why she decides to act.", "It tells the reader what every student in every class is thinking.", "It makes Leo the narrator of the story.", "It turns the story into a set of directions."], 0, 0], ["What does the word 'drooped' most likely mean when Leo's shoulders drooped?", ["stood up tall", "fell down in a tired or sad way", "moved quickly", "shook with laughter"], 1, 0], ["Why is 'tiny flag' a strong comparison when Leo holds up his library card?", ["It shows Leo is holding his card high because he feels proud and excited.", "It proves the card is made from cloth.", "It means Leo wants to hide the card from Ava.", "It shows the card is bigger than a book."], 0, 0], ["What does 'cheered' mean when students cheered for their library cards?", ["asked a question", "became worried", "showed excitement", "walked away"], 2, 0], ["What is the main idea of the article about how seeds travel?", ["Seeds all travel in exactly the same way.", "Plants use several different ways to move seeds to new places.", "Only water can carry seeds far away.", "Birds are the fastest animals in the world."], 1, 1], ["Which detail best supports the main idea about seeds traveling?", ["A seed needs sunlight, water, and space to grow.", "Dandelion seeds have soft tops, coconuts can float, and burrs cling to fur.", "Plants cannot walk to new places.", "Some plants live near rivers."], 1, 1], ["How does the chart in the seed travel article help the reader?", ["It gives a quick way to compare plants and how their seeds move.", "It tells a made-up story about a seed.", "It explains how to grow a tree indoors.", "It proves coconuts are the only seeds in the world."], 0, 1], ["How is the seed travel article organized?", ["It tells one long story about a single seed.", "It explains one travel method at a time.", "It lists plant names in alphabetical order only.", "It gives directions for building a parachute."], 1, 1], ["What is the author's purpose for writing the seed travel article?", ["To entertain readers with a silly poem", "To explain ways seeds move from place to place", "To convince readers never to touch plants", "To tell readers to buy coconuts"], 1, 1], ["What does the word 'drift' mean when dandelion seeds drift away?", ["move gently through the air", "fall straight down like a rock", "grow new roots", "hide under leaves"], 0, 1], ["Which source would be most useful to learn whether water can move seeds?", ["A chart showing which seeds float and where they were found", "A poster about favorite fruits", "A joke book about trees", "A painting of a river"], 0, 1], ["What idea does the rain poem share?", ["Rain can make an ordinary place feel mation and directions for visitors.", "It proves Mia wrote the guide.", "It tells the reader the farm is closed.", "It makes the text rhyme."], 0, 3], ["Which detail belongs in a firsthand account like Mia's journal?", ["Visitors may tour the barn in spring and fall.", "Guests must walk slowly and listen to the guide.", "I almost bumped into Mrs. Torres when the chickens rushed forward.", "The most popular activity is feeding the chickens."], 2, 3], ["How is the Farm Visitor Guide different from Mia's journal?", ["Text B gives general facts and rules, while Text A shares personal feelings.", "Text B is made-up fiction, while Text A is a science article.", "Text B is only about goats, while Text A is only about chickens.", "Text B tells what Mia thought, while Text A gives safety rules."], 0, 3], ["Why might a reader use the Farm Visitor Guide after reading Mia's journal?", ["To learn the rules for visiting the farm safely", "To find out how Mia felt at the end of the trip", "To hear the goat chewing the map", "To read a poem about hay"], 0, 3], ["In Mia's journal, what does 'nibble' most likely mean?", ["take small bites", "run in circles", "sleep quietly", "jump very high"], 0, 3], ["Which text would be more useful for finding out the farm's safety rules?", ["Text A, because journals always list rules", "Text A, because it tells about Mia's favorite part", "Text B, because it directly gives visitor directions and rules", "Text B, because it has more feelings in it"], 2, 3], ["What is the author's opinion in the recess passage?", ["The school should add ten more minutes of recess each day.", "The school should cancel recess during winter.", "Students should do homework at recess.", "Recess should happen only once a week."], 0, 4], ["Which summary best matches the recess article?", ["The author argues for more recess because it can help students move, focus, and solve problems together.", "The author explains how to build a playground.", "The author lists every game  ball, and small starter cage", "Our bunny kit has everything your rabbit will ever need!", "Pet Store Poster", "small starter cage"], 1, 5], ["Which source gives the best support for what a rabbit should eat every day?", ["Source A only", "Source B only", "Source C, because it mentions hay, water, and veterinarian advice", "None of the sources talks about food"], 2, 5], ["Which source is most useful if a student wants advice from experts about rabbit care?", ["Source A", "Source B", "Source C", "All sources are equally expert"], 2, 5], ["Which source about pet rabbits is most likely to show bias because it is trying to sell something?", ["Source A", "Source B", "Source C", "None of them"], 1, 5], ["A student wants to know whether a small cage is enough for a rabbit. Which source is most relevant?", ["Source A, because it says rabbits need room to hop", "Source B, because it uses big letters", "Source C only because it mentions water", "None of the sources say anything about space"], 0, 5]]}, "Math Practice 1": [["What is 47 + 36?", ["73", "83", "93", "74"], 1], ["There are 4 groups of 6 apples. How many apples are there in all?", ["10", "20", "24", "28"], 2], ["Which fraction is equivalent to 1/2?", ["1/4", "2/4", "3/4", "3/8"], 1], ["What is 8 x 7?", ["54", "56", "63", "48"], 1], ["A rectangle has length 5 cm and width 3 cm. What is its perimeter?", ["8 cm", "15 cm", "16 cm", "10 cm"], 2], ["Round 374 to the nearest hundred.", ["300", "370", "380", "400"], 3], ["What is 81 / 9?", ["7", "8", "9", "10"], 2], ["Which number is even?", ["37", "51", "84", "99"], 2], ["3 out of 8 equal parts are shaded. What fraction is shaded?", ["3/5", "5/8", "3/8", "8/3"], 2], ["24 marbles are shared equally among 6 friends. How many does each friend get?", ["3", "4", "6", "18"], 1], ["The hour hand is on 3 and the minute hand is on 12. What time is it?", ["12:03", "3:00", "3:12", "12:15"], 1], ["Which symbol makes this true? 456 ___ 465", [">", "<", "=", "+"], 1], ["A rectangle has length 7 units and width 4 units. What is its area?", ["11 sq units", "22 sq units", "28 sq units", "14 sq units"], 2], ["What is 500 - 263?", ["237", "247", "337", "763"], 0], ["Which digit is in the hundreds place in 4,726?", ["4", "7", "2", "6"], 1], ["Bar graph: Mon=5, Tue=8, Wed=6, Thu=9 students. What is the total?", ["26", "28", "30", "24"], 1], ["Which is true?", ["1/3 > 1/2", "1/4 < 1/3", "1/2 < 1/4", "1/3 = 1/4"], 1], ["What multiplication fact helps you solve 35 / 5?", ["5 x 5 = 25", "5 x 7 = 35", "5 x 8 = 40", "6 x 5 = 30"], 1], ["There are 3 boxes with 9 crayons each. How many crayons total?", ["12", "21", "27", "36"], 2], ["What is the value of the digit 6 in 672?", ["6", "60", "600", "6,000"], 2], ["Which two shapes have 4 sides?", ["Triangle and circle", "Square and rectangle", "Pentagon and hexagon", "Oval and triangle"], 1], ["If 4 x 6 = 24, what is 24 / 4?", ["4", "5", "6", "8"], 2], ["A number line shows jumps of 3 starting at 0. What is the 5th number?", ["12", "15", "18", "5"], 1], ["What is the missing number? 7 x ___ = 63", ["7", "8", "9", "6"], 2], ["Which shape has exactly 1 line of symmetry?", ["Square", "Rectangle", "Isosceles triangle", "Circle"], 2]], "Math Practice 2": [["Choose the symbol that makes this true: 76,880 __ 70,332", [">", "<", "=", "?"], 0], ["Which rule matches the table? (Input-Output: 2-4, 4-8)", ["Add 2", "Multiply by 3", "Subtract 2", "Multiply by 2"], 3], ["What is 5 x 8?", ["13", "40", "45", "32"], 1], ["Which shape has 6 sides?", ["Hexagon", "Rectangle", "Triangle", "Trapezoid"], 0], ["How many plants are 6 inches tall? (Line plot shows 1 X above 6)", ["2", "3", "10", "1"], 3], ["Which fraction is greater: 2/3 or 7/8?", ["2/3", "7/8", "They are equal", "Not enough information"], 1], ["What number makes this true? 12 / ___ = 2", ["6", "12", "7", "2"], 0], ["Which tool is best for measuring the distance around a desk?", ["Tape measure", "Thermometer", "Clock", "Scale"], 0], ["What temperature is shown if a thermometer reads -2 degrees Fahrenheit?", ["−2°F", "3°F", "−7°F", "−2°C"], 0], ["In the number 2,878, which digit is in the thousands place?", ["8", "7", "1", "2"], 3], ["What number comes next? 20, 25, 30, 35, ___", ["100", "30", "40", "41"], 2], ["21 stickers are put into groups of 7. How many groups?", ["3", "7", "4", "21"], 0], ["How many sides does a hexagon have?", ["6", "7", "5", "8"], 0], ["According to a table (Red:13, Blue:15, Green:3, Yellow:8), how many students chose red?", ["3", "14", "13", "15"], 2], ["Which fraction is greater: 1/4 or 2/3?", ["1/4", "2/3", "They are equal", "Not enough information"], 1], ["What number makes this true? ___ x 10 = 120", ["12", "120", "10", "13"], 0], ["A quadrilateral has sides 12 ft, 3 ft, 9 ft, and a missing side. Perimeter = 32 ft. What is the missing side?", ["7", "8", "17", "24"], 1], ["A clock shows hour hand near 5, minute hand at 15 minutes. What time?", ["5:15", "6:15", "5:10", "5:20"], 0], ["In the number 73,713, which digit is in the thousands place?", ["3", "1", "6", "7"], 0], ["Which rule matches? (1-5, 3-15, 4-20, 7-35)", ["Add 5", "Subtract 5", "Multiply by 6", "Multiply by 5"], 3], ["32 stickers are put into groups of 8. How many groups?", ["32", "4", "5", "8"], 1], ["Which pair of lines is perpendicular?", ["Two lines that cross to make a square corner", "Two lines that never meet and stay the same distance apart", "Two lines that curve", "Two lines that overlap completely"], 0], ["According to a table (Red:14, Blue:6, Green:10, Yellow:4), how many chose blue?", ["6", "14", "4", "7"], 0], ["Which fraction is greater: 1/2 or 1/8?", ["1/2", "1/8", "They are equal", "Not enough information"], 0], ["What number makes this true? 28 / ___ = 7", ["4", "5", "28", "7"], 0], ["A quadrilateral has sides 10 ft, 3 ft, 12 ft, and a missing side. Perimeter = 32 ft. Missing side?", ["7", "6", "19", "25"], 0], ["What temperature is shown if a thermometer reads 65 degrees Fahrenheit?", ["65°F", "70°F", "60°F", "65°C"], 0], ["Round 99,977 to the nearest 10.", ["99,981", "99,970", "99,990", "99,980"], 3], ["There are 3 bags with 7 marbles in each bag. How many marbles in all?", ["7", "10", "24", "21"], 3], ["Which shape has 5 sides?", ["Pentagon", "Rectangle", "Triangle", "Trapezoid"], 0], ["How many plants are 8 inches tall? (Line plot shows 1 X above 8)", ["7", "1", "8", "2"], 1], ["Point P is 7 equal parts from 0 on a number line divided into 8 equal parts. Which fraction names P?", ["1 1/8", "1", "1 1/7", "7/8"], 3], ["There are 4 rows of chairs with 7 chairs in each row. Which equation matches?", ["4 x 28 = 7", "28 / 7 = 28", "4 + 7 = 28", "4 x 7 = 28"], 3], ["A quadrilateral has sides 9 ft, 10 ft, 8 ft, and a missing side. Perimeter = 38 ft. Missing side?", ["27", "10", "11", "19"], 2], ["A game starts at 7:50 and lasts 50 minutes. What time does it end?", ["8:50", "7:40", "8:40", "8:30"], 2], ["Choose the symbol: 35,060 __ 33,908", [">", "<", "=", "?"], 0], ["32 stickers are put into groups of 4. How many groups?", ["8", "32", "4", "9"], 0], ["Which height appears most often? (Line plot: 2 X's above 4 and 9, others have 1)", ["6", "9", "1", "4"], 3], ["1 of the 2 buttons are red. Which fraction are red?", ["2", "1 1/2", "1", "1/2"], 3], ["What number makes this true? 18 / ___ = 2", ["10", "9", "2", "18"], 1], ["Choose the symbol: 9,033 __ 70,669", [">", "<", "=", "?"], 1], ["A farmer picked 367 apples in the morning and 158 in the afternoon. How many total?", ["535", "377", "525", "209"], 2], ["A bar graph shows Yellow=10, Red=6. How many MORE chose yellow than red?", ["16", "4", "6", "13"], 1], ["2 of the 6 buttons are red. Which fraction are red?", ["2/3", "1/3", "3", "2/5"], 1], ["There are 8 rows of chairs with 6 chairs in each row. Which equation matches?", ["48 / 6 = 48", "8 + 6 = 48", "8 x 6 = 48", "8 x 48 = 6"], 2], ["What is 20 / 5?", ["5", "4", "20", "6"], 1], ["According to a table (Red:5, Blue:10, Green:14, Yellow:5), how many chose green?", ["16", "15", "5", "14"], 3], ["4 of the 12 buttons are red. Which fraction are red?", ["4/11", "3", "1/3", "1/2"], 2], ["A farmer picked 283 apples in the morning and 50 in the afternoon. How many total?", ["233", "333", "343", "293"], 1], ["What is 407 x 4?", ["1,221", "1,628", "1,632", "411"], 1]]}}, "Grade 4": {"color": "#1A5276", "subjects": {"Reading": {"passages": [{"title": "Passage 1 — The Rain Barrel Idea", "text": "<p>By the second week of June, the garden behind Valley View School looked tired. The lettuce leaves drooped. The bean vines curled at the edges. Every afternoon, the sun pressed down on the raised beds until the soil felt warm and crumbly. Ms. Romero, the garden leader, carried watering cans back and forth, but she knew the plants needed more than a quick splash.</p><p>Lena watched from the sidewalk while she waited for her older brother. She liked the garden because each class planted something different. Her class had planted marigolds near the tomatoes. The bright flowers made the garden look cheerful even on hot days. Lena wanted to help, but most of the jobs seemed too big.</p><p>One evening, Lena noticed her grandfather rinsing peaches in a bowl instead of under running water. When he finished, he poured the leftover water into a flower pot. \"Plants do not care if water comes from a hose or a bowl,\" he said with a smile. That sentence stayed in Lena's mind all night.</p><p>The next day, Lena brought an idea to school. She asked Ms. Romero if the garden club could collect rainwater in a barrel under the roof gutter. Ms. Romero said the club would need to ask the custodian and the principal first. Lena made a neat drawing that showed where the barrel could stand. She labeled the gutter, the lid, and a small spout at the bottom. The principal liked the plan because it saved water and gave students a chance to learn.</p><p>The barrel arrived the next week. After the first summer storm, the club hurried outside. They lifted the lid and peered in. The barrel held enough water to fill several cans. By July, the lettuce stood tall again, the beans had straightened, and the marigolds glowed like little suns. Lena grinned each time she turned the spout. Her idea had started as one small question, but it had grown into something the whole school could use.</p>"}, {"title": "Passage 2 — Why Bees Matter", "text": "<p>Many people notice bees because of their black-and-yellow stripes, but bees do much more than buzz from flower to flower. As a bee searches for nectar, it brushes against the dusty pollen inside a blossom. Some of that pollen sticks to the bee's body. When the bee lands on the next flower, a little pollen rubs off. This movement helps plants make seeds and fruit. The process is called pollination.</p><p>Pollination matters to gardens, farms, and even forests. Apple trees, pumpkin vines, blueberry bushes, and many wildflowers depend on pollinators. Without help from insects, some plants would make fewer fruits, and some would not grow seeds at all. Bees are not the only pollinators. Butterflies, beetles, flies, and even hummingbirds carry pollen too. Still, bees are especially important because they visit many flowers in one trip.</p><p>Bees need safe places to live. Some bees build hives, but many kinds live alone. A few nest in hollow stems or tiny holes in wood. Others dig small tunnels in the ground. When people leave a patch of bare soil, plant many kinds of flowers, and avoid spraying harmful chemicals, they create friendlier spaces for pollinators.</p><p>A garden that attracts bees often becomes healthier in more than one way. Flowers bloom, fruits develop, and seeds form for the next season. That is why some schools plant pollinator gardens with native flowers that open at different times of year. These gardens give bees food from spring through fall. They also give students a closer look at how living things depend on one another.</p>"}, {"title": "Passage 3 — The Library on Wheels", "text": "<p>Before families could stream movies or order books with a few taps, getting reading materials was not always easy. In some rural parts of the United States, the nearest library building was many miles away. Roads could be muddy in spring and icy in winter. For children who loved stories, that distance felt much longer.</p><p>To solve the problem, some communities created bookmobiles. A bookmobile was a traveling library, often built inside a truck or bus. Shelves lined the walls. Bins held picture books, chapter books, magazines, and sometimes puzzles. On certain days, the bookmobile stopped in small towns, at country schools, or near community centers. Families knew the schedule and waited for its arrival.</p><p>Bookmobiles did more than deliver books. They also connected neighbors. Librarians learned what readers liked and brought special titles for them. If one child loved animal stories and another wanted books about space, the librarian might set those books aside before the next visit. Children returned finished books, checked out new ones, and talked with friends about what they had read.</p><p>Today, many libraries still use bookmobiles, but the vehicles may carry more than books. Some have computers, internet hotspots, or activity kits. Others visit neighborhoods after school and offer story times on the steps outside. The wheels may be the same idea as before, but the mission remains simple: bring information and stories to the people who need them.</p>"}, {"title": "Passage 4 — Two Texts About a Park Cleanup (Paired)", "text": "<strong class='source-label'>Text 1: Neighborhood Cleanup Flyer</strong><p><strong>Saturday, April 20</strong><br>Meet at 9:00 a.m. at Maple Park.<br>Volunteers will pick up litter, pull weeds, and plant flowers near the playground. Gloves and trash bags will be provided. Students who attend can earn one hour of community service. Bring a water bottle and wear closed-toe shoes.</p><hr class='divider'/><strong class='source-label'>Text 2: Maya's Journal</strong><p>This morning I almost stayed home because the sky looked gray. I thought the cleanup might be boring too. But when I got to Maple Park, people were already working in teams. Mr. Chen showed us how to separate recycling from trash, and my friend Alina helped me plant purple flowers near the bench by the swings. By the end of the morning, the park looked brighter. I was muddy and tired, but I also felt proud when a little kid ran straight to the cleaned-up slide.</p>"}, {"title": "Passage 5 — Why Our School Should Compost", "text": "<p>Every day after lunch, our school throws away piles of fruit peels, sandwich crusts, napkins, and paper trays. Some of that waste must go in the trash, but much of it could be composted instead. Compost is made from natural materials that break down into dark, crumbly soil. Schools that compost can use the finished material in gardens and flower beds.</p><p>Starting a compost program would take teamwork, but the rewards are worth it. First, students and adults would need to learn which items belong in compost bins. Banana peels, apple cores, and leaves are good choices. Plastic wrappers and metal cans are not. Clear signs near the cafeteria bins could help everyone sort correctly.</p><p>A compost program could also become part of science lessons. Students could observe how food scraps change over time, measure temperature inside the pile, and compare how different materials break down. Instead of treating lunch waste as something useless, students could see it as part of a cycle.</p><p>Some people worry that compost bins smell bad or attract pests. Those are real concerns, but they can be managed. Bins need lids, the right mix of wet and dry materials, and regular turning. Many schools already compost successfully by following these steps. Our school should join them and turn more of our lunch leftovers into something useful.</p>"}, {"title": "Passage 6 — Which Source Should You Trust? (Media Literacy)", "text": "<strong class='source-label'>Source A: City Park Department Webpage</strong><p>The city plans to add a new climbing structure and two shade trees to Oak Street Playground this summer. Construction is expected to begin in July and finish before school starts in the fall. The project will be paid for with money from the city's parks improvement fund. During construction, the playground area will be fenced off for safety, but the walking path will stay open.</p><hr class='divider'/><strong class='source-label'>Source B: SunnyFun Playsets Advertisement</strong><p>Oak Street families deserve the biggest and brightest playground in the county! Our Mega Mountain set will make every child stronger, faster, and happier. No other playset comes close. Ask your city leaders to buy SunnyFun products right away. If they choose anything else, children will miss out on the best summer ever.</p>"}], "questions": [["What is the best theme of the Rain Barrel story?", ["Children should not ask adults questions.", "Gardens only grow well in the rain.", "School projects should always be easy.", "A small idea can grow into a helpful change."], 3, 0], ["Which detail best shows that the garden in the Rain Barrel story needed help?", ["The lettuce leaves drooped and the bean vines curled.", "Lena waited for her older brother.", "The principal liked careful drawings.", "The marigolds were bright flowers."], 0, 0], ["In the Rain Barrel story, the word 'drooped' most nearly means", ["became stronger", "changed color", "grew taller", "hung down"], 3, 0], ["Why does the author include the sentence about Lena's grandfather pouring water into a flower pot?", ["It tells readers that Ms. Romero needed more helpers.", "It explains what gave Lena her idea.", "It shows Lena would rather be at home than at school.", "It proves peaches are grown in the school garden."], 1, 0], ["How does the Rain Barrel story's structure help readers understand Lena's success?", ["It compares two gardens in different states.", "It lists random garden facts in no order.", "It shows the problem first and then the steps Lena takes to solve it.", "It tells the ending before the problem begins."], 2, 0], ["Which sentence best describes Ms. Romero's perspective on Lena's plan?", ["She believes the plan will never work.", "She thinks the plan is worth trying if the school approves it.", "She wants Lena to keep the idea secret.", "She thinks students should not help with the garden."], 1, 0], ["Which detail gives the strongest evidence that the rain barrel helped the garden?", ["By July, the lettuce stood tall again and the beans had straightened.", "Lena made a neat drawing with labels.", "The club hurried outside after the storm.", "The barrel stood under the roof gutter."], 0, 0], ["What is the main idea of the article about bees?", ["All insects build hives in trees.", "Forests do not need pollinators.", "Bees help many plants grow by carrying pollen from flower to flower.", "Only honeybees matter to gardens."], 2, 1], ["According to the bee article, what happens during pollination?", ["Bees make nectar inside flowers.", "Seeds turn into blossoms overnight.", "Pollen moves from one flower to another.", "Roots carry water into the sky."], 2, 1], ["In the bee article, the word 'avoid' most nearly means", ["measure", "gather more of", "paint over", "stay away from"], 3, 1], ["Why does the bee article mention butterflies, beetles, flies, and hummingbirds?", ["to prove hummingbirds are better than bees", "to list animals that eat flowers", "to explain how to build a beehive", "to show that bees are important but not the only pollinators"], 3, 1], ["How does paragraph 3 of the bee article support the main idea?", ["It explains ways people can protect places where pollinators live.", "It describes how fruits are sold at a market.", "It tells a story about a bee lost in a garden.", "It gives the life cycle of one apple tree."], 0, 1], ["What is the author's purpose in writing the bee article?", ["to persuade readers to buy honey from one farm", "to entertain readers with a made-up bee adventure", "to explain why pollinators matter and how people can help them", "to warn readers never to plant flowers"], 2, 1], ["Which detail from the bee article best supports the claim that pollinator gardens are useful?", ["A few bees live in wood.", "Native flowers that bloom at different times give bees food from spring through fall.", "Some bees have black-and-yellow stripes.", "Many people notice bees buzzing."], 1, 1], ["What is the central idea of the bookmobile article?", ["Children stopped reading once movies became popular.", "Rural roads were easy to travel in all seasons.", "Bookmobiles were created to bring library services to people who lived far from a library.", "Libraries were replaced by buses in every town."], 2, 2], ["Which detail best explains why bookmobiles were needed?", ["Shelves lined the walls of the truck.", "Librarians enjoyed talking with children.", "In some places, the nearest library building was many miles away.", "Some bookmobiles had puzzles."], 2, 2], ["In the bookmobile article, the word 'mission' most nearly means", ["road map", "reading contest", "type of vehicle", "main purpose"], 3, 2], ["How does the bookmobile article organize information?", ["The author explains a problem, describes a solution, and then shows how it continues today.", "The author gives steps for building a bus.", "The author compares two characters in a story.", "The author lists random library facts without a focus."], 0, 2], ["Why does the bookmobile author include examples of librarians setting aside special titles?", ["to explain how trucks are repaired", "to show that bookmobiles served readers in a personal way", "to show that all readers wanted animal stories", "to prove that only children borrowed books"], 1, 2], ["What point of view about bookmobiles does the author communicate?", ["Bookmobiles work only in warm weather.", "Bookmobiles are a practical and caring way to share books and information.", "Bookmobiles are useful only for adults.", "Bookmobiles are outdated and should disappear."], 1, 2], ["Which detail best supports the idea that modern bookmobiles have changed with time?", ["Shelves lined the walls.", "Roads could be muddy in spring.", "Families waited for the schedule.", "Some now carry computers, internet hotspots, or activity kits."], 3, 2], ["What do both the park cleanup flyer and Maya's journal mostly show?", ["Rain always ruins outdoor plans.", "Community service should happen indoors.", "People are working together to improve Maple Park.", "The park is closing for repairs."], 2, 3], ["Which detail from Maya's journal shows her opinion changed?", ["She felt proud when she saw a child run to the cleaned-up slide.", "Students could earn community service.", "The sky looked gray in the morning.", "Gloves and trash bags were provided."], 0, 3], ["In Maya's journal, the word 'brighter' most nearly suggests", ["colder and wetter", "older and quieter", "louder and busier", "cleaner and more cheerful"], 3, 3], ["How are the park cleanup flyer and Maya's journal different?", ["The flyer gives event information, while the journal shares one person's experience.", "The flyer is fiction, while the journal is a science article.", "The flyer explains feelings, while the journal lists supplies only.", "Both texts are advertisements for a toy store."], 0, 3], ["Why is the park cleanup flyer a useful source for someone deciding whether to attend?", ["It tells who won a prize at the park.", "It gives the time, place, and what volunteers should bring.", "It explains Maya's feelings in detail.", "It shows how long the swings are."], 1, 3], ["Which text is more helpful for learning how the cleanup felt to a volunteer?", ["Maya's journal", "neither text", "the flyer", "both texts equally"], 0, 3], ["If a student wants to know whether gloves will be available at the cleanup, which source is most relevant?", ["Maya's journal only", "neither source", "a weather map", "the flyer"], 3, 3], ["What is the author's main claim in the compost article?", ["The school should start a compost program.", "Science lessons should move outside every day.", "Students should stop eating fruit at lunch.", "Trash bins should be removed from the cafeteria."], 0, 4], ["Which detail best supports the compost article's claim?", ["Many schools already compost successfully by following a few steps.", "Lunch happens every day after noon.", "Finished compost is dark and crumbly.", "Plastic wrappers and metal cans are not compostable."], 0, 4], ["In the compost article, the word 'cycle' most nearly means", ["a short class period", "a noisy machine", "a process that repeats", "a kind of bicycle"], 2, 4], ["Why does the compost author include paragraph 3 about science lessons?", ["to tell a funny story about lunch", "to compare two sports teams", "to show that composting needs no planning", "to explain an educational benefit of composting"], 3, 4], ["How does the compost author address a possible opposing view?", ["by admitting concerns about smell and pests and then explaining solutions", "by saying only teachers should compost", "by changing the topic to recycling bottles", "by ignoring every concern readers may have"], 0, 4], ["What is the compost article author's purpose?", ["to explain the history of school lunches", "to describe a vacation to a farm", "to persuade readers that composting is a good idea for the school", "to entertain readers with a mystery"], 2, 4], ["Which source would be most credible for checking the claim that many schools compost successfully?", ["an advertisement for lunch trays", "a comic strip about worms", "a poster with no author listed", "a report from a school district that runs compost programs"], 3, 4], ["What is the main difference between Source A (city park webpage) and Source B (SunnyFun advertisement)?", ["Source A gives opinions only, while Source B gives careful facts only.", "Source A is a poem, while Source B is a recipe.", "Source A informs readers about a project, while Source B tries to persuade readers to buy one company's product.", "Both sources are diary entries."], 2, 5], ["Which detail from the city park webpage is most useful to a family wanting to know when construction will happen?", ["Construction is expected to begin in July and finish before school starts in the fall.", "Two shade trees will be added.", "The walking path will stay open.", "The project is paid for with city funds."], 0, 5], ["In the SunnyFun advertisement, the word 'deserve' helps create a tone that is", ["sad and disappointed", "careful and neutral", "quiet and uncertain", "excited and persuasive"], 3, 5], ["Which source is more credible for learning how the playground project will be paid for?", ["Source A", "neither source", "both sources equally", "Source B"], 0, 5], ["Why is the SunnyFun advertisement less reliable for factual planning details?", ["It mentions Oak Street by name.", "It says children like summer.", "It uses strong opinions and does not provide specific project facts.", "It is written in complete sentences."], 2, 5], ["What is the purpose of the sentence 'If they choose anything else, children will miss out on the best summer ever'?", ["to pressure readers by making the product sound extremely important", "to show when fences will be installed", "to explain the city's budget", "to summarize a neutral report"], 0, 5], ["If a student is writing a report about the playground project, which source is more relevant for dates and safety information?", ["a flyer for ice cream", "Source B", "Source A", "both sources equally"], 2, 5]]}, "Math": [["What is 3,456 + 2,789?", ["5,245", "6,145", "6,245", "6,355"], 2], ["A rectangle has length 9 cm and width 4 cm. What is its area?", ["13 cm²", "26 cm²", "36 cm²", "40 cm²"], 2], ["Which fraction is equivalent to 3/4?", ["6/8", "4/6", "5/8", "2/3"], 0], ["What is 56 x 7?", ["382", "392", "372", "402"], 1], ["What is 2,000 - 847?", ["1,153", "1,163", "1,053", "1,253"], 0], ["A bag of rice weighs 2.5 kg. How many grams? (1 kg = 1,000 g)", ["25 g", "250 g", "2,500 g", "25,000 g"], 2], ["Which is a prime number?", ["4", "9", "15", "17"], 3], ["What is 4/5 as a decimal?", ["0.45", "0.54", "0.80", "0.08"], 2], ["What is 6,300 / 9?", ["600", "700", "70", "6,300"], 1], ["Which angle is greater than 90 degrees?", ["Acute angle", "Right angle", "Obtuse angle", "Straight angle"], 2], ["Order from least to greatest: 3/4, 1/2, 7/8", ["7/8, 3/4, 1/2", "1/2, 3/4, 7/8", "3/4, 1/2, 7/8", "1/2, 7/8, 3/4"], 1], ["What is 1/3 + 1/3?", ["2/6", "2/3", "1/6", "3/6"], 1], ["A movie starts at 2:15 PM and lasts 1 hour 45 minutes. What time does it end?", ["3:45 PM", "4:00 PM", "3:00 PM", "4:15 PM"], 1], ["Which number has the digit 5 in the ten-thousands place?", ["52,000", "5,200", "500", "50"], 0], ["What is 3 x 247?", ["631", "641", "741", "731"], 2], ["What is the area of a square with side length 8 cm?", ["32 cm²", "64 cm²", "16 cm²", "24 cm²"], 1], ["A school collects 1,250 cans in January and 875 in February. How many total?", ["2,025", "2,125", "2,100", "2,105"], 1], ["What is 5/8 - 3/8?", ["2/0", "2/16", "2/8", "8/8"], 2], ["Pattern: 3, 6, 12, 24, ___. What is the next number?", ["36", "40", "48", "30"], 2], ["How many lines of symmetry does a regular hexagon have?", ["2", "4", "6", "8"], 2], ["What is 25 x 40?", ["800", "1,000", "900", "1,100"], 1], ["Round 4,672 to the nearest thousand.", ["4,000", "4,600", "4,700", "5,000"], 3], ["A right triangle has legs 3 cm and 4 cm, hypotenuse 5 cm. What is the perimeter?", ["10 cm", "12 cm", "7 cm", "14 cm"], 1], ["What is 5 x (3 + 4)?", ["19", "35", "23", "32"], 1], ["Which pair of fractions is equivalent?", ["1/2 and 2/5", "2/3 and 4/6", "3/4 and 5/8", "1/3 and 2/5"], 1]], "Math Practice 1": [["What is 8 × 7?", ["56", "49", "64", "54"], 0], ["What is 72 ÷ 8?", ["7", "9", "8", "10"], 1], ["What is 324 × 10?", ["3,240", "324", "32,400", "3,420"], 0], ["What is 48 × 6?", ["296", "288", "254", "268"], 1], ["What is 326 × 4?", ["1,324", "1,344", "1,304", "1,204"], 2], ["What is 918 ÷ 3?", ["316", "306", "309", "326"], 1], ["A museum has 1,440 tickets packed equally into 12 boxes. How many tickets per box?", ["128", "112", "132", "120"], 3], ["Which estimate is closest to 53 × 38?", ["1,500", "2,600", "2,000", "2,400"], 2], ["A school ordered 18 boxes of 24 markers, then used 35. How many markers were left?", ["389", "467", "397", "407"], 2], ["Which fraction is equivalent to 3/4?", ["3/8", "8/12", "6/8", "4/8"], 2], ["Which symbol makes 5/8 __ 3/8 true?", ["<", "cannot tell", "=", ">"], 3], ["Which symbol makes 7/8 __ 3/4 true?", ["cannot tell", ">", "=", "<"], 1], ["What is 3/8 + 2/8?", ["5/16", "1", "5/8", "3/10"], 2], ["What is 7/10 − 4/10?", ["3/10", "4/3", "3/20", "11/10"], 0], ["How is 4.07 read?", ["four hundred seven", "four and seven tenths", "four and seven hundredths", "forty-seven hundredths"], 2], ["Which decimal is greater: 3.45 or 3.405?", ["3.45", "They are equal", "3.405", "Not enough information"], 0], ["Which number is equal to 0.75?", ["4/3", "3/4", "1/2", "7/10"], 1], ["Round 6.47 to the nearest tenth.", ["6.47", "6.5", "7.0", "6.4"], 1], ["Which list is in order from least to greatest: 1.2, 1½, 7/4?", ["1.2, 1½, 7/4", "1½, 1.2, 7/4", "1½, 7/4, 1.2", "7/4, 1.2, 1½"], 0], ["A recipe uses 1.5 cups of oats per batch. How many cups for 4 batches?", ["6.5", "6", "7", "5"], 1], ["Rule: multiply by 3 then add 2. Output when input is 5?", ["15", "13", "11", "17"], 3], ["Table shows 2→7, 4→9, 6→11. Which rule matches?", ["add 3", "multiply by 2", "subtract 5", "add 5"], 3], ["What number makes n × 6 = 42 true?", ["9", "6", "8", "7"], 3], ["What number makes 54 ÷ m = 6 true?", ["8", "9", "6", "12"], 1], ["8 bags, same marbles each, 56 total. Which equation matches?", ["8 + b = 56", "56 ÷ 8 = 64", "56 − 8 = b", "8 × b = 56"], 3], ["A pattern goes 12, 15, 18, 21, … What happens each time?", ["subtract 3", "add 3", "multiply by 3", "add 6"], 1], ["Using the pattern 12, 15, 18, 21, … what is the 6th number?", ["33", "27", "30", "24"], 1], ["Which table shows the rule 'multiply by 4'?", ["2→4, 3→7, 5→9", "2→8, 3→12, 5→20", "2→12, 3→16, 5→24", "2→6, 3→9, 5→15"], 1], ["A triangle has one 90-degree angle. How is it classified?", ["obtuse triangle", "acute triangle", "right triangle", "scalene quadrilateral"], 2], ["Which shape always has exactly one pair of parallel sides?", ["rectangle", "square", "rhombus", "trapezoid"], 3], ["An angle measures 92 degrees. What kind of angle is it?", ["obtuse", "right", "acute", "straight"], 0], ["An angle measures 38 degrees. What kind of angle is it?", ["straight", "right", "obtuse", "acute"], 3], ["Area of a rectangle 9 units long and 6 units wide?", ["45", "30", "15", "54"], 3], ["A classroom rug is 12 feet by 8 feet. What is its area?", ["20", "96", "40", "88"], 1], ["Two rectangles have areas 24 and 18 sq units. What is the total area?", ["42", "36", "48", "52"], 0], ["A shape slides 5 units right without turning. What transformation is this?", ["rotation", "dilation", "reflection", "translation"], 3], ["A shape is flipped across a line. What transformation is this?", ["rotation", "reflection", "translation", "stretch"], 1], ["A square turns one quarter-turn clockwise. What transformation is this?", ["translation", "rotation", "reflection", "resize"], 1], ["After a slide, flip, or turn, the new figure is ___.", ["larger than the original", "always a different shape", "always a mirror image only", "congruent to the original"], 3], ["How many lines of symmetry does a square have?", ["4", "1", "8", "2"], 0], ["Which quadrilateral has 4 right angles and 4 equal sides?", ["parallelogram", "square", "trapezoid", "rectangle"], 1], ["An L-shaped playground has a 7×4 and a 3×5 rectangle. What is the total area?", ["35", "54", "47", "43"], 3], ["Which statement about a rectangle is always true?", ["It has exactly 1 right angle.", "It has 4 right angles.", "All 4 sides are the same length.", "It has no parallel sides."], 1], ["Bar graph: 12 soccer, 9 basketball, 6 tennis, 3 hockey. Which was chosen fewest?", ["basketball", "soccer", "tennis", "hockey"], 3], ["Venn: 7 like cats only, 5 dogs only, 4 both. How many like cats?", ["9", "16", "11", "12"], 2], ["Which display is best for showing events in order over time?", ["number sentence", "timeline", "Venn diagram", "bar graph"], 1], ["Books read by four classes: 24, 31, 18, 27. How many total?", ["104", "96", "90", "100"], 3], ["Bar graph: 15 red, 10 blue, 5 yellow balloons. How many more red than yellow?", ["15", "20", "10", "5"], 2], ["Venn: 6 music only, 8 art only, 3 both. How many in music or art?", ["17", "21", "11", "14"], 0], ["Which statement can be supported by a bar graph?", ["It always shows events over time.", "You can compare how many are in each category.", "It cannot show numbers.", "It shows only two groups."], 1]]}}, "Grade 5": {"color": "#0D3D2E", "subjects": {"Reading": {"passages": [{"title": "Section 1 — The Broken Kite", "text": "<p>On the first warm Saturday of April, Rosa climbed the attic stairs to search for a box of spring decorations. Instead, she found her grandfather's old kite leaning behind a trunk. Its red paper was faded to the color of brick dust, and one thin wooden rib was cracked straight through. A note was tied to the tail with blue string: <em>For the first windy day.</em> Rosa smiled. Grandpa had written the note two summers before he moved to Arizona, back when they used to fly kites together in the park every April.</p><p>Downstairs, Rosa spread the kite across the kitchen table. Her little brother, Mateo, wrinkled his nose. \"That thing can't fly,\" he said. \"It looks like a sandwich that got stepped on.\" Rosa ignored him. She cut a fresh strip of paper, glued the torn edge, and taped the cracked rib to a new support stick. The whole time, she could almost hear Grandpa's voice: \"A kite does not need to be perfect. It only needs balance.\"</p><p>That afternoon, the neighborhood association held its annual kite festival on the soccer field. Kids ran through the grass dragging bright tails behind them. Some kites looked like dragons, some like rockets, and one giant blue fish rose so high that people shaded their eyes to follow it. Rosa felt suddenly embarrassed carrying her patched kite.</p><p>Then she noticed a boy about her age kneeling near the fence. He was staring at a green kite that had snapped loose from its string and tangled itself in the wire. Rosa recognized him from school — his name was Ezra, and he had moved into the apartment building across the street only a month earlier.</p><p>\"Want help?\" Rosa asked. Together they worked the string out of the fence one loop at a time. When they finally freed the kite, the tail was torn and one corner had ripped away. Ezra looked as if the wind had blown all the excitement right out of him.</p><p>Rosa glanced toward the starting line, where festival volunteers were calling participants to line up for the contest. The wind tugged at her sleeve like an impatient puppy. Instead, Rosa knelt in the grass and pulled a roll of spare tape from her pocket. \"Hold this corner flat,\" she said. They patched the green kite, tied on a shorter tail from leftover ribbon, and tested the frame by lifting it into the wind. It wobbled at first like a tired bird. Then it steadied.</p><p>By the time Rosa reached the starting line, the contest had already begun. She was too late to enter. Then Ezra, running nearby with his repaired kite, called, \"Rosa! Look!\" His kite swept upward in a clean arc.</p><p>Rosa launched Grandpa's kite next. It did not soar as high as the dragon, and it dipped whenever the wind shifted. But it stayed aloft. As the red tail flickered against the clouds, Rosa understood what Grandpa had meant about balance. The old kite was held together by mended paper, new tape, old memories, and one changed plan. Somehow, all of it worked.</p>"}, {"title": "Section 2 — Why Some City Trees Keep Their Leaves Longer", "text": "<p><em>By Lena Ortiz, neighborhood arborist</em></p><p>Have you ever noticed that some trees on city blocks stay green longer than trees in open parks? Many people assume those trees are simply a different kind. Sometimes that is true, but another reason has to do with the places where the trees are growing. Pavement, brick walls, and nearby buildings can change the temperature around a tree in small but important ways.</p><p>During the day, streets and sidewalks absorb heat from sunlight. After sunset, those hard surfaces release heat slowly. In neighborhoods with many buildings and paved lots, the air often stays a little warmer at night than the air in grassy areas. Scientists sometimes call this a heat island effect. Even a difference of a few degrees can affect how quickly leaves change color and fall.</p><p>Trees respond to temperature and daylight together. As autumn days grow shorter, trees begin to slow their growth. But when the nights remain warmer, some trees keep their leaves a bit longer before dropping them.</p><p>Water also matters. A tree planted in a tiny square of soil beside a hot street may lose water quickly. Another tree of the same species might stand near a building that blocks wind and holds moisture in the ground. Because city spaces differ so much from one block to the next, two trees growing only a few streets apart can behave differently.</p><p>Scientists who study city trees compare temperature records, soil moisture, and the dates when leaves change. This helps them determine whether a pattern is caused by weather, location, or some other factor.</p><table><tr><th>Location</th><th>Average Evening Temperature (October)</th></tr><tr><td>Downtown street with pavement and buildings</td><td>61°F</td></tr><tr><td>Neighborhood block with some pavement and lawns</td><td>57°F</td></tr><tr><td>Open park with grass and fewer buildings</td><td>54°F</td></tr></table>"}, {"title": "Section 3 — Maple Street at Dawn (Poem)", "text": "<p style='font-style:italic;line-height:2.2'>Before the buses growl,<br>before the bakery lifts its metal door,<br>Maple Street stretches in a silver hush.<br>Windows yawn awake.<br><br>A bicycle clicks past the sleeping shops.<br>The crossing guard plants her boots like bright commas on the corner.<br>Two sparrows argue in the gutter.<br>A boy with a trumpet case<br>walks carefully around a puddle<br>that holds half the sky.<br><br>Then the street changes—<br>steam, footsteps, lunch boxes, laughter—<br>but for one thin minute<br>the whole block seems to listen<br>to its own small morning heart.</p>"}, {"title": "Section 4 — Crossing the River (Paired Texts)", "text": "<strong class='source-label'>Text A: From Ana's Journal, May 12, 1918</strong><p>This morning the ferry rocked so hard that Mamá squeezed my shoulder and told me to stand still. Fog covered the river like a blanket, and the dock bell sounded louder than usual because I could not see the far shore. I wanted to act brave for my little cousin Tomás, but when the boat lurched away from the dock, my stomach lurched too. An old man near the railing laughed kindly and said the river was only showing off after the rain. When we reached the other side, my shoes were damp from the boards, and I felt proud that I had crossed without crying.</p><hr class='divider'/><strong class='source-label'>Text B: Museum Note About the East Ferry Route</strong><p>For many years, residents used the East Ferry Route to cross the Graystone River before a bridge was built. During wet weather, travelers often experienced stronger currents and reduced visibility from fog. Journal entries, ticket records, and city reports show that the route remained important because it connected farms, homes, and the market district. Ferry operators rang a dock bell in poor visibility to signal their location. The route closed in 1924, two years after construction began on the Graystone Bridge.</p>"}, {"title": "Section 5 — Should Our School Start a Repair Club?", "text": "<p>Every month, our school throws away items that could still be useful with a little care: backpacks with loose straps, calculators with missing battery covers, and chairs with wobbly screws. Instead of replacing so many things, our school should start a student repair club.</p><p>A repair club would reduce waste. When an item is tossed into a trash bin, it often ends up in a landfill even if only one small part is broken. Repairing an object keeps it in use longer. A single fixed zipper may not seem important, but many small repairs add up over time.</p><p>A repair club would also teach practical problem-solving. Students would learn to inspect an object, identify what is wrong, and choose a safe fix. Those are useful skills in science, art, engineering, and everyday life.</p><p>Some people may worry that a repair club would cost too much. However, many repairs require inexpensive materials such as thread, glue, replacement screws, or patch fabric. Local businesses sometimes donate leftover materials to student projects. If the club began with a small number of approved items, the cost would stay manageable.</p><p>Another concern is time. But a repair club could meet once a week after school, just like other clubs. Members would not need to fix everything at once. Starting a small repair club would help our school save resources, learn useful skills, and take better care of the things we already have.</p>"}, {"title": "Section 6 — Planning a Community Garden (Multi-Source)", "text": "<strong class='source-label'>Source A: News Brief</strong><p>Neighbors on Pine Avenue are planning a community garden in the empty lot behind the library. Volunteers hope the garden will provide vegetables, a small pollinator area, and an outdoor learning space for students. Organizers say the lot gets strong afternoon sun, but they still need more information about soil quality before planting begins.</p><hr class='divider'/><strong class='source-label'>Source B: Volunteer Day Flyer</strong><p><strong>Saturday, May 18 — 9:00 a.m. to 1:00 p.m.</strong><br>Tasks: clear litter, mark pathways, build two starter raised beds<br>Bring: water bottle, work gloves, closed-toe shoes<br>Goal: \"Let's make the best garden in the whole city!\"</p><hr class='divider'/><strong class='source-label'>Source C: County Extension Website</strong><p>Before growing food in a new location, collect soil samples from several spots and send them to a certified soil lab. Test results can show whether the soil has enough nutrients and whether the area contains contaminants that make food gardening unsafe. If the soil is not suitable, gardeners can use raised beds with clean soil and compost instead.</p>"}], "questions": [["Which statement best expresses a theme of the Broken Kite story?", ["Winning a contest is the best way to honor a family tradition.", "Old objects should be replaced with newer ones whenever possible.", "Helping someone can matter more than carrying out your original plan.", "People should avoid entering contests unless they are sure they will win."], 2, 0], ["Which summary best matches the Broken Kite story?", ["Rosa finds her grandfather's kite, repairs it, misses a contest while helping Ezra, and learns that her changed plan still honors what Grandpa taught her.", "Rosa and Mateo argue about whether old toys should be thrown away.", "Ezra wins the kite contest and teaches Rosa how to repair a broken frame.", "Grandpa mails Rosa a brand-new kite, and she wins the festival."], 0, 0], ["Why does the author include the contest volunteers calling participants to line up?", ["To show that Rosa has forgotten why she came to the festival", "To build tension by reminding readers that Rosa must choose how to use her time", "To prove that Ezra should not have brought his kite to the field", "To explain the rules of the contest in detail"], 1, 0], ["How does the story being told mostly through Rosa's thoughts shape the Broken Kite story?", ["It helps readers understand why missing the contest feels important to Rosa at first and meaningful later.", "It lets readers know what every person at the festival is thinking.", "It makes Grandpa the main character instead of Rosa.", "It turns the story into a secondhand report about the festival."], 0, 0], ["The wind tugged at Rosa's sleeve 'like an impatient puppy.' What does this comparison suggest?", ["The wind was weak and fading away.", "The wind kept pulling at Rosa again and again.", "The wind made Rosa feel afraid of animals.", "The wind came only from one short gust."], 1, 0], ["What does the word 'mended' most nearly mean in the last paragraph of the Broken Kite story?", ["hidden", "measured", "repaired", "painted"], 2, 0], ["Why is the word 'flickered' a strong choice in the last paragraph of the Broken Kite story?", ["It suggests the kite's tail moved lightly and quickly in the wind.", "It proves the kite's tail was made of metal.", "It shows the tail had caught on fire.", "It means the tail had stopped moving completely."], 0, 0], ["What is the central idea of the article about why city trees keep their leaves longer?", ["Trees in cities keep their leaves longer only because they are planted later in the year.", "Differences in temperature, water, and surroundings can cause city trees to behave differently in autumn.", "Open parks are always better places for trees than city streets.", "Scientists study trees mainly to find the tallest species in each neighborhood."], 1, 1], ["Which detail best supports the idea that location affects a tree's leaves?", ["Many people assume the trees are a different kind.", "Trees respond to temperature and daylight together.", "Two trees of the same species can behave differently even when they grow only a few streets apart.", "Cities want streets to stay cooler in summer."], 2, 1], ["How does the temperature table help readers understand the city trees article?", ["It shows exact evidence that evening temperatures can vary by location in a city.", "It proves that parks never get warm during the day.", "It explains how to identify every species of tree in a neighborhood.", "It lists the dates when each tree loses every leaf."], 0, 1], ["How does the author organize the city trees article?", ["By telling a made-up story about one tree and then switching to a poem", "By comparing different city conditions and explaining how each one can affect trees", "By listing tree names in alphabetical order", "By arguing that all city planning should stop immediately"], 1, 1], ["How does the author's role as a neighborhood arborist most influence the city trees article?", ["It leads the author to focus on practical observations about how city spaces affect trees.", "It causes the author to write only about animals instead of plants.", "It means the article must be fictional rather than factual.", "It keeps the author from using any scientific information."], 0, 1], ["What does the word 'determine' most nearly mean in the fifth paragraph of the city trees article?", ["forget", "figure out", "decorate", "copy down"], 1, 1], ["Which source would be most relevant and credible to confirm the claim about warmer city nights?", ["A weather station's temperature records collected from several city locations over many evenings", "A poster advertising a fall festival near downtown", "A friend's memory of one warm night last October", "A comic strip about a tree that talks"], 0, 1], ["Which idea is developed in the Maple Street at Dawn poem?", ["Busy places often have a calm moment before the day fully begins.", "Morning is the loudest time on every city street.", "Only adults notice small details in a neighborhood.", "People should avoid walking outside in the early morning."], 0, 2], ["What is the effect of repeating the word 'before' at the beginning of the Maple Street poem?", ["It shows that the speaker has forgotten what happens later.", "It emphasizes the quiet time just before the neighborhood becomes active.", "It proves the poem takes place at night instead of morning.", "It makes the poem sound like a set of directions."], 1, 2], ["How do the very short final lines in the Maple Street poem help shape it?", ["They slow the poem down and draw attention to the quiet feeling of the moment.", "They make the poem sound like an argument between two characters.", "They add extra facts about the bakery schedule.", "They change the poem into a secondhand news report."], 0, 2], ["Which statement best describes the speaker's perspective in the Maple Street poem?", ["The speaker notices ordinary neighborhood details and treats them as meaningful.", "The speaker is upset that Maple Street is always too crowded.", "The speaker is writing from the point of view of the crossing guard only.", "The speaker does not seem interested in the neighborhood at all."], 0, 2], ["What does 'Windows yawn awake' suggest in the Maple Street poem?", ["The windows are broken and making noise.", "The buildings seem to be slowly waking up like people.", "The speaker wants to go back to sleep.", "The weather is too cold for anyone to move."], 1, 2], ["What mood is created by the phrase 'silver hush' in the Maple Street poem?", ["sharp anger", "calm quiet", "wild excitement", "deep confusion"], 1, 2], ["Why does the Maple Street poem shift from quiet images to 'steam, footsteps, lunch boxes, laughter'?", ["To show the speaker has moved to another country", "To show how the neighborhood changes as the day begins", "To explain that the earlier stanzas were a dream", "To prove the street becomes dangerous after sunrise"], 1, 2], ["Which summary best fits both Crossing the River texts together?", ["Both texts describe a river crossing and help readers understand what traveling by ferry was like before a bridge existed.", "Both texts explain how to build a new bridge across the river.", "Bot
