passages": [{"title": "Passage 1 — What Mina Heard at the Public Meeting", "text": "<p>At the start of the semester, the civics class treated the public hearing like one more assignment with a deadline. Their teacher had divided the class into teams, and each team was supposed to research a local issue, listen to community comments, and present a brief summary afterward. Most students assumed the evening meeting would be predictable: adults reading prepared remarks while everyone else waited to go home.</p><p>Mina changed her mind halfway through the hearing. The topic was a proposal to convert an empty lot into a community food market and garden. One speaker described the plan as a chance to sell fresh produce in a neighborhood with few grocery options. Another warned that the project might increase traffic near a bus stop used by elementary students. A third speaker said she liked the garden idea but worried that the market booths would become too noisy on weekends.</p><p>What surprised Mina was not that people disagreed, but that many of them agreed on the same facts while reaching different conclusions. Nearly everyone wanted the lot to become useful. Nearly everyone said children should be safe and residents should have access to fresh food. Yet they weighed those goals differently. The hearing was less like a contest between right and wrong than a demonstration of how public decisions become complicated once real lives enter the discussion.</p><p>When the class met the next day, several students complained that the council had not solved anything. Mina disagreed. She had gone expecting a fast answer and instead found a slower kind of progress: people naming trade-offs in public. The meeting had not erased conflict, but it had made the conflict clearer. For Mina, that clarity felt like the beginning of citizenship rather than a failure of it.</p>"}, {"title": "Passage 2 — Why Scientists Notice Freshwater Mussels", "text": "<p>Freshwater mussels are easy to overlook because they spend most of their lives partly buried in riverbeds and lake bottoms. To many people, they appear to be little more than dark shells resting in mud. Yet scientists often pay close attention to mussel populations because the animals can reveal important information about water quality and ecosystem health.</p><p>Mussels are filter feeders. They draw in water, trap tiny particles such as algae and organic matter, and then release cleaner water back into the environment. In that sense, a healthy mussel bed can act like a living filtration system. Mussels do not solve every pollution problem, but their presence can support a balanced aquatic habitat.</p><p>They are also sensitive to environmental change. Excess sediment, chemical pollution, and altered stream flow can make survival difficult. Some mussel species depend on specific fish during part of their life cycle, so when fish populations decline or movement is blocked, mussels may suffer too. Because of these connections, scientists use mussels as indicator species: their condition can signal broader changes in an ecosystem.</p><p>Protecting mussels means protecting more than one organism. It often involves restoring riverbanks, improving water management, reducing runoff, and preserving habitat for fish and other aquatic life. A shell in the mud may seem unremarkable at first glance, but in ecological terms it can represent an entire network of relationships.</p>"}, {"title": "Passage 3 — How Should Service-Learning Be Designed?", "text": "<p>Some schools have proposed requiring students to complete service-learning hours before graduation. Supporters argue that this requirement can help students connect classroom knowledge to real community needs. A student studying environmental science might work on stream monitoring. A student learning about local history might help preserve oral histories or assist at a museum.</p><p>The strongest version of this argument is not simply that service is morally good. It is that structured service-learning can deepen academic understanding when students reflect on what they do, why the work matters, and how it connects to larger systems. In that model, service is not a separate charity project attached to school. It is part of the learning itself.</p><p>Critics, however, raise serious questions. If schools require service without providing transportation, flexibility, or meaningful options, the policy can place a heavier burden on some students than on others. A teenager caring for siblings after school may not have the same schedule as a classmate with more free time. A requirement meant to build civic engagement should not ignore unequal access to time and resources.</p><p>For that reason, the debate should focus less on whether service matters in the abstract and more on the design of the program. Reflection, choice, support, and fairness determine whether service-learning becomes transformative or merely another checkbox. Good civic education requires more than good intentions.</p>"}, {"title": "Passage 4 — Reading an Industrial-Era Letter (Paired Texts)", "text": "<strong class='source-label'>Text 1: Letter from a Mill Owner, 1911</strong><p>Production slowed again this week after the third power failure this month. I do not object to progress, but the city cannot expect manufacturers to modernize without reliable electric service. Our workers lose hours each time the machines stop, and delayed orders harm both wages and reputation. If officials want industry to expand, they must build infrastructure capable of supporting it.</p><hr class='divider'/><strong class='source-label'>Text 2: Historian's Analysis</strong><p>Business letters can reveal how industrial leaders understood modernization, but they often frame public issues through the lens of private interest. A mill owner writing to city officials may emphasize economic losses and present local policy as urgent. Such a source can be valuable, especially when compared with city records, labor reports, and newspapers that show how the same problem affected workers and residents.</p>"}, {"title": "Passage 5 — Why Images Need Context", "text": "<p>Digital images now move quickly through messages, social feeds, and news alerts, but speed does not guarantee trustworthiness. A striking image can appear persuasive simply because it seems immediate and concrete. Yet images can be cropped, captioned misleadingly, or shared without the context needed to interpret them accurately.</p><p>This does not mean images are useless as evidence. On the contrary, photographs and videos can document events, preserve details, and support reporting. The challenge is that visual evidence still requires source evaluation. Who took the image? When and where was it captured? Has it been edited? What does the frame include, and what does it leave out?</p><p>Context matters especially when an image circulates separately from its original setting. A photo from one protest, storm, or fire may be reposted during a different event and falsely presented as current. In such cases, the image itself may be real, but the claim attached to it may be false. Verifying visual media therefore involves checking both the content and the accompanying narrative.</p><p>Media literacy in the digital age requires slowing down at the moment when a post is designed to make users react quickly. Before sharing, readers can compare captions with reporting from reliable outlets, look for original publication dates, or search for the image in other contexts. A compelling image deserves attention, but not automatic belief.</p>"}, {"title": "Passage 6 — Planning with the Most Reliable Source (Media Literacy)", "text": "<strong class='source-label'>Source A: State Park Notice</strong><p>The east trail at Cedar Bluffs State Park will close from June 3 through June 21 while crews replace two footbridges and repair erosion damage after spring storms. Hikers may still use the west trail and the visitor center parking lot. Updated trail maps and reopening notices will be posted on the park website.</p><hr class='divider'/><strong class='source-label'>Source B: Adventure Blog Post</strong><p>Cedar Bluffs is about to get its biggest trail upgrade ever! This is exactly the kind of bold outdoor investment our state needs. Once the work is done, the park will probably become one of the most exciting hiking destinations anywhere in the region. If you care about nature, you should celebrate this project.</p><p><em>A student is preparing a short informational handout for classmates planning a June hiking trip. The handout needs accurate closure dates, alternate access information, and a trustworthy source for updates.</em></p>"}], "questions": [["What is the central idea of the public meeting passage?", ["Mina learns that public decision making often involves balancing shared goals that lead to different conclusions.", "Students should never attend evening meetings.", "The hearing proves that local government is useless.", "The council quickly solved the lot proposal."], 0, 0], ["Which detail best reveals why Mina changes her mind about the hearing?", ["She hears speakers agree on some facts but disagree about which concerns matter most.", "The teacher divides the class into teams.", "Students meet in class the next day.", "The assignment has a deadline."], 0, 0], ["In paragraph 4, the word 'clarity' most nearly means:", ["a final victory", "a louder argument", "a clearer understanding", "a written rule"], 2, 0], ["How does paragraph 3 develop the author's message in the public meeting passage?", ["It explains that disagreement can grow from different priorities rather than ignorance of the facts.", "It lists the price of garden tools.", "It changes the setting to a different city.", "It proves only one speaker was correct."], 0, 0], ["What perspective does Mina express at the end of the passage?", ["Trade-offs are signs that no plan should move forward.", "Community meetings should happen in secret.", "Public discussion has value even before it produces a final answer.", "Citizenship works only when everyone agrees immediately."], 2, 0], ["Why does the author describe the hearing as 'the beginning of citizenship'?", ["to prove that teachers assign too much homework", "to argue that students should replace the council", "to suggest that civic life includes open disagreement and careful listening", "to show that market booths always cause noise"], 2, 0], ["Which sentence best supports the claim that speakers shared some goals while disagreeing?", ["The class was divided into teams.", "Several students complained the council had not solved anything.", "Nearly everyone wanted the lot to become useful.", "Most students assumed the meeting would be predictable."], 2, 0], ["What is the main idea of the freshwater mussels article?", ["Indicator species can survive any environmental change.", "Scientists study mussels only because they are easy to see.", "Freshwater mussels help filter water and can signal the health of an aquatic ecosystem.", "Mussels are useful mainly as decorations on shorelines."], 2, 1], ["Which detail best explains why scientists call mussels indicator species?", ["Some people overlook them.", "Their condition can signal broader changes in the ecosystem.", "They release cleaner water after filtering.", "Their shells are dark and partly buried."], 1, 1], ["In paragraph 2 of the mussels article, the word 'trap' most nearly means:", ["break into pieces", "catch and hold", "hide from view", "set a trick for"], 1, 1], ["How does paragraph 3 build on the mussels article's main idea?", ["It shows that mussels respond to environmental change and are linked to other species.", "It gives directions for raising mussels at home.", "It argues that mussels are the only important river organisms.", "It changes the topic from water to desert climate."], 0, 1], ["Why does the mussels article author mention fish populations?", ["to compare fish shells with mussel shells", "to suggest that fish cause all pollution", "to explain that mussel survival depends on other parts of the ecosystem", "to argue that fish matter more than mussels"], 2, 1], ["What is the author's purpose in the mussels article?", ["to advertise a new aquarium", "to persuade readers to collect mussel shells", "to explain the ecological importance of freshwater mussels", "to entertain readers with a fantasy river story"], 2, 1], ["Which source would be most relevant for checking whether a river's mussel population has changed over time?", ["a long-term survey of mussel counts and water conditions", "a poem about a lake at night", "a menu from a seafood restaurant", "a travel brochure about nearby parks"], 0, 1], ["What is the author's main claim in the service-learning passage?", ["Community service has no academic value.", "Whether service-learning helps students depends heavily on how fairly and thoughtfully the program is designed.", "Service requirements should always be rejected.", "Schools should remove reflection from all civic programs."], 1, 2], ["Which detail best supports the idea that service-learning can deepen academic understanding?", ["Museums preserve artifacts.", "Students can connect fieldwork and reflection to what they study in class.", "Many students have after-school plans.", "Graduation rules often change over time."], 1, 2], ["In paragraph 4 of the service-learning passage, the word 'transformative' most nearly means:", ["brief and unimportant", "able to produce meaningful change", "hard to observe", "expensive to maintain"], 1, 2], ["How does paragraph 3 strengthen the service-learning argument?", ["It gives a fictional example unrelated to school.", "It changes the discussion to college admissions.", "It proves that service is never useful.", "It introduces equity concerns that complicate a simple requirement."], 3, 2], ["What perspective does the service-learning author express about civic education?", ["Civic education should combine purpose with fairness and practical support.", "Civic education should avoid community contact.", "Civic education works best when every student does identical tasks.", "Civic education matters only outside school."], 0, 2], ["What is the author's purpose in the service-learning passage?", ["to explain how graduation robes are made", "to entertain readers with a student memoir", "to analyze an educational proposal and argue for a more careful way of judging it", "to advertise volunteer positions"], 2, 2], ["Which source would be most useful for evaluating the equity concerns in paragraph 3?", ["data showing which students completed required hours and what barriers they reported", "a list of school mascots", "a poster saying Service Matters", "a speech with no evidence"], 0, 2], ["What idea is conveyed by both the 1911 mill letter and the historian's analysis?", ["Power failures mattered only to businesses.", "Primary sources can provide insight, but they also reflect the writer's interests.", "Factory owners always gave neutral public advice.", "Historians reject all business letters as useless."], 1, 3], ["Which detail from the mill letter best shows the mill owner's concern?", ["The city expects manufacturers to modernize.", "Power failed three times in one month.", "The letter is dated 1911.", "Delayed orders harm both wages and reputation."], 3, 3], ["In Text 2, 'through the lens of private interest' most nearly means:", ["with the help of a camera", "in a completely objective manner", "without any evidence", "from a viewpoint shaped by personal or business concerns"], 3, 3], ["How does Text 2 affect a reader's interpretation of the mill letter?", ["It shows the city had already solved the problem.", "It changes the date of the power failures.", "It encourages the reader to compare the letter with other sources before drawing conclusions.", "It proves the letter was forged."], 2, 3], ["Why might the mill owner stress the effects on wages as well as business reputation?", ["to deny that workers existed", "to strengthen the argument by showing broader consequences", "to praise city officials", "to avoid mentioning modernization"], 1, 3], ["Which text is more useful for understanding one industrial leader's immediate reaction to power failures?", ["neither text", "Text 1 (the letter)", "Text 2 (historian's analysis)", "both texts equally"], 1, 3], ["If a researcher wants to know how power failures affected workers, which source is most relevant?", ["a labor report or newspaper interview with workers from the period", "a tourist map", "a modern appliance advertisement", "a weather forecast for this week"], 0, 3], ["What is the central idea of the 'Why Images Need Context' passage?", ["Visual media can be powerful evidence, but images still need careful source and context checks.", "Only edited images can mislead viewers.", "Images should never be used in news reporting.", "Captions always tell the whole truth."], 0, 4], ["Which detail best supports the idea that a real image can still mislead people?", ["Images move quickly through social feeds.", "Videos can preserve details.", "A photo from one event may be reposted during a different event and falsely presented as current.", "Some posts include bright colors."], 2, 4], ["In paragraph 4 of the images passage, the word 'compelling' most nearly means:", ["completely reliable", "difficult to print", "politically neutral", "strong enough to attract attention"], 3, 4], ["How does paragraph 2 of the images passage contribute to it?", ["It shifts the topic to written fiction.", "It proves that captions are unnecessary.", "It balances caution by explaining that images can still be valuable evidence.", "It argues that all photos are fake."], 2, 4], ["What perspective does the images passage author express about media literacy?", ["Media literacy means rejecting all emotional images.", "Media literacy matters only for professional journalists.", "Media literacy involves resisting quick reactions long enough to verify what is being shown.", "Media literacy depends mainly on camera quality."], 2, 4], ["What is the author's purpose in the images passage?", ["to compare two camera brands", "to advertise a photo-editing app", "to explain how readers should evaluate images before trusting or sharing them", "to narrate a historical event"], 2, 4], ["Which source would be most relevant for checking whether a viral image is being reused from an older event?", ["a comment saying the image looks real", "a slogan about truth", "a list of camera models", "a reverse-image search result showing where and when the image first appeared"], 3, 4], ["Which source should a student rely on most for a handout about a June hiking trip near the closed trail?", ["both sources equally", "Source B (adventure blog)", "neither source", "Source A (state park notice)"], 3, 5], ["Which detail from Source A is most relevant for students who still want to visit the park during the closure?", ["Storms caused erosion damage.", "Hikers may still use the west trail and the visitor center parking lot.", "The trail closure begins in June.", "Updated maps will be posted."], 1, 5], ["In Source B, 'biggest trail upgrade ever' creates a tone that is:", ["uncertain and cautious", "formal and legal", "neutral and technical", "enthusiastic and promotional"], 3, 5], ["How do the two hiking sources differ in purpose?", ["Both sources are equally factual park notices.", "Source B gives more dates and logistics than Source A.", "Source A provides planning information, while Source B offers opinion and encouragement.", "Source A tells a personal story, while Source B gives official instructions."], 2, 5], ["Which source is more credible for checking trail closure dates?", ["Source B", "Source A", "both are equally credible", "neither source"], 1, 5], ["Why is Source B less useful for the student's handout?", ["It predicts and praises the project but does not provide the practical details students need.", "It says the region has hiking destinations.", "It mentions nature.", "It is shorter than Source A."], 0, 5], ["If a student wants the most up-to-date information before leaving for the trip, what is the best next step?", ["Reread the blog post several times.", "Check the park website listed in Source A for updated reopening notices.", "Look for hiking photos on social media.", "Ask a random visitor at another park."], 1, 5]]}}}};
const L=["A","B","C","D"];
const SI={Reading:"📖",Math:"🔢",Science:"🔬","Math Practice 1":"🔢","Math Practice 2":"📊"};
let cG=null,cS=null,cQs=[],cPassages=[],hasPassages=false;
let qi=0,sc=0,ua=[],curPassageIdx=-1,passageOpen=true;
let mode="solo",curPlayer=1,p1sc=0,p2sc=0;

function isPassageSubject(data){return !Array.isArray(data)&&data.passages!==undefined;}

const ggg=document.getElementById("ggg");
Object.entries(D).forEach(([g,d])=>{
  const subjs=Object.keys(d.subjects);
  const el=document.createElement("div");el.className="gc";
  const tags=subjs.map(s=>`<span class="stag" style="background:${d.color}22;color:${d.color}">${s}</span>`).join("");
  el.innerHTML=`<span class="bdg">${g}</span><h3>${g}</h3><p>${tags}</p><span class="ar">&#8594;</span>`;
  el.onclick=()=>pickG(g);ggg.appendChild(el);
});

function show(id){document.querySelectorAll(".sc").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo(0,0);}
function goHome(){closeOverlay("mode-overlay");closeOverlay("handoff-overlay");show("s0");}
function goSubj(){if(cG)pickG(cG);}
function closeOverlay(id){document.getElementById(id).classList.remove("show");}

function pickG(g){
  cG=g;const d=D[g];
  document.getElementById("sh").innerHTML=`<h2>${g}</h2><p>Choose a subject to practice</p>`;
  const sg=document.getElementById("sgg");sg.innerHTML="";
  Object.entries(d.subjects).forEach(([s,data])=>{
    const qCount=isPassageSubject(data)?data.questions.length:data.length;
    const el=document.createElement("div");el.className="scard";el.style.borderColor=d.color;
    el.innerHTML=`<div class="si">${SI[s]||"📝"}</div><h4>${s}</h4><p>${qCount} questions</p>`;
    el.onclick=()=>openModeSelect(g,s);sg.appendChild(el);
  });
  show("s1");
}

function openModeSelect(g,s){
  cG=g;cS=s;
  document.getElementById("mo-subj-label").textContent=g+" — "+s;
  document.getElementById("mode-overlay").classList.add("show");
}
function startSolo(){closeOverlay("mode-overlay");mode="solo";_startQuiz();}
function start1v1(){closeOverlay("mode-overlay");mode="1v1";_startQuiz();}

function _startQuiz(){
  const subjData=D[cG].subjects[cS];
  if(isPassageSubject(subjData)){
    cQs=subjData.questions;cPassages=subjData.passages;hasPassages=true;
  } else {
    cQs=[...subjData];cPassages=[];hasPassages=false;
  }
  qi=0;sc=0;ua=[];p1sc=0;p2sc=0;curPlayer=1;curPassageIdx=-1;passageOpen=true;
  document.getElementById("qtl").textContent=cG+" — "+cS;
  show("s2");renderQ();
}

function togglePassage(){
  passageOpen=!passageOpen;
  document.getElementById("passage-body").style.display=passageOpen?"block":"none";
  document.getElementById("passage-toggle").textContent=passageOpen?"▼ Hide":"▶ Show";
}

function renderQ(){
  const q=cQs[qi],tot=cQs.length,pct=Math.round(qi/tot*100);
  if(mode==="1v1") curPlayer=(qi%2===0)?1:2;
  // Player bar
  const pb=document.getElementById("pbar");
  if(mode==="1v1"){
    pb.className="player-bar show p"+curPlayer;
    pb.innerHTML=`${curPlayer===1?"🟢":"🔵"} <strong>Player ${curPlayer}'s Turn</strong><span class="p1v1sc">P1: ${p1sc} | P2: ${p2sc}</span>`;
  } else {pb.className="player-bar";}
  // Passage panel
  if(hasPassages&&q.length>3){
    const pIdx=q[3];
    const pp=document.getElementById("passage-panel");pp.style.display="block";
    if(pIdx!==curPassageIdx){
      curPassageIdx=pIdx;
      const passage=cPassages[pIdx];
      document.getElementById("passage-title").textContent=passage.title;
      document.getElementById("passage-body").innerHTML=passage.text;
      passageOpen=true;
      document.getElementById("passage-body").style.display="block";
      document.getElementById("passage-toggle").textContent="▼ Hide";
    }
  } else {document.getElementById("passage-panel").style.display="none";}
  document.getElementById("qn").textContent="Question "+(qi+1)+" of "+tot;
  document.getElementById("pll").textContent="Question "+(qi+1)+" of "+tot;
  document.getElementById("ppc").textContent=pct+"%";
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("scr").textContent=mode==="1v1"?("P1:"+p1sc+" P2:"+p2sc):("Score: "+sc+"/"+qi);
  document.getElementById("qt2").textContent=q[0];
  document.getElementById("fb").className="fb";
  document.getElementById("nx").className="nx";
  const ch=document.getElementById("ch");ch.innerHTML="";
  q[1].forEach((c,i)=>{
    const b=document.createElement("button");b.className="cb";
    b.innerHTML="<span class='ci'>"+L[i]+"</span><span>"+c+"</span>";
    b.onclick=()=>pick(i);ch.appendChild(b);
  });
}

function pick(idx){
  const q=cQs[qi],cor=q[2],correct=idx===cor;
  if(mode==="1v1"){if(curPlayer===1&&correct)p1sc++;else if(curPlayer===2&&correct)p2sc++;}
  else{if(correct)sc++;}
  ua.push({chosen:idx,correct:cor,qt:q[0],ct:q[1][cor],cht:q[1][idx],player:curPlayer});
  document.querySelectorAll(".cb").forEach((b,i)=>{
    b.disabled=true;
    if(i===cor){b.classList.add("correct");b.querySelector(".ci").textContent="✓";}
    else if(i===idx&&idx!==cor){b.classList.add("wrong");b.querySelector(".ci").textContent="✗";}
    else b.classList.add("faded");
  });
  const fb=document.getElementById("fb");
  if(correct){fb.className="fb show correct";document.getElementById("fbi").textContent="✓";document.getElementById("fbt").textContent="Correct! Great job!";}
  else{fb.className="fb show wrong";document.getElementById("fbi").textContent="✗";document.getElementById("fbt").innerHTML="Not quite. The correct answer is <strong>"+q[1][cor]+"</strong>.";}
  document.getElementById("scr").textContent=mode==="1v1"?("P1:"+p1sc+" P2:"+p2sc):("Score: "+sc+"/"+(qi+1));
  const nx=document.getElementById("nx");nx.className="nx show";
  nx.textContent=qi<cQs.length-1?"Next Question →":"See Results →";
}

function nextQ(){
  qi++;
  if(qi>=cQs.length){showRes();return;}
  if(mode==="1v1"){
    const nextP=(qi%2===0)?1:2;
    const prevP=nextP===1?2:1;
    document.getElementById("ho-icon").textContent=nextP===1?"🟢":"🔵";
    document.getElementById("ho-title").textContent="Pass to Player "+nextP+"!";
    document.getElementById("ho-msg").textContent=`Player ${prevP} answered. Now it's Player ${nextP}'s turn.`;
    document.getElementById("ho-scores-div").innerHTML=
      '<div class="ho-score-box p1">🟢 Player 1<br><strong>'+p1sc+' pts</strong></div>'+
      '<div class="ho-score-box p2">🔵 Player 2<br><strong>'+p2sc+' pts</strong></div>';
    document.getElementById("ho-btn").textContent="Player "+nextP+" Ready →";
    document.getElementById("handoff-overlay").classList.add("show");
  } else {renderQ();}
}

function continueHandoff(){closeOverlay("handoff-overlay");renderQ();}

function showRes(){
  const tot=cQs.length;
  const p1q=Math.ceil(tot/2),p2q=Math.floor(tot/2);
  let badge,msg,sub,bc;
  if(mode==="1v1"){
    const p1pct=p1q>0?Math.round(p1sc/p1q*100):0;
    const p2pct=p2q>0?Math.round(p2sc/p2q*100):0;
    if(p1pct>p2pct){badge="🏆";msg="Player 1 Wins!";sub="Congratulations Player 1!";bc="#1A6B4A";}
    else if(p2pct>p1pct){badge="🏆";msg="Player 2 Wins!";sub="Congratulations Player 2!";bc="#7C3AED";}
    else{badge="🤝";msg="It's a Tie!";sub="Both players scored equally — well done!";bc="#D97706";}
    document.getElementById("rb").textContent=badge;
    document.getElementById("rsc").textContent=p1sc+" – "+p2sc;
    document.getElementById("rl2").textContent="Player 1 vs Player 2";
    document.getElementById("rm").textContent=msg;
    document.getElementById("rsb").textContent=sub;
    const bar=document.getElementById("rba");bar.style.background=bc;bar.style.width="0%";
    setTimeout(()=>bar.style.width=Math.max(p1pct,p2pct)+"%",100);
    const dr=document.getElementById("duel-res");dr.style.display="block";
    const p1win=p1pct>p2pct,p2win=p2pct>p1pct;
    document.getElementById("duel-scores").innerHTML=
      '<div class="ds-box p1'+(p1win?" winner":"")+'"><div class="ds-name p1">🟢 Player 1</div><div class="ds-score">'+p1sc+"/"+p1q+'</div><div class="ds-pct">'+p1pct+'%</div>'+(p1win?'<div class="winner-badge">👑 WINNER</div>':"")+
      '</div><div class="ds-box p2'+(p2win?" winner":"")+'"><div class="ds-name p2">🔵 Player 2</div><div class="ds-score">'+p2sc+"/"+p2q+'</div><div class="ds-pct">'+p2pct+'%</div>'+(p2win?'<div class="winner-badge">👑 WINNER</div>':"")+
      "</div>";
  } else {
    document.getElementById("duel-res").style.display="none";
    const pct=Math.round(sc/tot*100);
    if(pct>=90){badge="🏆";msg="Outstanding!";sub="You are really ready for the MCA!";bc="#16A34A";}
    else if(pct>=75){badge="⭐";msg="Great job!";sub="Strong performance — review the questions you missed.";bc="#27AE72";}
    else if(pct>=60){badge="👍";msg="Good effort!";sub="Keep reviewing and try again!";bc="#D97706";}
    else{badge="📚";msg="Keep practicing!";sub="Review with your teacher and try again!";bc="#DC2626";}
    document.getElementById("rb").textContent=badge;
    document.getElementById("rsc").textContent=sc+" / "+tot;
    document.getElementById("rl2").textContent=pct+"% Correct";
    document.getElementById("rm").textContent=msg;
    document.getElementById("rsb").textContent=sub;
    const bar=document.getElementById("rba");bar.style.background=bc;bar.style.width="0%";
    setTimeout(()=>bar.style.width=pct+"%",100);
  }
  const bd=document.getElementById("bdd");bd.innerHTML="<h4>Question Review</h4>";
  ua.forEach((a,i)=>{
    const ok=a.chosen===a.correct,el=document.createElement("div");el.className="bdi";
    const qt=a.qt.length>75?a.qt.substring(0,75)+"...":a.qt;
    const plabel=mode==="1v1"?" (P"+a.player+")":"";
    el.innerHTML='<div class="bn '+(ok?"ok":"bad")+'">'+(i+1)+'</div><div class="bq">'+qt+plabel+'</div><div>'+(ok?"":'<span class="bwr">'+a.cht+"</span>")+'<span class="ba">'+a.ct+"</span></div>";
    bd.appendChild(el);
  });
  show("s3");
}
function retry(){_startQuiz();}
</script>
