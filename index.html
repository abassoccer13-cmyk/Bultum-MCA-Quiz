<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bultum Academy — MCA Math Practice</title>
<style>
  :root {
    --green-dark:#0D3D2E;--green-mid:#1A6B4A;--green-acc:#27AE72;--green-pale:#E8F5EF;
    --purp:#7C3AED;--purp-l:#F5F3FF;--purp-d:#4C1D95;
    --blue:#1D4ED8;--blue-l:#EFF6FF;
    --amber:#D97706;--amber-l:#FFFBEB;
    --red:#DC2626;--red-l:#FEF2F2;
    --text:#1F2937;--muted:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;
    --white:#fff;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* ── Header ── */
  .site-header{background:var(--green-dark);color:#fff;padding:0 1.5rem}
  .header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:14px 0}
  .logo-circle{width:44px;height:44px;border-radius:50%;background:var(--green-acc);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--green-dark);flex-shrink:0}
  .header-text h1{font-size:1.15rem;font-weight:700;letter-spacing:-.01em}
  .header-text p{font-size:.75rem;color:#A8D5BE;margin-top:1px}
  .accent-bar{height:3px;background:var(--green-acc)}

  /* ── Main ── */
  main{max-width:860px;margin:0 auto;padding:1.5rem 1rem 3rem}

  /* ── Grade Select Screen ── */
  .screen{display:none}.screen.active{display:block}
  .hero{text-align:center;padding:2rem 0 1.5rem}
  .hero h2{font-size:2rem;font-weight:800;color:var(--green-dark);line-height:1.1}
  .hero p{color:var(--muted);margin-top:.5rem;font-size:1rem}
  .grade-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:1.5rem}
  .grade-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;cursor:pointer;transition:all .2s;text-align:left;position:relative;overflow:hidden}
  .grade-card:hover{border-color:var(--green-acc);transform:translateY(-2px);box-shadow:0 8px 24px rgba(39,174,114,.15)}
  .grade-card .badge{display:inline-block;background:var(--green-pale);color:var(--green-mid);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:.6rem;letter-spacing:.05em;text-transform:uppercase}
  .grade-card h3{font-size:1.2rem;font-weight:700;color:var(--text)}
  .grade-card p{font-size:.82rem;color:var(--muted);margin-top:.3rem}
  .grade-card .arrow{position:absolute;right:1.25rem;top:50%;transform:translateY(-50%);color:var(--green-acc);font-size:1.3rem;opacity:.6}
  .grade-card:hover .arrow{opacity:1;right:1rem}

  /* ── Quiz Screen ── */
  .quiz-top{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
  .back-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;cursor:pointer;font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;transition:all .15s}
  .back-btn:hover{border-color:var(--text);color:var(--text)}
  .quiz-title{font-weight:700;font-size:1rem;color:var(--text)}
  .score-display{margin-left:auto;background:var(--purp-l);color:var(--purp-d);border-radius:20px;padding:.3rem .9rem;font-size:.82rem;font-weight:600}

  /* Progress bar */
  .progress-wrap{background:#E5E7EB;border-radius:99px;height:6px;margin-bottom:1.5rem;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green-acc),var(--purp));border-radius:99px;transition:width .4s ease}
  .progress-label{font-size:.78rem;color:var(--muted);margin-bottom:.4rem;display:flex;justify-content:space-between}

  /* Question card */
  .q-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.04)}
  .q-number{font-size:.75rem;font-weight:700;color:var(--purp);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem}
  .q-text{font-size:1.02rem;font-weight:600;line-height:1.55;color:var(--text);margin-bottom:1.25rem}
  .choices{display:flex;flex-direction:column;gap:.6rem}
  .choice-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1.1rem;cursor:pointer;text-align:left;font-size:.95rem;font-weight:500;color:var(--text);transition:all .18s;display:flex;align-items:center;gap:.75rem}
  .choice-btn:hover:not(:disabled){border-color:var(--purp);background:var(--purp-l);color:var(--purp-d)}
  .choice-btn.correct{border-color:#16A34A;background:#F0FDF4;color:#14532D;pointer-events:none}
  .choice-btn.wrong{border-color:var(--red);background:var(--red-l);color:var(--red);pointer-events:none}
  .choice-btn.faded{opacity:.45;pointer-events:none}
  .choice-btn.selected-correct{border-color:#16A34A;background:#F0FDF4;color:#14532D}
  .choice-icon{width:24px;height:24px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;font-weight:700}
  .choice-btn.correct .choice-icon{background:#16A34A;border-color:#16A34A;color:#fff}
  .choice-btn.wrong .choice-icon{background:var(--red);border-color:var(--red);color:#fff}

  /* Feedback */
  .feedback{margin-top:1.1rem;padding:.9rem 1.1rem;border-radius:10px;font-size:.92rem;font-weight:500;display:none}
  .feedback.show{display:flex;align-items:flex-start;gap:.6rem}
  .feedback.correct{background:#F0FDF4;color:#14532D;border:1px solid #BBF7D0}
  .feedback.wrong{background:var(--red-l);color:var(--red);border:1px solid #FECACA}
  .feedback-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
  .next-btn{margin-top:1.1rem;width:100%;background:var(--green-mid);color:#fff;border:none;border-radius:10px;padding:.85rem;font-size:.98rem;font-weight:600;cursor:pointer;transition:background .15s;display:none}
  .next-btn.show{display:block}
  .next-btn:hover{background:var(--green-dark)}

  /* ── Results Screen ── */
  .results-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
  .results-badge{font-size:3.5rem;margin-bottom:.5rem}
  .results-score{font-size:3rem;font-weight:800;color:var(--green-dark);line-height:1}
  .results-label{color:var(--muted);font-size:.95rem;margin-top:.3rem}
  .results-msg{margin-top:1rem;font-size:1.05rem;font-weight:600;color:var(--text)}
  .results-sub{color:var(--muted);font-size:.9rem;margin-top:.3rem}
  .results-bar-wrap{background:#E5E7EB;border-radius:99px;height:14px;margin:1.5rem 0;overflow:hidden}
  .results-bar{height:100%;border-radius:99px;transition:width 1s ease}
  .results-actions{display:flex;gap:.75rem;margin-top:1.5rem;flex-wrap:wrap}
  .btn-primary{flex:1;background:var(--green-mid);color:#fff;border:none;border-radius:10px;padding:.85rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-primary:hover{background:var(--green-dark)}
  .btn-secondary{flex:1;background:var(--white);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:.85rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-secondary:hover{border-color:var(--text)}
  .breakdown{margin-top:1.5rem;text-align:left}
  .breakdown h4{font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
  .breakdown-item{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.88rem}
  .breakdown-item:last-child{border-bottom:none}
  .b-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
  .b-num.ok{background:#F0FDF4;color:#14532D}
  .b-num.bad{background:var(--red-l);color:var(--red)}
  .b-q{flex:1;color:var(--text)}
  .b-ans{font-size:.8rem;color:var(--green-mid);font-weight:600}
  .b-wrong{font-size:.8rem;color:var(--red);text-decoration:line-through;margin-right:.3rem}

  @media(max-width:500px){
    .hero h2{font-size:1.5rem}
    .grade-grid{grid-template-columns:1fr}
    .results-score{font-size:2.5rem}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo-circle">BA</div>
    <div class="header-text">
      <h1>Bultum Academy</h1>
      <p>MCA Math Practice — Grades 3–8</p>
    </div>
  </div>
</header>
<div class="accent-bar"></div>

<main>

<!-- ── Screen 1: Grade Select ─────────────────────────────────── -->
<div id="screen-home" class="screen active">
  <div class="hero">
    <h2>MCA Math Practice</h2>
    <p>Choose your grade to start practicing. Get instant feedback on every question!</p>
  </div>
  <div class="grade-grid" id="grade-grid"></div>
</div>

<!-- ── Screen 2: Quiz ─────────────────────────────────────────── -->
<div id="screen-quiz" class="screen">
  <div class="quiz-top">
    <button class="back-btn" onclick="goHome()">← Grades</button>
    <span class="quiz-title" id="quiz-title"></span>
    <span class="score-display" id="score-display">Score: 0/0</span>
  </div>
  <div class="progress-label">
    <span id="prog-label">Question 1 of 25</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="q-card">
    <div class="q-number" id="q-number"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <span class="feedback-icon" id="fb-icon"></span>
      <span id="fb-text"></span>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<!-- ── Screen 3: Results ──────────────────────────────────────── -->
<div id="screen-results" class="screen">
  <div class="results-card">
    <div class="results-badge" id="res-badge"></div>
    <div class="results-score" id="res-score"></div>
    <div class="results-label" id="res-label"></div>
    <div class="results-msg" id="res-msg"></div>
    <div class="results-sub" id="res-sub"></div>
    <div class="results-bar-wrap"><div class="results-bar" id="res-bar"></div></div>
    <div class="results-actions">
      <button class="btn-primary" onclick="retryQuiz()">Try Again</button>
      <button class="btn-secondary" onclick="goHome()">Change Grade</button>
    </div>
    <div class="breakdown" id="breakdown"></div>
  </div>
</div>

</main>

<script>
const GRADES = {
  "Grade 3": {

      {q:"What is 8 × 7?",choices:["54","56","63","48"],ans:1},
      {q:"A rectangle has length 5 cm and width 3 cm. What is its perimeter?",choices:["8 cm","15 cm","16 cm","10 cm"],ans:2},

      {q:"24 marbles are shared equally among 6 friends. How many does each friend get?",choices:["3","4","6","18"],ans:1},

      {q:"A rectangle has length 7 units and width 4 units. What is its area?",choices:["11 sq units","22 sq units","28 sq units","14 sq units"],ans:2},
      {q:"What is 500 – 263?",choices:["237","247","337","763"],ans:0},
      {q:"Which digit is in the hundreds place in 4,726?",choices:["4","7","2","6"],ans:1},
      {q:"Bar graph: Mon=5, Tue=8, Wed=6, Thu=9 students. What is the total?",choices:["26","28","30","24"],ans:1},
      {q:"Which is true?",choices:["1/3 &gt; 1/2","1/4 &lt; 1/3","1/2 &lt; 1/4","1/3 = 1/4"],ans:1},
      {q:"What multiplication fact helps you solve 35 ÷ 5?",choices:["5 × 5 = 25","5 × 7 = 35","5 × 8 = 40","6 × 5 = 30"],ans:1},
      {q:"There are 3 boxes with 9 crayons each. How many crayons total?",choices:["12","21","27","36"],ans:2},

    questions:[

      {q:"A rectangle has length 9 cm and width 4 cm. What is its area?",choices:["13 cm²","26 cm²","36 cm²","40 cm²"],ans:2},
      {q:"Which fraction is equivalent to 3/4?",choices:["6/8","4/6","5/8","2/3"],ans:0},
      {q:"What is 56 × 7?",choices:["382","392","372","402"],ans:1},
      {q:"What is 2,000 – 847?",choices:["1,153","1,163","1,053","1,253"],ans:0},

      {q:"Which angle is greater than 90°?",choices:["Acute angle","Right angle","Obtuse angle","Straight angle"],ans:2},
      {q:"Order from least to greatest:   3/4, 1/2, 7/8",choices:["7/8, 3/4, 1/2","1/2, 3/4, 7/8","3/4, 1/2, 7/8","1/2, 7/8, 3/4"],ans:1},

const LABELS = ["A","B","C","D"];
let currentGrade = null, currentQs = [], qIndex = 0, score = 0, userAnswers = [];

// Build grade cards
const grid = document.getElementById('grade-grid');
Object.entries(GRADES).forEach(([name, data]) => {
  const card = document.createElement('div');
  card.className = 'grade-card';
  card.innerHTML = `
    <span class="badge">${data.badge}</span>
    <h3>${name}</h3>
    <p>${data.desc}</p>
    <p style="margin-top:.5rem;font-size:.8rem;color:#27AE72;font-weight:600">25 questions</p>
    <span class="arrow">→</span>`;
  card.onclick = () => startQuiz(name);
  grid.appendChild(card);
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(grade) {
  currentGrade = grade;
  currentQs = [...GRADES[grade].questions];
  qIndex = 0; score = 0; userAnswers = [];
  document.getElementById('quiz-title').textContent = grade + ' — Math';
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = currentQs[qIndex];
  const total = currentQs.length;
  const pct = Math.round((qIndex/total)*100);
  document.getElementById('q-number').textContent = `Question ${qIndex+1} of ${total}`;
  document.getElementById('prog-label').textContent = `Question ${qIndex+1} of ${total}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('score-display').textContent = `Score: ${score}/${qIndex}`;
  document.getElementById('q-text').innerHTML = q.q;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').className = 'next-btn';

  const ch = document.getElementById('choices');
  ch.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-icon">${LABELS[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    ch.appendChild(btn);
  });
}

function selectAnswer(idx) {
  const q = currentQs[qIndex];
  const btns = document.querySelectorAll('.choice-btn');
  const fb = document.getElementById('feedback');
  const fbIcon = document.getElementById('fb-icon');
  const fbText = document.getElementById('fb-text');
  const correct = q.ans;
  userAnswers.push({chosen: idx, correct: correct, q: q.q, correctText: q.choices[correct]});

  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === correct) { b.classList.add('correct'); b.querySelector('.choice-icon').textContent='✓'; }
    else if (i === idx && idx !== correct) { b.classList.add('wrong'); b.querySelector('.choice-icon').textContent='✗'; }
    else { b.classList.add('faded'); }
  });

  if (idx === correct) {
    score++;
    fb.className = 'feedback show correct';
    fbIcon.textContent = '✓';
    fbText.textContent = 'Correct! Great job!';
  } else {
    fb.className = 'feedback show wrong';
    fbIcon.textContent = '✗';
    fbText.innerHTML = `Not quite. The correct answer is <strong>${q.choices[correct]}</strong>.`;
  }

  document.getElementById('score-display').textContent = `Score: ${score}/${qIndex+1}`;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn show';
  nextBtn.textContent = qIndex < currentQs.length - 1 ? 'Next Question →' : 'See My Results →';
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= currentQs.length) { showResults(); return; }
  renderQuestion();
}

function showResults() {
  const total = currentQs.length;
  const pct = Math.round((score/total)*100);
  let badge, msg, sub, barColor;
  if (pct >= 90) { badge='🏆'; msg='Outstanding!'; sub='Excellent work — you are really ready for the MCA!'; barColor='#16A34A'; }
  else if (pct >= 75) { badge='🌟'; msg='Great job!'; sub='Strong performance — keep reviewing the questions you missed.'; barColor='#27AE72'; }
  else if (pct >= 60) { badge='👍'; msg='Good effort!'; sub='You are on the right track. Review the missed questions and try again.'; barColor='#D97706'; }
  else { badge='📚'; msg='Keep practicing!'; sub='Review these topics with your teacher and try again — you can do it!'; barColor='#DC2626'; }

  document.getElementById('res-badge').textContent = badge;
  document.getElementById('res-score').textContent = `${score} / ${total}`;
  document.getElementById('res-label').textContent = `${pct}% Correct`;
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-sub').textContent = sub;
  const bar = document.getElementById('res-bar');
  bar.style.background = barColor;
  bar.style.width = '0%';
  setTimeout(() => { bar.style.width = pct + '%'; }, 100);

  // Breakdown
  const bd = document.getElementById('breakdown');
  bd.innerHTML = '<h4>Question Review</h4>';
  userAnswers.forEach((a, i) => {
    const ok = a.chosen === a.correct;
    const item = document.createElement('div');
    item.className = 'breakdown-item';
    const wrongText = !ok ? `<span class="b-wrong">${currentQs[i].choices[a.chosen]}</span>` : '';
    item.innerHTML = `
      <div class="b-num ${ok?'ok':'bad'}">${i+1}</div>
      <div class="b-q">${a.q.replace(/&gt;/g,'>').replace(/&lt;/g,'<').replace(/&amp;/g,'&')}</div>
      <div>${wrongText}<span class="b-ans">${a.correctText}</span></div>`;
    bd.appendChild(item);
  });

  showScreen('screen-results');
}

function retryQuiz() { startQuiz(currentGrade); }
function goHome() { showScreen('screen-home'); }
