tor: 1/3 = 2/6.\nStep 2: 5/6 - 2/6 = 3/6 = 1/2.&quot;], [&quot;A recipe needs 2 and 1/4 cups of sugar. How much for double the recipe?&quot;, [&quot;4 cups&quot;, &quot;4 and 1/4 cups&quot;, &quot;4 and 1/2 cups&quot;, &quot;3 and 1/2 cups&quot;], 2, &quot;Step 1: Double 2¼: 2×2=4, ¼×2=½.\nStep 2: 4 + ½ = 4½ cups.&quot;], [&quot;What is 6.25 x 10?&quot;, [&quot;0.625&quot;, &quot;6.250&quot;, &quot;62.5&quot;, &quot;625&quot;], 2, &quot;Step 1: 6.25 × 10. Move decimal one place right.\nAnswer: 62.5&quot;], [&quot;The ordered pair (3, 5) is plotted on a coordinate plane. Which quadrant is it in?&quot;, [&quot;Quadrant II&quot;, &quot;Quadrant III&quot;, &quot;Quadrant I&quot;, &quot;Quadrant IV&quot;], 2, &quot;Step 1: Both x and y are positive, so it's in Quadrant I.\nTip: Quadrant I = (+,+), II = (-,+), III = (-,-), IV = (+,-).&quot;]], &quot;Reading&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Section 1 — The Broken Kite&quot;, &quot;text&quot;: &quot;&lt;p&gt;On the first warm Saturday of April, Rosa climbed the attic stairs to search for a box of spring decorations. Instead, she found her grandfather's old kite leaning behind a trunk. Its red paper was faded to the color of brick dust, and one thin wooden rib was cracked straight through. A note was tied to the tail with blue string: &lt;em&gt;For the first windy day.&lt;/em&gt; Rosa smiled. Grandpa had written the note two summers before he moved to Arizona, back when they used to fly kites together in the park every April.&lt;/p&gt;&lt;p&gt;Downstairs, Rosa spread the kite across the kitchen table. Her little brother, Mateo, wrinkled his nose. \&quot;That thing can't fly,\&quot; he said. \&quot;It looks like a sandwich that got stepped on.\&quot; Rosa ignored him. She cut a fresh strip of paper, glued the torn edge, and taped the cracked rib to a new support stick. The whole time, she could almost hear Grandpa's voice: \&quot;A kite does not need to be perfect. It only needs balance.\&quot;&lt;/p&gt;&lt;p&gt;That afternoon, the neighborhood association held its annual kite festival on the soccer field. Kids ran through the grass dragging bright tails behind them. Some kites looked like dragons, some like rockets, and one giant blue fish rose so high that people shaded their eyes to follow it. Rosa felt suddenly embarrassed carrying her patched kite.&lt;/p&gt;&lt;p&gt;Then she noticed a boy about her age kneeling near the fence. He was staring at a green kite that had snapped loose from its string and tangled itself in the wire. Rosa recognized him from school — his name was Ezra, and he had moved into the apartment building across the street only a month earlier.&lt;/p&gt;&lt;p&gt;\&quot;Want help?\&quot; Rosa asked. Together they worked the string out of the fence one loop at a time. When they finally freed the kite, the tail was torn and one corner had ripped away. Ezra looked as if the wind had blown all the excitement right out of him.&lt;/p&gt;&lt;p&gt;Rosa glanced toward the starting line, where festival volunteers were calling participants to line up for the contest. The wind tugged at her sleeve like an impatient puppy. Instead, Rosa knelt in the grass and pulled a roll of spare tape from her pocket. \&quot;Hold this corner flat,\&quot; she said. They patched the green kite, tied on a shorter tail from leftover ribbon, and tested the frame by lifting it into the wind. It wobbled at first like a tired bird. Then it steadied.&lt;/p&gt;&lt;p&gt;By the time Rosa reached the starting line, the contest had already begun. She was too late to enter. Then Ezra, running nearby with his repaired kite, called, \&quot;Rosa! Look!\&quot; His kite swept upward in a clean arc.&lt;/p&gt;&lt;p&gt;Rosa launched Grandpa's kite next. It did not soar as high as the dragon, and it dipped whenever the wind shifted. But it stayed aloft. As the red tail flickered against the clouds, Rosa understood what Grandpa had meant about balance. The old kite was held together by mended paper, new tape, old memories, and one changed plan. Somehow, all of it worked.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Section 2 — Why Some City Trees Keep Their Leaves Longer&quot;, &quot;text&quot;: &quot;&lt;p&gt;&lt;em&gt;By Lena Ortiz, neighborhood arborist&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Have you ever noticed that some trees on city blocks stay green longer than trees in open parks? Many people assume those trees are simply a different kind. Sometimes that is true, but another reason has to do with the places where the trees are growing. Pavement, brick walls, and nearby buildings can change the temperature around a tree in small but important ways.&lt;/p&gt;&lt;p&gt;During the day, streets and sidewalks absorb heat from sunlight. After sunset, those hard surfaces release heat slowly. In neighborhoods with many buildings and paved lots, the air often stays a little warmer at night than the air in grassy areas. Scientists sometimes call this a heat island effect. Even a difference of a few degrees can affect how quickly leaves change color and fall.&lt;/p&gt;&lt;p&gt;Trees respond to temperature and daylight together. As autumn days grow shorter, trees begin to slow their growth. But when the nights remain warmer, some trees keep their leaves a bit longer before dropping them.&lt;/p&gt;&lt;p&gt;Water also matters. A tree planted in a tiny square of soil beside a hot street may lose water quickly. Another tree of the same species might stand near a building that blocks wind and holds moisture in the ground. Because city spaces differ so much from one block to the next, two trees growing only a few streets apart can behave differently.&lt;/p&gt;&lt;p&gt;Scientists who study city trees compare temperature records, soil moisture, and the dates when leaves change. This helps them determine whether a pattern is caused by weather, location, or some other factor.&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;th&gt;Location&lt;/th&gt;&lt;th&gt;Average Evening Temperature (October)&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Downtown street with pavement and buildings&lt;/td&gt;&lt;td&gt;61°F&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Neighborhood block with some pavement and lawns&lt;/td&gt;&lt;td&gt;57°F&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Open park with grass and fewer buildings&lt;/td&gt;&lt;td&gt;54°F&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Section 3 — Maple Street at Dawn (Poem)&quot;, &quot;text&quot;: &quot;&lt;p style='font-style:italic;line-height:2.2'&gt;Before the buses growl,&lt;br&gt;before the bakery lifts its metal door,&lt;br&gt;Maple Street stretches in a silver hush.&lt;br&gt;Windows yawn awake.&lt;br&gt;&lt;br&gt;A bicycle clicks past the sleeping shops.&lt;br&gt;The crossing guard plants her boots like bright commas on the corner.&lt;br&gt;Two sparrows argue in the gutter.&lt;br&gt;A boy with a trumpet case&lt;br&gt;walks carefully around a puddle&lt;br&gt;that holds half the sky.&lt;br&gt;&lt;br&gt;Then the street changes—&lt;br&gt;steam, footsteps, lunch boxes, laughter—&lt;br&gt;but for one thin minute&lt;br&gt;the whole block seems to listen&lt;br&gt;to its own small morning heart.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Section 4 — Crossing the River (Paired Texts)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Text A: From Ana's Journal, May 12, 1918&lt;/strong&gt;&lt;p&gt;This morning the ferry rocked so hard that Mamá squeezed my shoulder and told me to stand still. Fog covered the river like a blanket, and the dock bell sounded louder than usual because I could not see the far shore. I wanted to act brave for my little cousin Tomás, but when the boat lurched away from the dock, my stomach lurched too. An old man near the railing laughed kindly and said the river was only showing off after the rain. When we reached the other side, my shoes were damp from the boards, and I felt proud that I had crossed without crying.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Text B: Museum Note About the East Ferry Route&lt;/strong&gt;&lt;p&gt;For many years, residents used the East Ferry Route to cross the Graystone River before a bridge was built. During wet weather, travelers often experienced stronger currents and reduced visibility from fog. Journal entries, ticket records, and city reports show that the route remained important because it connected farms, homes, and the market district. Ferry operators rang a dock bell in poor visibility to signal their location. The route closed in 1924, two years after construction began on the Graystone Bridge.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Section 5 — Should Our School Start a Repair Club?&quot;, &quot;text&quot;: &quot;&lt;p&gt;Every month, our school throws away items that could still be useful with a little care: backpacks with loose straps, calculators with missing battery covers, and chairs with wobbly screws. Instead of replacing so many things, our school should start a student repair club.&lt;/p&gt;&lt;p&gt;A repair club would reduce waste. When an item is tossed into a trash bin, it often ends up in a landfill even if only one small part is broken. Repairing an object keeps it in use longer. A single fixed zipper may not seem important, but many small repairs add up over time.&lt;/p&gt;&lt;p&gt;A repair club would also teach practical problem-solving. Students would learn to inspect an object, identify what is wrong, and choose a safe fix. Those are useful skills in science, art, engineering, and everyday life.&lt;/p&gt;&lt;p&gt;Some people may worry that a repair club would cost too much. However, many repairs require inexpensive materials such as thread, glue, replacement screws, or patch fabric. Local businesses sometimes donate leftover materials to student projects. If the club began with a small number of approved items, the cost would stay manageable.&lt;/p&gt;&lt;p&gt;Another concern is time. But a repair club could meet once a week after school, just like other clubs. Members would not need to fix everything at once. Starting a small repair club would help our school save resources, learn useful skills, and take better care of the things we already have.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Section 6 — Planning a Community Garden (Multi-Source)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Source A: News Brief&lt;/strong&gt;&lt;p&gt;Neighbors on Pine Avenue are planning a community garden in the empty lot behind the library. Volunteers hope the garden will provide vegetables, a small pollinator area, and an outdoor learning space for students. Organizers say the lot gets strong afternoon sun, but they still need more information about soil quality before planting begins.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Source B: Volunteer Day Flyer&lt;/strong&gt;&lt;p&gt;&lt;strong&gt;Saturday, May 18 — 9:00 a.m. to 1:00 p.m.&lt;/strong&gt;&lt;br&gt;Tasks: clear litter, mark pathways, build two starter raised beds&lt;br&gt;Bring: water bottle, work gloves, closed-toe shoes&lt;br&gt;Goal: \&quot;Let's make the best garden in the whole city!\&quot;&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Source C: County Extension Website&lt;/strong&gt;&lt;p&gt;Before growing food in a new location, collect soil samples from several spots and send them to a certified soil lab. Test results can show whether the soil has enough nutrients and whether the area contains contaminants that make food gardening unsafe. If the soil is not suitable, gardeners can use raised beds with clean soil and compost instead.&lt;/p&gt;&quot;}], &quot;questions&quot;: [[&quot;Which statement best expresses a theme of the Broken Kite story?&quot;, [&quot;Winning a contest is the best way to honor a family tradition.&quot;, &quot;Old objects should be replaced with newer ones whenever possible.&quot;, &quot;Helping someone can matter more than carrying out your original plan.&quot;, &quot;People should avoid entering contests unless they are sure they will win.&quot;], 2, 0], [&quot;Which summary best matches the Broken Kite story?&quot;, [&quot;Rosa finds her grandfather's kite, repairs it, misses a contest while helping Ezra, and learns that her changed plan still honors what Grandpa taught her.&quot;, &quot;Rosa and Mateo argue about whether old toys should be thrown away.&quot;, &quot;Ezra wins the kite contest and teaches Rosa how to repair a broken frame.&quot;, &quot;Grandpa mails Rosa a brand-new kite, and she wins the festival.&quot;], 0, 0], [&quot;Why does the author include the contest volunteers calling participants to line up?&quot;, [&quot;To show that Rosa has forgotten why she came to the festival&quot;, &quot;To build tension by reminding readers that Rosa must choose how to use her time&quot;, &quot;To prove that Ezra should not have brought his kite to the field&quot;, &quot;To explain the rules of the contest in detail&quot;], 1, 0], [&quot;How does the story being told mostly through Rosa's thoughts shape the Broken Kite story?&quot;, [&quot;It helps readers understand why missing the contest feels important to Rosa at first and meaningful later.&quot;, &quot;It lets readers know what every person at the festival is thinking.&quot;, &quot;It makes Grandpa the main character instead of Rosa.&quot;, &quot;It turns the story into a secondhand report about the festival.&quot;], 0, 0], [&quot;The wind tugged at Rosa's sleeve 'like an impatient puppy.' What does this comparison suggest?&quot;, [&quot;The wind was weak and fading away.&quot;, &quot;The wind kept pulling at Rosa again and again.&quot;, &quot;The wind made Rosa feel afraid of animals.&quot;, &quot;The wind came only from one short gust.&quot;], 1, 0], [&quot;What does the word 'mended' most nearly mean in the last paragraph of the Broken Kite story?&quot;, [&quot;hidden&quot;, &quot;measured&quot;, &quot;repaired&quot;, &quot;painted&quot;], 2, 0], [&quot;Why is the word 'flickered' a strong choice in the last paragraph of the Broken Kite story?&quot;, [&quot;It suggests the kite's tail moved lightly and quickly in the wind.&quot;, &quot;It proves the kite's tail was made of metal.&quot;, &quot;It shows the tail had caught on fire.&quot;, &quot;It means the tail had stopped moving completely.&quot;], 0, 0], [&quot;What is the central idea of the article about why city trees keep their leaves longer?&quot;, [&quot;Trees in cities keep their leaves longer only because they are planted later in the year.&quot;, &quot;Differences in temperature, water, and surroundings can cause city trees to behave differently in autumn.&quot;, &quot;Open parks are always better places for trees than city streets.&quot;, &quot;Scientists study trees mainly to find the tallest species in each neighborhood.&quot;], 1, 1], [&quot;Which detail best supports the idea that location affects a tree's leaves?&quot;, [&quot;Many people assume the trees are a different kind.&quot;, &quot;Trees respond to temperature and daylight together.&quot;, &quot;Two trees of the same species can behave differently even when they grow only a few streets apart.&quot;, &quot;Cities want streets to stay cooler in summer.&quot;], 2, 1], [&quot;How does the temperature table help readers understand the city trees article?&quot;, [&quot;It shows exact evidence that evening temperatures can vary by location in a city.&quot;, &quot;It proves that parks never get warm during the day.&quot;, &quot;It explains how to identify every species of tree in a neighborhood.&quot;, &quot;It lists the dates when each tree loses every leaf.&quot;], 0, 1], [&quot;How does the author organize the city trees article?&quot;, [&quot;By telling a made-up story about one tree and then switching to a poem&quot;, &quot;By comparing different city conditions and explaining how each one can affect trees&quot;, &quot;By listing tree names in alphabetical order&quot;, &quot;By arguing that all city planning should stop immediately&quot;], 1, 1], [&quot;How does the author's role as a neighborhood arborist most influence the city trees article?&quot;, [&quot;It leads the author to focus on practical observations about how city spaces affect trees.&quot;, &quot;It causes the author to write only about animals instead of plants.&quot;, &quot;It means the article must be fictional rather than factual.&quot;, &quot;It keeps the author from using any scientific information.&quot;], 0, 1], [&quot;What does the word 'determine' most nearly mean in the fifth paragraph of the city trees article?&quot;, [&quot;forget&quot;, &quot;figure out&quot;, &quot;decorate&quot;, &quot;copy down&quot;], 1, 1], [&quot;Which source would be most relevant and credible to confirm the claim about warmer city nights?&quot;, [&quot;A weather station's temperature records collected from several city locations over many evenings&quot;, &quot;A poster advertising a fall festival near downtown&quot;, &quot;A friend's memory of one warm night last October&quot;, &quot;A comic strip about a tree that talks&quot;], 0, 1], [&quot;Which idea is developed in the Maple Street at Dawn poem?&quot;, [&quot;Busy places often have a calm moment before the day fully begins.&quot;, &quot;Morning is the loudest time on every city street.&quot;, &quot;Only adults notice small details in a neighborhood.&quot;, &quot;People should avoid walking outside in the early morning.&quot;], 0, 2], [&quot;What is the effect of repeating the word 'before' at the beginning of the Maple Street poem?&quot;, [&quot;It shows that the speaker has forgotten what happens later.&quot;, &quot;It emphasizes the quiet time just before the neighborhood becomes active.&quot;, &quot;It proves the poem takes place at night instead of morning.&quot;, &quot;It makes the poem sound like a set of directions.&quot;], 1, 2], [&quot;How do the very short final lines in the Maple Street poem help shape it?&quot;, [&quot;They slow the poem down and draw attention to the quiet feeling of the moment.&quot;, &quot;They make the poem sound like an argument between two characters.&quot;, &quot;They add extra facts about the bakery schedule.&quot;, &quot;They change the poem into a secondhand news report.&quot;], 0, 2], [&quot;Which statement best describes the speaker's perspective in the Maple Street poem?&quot;, [&quot;The speaker notices ordinary neighborhood details and treats them as meaningful.&quot;, &quot;The speaker is upset that Maple Street is always too crowded.&quot;, &quot;The speaker is writing from the point of view of the crossing guard only.&quot;, &quot;The speaker does not seem interested in the neighborhood at all.&quot;], 0, 2], [&quot;What does 'Windows yawn awake' suggest in the Maple Street poem?&quot;, [&quot;The windows are broken and making noise.&quot;, &quot;The buildings seem to be slowly waking up like people.&quot;, &quot;The speaker wants to go back to sleep.&quot;, &quot;The weather is too cold for anyone to move.&quot;], 1, 2], [&quot;What mood is created by the phrase 'silver hush' in the Maple Street poem?&quot;, [&quot;sharp anger&quot;, &quot;calm quiet&quot;, &quot;wild excitement&quot;, &quot;deep confusion&quot;], 1, 2], [&quot;Why does the Maple Street poem shift from quiet images to 'steam, footsteps, lunch boxes, laughter'?&quot;, [&quot;To show the speaker has moved to another country&quot;, &quot;To show how the neighborhood changes as the day begins&quot;, &quot;To explain that the earlier stanzas were a dream&quot;, &quot;To prove the street becomes dangerous after sunrise&quot;], 1, 2], [&quot;Which summary best fits both Crossing the River texts together?&quot;, [&quot;Both texts describe a river crossing and help readers understand what traveling by ferry was like before a bridge existed.&quot;, &quot;Both texts explain how to build a new bridge across the river.&quot;, &quot;Both texts argue that ferries should never have been used.&quot;, &quot;Both texts are poems about fog and rain.&quot;], 0, 3], [&quot;How does the heading in Text B help the reader of the Crossing the River texts?&quot;, [&quot;It shows that Text B is a general story about any river in the world.&quot;, &quot;It tells readers that the passage is an informational note focused on the East Ferry Route.&quot;, &quot;It proves Ana wrote both texts herself.&quot;, &quot;It adds dialogue from the people on the ferry.&quot;], 1, 3], [&quot;What is one important difference in focus between the two Crossing the River texts?&quot;, [&quot;Text A focuses on Ana's feelings during one trip, while Text B explains the ferry route more generally.&quot;, &quot;Text A lists dates and records, while Text B tells how Ana felt.&quot;, &quot;Text A explains bridge construction, while Text B describes market prices.&quot;, &quot;Text A and Text B focus on exactly the same details in exactly the same way.&quot;], 0, 3], [&quot;Which detail is included in the Crossing the River journal mainly because it is a firsthand account?&quot;, [&quot;The route closed in 1924.&quot;, &quot;The ferry connected farms and the market district.&quot;, &quot;Ana's stomach lurched when the boat pulled away.&quot;, &quot;City reports were used to study the route.&quot;], 2, 3], [&quot;Why might a reader use Text B after reading the Crossing the River journal?&quot;, [&quot;To learn the broader historical facts and context that Ana's journal does not explain&quot;, &quot;To find out what Ana ate for breakfast that morning&quot;, &quot;To hear direct dialogue from Tomas&quot;, &quot;To read a fictional retelling of the ferry trip&quot;], 0, 3], [&quot;In the Crossing the River journal, what does the word 'lurched' most nearly mean?&quot;, [&quot;moved suddenly and unevenly&quot;, &quot;rested quietly&quot;, &quot;shone brightly&quot;, &quot;became lighter in weight&quot;], 0, 3], [&quot;Which text is more useful for finding the exact year the ferry route closed, and why?&quot;, [&quot;Text A, because personal feelings are always more exact than records&quot;, &quot;Text A, because journal entries usually include more dates than museum notes&quot;, &quot;Text B, because it provides a specific historical date based on records and reports&quot;, &quot;Text B, because it uses more descriptive language about fog&quot;], 2, 3], [&quot;What is the author's main claim in the repair club article?&quot;, [&quot;The school should begin a repair club.&quot;, &quot;The school should cancel all after-school clubs.&quot;, &quot;Students should only repair items at home.&quot;, &quot;Landfills are larger than most people realize.&quot;], 0, 4], [&quot;Which summary best captures the repair club article?&quot;, [&quot;The author explains that students like working with tools and should replace teachers in maintenance jobs.&quot;, &quot;The author argues for a repair club because it could reduce waste, teach problem-solving, and be managed at a reasonable cost and time commitment.&quot;, &quot;The author lists broken school items but does not suggest any solution.&quot;, &quot;The author argues that schools should stop buying supplies and furniture.&quot;], 1, 4], [&quot;How do the 'Some people may worry' and 'Another concern' paragraphs help the repair club article?&quot;, [&quot;They show how the author addresses possible objections to the repair club.&quot;, &quot;They switch the passage from opinion writing to poetry.&quot;, &quot;They prove the author no longer supports the club.&quot;, &quot;They provide a step-by-step set of repair instructions.&quot;], 0, 4], [&quot;Which detail is the strongest evidence that a repair club could reduce waste?&quot;, [&quot;Students already join sports and music clubs.&quot;, &quot;Many broken items are thrown away even when only one small part needs fixing.&quot;, &quot;Local businesses sometimes donate materials.&quot;, &quot;Some tools are interesting to use.&quot;], 1, 4], [&quot;Which statement from the repair club passage is mainly a claim that would need more evidence to be fully proved?&quot;, [&quot;A repair club would also teach practical problem-solving.&quot;, &quot;Many repairs require inexpensive materials such as thread and screws.&quot;, &quot;Students already participate in sports, music, and homework help.&quot;, &quot;Some items are too damaged or unsafe to fix at school.&quot;], 0, 4], [&quot;How does the repair club author respond to the concern about cost?&quot;, [&quot;By saying money does not matter&quot;, &quot;By suggesting that repairs would require only expensive machines&quot;, &quot;By explaining that many repairs use low-cost materials and the club could start small&quot;, &quot;By arguing that the school should stop buying supplies for other classes&quot;], 2, 4], [&quot;What does the word 'manageable' most nearly mean in the repair club article?&quot;, [&quot;easy to control&quot;, &quot;ready to recycle&quot;, &quot;completely free&quot;, &quot;likely to disappear&quot;], 0, 4], [&quot;What is the central idea of the community garden news brief (Source A)?&quot;, [&quot;The library is closing because the lot behind it is too empty.&quot;, &quot;Neighbors are organizing a garden project and still need to learn more before planting.&quot;, &quot;Students have already finished building the garden by themselves.&quot;, &quot;The lot behind the library gets no sunlight at all.&quot;], 1, 5], [&quot;What can a reader infer by combining Source A and Source C about the community garden?&quot;, [&quot;The organizers should test the soil before deciding where and how to plant food crops.&quot;, &quot;The garden can open only at night.&quot;, &quot;Raised beds are useful only for flowers, not vegetables.&quot;, &quot;The lot definitely cannot be used for any kind of garden.&quot;], 0, 5], [&quot;Which statement from the volunteer day flyer is most clearly a persuasive claim rather than a fact?&quot;, [&quot;Saturday, May 18 - 9:00 a.m. to 1:00 p.m.&quot;, &quot;Bring: water bottle, work gloves, closed-toe shoes&quot;, &quot;Tasks: clear litter, mark pathways, build two starter raised beds&quot;, &quot;Let's make the best garden in the whole city!&quot;], 3, 5], [&quot;Which source provides the strongest evidence for what gardeners should do if the soil is unsafe for food crops?&quot;, [&quot;Source A, because it mentions the library&quot;, &quot;Source B, because it lists the volunteer schedule&quot;, &quot;Source C, because it explains using raised beds with clean soil and compost&quot;, &quot;None of the sources gives information about soil safety&quot;], 2, 5], [&quot;A student wants to know when volunteers should arrive and what to bring. Which source is most relevant?&quot;, [&quot;Source A&quot;, &quot;Source B&quot;, &quot;Source C&quot;, &quot;All three sources are equally useful&quot;], 1, 5], [&quot;Which community garden source is the most credible for deciding whether the soil is safe for growing vegetables?&quot;, [&quot;Source A, because news briefs always replace lab testing&quot;, &quot;Source B, because flyers are designed to persuade people&quot;, &quot;Source C, because it comes from a county extension office and explains soil testing&quot;, &quot;Source B, because it uses the strongest language&quot;], 2, 5], [&quot;Which community garden source is most likely to contain bias because its main purpose is to encourage participation?&quot;, [&quot;Source A&quot;, &quot;Source B&quot;, &quot;Source C&quot;, &quot;None of the sources has any purpose&quot;], 1, 5]]}, &quot;Science&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Scenario 1 — Shadows Over the Playground&quot;, &quot;text&quot;: &quot;&lt;p&gt;A class measured the shadow of the school flagpole several times during one clear day. They also recorded how many hours of daylight the town had in different months. Their goal was to look for patterns they could use to make predictions.&lt;/p&gt;&lt;p&gt;The class also compared two identical camp lanterns. One lantern was 2 meters away. The other was 8 meters away. The closer lantern looked brighter even though both gave off the same kind of light.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Table 1. Flagpole Shadow Measurements&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Time&lt;/th&gt;&lt;th&gt;Shadow length&lt;/th&gt;&lt;th&gt;Direction shadow pointed&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;8:00 a.m.&lt;/td&gt;&lt;td&gt;18 feet&lt;/td&gt;&lt;td&gt;west&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;10:00 a.m.&lt;/td&gt;&lt;td&gt;10 feet&lt;/td&gt;&lt;td&gt;west&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;12:00 p.m.&lt;/td&gt;&lt;td&gt;6 feet&lt;/td&gt;&lt;td&gt;north&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;2:00 p.m.&lt;/td&gt;&lt;td&gt;9 feet&lt;/td&gt;&lt;td&gt;east&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;4:00 p.m.&lt;/td&gt;&lt;td&gt;16 feet&lt;/td&gt;&lt;td&gt;east&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Table 2. Average Daylight Hours&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Month&lt;/th&gt;&lt;th&gt;Average daylight hours&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;December&lt;/td&gt;&lt;td&gt;9.0 hours&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;March&lt;/td&gt;&lt;td&gt;12.0 hours&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;June&lt;/td&gt;&lt;td&gt;15.5 hours&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;September&lt;/td&gt;&lt;td&gt;12.5 hours&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 2 — Saving the School Hill from Erosion&quot;, &quot;text&quot;: &quot;&lt;p&gt;After heavy rain, soil washes down a grassy hill near the school playground. A student team built three small models to test which design would reduce erosion the most. Each model tray had the same slope, the same amount of soil, and the same amount of water poured on it during each trial.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Design A&lt;/strong&gt; used bare soil. &lt;strong&gt;Design B&lt;/strong&gt; used strips of grass planted across the slope. &lt;strong&gt;Design C&lt;/strong&gt; used a low stone barrier with small drain holes.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Table 3. Soil Washed Out After Three Trials&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Design&lt;/th&gt;&lt;th&gt;Trial 1&lt;/th&gt;&lt;th&gt;Trial 2&lt;/th&gt;&lt;th&gt;Trial 3&lt;/th&gt;&lt;th&gt;Average&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;A: Bare soil&lt;/td&gt;&lt;td&gt;220 g&lt;/td&gt;&lt;td&gt;210 g&lt;/td&gt;&lt;td&gt;225 g&lt;/td&gt;&lt;td&gt;218 g&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;B: Grass strips&lt;/td&gt;&lt;td&gt;95 g&lt;/td&gt;&lt;td&gt;88 g&lt;/td&gt;&lt;td&gt;92 g&lt;/td&gt;&lt;td&gt;92 g&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;C: Stone barrier with drain holes&lt;/td&gt;&lt;td&gt;130 g&lt;/td&gt;&lt;td&gt;124 g&lt;/td&gt;&lt;td&gt;128 g&lt;/td&gt;&lt;td&gt;127 g&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 3 — Finch Traits on Windy Island&quot;, &quot;text&quot;: &quot;&lt;p&gt;Scientists on Windy Island studied one kind of finch. Some finches had deeper beaks and some had shallower beaks. In one dry year, fewer soft seeds grew on the island, but many hard seeds remained. The scientists measured many birds instead of just one bird so they could learn about variation in the whole finch population.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Table 4. Finch Beak Types Before and After a Dry Year&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Beak type&lt;/th&gt;&lt;th&gt;Before dry year&lt;/th&gt;&lt;th&gt;After dry year&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Shallow beak&lt;/td&gt;&lt;td&gt;24 finches&lt;/td&gt;&lt;td&gt;10 finches&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Deep beak&lt;/td&gt;&lt;td&gt;16 finches&lt;/td&gt;&lt;td&gt;22 finches&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Table 5. Traits Observed in One Finch Chick&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Trait&lt;/th&gt;&lt;th&gt;Likely inherited or acquired?&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Deep beak&lt;/td&gt;&lt;td&gt;Inherited&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Brown feathers&lt;/td&gt;&lt;td&gt;Inherited&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Mud on feet&lt;/td&gt;&lt;td&gt;Acquired&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Scraped wing tip from a thorn&lt;/td&gt;&lt;td&gt;Acquired&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 4 — Wetland Food Web&quot;, &quot;text&quot;: &quot;&lt;p&gt;A wetland near a school includes cattails, algae, insects, snails, frogs, herons, and decomposers in the mud. During three dry years, the water level dropped and fewer cattails grew. Scientists tracked several populations and considered possible ways to help the wetland recover.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Food Web Notes&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Organism&lt;/th&gt;&lt;th&gt;Role in the wetland&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Cattails and algae&lt;/td&gt;&lt;td&gt;Producers&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Insects and snails&lt;/td&gt;&lt;td&gt;Consumers that eat plants or algae&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Frogs&lt;/td&gt;&lt;td&gt;Consumers that eat insects&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Herons&lt;/td&gt;&lt;td&gt;Consumers that eat frogs and fish&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Decomposers in mud&lt;/td&gt;&lt;td&gt;Break down dead matter and return materials to the system&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Table 6. Population Data&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Year&lt;/th&gt;&lt;th&gt;Cattail patches&lt;/th&gt;&lt;th&gt;Frogs counted&lt;/th&gt;&lt;th&gt;Herons counted&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Year 1&lt;/td&gt;&lt;td&gt;50&lt;/td&gt;&lt;td&gt;120&lt;/td&gt;&lt;td&gt;18&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Year 2&lt;/td&gt;&lt;td&gt;38&lt;/td&gt;&lt;td&gt;85&lt;/td&gt;&lt;td&gt;15&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Year 3&lt;/td&gt;&lt;td&gt;25&lt;/td&gt;&lt;td&gt;40&lt;/td&gt;&lt;td&gt;9&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Possible Solutions&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Option&lt;/th&gt;&lt;th&gt;Description&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;A&lt;/td&gt;&lt;td&gt;Plant native cattails and build shallow pond edges that hold water longer&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;B&lt;/td&gt;&lt;td&gt;Release more herons into the wetland right away&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;C&lt;/td&gt;&lt;td&gt;Pave a wide path across the wet area so people can walk there in all seasons&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 5 — What Happened to the Sugar?&quot;, &quot;text&quot;: &quot;&lt;p&gt;Students investigated matter using three small activities.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Cup A:&lt;/strong&gt; They stirred one spoon of sugar into warm water until the sugar could no longer be seen, but the water still tasted sweet.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Cup B:&lt;/strong&gt; They left the sugar water in a sunny window until the water disappeared and sugar crystals remained.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Activity C:&lt;/strong&gt; They pushed air into a syringe with the tip sealed and saw the air take up less space until they released the plunger.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 6 — Ramp Races&quot;, &quot;text&quot;: &quot;&lt;p&gt;Students rolled the same marble down ramps of different heights. After leaving the ramp, the marble hit an empty paper cup on a smooth floor. The class measured how far the cup moved after each collision.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Table 7. Ramp Test Results&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Ramp height&lt;/th&gt;&lt;th&gt;Cup movement after collision&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;10 cm&lt;/td&gt;&lt;td&gt;5 cm&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;20 cm&lt;/td&gt;&lt;td&gt;11 cm&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;30 cm&lt;/td&gt;&lt;td&gt;18 cm&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 7 — Where Does the Rabbit's Energy Come From?&quot;, &quot;text&quot;: &quot;&lt;p&gt;A meadow food-chain model showed this path:&lt;/p&gt;&lt;p style='text-align:center;font-size:1.1rem;font-weight:700;padding:.5rem;background:#e8f5ef;border-radius:8px'&gt;☀️ Sun → 🌿 Clover → 🐰 Rabbit → 🦊 Fox&lt;/p&gt;&lt;p&gt;Students discussed how the rabbit uses food energy for body warmth, growth, movement, and repair. They also asked what would happen if thick clouds blocked much of the sunlight for many days.&lt;/p&gt;&quot;}], &quot;questions&quot;: [[&quot;At what time was the flagpole's shadow shortest?&quot;, [&quot;8:00 a.m.&quot;, &quot;10:00 a.m.&quot;, &quot;12:00 p.m.&quot;, &quot;4:00 p.m.&quot;], 2, 0, &quot;Step 1: Look at Table 1 for the shortest shadow length.\nStep 2: 8am=18ft, 10am=10ft, 12pm=6ft, 2pm=9ft, 4pm=16ft.\nStep 3: The shortest is 6 feet at 12:00 p.m.\nWhy? The Sun is highest at noon, so shadows are shortest.&quot;], [&quot;Which shadow pattern is best supported by the data?&quot;, [&quot;The shadow always pointed north.&quot;, &quot;The shadow pointed west in the morning and east in the afternoon.&quot;, &quot;The shadow stayed the same length all day.&quot;, &quot;The shadow became shorter every hour with no change later.&quot;], 1, 0, &quot;Step 1: Look at the 'Direction' column in Table 1.\nStep 2: At 8am and 10am the shadow pointed west. At 2pm and 4pm it pointed east.\nStep 3: The pattern is west in the morning, east in the afternoon.\nWhy? As the Sun moves across the sky, shadows point the opposite direction.&quot;], [&quot;If students measured the flagpole shadow at 3:00 p.m., which result would be most reasonable?&quot;, [&quot;A shadow pointing east that is longer than 9 feet but shorter than 16 feet&quot;, &quot;A shadow pointing west that is shorter than 6 feet&quot;, &quot;No shadow at all&quot;, &quot;A shadow pointing north that is exactly 2 feet long&quot;], 0, 0, &quot;Step 1: At 2pm the shadow was 9ft pointing east. At 4pm it was 16ft pointing east.\nStep 2: At 3pm (between 2pm and 4pm), the shadow should be between 9 and 16 feet, still pointing east.\nTip: Use the pattern in the data to predict values between measurements.&quot;], [&quot;During which month does the town have the most daylight?&quot;, [&quot;December&quot;, &quot;March&quot;, &quot;June&quot;, &quot;September&quot;], 2, 0, &quot;Step 1: Look at Table 2 for daylight hours in each month.\nStep 2: Dec=9.0, Mar=12.0, Jun=15.5, Sep=12.5.\nStep 3: June has the most daylight at 15.5 hours.\nWhy? In summer, Earth's tilt gives the Northern Hemisphere more sunlight.&quot;], [&quot;Which statement best explains the daily shadow pattern?&quot;, [&quot;The Sun moves under Earth each afternoon.&quot;, &quot;Earth's rotation makes the Sun appear to move across the sky during the day.&quot;, &quot;The flagpole changes height every few hours.&quot;, &quot;Clouds pull the shadow across the ground.&quot;], 1, 0, &quot;Step 1: Shadows change position because the Sun appears to move across the sky.\nStep 2: The Sun doesn't actually move — Earth rotates (spins) on its axis.\nStep 3: This rotation makes the Sun appear to rise in the east and set in the west.\nAnswer: Earth's rotation causes the daily shadow pattern.&quot;], [&quot;What evidence best supports the claim that the Sun looks brighter than other stars because it is closer to Earth?&quot;, [&quot;A closer lantern looked brighter than the same lantern placed farther away.&quot;, &quot;The flagpole was taller than the students.&quot;, &quot;June has more daylight than December.&quot;, &quot;The shadow at noon was the shortest one.&quot;], 0, 0, &quot;Step 1: The experiment used two identical lanterns at different distances.\nStep 2: The closer lantern (2m) looked brighter than the farther one (8m).\nStep 3: This is like the Sun — it looks brighter than other stars because it's much closer to Earth.\nTip: Same light + closer distance = appears brighter.&quot;], [&quot;Which erosion design reduced erosion the most?&quot;, [&quot;Design A (bare soil), because it had the largest average&quot;, &quot;Design B (grass strips), because it had the smallest average amount of soil washed out&quot;, &quot;Design C (stone barrier), because stones are always better than plants&quot;, &quot;All three designs reduced erosion equally&quot;], 1, 1, &quot;Step 1: Look at the 'Average' column in Table 3.\nStep 2: Design A=218g, Design B=92g, Design C=127g.\nStep 3: Design B (grass strips) had the least soil washed out (92g), so it reduced erosion the most.\nTip: Less soil lost = better erosion control.&quot;], [&quot;What variable did the students change on purpose in the erosion investigation?&quot;, [&quot;The design used on the slope&quot;, &quot;The amount of water poured in each trial&quot;, &quot;The steepness of the trays&quot;, &quot;The amount of soil in each tray&quot;], 0, 1, &quot;Step 1: In an experiment, the variable you change on purpose is the independent variable.\nStep 2: The students kept slope, soil amount, and water amount the same.\nStep 3: The only thing they changed was the design (bare soil vs. grass vs. stone barrier).\nAnswer: The design used on the slope.&quot;], [&quot;Why was it important to keep the slope of each tray the same in the erosion investigation?&quot;, [&quot;So the students could make the test fair and compare only the designs&quot;, &quot;So Design A would have a better chance to win&quot;, &quot;So the water would not move at all&quot;, &quot;So the students would not need to record data&quot;], 0, 1, &quot;Step 1: A fair test means only ONE variable changes at a time.\nStep 2: If slopes were different, you couldn't tell if the results were from the design or the slope.\nStep 3: Keeping the slope the same lets you compare ONLY the designs.\nTip: This is called 'controlling variables.'&quot;], [&quot;Which claim is best supported by the erosion data?&quot;, [&quot;Plants can help slow erosion on a slope.&quot;, &quot;Bare soil is always the safest design.&quot;, &quot;Stone barriers stop every drop of water.&quot;, &quot;The amount of water poured did not matter.&quot;], 0, 1, &quot;Step 1: Design B (grass strips) lost only 92g of soil vs. 218g for bare soil.\nStep 2: This shows that plants helped hold the soil in place.\nStep 3: The roots of the grass grip the soil and slow water flow.\nAnswer: Plants can help slow erosion on a slope.&quot;], [&quot;Which possible failure point should students think about for Design C (stone barrier with drain holes)?&quot;, [&quot;Whether the drain holes could clog with mud and stop water from flowing through&quot;, &quot;Whether grass is green&quot;, &quot;Whether stones are heavier than feathers&quot;, &quot;Whether the school bell rings during science class&quot;], 0, 1, &quot;Step 1: Design C has small drain holes in the stone barrier.\nStep 2: Over time, mud and dirt could block these holes.\nStep 3: If holes clog, water can't drain and might overflow or push the barrier.\nTip: Engineers always think about what could go wrong with a design.&quot;], [&quot;What is the best next step if students want stronger evidence for their erosion results?&quot;, [&quot;Repeat the investigation again using the same controlled conditions&quot;, &quot;Change all the variables at once&quot;, &quot;Stop collecting data because three trials are enough forever&quot;, &quot;Use only Design A from now on&quot;], 0, 1, &quot;Step 1: Three trials is a good start, but more trials = stronger evidence.\nStep 2: Repeating with the same conditions checks if results are consistent.\nStep 3: If you get similar numbers again, you can be more confident in your conclusion.\nTip: Repetition makes science more reliable.&quot;], [&quot;Which trait in the finch table is an acquired trait, not an inherited one?&quot;, [&quot;deep beak&quot;, &quot;brown feathers&quot;, &quot;mud on feet&quot;, &quot;beak shape&quot;], 2, 2, &quot;Step 1: Look at Table 5 for acquired traits.\nStep 2: Inherited traits come from parents (deep beak, brown feathers). Acquired traits happen during life.\nStep 3: 'Mud on feet' happened from walking — it wasn't passed down from parents.\nAnswer: Mud on feet is acquired.&quot;], [&quot;Why did the scientists measure many finches instead of just one finch?&quot;, [&quot;To learn about variation in the population&quot;, &quot;Because one finch can never be measured&quot;, &quot;To make the island windier&quot;, &quot;Because all finches are exactly the same&quot;], 0, 2, &quot;Step 1: One bird might not represent the whole population.\nStep 2: Some finches have deep beaks, others have shallow beaks — there's variation.\nStep 3: Measuring many birds shows the range of differences in the population.\nTip: A bigger sample gives a better picture of the whole group.&quot;], [&quot;According to the finch data, which beak type became more common after the dry year?&quot;, [&quot;shallow beak&quot;, &quot;deep beak&quot;, &quot;both stayed equal&quot;, &quot;the table does not show beak types&quot;], 1, 2, &quot;Step 1: Look at Table 4. Before: shallow=24, deep=16. After: shallow=10, deep=22.\nStep 2: Deep beak finches increased from 16 to 22.\nStep 3: Shallow beak finches decreased from 24 to 10.\nAnswer: Deep beaks became more common after the dry year.&quot;], [&quot;What is the best explanation for the change in finch beak types after the dry year?&quot;, [&quot;Finches with deeper beaks were better able to crack hard seeds during the dry year.&quot;, &quot;All shallow-beak finches forgot how to eat.&quot;, &quot;Deep beaks change into shallow beaks every winter.&quot;, &quot;Rainfall has no effect on food for finches.&quot;], 0, 2, &quot;Step 1: During the dry year, soft seeds were scarce but h squares folds into a cube.\nTip: All faces are squares = cube.&quot;], [&quot;Grid shows (1,3),(2,5),(3,7). Which ordered pair continues the pattern?&quot;, [&quot;(4, 8)&quot;, &quot;(4, 9)&quot;, &quot;(5, 9)&quot;, &quot;(5, 11)&quot;], 1, &quot;Step 1: Pattern: x goes +1, y goes +2. Next: (4,9).\nAnswer: (4,9)&quot;], [&quot;Ellen has $12.50, buys a notebook ($3.75) and markers ($2.89). How much is left?&quot;, [&quot;$5.84&quot;, &quot;$5.86&quot;, &quot;$6.14&quot;, &quot;$6.36&quot;], 1, &quot;Step 1: $3.75+$2.89=$6.64 spent.\nStep 2: $12.50-$6.64=$5.86 left.&quot;], [&quot;Order from least to greatest: 0.58, 3/5, 0.62, 5/8&quot;, [&quot;0.58, 0.62, 3/5, 5/8&quot;, &quot;0.58, 3/5, 0.62, 5/8&quot;, &quot;3/5, 0.58, 5/8, 0.62&quot;, &quot;5/8, 0.62, 3/5, 0.58&quot;], 1, &quot;Step 1: Convert: 3/5=0.60, 5/8=0.625.\nStep 2: Order: 0.58, 0.60, 0.62, 0.625.\nAnswer: 0.58, 3/5, 0.62, 5/8&quot;], [&quot;Figure is a rectangle (8×4) plus a triangle (base 8, height 3). Total area?&quot;, [&quot;36 sq units&quot;, &quot;40 sq units&quot;, &quot;44 sq units&quot;, &quot;56 sq units&quot;], 2, &quot;Step 1: Rectangle area = 8×4=32.\nStep 2: Triangle area = ½×8×3=12.\nStep 3: Total = 32+12=44 sq units.&quot;], [&quot;Jada has x stickers, buys 18 more, now has more than 50. Which inequality?&quot;, [&quot;x + 18 &gt; 50&quot;, &quot;x − 18 &gt; 50&quot;, &quot;18x &gt; 50&quot;, &quot;x + 50 &gt; 18&quot;], 0, &quot;Step 1: x stickers + 18 more &gt; 50.\nStep 2: Written as x + 18 &gt; 50.&quot;], [&quot;A rectangular prism has dimensions 4 cm × 3 cm × 2 cm. What is its surface area?&quot;, [&quot;24 sq cm&quot;, &quot;26 sq cm&quot;, &quot;52 sq cm&quot;, &quot;72 sq cm&quot;], 2, &quot;Step 1: Surface area = 2(lw+lh+wh).\nStep 2: 2(4×3+4×2+3×2)=2(12+8+6)=2(26)=52 sq cm.&quot;], [&quot;Best whole-number estimate of 3 7/8 + 2 1/6?&quot;, [&quot;5&quot;, &quot;6&quot;, &quot;7&quot;, &quot;8&quot;], 1, &quot;Step 1: 3 7/8 ≈ 4, and 2 1/6 ≈ 2.\nStep 2: 4+2=6.\nAnswer: Best estimate is 6.&quot;], [&quot;Which expression is equivalent to 7 × 18 + 7 × 2?&quot;, [&quot;7 × 20&quot;, &quot;7 + 18 + 2&quot;, &quot;18 × 2 × 7&quot;, &quot;7 × 16&quot;], 0, &quot;Step 1: Factor out 7: 7×18+7×2 = 7×(18+2) = 7×20.\nTip: This is the distributive property!&quot;], [&quot;Line graph shows plant height each week. During which time did the plant NOT grow?&quot;, [&quot;Week 1 to Week 2&quot;, &quot;Week 2 to Week 3&quot;, &quot;Week 3 to Week 4&quot;, &quot;Week 4 to Week 5&quot;], 1, &quot;Step 1: Look for where the line is flat (no change in height).\nAnswer: Week 2 to Week 3 (the line stays level).&quot;], [&quot;Five jars have 6, 10, 8, 12, 14 marbles. If shared equally, how many in each jar?&quot;, [&quot;8&quot;, &quot;9&quot;, &quot;10&quot;, &quot;12&quot;], 2, &quot;Step 1: Total: 6+10+8+12+14=50.\nStep 2: 50÷5=10 marbles each.&quot;], [&quot;The rule is y = 3x. Which ordered pair belongs to the graph?&quot;, [&quot;(2, 5)&quot;, &quot;(3, 6)&quot;, &quot;(4, 12)&quot;, &quot;(5, 20)&quot;], 2, &quot;Step 1: y=3x. Check (4,12): 3×4=12 ✓.\nAnswer: (4,12)&quot;], [&quot;A rectangular prism has base area 12 sq cm and height 5 cm. What is its volume?&quot;, [&quot;17 cubic cm&quot;, &quot;60 cubic cm&quot;, &quot;120 cubic cm&quot;, &quot;300 cubic cm&quot;], 1, &quot;Step 1: Volume = base area × height = 12×5 = 60 cubic cm.&quot;], [&quot;What is the quotient of 425 ÷ 20?&quot;, [&quot;21 remainder 5&quot;, &quot;21.25&quot;, &quot;22.5&quot;, &quot;25.21&quot;], 1, &quot;Step 1: 425÷20. 20×21=420. Remainder=5.\nStep 2: 5/20=0.25. So 21.25.&quot;], [&quot;Museum sold t tickets Tuesday, 38 more Wednesday, 154 total. Which equation?&quot;, [&quot;t + 38 = 154&quot;, &quot;2t + 38 = 154&quot;, &quot;t + (38 − t) = 154&quot;, &quot;t − 38 = 154&quot;], 1, &quot;Step 1: Tuesday: t tickets. Wednesday: t+38.\nStep 2: Total: t+(t+38)=154 → 2t+38=154.&quot;], [&quot;What is 2 3/4 + 1 1/6?&quot;, [&quot;3 7/12&quot;, &quot;3 9/12&quot;, &quot;3 11/12&quot;, &quot;4 1/12&quot;], 2, &quot;Step 1: Convert to improper: 2¾=11/4, 1⅙=7/6.\nStep 2: Common denom=12: 33/12+14/12=47/12=3 11/12.&quot;], [&quot;Which decimal is equivalent to 1 3/5?&quot;, [&quot;1.3&quot;, &quot;1.35&quot;, &quot;1.6&quot;, &quot;1.8&quot;], 2, &quot;Step 1: 1 3/5 = 1 + 3/5.\nStep 2: 3÷5=0.6, so 1 3/5=1.6.&quot;], [&quot;A solid has 1 pentagonal base and 5 triangular faces. What is the solid?&quot;, [&quot;pentagonal prism&quot;, &quot;pentagonal pyramid&quot;, &quot;triangular prism&quot;, &quot;cube&quot;], 1, &quot;Step 1: 1 pentagonal base + 5 triangular faces = pentagonal pyramid.\nTip: Pyramids have one base and triangular sides.&quot;], [&quot;Students read 8,9,9,10,10,11,40 books. Which measure best describes a typical number?&quot;, [&quot;mean, because it uses every number&quot;, &quot;median, because 40 is an outlier&quot;, &quot;range, because it shows spread&quot;, &quot;maximum, because it shows the greatest&quot;], 1, &quot;Step 1: 40 is much bigger than the others (it's an outlier).\nStep 2: The mean gets pulled up by 40, but the median stays near the middle.\nAnswer: Median is best because 40 is an outlier.&quot;], [&quot;Which number is greatest: 1.68, 17/10, 1 3/4, 9/5?&quot;, [&quot;1.68&quot;, &quot;17/10&quot;, &quot;1 3/4&quot;, &quot;9/5&quot;], 3, &quot;Step 1: Convert all to decimals: 1.68, 1.70, 1.75, 1.80.\nStep 2: 9/5=1.80 is greatest.&quot;], [&quot;What value of x makes x + 19 = 54 true?&quot;, [&quot;25&quot;, &quot;35&quot;, &quot;63&quot;, &quot;73&quot;], 1, &quot;Step 1: x+19=54.\nStep 2: x=54-19=35.&quot;], [&quot;A parallelogram has base 11 units and height 7 units. What is its area?&quot;, [&quot;18 sq units&quot;, &quot;38.5 sq units&quot;, &quot;77 sq units&quot;, &quot;154 sq units&quot;], 2, &quot;Step 1: Area = base × height = 11 × 7 = 77 sq units.&quot;], [&quot;A pattern starts with 5 tiles and increases by 4 each time. How many tiles in Figure 4?&quot;, [&quot;15&quot;, &quot;16&quot;, &quot;17&quot;, &quot;18&quot;], 2, &quot;Step 1: Figure 1=5, Figure 2=9, Figure 3=13, Figure 4=17.\nTip: Add 4 each time: 5,9,13,17.&quot;], [&quot;18 buses each holding 46 students; 597 have boarded. How many seats are empty?&quot;, [&quot;221&quot;, &quot;231&quot;, &quot;241&quot;, &quot;251&quot;], 1, &quot;Step 1: Total seats: 18×46=828.\nStep 2: Empty: 828-597=231.&quot;], [&quot;A recipe needs 2 1/2 cups flour. Elena has 1 3/4 cups. How much more does she need?&quot;, [&quot;1/4 cup&quot;, &quot;1/2 cup&quot;, &quot;3/4 cup&quot;, &quot;1 1/4 cups&quot;], 2, &quot;Step 1: 2½ - 1¾. Convert: 2 2/4 - 1 3/4.\nStep 2: Borrow: 1 6/4 - 1 3/4 = 3/4 cup.&quot;], [&quot;Student estimates 3,968 ÷ 51 using 4,000 ÷ 50. Which estimate is closest?&quot;, [&quot;40&quot;, &quot;50&quot;, &quot;80&quot;, &quot;100&quot;], 2, &quot;Step 1: 4,000÷50=80.\nTip: Round to friendly numbers to estimate!&quot;], [&quot;A bottle has 2.5 L. Sam drinks 3/4 L in the morning and 1 1/2 L at lunch. How much is left?&quot;, [&quot;1/4 liter&quot;, &quot;1/2 liter&quot;, &quot;3/4 liter&quot;, &quot;1 liter&quot;], 0, &quot;Step 1: Used: ¾ + 1½ = ¾ + 6/4 = 9/4 = 2.25 L.\nStep 2: 2.5 - 2.25 = 0.25 = ¼ liter left.&quot;], [&quot;What is 0.01 more than 6.309?&quot;, [&quot;6.31&quot;, &quot;6.319&quot;, &quot;6.409&quot;, &quot;7.309&quot;], 1, &quot;Step 1: 6.309 + 0.010 = 6.319.\nTip: Add 1 to the hundredths place.&quot;], [&quot;A ribbon is 4 1/2 ft. Maya uses 1 3/4 ft and 1 1/2 ft. How much remains?&quot;, [&quot;1/4 foot&quot;, &quot;3/4 foot&quot;, &quot;1 1/4 feet&quot;, &quot;1 3/4 feet&quot;], 2, &quot;Step 1: Used: 1¾ + 1½ = 7/4 + 6/4 = 13/4 = 3¼ ft.\nStep 2: 4½ - 3¼ = 4 2/4 - 3 1/4 = 1¼ feet.&quot;]], &quot;Math Practice 2&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Reference Sheet — Helpful Formulas&quot;, &quot;text&quot;: &quot;&lt;p style=\&quot;font-weight:700;color:#0D3D2E;font-size:.92rem;margin-bottom:.5rem\&quot;&gt;Grade 5 Quick Reference Sheet&lt;/p&gt;\n&lt;p style=\&quot;font-size:.84rem;margin-bottom:.5rem\&quot;&gt;Use these formulas when they help. Read each problem carefully and choose the right operation.&lt;/p&gt;\n&lt;table&gt;\n&lt;tr&gt;&lt;th&gt;Skill&lt;/th&gt;&lt;th&gt;Formula / Reminder&lt;/th&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Perimeter&lt;/td&gt;&lt;td&gt;Add the side lengths&lt;/td&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Area of a rectangle&lt;/td&gt;&lt;td&gt;length &amp;times; width&lt;/td&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Area of a triangle&lt;/td&gt;&lt;td&gt;&amp;frac12; &amp;times; base &amp;times; height&lt;/td&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Area of a parallelogram&lt;/td&gt;&lt;td&gt;base &amp;times; height&lt;/td&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Volume of a rectangular prism&lt;/td&gt;&lt;td&gt;length &amp;times; width &amp;times; height&lt;/td&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Surface area of a rectangular prism&lt;/td&gt;&lt;td&gt;2(lw + lh + wh)&lt;/td&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Mean (average)&lt;/td&gt;&lt;td&gt;Sum of values &amp;divide; number of values&lt;/td&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Median&lt;/td&gt;&lt;td&gt;The middle value in an ordered list&lt;/td&gt;&lt;/tr&gt;\n&lt;tr&gt;&lt;td&gt;Range&lt;/td&gt;&lt;td&gt;Largest value &amp;minus; smallest value&lt;/td&gt;&lt;/tr&gt;\n&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Bar Graph — Votes by Color (Set 1)&quot;, &quot;text&quot;: &quot;&lt;p style=\&quot;font-weight:700;text-align:center;color:#0D3D2E;font-size:.95rem;margin-bottom:.4rem\&quot;&gt;Votes by Color&lt;/p&gt;&lt;div style=\&quot;display:flex;gap:.3rem;margin:0 auto;max-width:420px\&quot;&gt;&lt;div style=\&quot;display:flex;flex-direction:column;justify-content:space-between;width:26px;height:150px;font-size:.7rem;color:#555;text-align:right;padding-right:4px;border-right:2px solid #333\&quot;&gt;&lt;span style=\&quot;flex:1;display:flex;align-items:flex-start;justify-content:flex-end\&quot;&gt;14&lt;/span&gt;&lt;span style=\&quot;flex:1;display:flex;align-it he fractions (same denominator): 4/5 − 2/5 = 2/5.\nAnswer: 2/5.&quot;], [&quot;What is the volume of the rectangular prism shown (in cubic units)?&quot;, [&quot;6&quot;, &quot;8&quot;, &quot;12&quot;, &quot;16&quot;], 1, 4, &quot;Step 1: Volume = length × width × height.\nStep 2: 2 × 2 × 2.\nStep 3: 2 × 2 = 4, then 4 × 2 = 8.\nAnswer: 8 cubic units.&quot;], [&quot;Is  5x &gt; 8  true when  x = 4?&quot;, [&quot;Yes&quot;, &quot;No&quot;, &quot;Only for x = 0&quot;, &quot;Cannot tell&quot;], 0, 0, &quot;Step 1: Substitute x = 4 into 5x: 5 × 4 = 20.\nStep 2: Compare 20 and 8. Since 20 &gt; 8, the statement is true.\nAnswer: Yes.&quot;], [&quot;A factory has 178 bottles. It puts 4 bottles in each crate. How many full crates can be packed?&quot;, [&quot;43&quot;, &quot;2&quot;, &quot;44&quot;, &quot;45&quot;], 2, 0, &quot;Step 1: Divide: 178 ÷ 4.\nStep 2: 4 × 44 = 176, leaving 2 bottles left over.\nStep 3: 2 bottles is not enough for another full crate.\nAnswer: 44 full crates.&quot;], [&quot;Which number is equivalent to  1 1/5?&quot;, [&quot;1.3&quot;, &quot;1.1&quot;, &quot;1.2&quot;, &quot;1.21&quot;], 2, 0, &quot;Step 1: 1/5 as a decimal is 0.2 (since 1 ÷ 5 = 0.2).\nStep 2: Add the whole number: 1 + 0.2 = 1.2.\nAnswer: 1.2&quot;], [&quot;Look at the bar graph. For Red, which class had more votes?&quot;, [&quot;Class A&quot;, &quot;Class B&quot;, &quot;They are equal&quot;, &quot;Not enough information&quot;], 2, 6, &quot;Step 1: Read the two Red bars. Class A = 7 and Class B = 7.\nStep 2: Both classes had the same number of Red votes.\nAnswer: They are equal.&quot;], [&quot;A bottle holds 6.43 liters of juice. 1.24 liters are poured out. How many liters are left?&quot;, [&quot;5.19&quot;, &quot;5.29&quot;, &quot;1.24&quot;, &quot;7.67&quot;], 0, 0, &quot;Step 1: Subtract: 6.43 − 1.24.\nStep 2: Hundredths: 3 − 4 needs borrowing. 13 − 4 = 9.\nStep 3: Tenths (after borrow): 3 − 2 = 1.\nStep 4: Ones: 6 − 1 = 5.\nAnswer: 5.19 liters left.&quot;], [&quot;What is the volume of the rectangular prism shown (in cubic units)?&quot;, [&quot;56&quot;, &quot;13&quot;, &quot;100&quot;, &quot;15&quot;], 0, 7, &quot;Step 1: Volume = length × width × height.\nStep 2: 2 × 4 × 7.\nStep 3: 2 × 4 = 8, then 8 × 7 = 56.\nAnswer: 56 cubic units.&quot;], [&quot;Which estimate is closest to  278 × 53?&quot;, [&quot;15,000&quot;, &quot;14,500&quot;, &quot;14,000&quot;, &quot;11,200&quot;], 2, 0, &quot;Step 1: Round 278 to 280 and 53 to 50.\nStep 2: 280 × 50 = 14,000.\nAnswer: The closest estimate is 14,000.&quot;], [&quot;Which list shows these numbers in order from least to greatest?\n0.93,  1.79,  7/8,  1.25&quot;, [&quot;7/8, 1.25, 0.93, 1.79&quot;, &quot;1.79, 1.25, 0.93, 7/8&quot;, &quot;7/8, 0.93, 1.25, 1.79&quot;, &quot;0.93, 7/8, 1.25, 1.79&quot;], 2, 0, &quot;Step 1: Convert 7/8 to a decimal: 7 ÷ 8 = 0.875.\nStep 2: Compare decimals: 0.875, 0.93, 1.25, 1.79.\nStep 3: From least to greatest: 7/8, 0.93, 1.25, 1.79.&quot;], [&quot;Look at the bar graph. What is the total number of votes for Red from both classes?&quot;, [&quot;5&quot;, &quot;6&quot;, &quot;16&quot;, &quot;11&quot;], 2, 8, &quot;Step 1: Read the two Red bars. Class A = 5 and Class B = 11.\nStep 2: Add: 5 + 11 = 16.\nAnswer: 16 total votes for Red.&quot;], [&quot;What is the median of this data set?\n21, 27, 36, 43, 47, 57, 61, 87, 92&quot;, [&quot;21&quot;, &quot;92&quot;, &quot;47&quot;, &quot;52.333&quot;], 2, 0, &quot;Step 1: The data is already in order from least to greatest.\nStep 2: There are 9 values, so the median is the 5th (middle) value.\nStep 3: The 5th value is 47.\nAnswer: Median = 47.&quot;]]}}}, &quot;Grade 6&quot;: {&quot;color&quot;: &quot;#2E4057&quot;, &quot;subjects&quot;: {&quot;Math&quot;: [[&quot;What is 3/4 / 1/2?&quot;, [&quot;3/8&quot;, &quot;1 and 1/2&quot;, &quot;6/4&quot;, &quot;2/3&quot;], 1, &quot;Step 1: Dividing by a fraction = multiply by its reciprocal.\nStep 2: 3/4 ÷ 1/2 = 3/4 × 2/1 = 6/4 = 1½.&quot;], [&quot;Solve for x: 2x + 5 = 17&quot;, [&quot;x = 6&quot;, &quot;x = 7&quot;, &quot;x = 11&quot;, &quot;x = 5&quot;], 0, &quot;Step 1: Subtract 5 from both sides: 2x = 12.\nStep 2: Divide both sides by 2: x = 6.&quot;], [&quot;A bag has 4 red, 3 blue, and 5 green marbles. What is the probability of picking blue?&quot;, [&quot;1/4&quot;, &quot;3/12&quot;, &quot;1/3&quot;, &quot;3/4&quot;], 1, &quot;Step 1: Total marbles: 4+3+5=12.\nStep 2: P(blue) = blue/total = 3/12 = 1/4.\nTip: Simplify: 3÷3=1, 12÷3=4.&quot;], [&quot;What is the GCF of 24 and 36?&quot;, [&quot;6&quot;, &quot;9&quot;, &quot;12&quot;, &quot;18&quot;], 2, &quot;Step 1: Factors of 24: 1,2,3,4,6,8,12,24.\nStep 2: Factors of 36: 1,2,3,4,6,9,12,18,36.\nStep 3: Greatest common: 12.&quot;], [&quot;What is 2.4 x 3.5?&quot;, [&quot;7.2&quot;, &quot;8.4&quot;, &quot;6.8&quot;, &quot;9.2&quot;], 1, &quot;Step 1: 2.4 × 3.5. Ignore decimals: 24×35=840.\nStep 2: Count decimal places: 1+1=2. Move decimal 2 left: 8.40.\nAnswer: 8.4&quot;], [&quot;Evaluate: 3 squared + 4 x 2&quot;, [&quot;17&quot;, &quot;22&quot;, &quot;14&quot;, &quot;25&quot;], 0, &quot;Step 1: Order of operations: exponents first, then multiply.\nStep 2: 3²=9, then 4×2=8. Finally 9+8=17.&quot;], [&quot;What is the LCM of 4 and 6?&quot;, [&quot;2&quot;, &quot;12&quot;, &quot;24&quot;, &quot;6&quot;], 1, &quot;Step 1: Multiples of 4: 4,8,12,16... Multiples of 6: 6,12,18...\nStep 2: First common multiple: 12.\nAnswer: LCM = 12&quot;], [&quot;A shirt costs $25. It is on sale for 20% off. What is the sale price?&quot;, [&quot;$5&quot;, &quot;$15&quot;, &quot;$20&quot;, &quot;$22&quot;], 2, &quot;Step 1: 20% of $25 = 0.20 × 25 = $5 discount.\nStep 2: $25 - $5 = $20 sale price.&quot;], [&quot;Simplify: 4(3x + 2)&quot;, [&quot;7x + 6&quot;, &quot;12x + 8&quot;, &quot;12x + 2&quot;, &quot;7x + 8&quot;], 1, &quot;Step 1: Distribute 4 to each term inside: 4×3x=12x, 4×2=8.\nAnswer: 12x + 8&quot;], [&quot;What is the mean of: 4, 7, 9, 6, 4?&quot;, [&quot;5&quot;, &quot;6&quot;, &quot;7&quot;, &quot;8&quot;], 1, &quot;Step 1: Mean = sum ÷ count.\nStep 2: 4+7+9+6+4=30. 30÷5=6.&quot;], [&quot;What is -3 + 7?&quot;, [&quot;−10&quot;, &quot;−4&quot;, &quot;4&quot;, &quot;10&quot;], 2, &quot;Step 1: -3 + 7. Start at -3 on number line, move 7 right.\nStep 2: -3+7=4.\nTip: When signs differ, subtract and keep the sign of the bigger number.&quot;], [&quot;What is the area of a triangle with base 8 and height 5?&quot;, [&quot;40&quot;, &quot;20&quot;, &quot;13&quot;, &quot;16&quot;], 1, &quot;Step 1: Area of triangle = ½ × base × height.\nStep 2: ½ × 8 × 5 = 20.&quot;], [&quot;Write the ratio 5:20 as a unit rate (per 1).&quot;, [&quot;1/5&quot;, &quot;1/4&quot;, &quot;1/3&quot;, &quot;4/1&quot;], 1, &quot;Step 1: Unit rate means 'per 1.' Simplify 5:20.\nStep 2: 5÷5=1, 20÷5=4. Rate = 1/4.&quot;], [&quot;Which value satisfies the inequality x + 3 &gt; 8?&quot;, [&quot;x = 4&quot;, &quot;x = 5&quot;, &quot;x = 6&quot;, &quot;x = 3&quot;], 2, &quot;Step 1: x+3&gt;8. Subtract 3: x&gt;5.\nStep 2: x=6 works because 6&gt;5 ✓.\nTip: x=5 doesn't work because 5 is not greater than 5.&quot;], [&quot;A car travels 180 miles in 3 hours. What is its speed in miles per hour?&quot;, [&quot;50 mph&quot;, &quot;60 mph&quot;, &quot;55 mph&quot;, &quot;65 mph&quot;], 1, &quot;Step 1: Speed = distance ÷ time.\nStep 2: 180 ÷ 3 = 60 mph.&quot;], [&quot;What is the median of: 3, 7, 9, 2, 5?&quot;, [&quot;5&quot;, &quot;7&quot;, &quot;9&quot;, &quot;2&quot;], 0, &quot;Step 1: Order the data: 2,3,5,7,9.\nStep 2: Middle value (3rd) = 5.\nAnswer: Median is 5.&quot;], [&quot;What is the surface area of a rectangular prism with length 4, width 3, height 2?&quot;, [&quot;24&quot;, &quot;52&quot;, &quot;26&quot;, &quot;48&quot;], 1, &quot;Step 1: SA = 2(lw+lh+wh).\nStep 2: 2(4×3+4×2+3×2)=2(12+8+6)=2(26)=52.&quot;], [&quot;Convert 3/8 to a percent.&quot;, [&quot;38%&quot;, &quot;37.5%&quot;, &quot;40%&quot;, &quot;35%&quot;], 1, &quot;Step 1: 3/8 as a decimal: 3÷8=0.375.\nStep 2: 0.375 × 100 = 37.5%.&quot;], [&quot;Simplify: 18/24&quot;, [&quot;2/3&quot;, &quot;3/4&quot;, &quot;4/5&quot;, &quot;6/8&quot;], 1, &quot;Step 1: Divide top and bottom by their GCF.\nStep 2: GCF of 18 and 24 is 6. 18÷6=3, 24÷6=4.\nAnswer: 3/4&quot;], [&quot;What is the absolute value of -15?&quot;, [&quot;−15&quot;, &quot;0&quot;, &quot;15&quot;, &quot;150&quot;], 2, &quot;Step 1: Absolute value is the distance from zero (always positive).\nStep 2: |-15| = 15.&quot;], [&quot;A recipe needs 2.5 cups of flour for 20 cookies. How much for 40 cookies?&quot;, [&quot;4 cups&quot;, &quot;5 cups&quot;, &quot;3 cups&quot;, &quot;6 cups&quot;], 1, &quot;Step 1: 40 cookies is double 20 cookies.\nStep 2: Double the flour: 2.5 × 2 = 5 cups.&quot;], [&quot;What is the volume of a cube with side length 4 cm?&quot;, [&quot;16 cm³&quot;, &quot;48 cm³&quot;, &quot;64 cm³&quot;, &quot;24 cm³&quot;], 2, &quot;Step 1: Volume of cube = side³.\nStep 2: 4³ = 4×4×4 = 64 cm³.&quot;], [&quot;Point (-2, 3) is plotted on a coordinate plane. Which quadrant is it in?&quot;, [&quot;Quadrant I&quot;, &quot;Quadrant II&quot;, &quot;Quadrant III&quot;, &quot;Quadrant IV&quot;], 1, &quot;Step 1: x=-2 (negative), y=3 (positive).\nStep 2: (-,+) is in Quadrant II.&quot;], [&quot;What is 5/6 / 1/3?&quot;, [&quot;5/18&quot;, &quot;5/2&quot;, &quot;2/5&quot;, &quot;15/6&quot;], 1, &quot;Step 1: 5/6 ÷ 1/3 = 5/6 × 3/1 = 15/6 = 5/2 = 2½.&quot;], [&quot;Which expression is equivalent to 2(x + 4) + 3x?&quot;, [&quot;5x + 4&quot;, &quot;5x + 8&quot;, &quot;6x + 4&quot;, &quot;2x + 8&quot;], 1, &quot;Step 1: Distribute: 2(x+4)=2x+8.\nStep 2: Combine: 2x+8+3x=5x+8.&quot;]], &quot;Reading&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Passage 1 — The Test Run&quot;, &quot;text&quot;: &quot;&lt;p&gt;When the robotics club rolled its machine onto the gym floor for the regional demonstration, everything looked ready. The code had been tested. The wheels had been tightened. The lifting arm had raised plastic blocks perfectly in practice. Yet as soon as the timer began, the robot spun in a quick circle and bumped the edge of the court. A few students in the bleachers laughed. Omar felt his face grow hot.&lt;/p&gt;&lt;p&gt;Back in the classroom, frustration settled over the team like a heavy coat. Priya wanted to rewrite the turning code. Ben thought the wheels had been mounted unevenly. Omar blamed himself for not noticing the problem sooner. Their adviser, Ms. Lin, did not rush to solve the puzzle for them. Instead, she asked each student to write down one observation and one question. At first the room stayed quiet. Then chairs scraped, pencils moved, and the team began comparing notes.&lt;/p&gt;&lt;p&gt;They soon noticed a pattern. The robot turned correctly when it carried no blocks, but drifted off course when the arm held weight on one side. That clue led the team to test the balance of the machine instead of the code alone. They shifted the battery pack, adjusted a wheel bracket, and ran the robot again. This time it crossed the taped line in a straight path.&lt;/p&gt;&lt;p&gt;The club did not win the demonstration that day, but the students left with something more useful than a ribbon. They had learned that failure can act like a flashlight. It does not feel comfortable when it shines on a mistake, yet it helps people see where to look next. Weeks later, when the club prepared for a second event, Omar kept Ms. Lin's question sheet folded in his notebook. The paper reminded him that good problem solving begins with careful noticing.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 2 — Why Some City Streets Feel Hotter&quot;, &quot;text&quot;: &quot;&lt;p&gt;On a summer afternoon, two sidewalks in the same city can feel surprisingly different. One may lie beside a row of leafy trees and a patch of grass. The other may sit between a wide street and a dark parking lot. Even if both sidewalks receive the same sunlight, the second one often feels hotter. Scientists use the term &lt;em&gt;urban heat island&lt;/em&gt; to describe this pattern. Built areas with many roofs, roads, and paved surfaces tend to hold more heat than nearby places with trees, soil, and water.&lt;/p&gt;&lt;p&gt;Materials help explain the difference. Dark pavement and rooftops absorb sunlight and store energy during the day. Later, they release that heat back into the air. Trees affect temperature in two ways. Their leaves provide shade, and they also release water vapor through a process called transpiration. That water vapor can help cool the surrounding air.&lt;/p&gt;&lt;p&gt;Heat islands matter because they can affect daily life. Higher temperatures can make outdoor work and exercise more tiring. Buildings may need more energy for air-conditioning. Extreme heat can also be dangerous for older adults, young children, and people who do not have easy access to cool spaces.&lt;/p&gt;&lt;p&gt;Communities use several strategies to reduce urban heat. Planting tree canopies is one. Creating green roofs, protecting parks, and using lighter-colored materials on some surfaces are others. None of these steps can erase summer heat entirely, but together they can make neighborhoods safer and more comfortable. In that sense, shade is not just pleasant. It is part of a city's infrastructure.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 3 — Listen to the Object First&quot;, &quot;text&quot;: &quot;&lt;p&gt;My grandmother repairs things slowly, which is strange only if you believe speed is the same as skill. She studies a loose chair rung the way some people study a puzzle. She turns the chair upside down, presses the wood with both thumbs, and waits as if the answer might rise from the grain itself.&lt;/p&gt;&lt;p&gt;When I was younger, I thought her method took forever. If a drawer stuck, I wanted to tug harder. If a lamp would not switch on, I wanted to shake the cord and hope for the best. My grandmother would stop me every time. \&quot;Listen to the object first,\&quot; she would say. At the time, I found this irritating. Objects do not speak. They simply sit there, broken.&lt;/p&gt;&lt;p&gt;One rainy Saturday, my backpack zipper split open the night before a field trip. I was ready to declare the bag ruined. My grandmother asked me to set it on the table. She looked at the zipper teeth, slid the pull gently backward, and found a loose thread caught in the metal. After trimming the thread and rubbing a little soap on the zipper track, she worked the pull up and down until it moved cleanly again.&lt;/p&gt;&lt;p&gt;I still like quick solutions, especially when a deadline is close. But I understand now that my grandmother's patience is not slowness for its own sake. It is a kind of respect. She begins by paying attention. Often that first quiet minute saves many noisy mistakes later.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 4 — Why Library Hours Matter&quot;, &quot;text&quot;: &quot;&lt;p&gt;Some students finish school, head home, and discover that the quietest place to study is the library. Others go there because they need internet access, help with homework, or a safe place to wait before a family member finishes work. For these students, the library is more than a room full of shelves. It is a bridge between the school day and everything that comes after it.&lt;/p&gt;&lt;p&gt;That is why public libraries should consider staying open later on school nights when budgets allow. Extended hours would not benefit every student in exactly the same way, but they would provide added flexibility for many families. A student who shares a crowded apartment, for example, might need a calm place to finish a project. Another student might need a computer to type an essay or apply for a summer program.&lt;/p&gt;&lt;p&gt;Of course, longer hours require staffing, utilities, and planning. Libraries already balance many needs, and each branch must make decisions based on community resources. Still, when leaders study how spaces are used, they should count the value of time as well as the value of materials. A library that closes early may technically own useful books and computers, yet those resources help fewer people if students cannot reach them when needed.&lt;/p&gt;&lt;p&gt;Later hours are not the only answer to educational inequity, but they are one practical step. When communities invest in access, they send a clear message: learning does not end when the final bell rings.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 5 — Two Views of a River Cleanup (Paired Texts)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Text 1: News Brief&lt;/strong&gt;&lt;p&gt;Volunteers and city crews removed more than two tons of trash from the Pine River last Saturday. According to the Department of Water Resources, the cleanup focused on three miles of shoreline near public boat launches. Workers also installed new signs reminding visitors not to leave fishing line and food containers behind.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Text 2: Interview Excerpt&lt;/strong&gt;&lt;p&gt;\&quot;I grew up fishing on this river,\&quot; said local resident Elena Ruiz. \&quot;When I was little, the water seemed endless and clean. Later, I started noticing bottles tucked in the reeds and old cans near the bank. The cleanup mattered, but the signs matter too. If people only remove trash once and keep dropping new trash every weekend, the river will not stay healthy for long.\&quot;&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 6 — Choosing a Reliable Source (Media Literacy)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Source A: Museum Webpage&lt;/strong&gt;&lt;p&gt;The North County History Museum will open its new exhibit, &lt;em&gt;Makers of Main Street&lt;/em&gt;, on May 18. Visitors can explore photographs, shop ledgers, and tools used by carpenters, printers, and dressmakers who worked in the town between 1890 and 1930. The exhibit was created with help from local historians and archived materials from the city library.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Source B: Sponsored Social Post&lt;/strong&gt;&lt;p&gt;Don't miss the most unbelievable exhibit ever created! &lt;em&gt;Makers of Main Street&lt;/em&gt; will blow your mind and change the way you see history forever. Everyone in town is talking about it already. Buy souvenir items while they last, and bring your friends for the only experience that really matters this spring.&lt;/p&gt;&lt;p&gt;&lt;em&gt;A student named Nora wants to write a short report about the exhibit for class. She needs the opening date, the kinds of materials on display, and a trustworthy explanation of who helped create the exhibit.&lt;/em&gt;&lt;/p&gt;&quot;}], &quot;questions&quot;: [[&quot;What is the central idea of the robotics club (Test Run) passage?&quot;, [&quot;A setback helps the robotics team learn a stronger problem-solving process.&quot;, &quot;Competitive events are unfair to beginners.&quot;, &quot;The robotics club loses because the students stop listening.&quot;, &quot;Machines usually fail because of bad code only.&quot;], 0, 0], [&quot;Which detail best shows that the robotics team started to think more carefully about the problem?&quot;, [&quot;Omar felt his face grow hot.&quot;, &quot;They each wrote down one observation and one question.&quot;, &quot;Students in the bleachers laughed.&quot;, &quot;The lifting arm had worked during practice.&quot;], 1, 0], [&quot;In the Test Run passage, the word 'settled' most nearly means&quot;, [&quot;disappeared&quot;, &quot;moved quickly&quot;, &quot;came to rest&quot;, &quot;argued loudly&quot;], 2, 0], [&quot;How does the Test Run author develop the idea that failure can be useful?&quot;, [&quot;by showing how the team's mistake revealed the real problem&quot;, &quot;by listing awards the team won in the past&quot;, &quot;by explaining how to buy robotics parts&quot;, &quot;by comparing two different schools&quot;], 0, 0], [&quot;Why does the Test Run author include Ms. Lin's response instead of having her fix the robot immediately?&quot;, [&quot;to show that she values teaching students how to think through a problem&quot;, &quot;to show that the students wanted to quit&quot;, &quot;to suggest that she does not understand robotics&quot;, &quot;to prove that adults should stay out of competitions&quot;], 0, 0], [&quot;What perspective does Omar most likely have by the end of the Test Run passage?&quot;, [&quot;Robots are too unpredictable to improve.&quot;, &quot;Only advisers can solve technical problems.&quot;, &quot;Competitions should be canceled.&quot;, &quot;Mistakes can lead to better thinking if people study them carefully.&quot;], 3, 0], [&quot;Which sentence best supports the claim that the robotics problem was not caused only by coding?&quot;, [&quot;The code had been tested.&quot;, &quot;The robot turned correctly when it carried no blocks, but drifted off course when the arm held weight on one side.&quot;, &quot;A few students in the bleachers laughed.&quot;, &quot;Omar felt his face grow hot.&quot;], 1, 0], [&quot;What is the main idea of the article about why city streets feel hotter?&quot;, [&quot;Only scientists can tell whether a place is hot.&quot;, &quot;Parking lots are more useful than tree canopies.&quot;, &quot;Urban heat islands happen when built surfaces hold heat, and communities can reduce the effect in several ways.&quot;, &quot;All sidewalks in a city have the same temperature.&quot;], 2, 1], [&quot;Which detail best explains why one sidewalk may feel hotter than another?&quot;, [&quot;Young children often need cool spaces.&quot;, &quot;Dark pavement and rooftops absorb sunlight and later release that heat.&quot;, &quot;Scientists prefer grassy areas.&quot;, &quot;Communities like to protect parks.&quot;], 1, 1], [&quot;In the city streets article, the word 'infrastructure' most nearly means&quot;, [&quot;systems and features
