      [&quot;Conservation of Mass&quot;, &quot;⚖️&quot;, &quot;Matter is never lost&quot;, &quot;In any physical or chemical change, the total mass before equals the total mass after. Atoms are only rearranged.&quot;, &quot;🔄&quot;, &quot;Grade 5&quot;],
      [&quot;Energy Flow in Ecosystems&quot;, &quot;☀️&quot;, &quot;The Sun powers ecosystems&quot;, &quot;Energy flows one direction: Sun → producers → consumers → decomposers. Unlike matter, energy does not cycle — it's gradually lost as heat.&quot;, &quot;🌱🐰&quot;, &quot;Grade 5&quot;],

      // ===== GRADE 6 =====
      [&quot;Solar System&quot;, &quot;🪐&quot;, &quot;Sun and objects orbiting it&quot;, &quot;The Sun, 8 planets, moons, asteroids, and comets. Objects orbit due to the Sun's gravity pulling them and their inertia moving them forward.&quot;, &quot;☀️&quot;, &quot;Grade 6&quot;],
      [&quot;Gravity&quot;, &quot;🍎&quot;, &quot;Attractive force between masses&quot;, &quot;Every object with mass pulls on every other. Larger masses and shorter distances create stronger gravitational pull.&quot;, &quot;⬇️&quot;, &quot;Grade 6&quot;],
      [&quot;Inertia&quot;, &quot;🎱&quot;, &quot;Objects resist changes in motion&quot;, &quot;Objects at rest stay at rest; objects in motion keep moving in a straight line unless acted on by a force. Mass = more inertia.&quot;, &quot;🛑&quot;, &quot;Grade 6&quot;],
      [&quot;Earth-Sun-Moon System&quot;, &quot;🌎&quot;, &quot;Motion causes cyclic patterns&quot;, &quot;The motion of these three bodies causes lunar phases, eclipses, and seasons — all cyclic patterns we can predict.&quot;, &quot;🌖&quot;, &quot;Grade 6&quot;],
      [&quot;Lunar Phases&quot;, &quot;🌙&quot;, &quot;Moon's shape changes as it orbits&quot;, &quot;As the Moon orbits Earth, we see different amounts of its lit side: new, crescent, quarter, gibbous, full — then back again (~29 days).&quot;, &quot;🌕&quot;, &quot;Grade 6&quot;],
      [&quot;Seasons (Earth's Tilt)&quot;, &quot;🍂&quot;, &quot;Caused by axis tilt, not distance&quot;, &quot;Earth's 23.5° tilt means different hemispheres receive more direct sunlight at different times of year — NOT because Earth gets closer to the Sun.&quot;, &quot;☀️🌍&quot;, &quot;Grade 6&quot;],
      [&quot;Rock Cycle&quot;, &quot;🪨&quot;, &quot;Rocks change forms over time&quot;, &quot;Igneous, sedimentary, and metamorphic rocks transform into each other through heat, pressure, weathering, and melting — driven by Earth's energy.&quot;, &quot;🌋&quot;, &quot;Grade 6&quot;],
      [&quot;Plate Tectonics&quot;, &quot;🧩&quot;, &quot;Earth's plates move&quot;, &quot;Earth's surface is made of moving plates. Their motion causes earthquakes, volcanoes, mountain building, and reshapes continents over time.&quot;, &quot;🌏&quot;, &quot;Grade 6&quot;],
      [&quot;Geological Time Scale&quot;, &quot;⏳&quot;, &quot;Earth's 4.6 billion-year history&quot;, &quot;Scientists organize Earth's vast history into eons, eras, and periods using evidence from rock layers and fossils.&quot;, &quot;📜&quot;, &quot;Grade 6&quot;],
      [&quot;Water Cycle (advanced)&quot;, &quot;💧&quot;, &quot;Driven by Sun and gravity&quot;, &quot;Sun's energy causes evaporation; gravity pulls precipitation and runoff down. Water cycles through oceans, atmosphere, land, and living things.&quot;, &quot;🌧️&quot;, &quot;Grade 6&quot;],
      [&quot;Weather &amp; Air Masses&quot;, &quot;🌦️&quot;, &quot;Interactions cause weather&quot;, &quot;Air masses with different temperatures and pressures interact, causing weather changes. Low pressure = storms; high pressure = fair weather.&quot;, &quot;💨&quot;, &quot;Grade 6&quot;],
      [&quot;Fossil Evidence&quot;, &quot;🦕&quot;, &quot;Shows continental drift&quot;, &quot;Matching fossils and rock formations on distant continents show the continents were once joined (evidence for plate tectonics).&quot;, &quot;🗺️&quot;, &quot;Grade 6&quot;],

      // ===== GRADE 7 =====
      [&quot;Cells&quot;, &quot;🦠&quot;, &quot;Basic units of life&quot;, &quot;All living things are made of cells — either one cell (unicellular) or many cells (multicellular). Cells are the smallest units that carry out life's functions.&quot;, &quot;🔬&quot;, &quot;Grade 7&quot;],
      [&quot;Cell Function&quot;, &quot;⚙️&quot;, &quot;Cell parts work together&quot;, &quot;Each cell part has a job: nucleus controls the cell, mitochondria make energy, cell membrane controls what enters/leaves.&quot;, &quot;🏭&quot;, &quot;Grade 7&quot;],
      [&quot;Photosynthesis&quot;, &quot;🌿&quot;, &quot;Plants capture energy&quot;, &quot;Plants use light energy to convert carbon dioxide and water into sugar (glucose) and oxygen: 6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂.&quot;, &quot;☀️&quot;, &quot;Grade 7&quot;],
      [&quot;Matter Cycling in Ecosystems&quot;, &quot;🔁&quot;, &quot;Atoms move through food web&quot;, &quot;Carbon, nitrogen, and other atoms cycle from air, soil, and water, through living things, and back to the environment via decomposers.&quot;, &quot;♻️&quot;, &quot;Grade 7&quot;],
      [&quot;Resource Availability&quot;, &quot;🌾&quot;, &quot;Affects population sizes&quot;, &quot;When resources (food, water, shelter) are abundant, populations grow. When scarce, populations decline or organisms compete.&quot;, &quot;📊&quot;, &quot;Grade 7&quot;],
      [&quot;Asexual Reproduction&quot;, &quot;🧫&quot;, &quot;One parent, identical offspring&quot;, &quot;One parent produces genetically identical offspring (clones). Examples: bacteria splitting, plants cloning from cuttings.&quot;, &quot;👤&quot;, &quot;Grade 7&quot;],
      [&quot;Sexual Reproduction&quot;, &quot;🧬&quot;, &quot;Two parents, genetic variation&quot;, &quot;Two parents combine genetic material, producing offspring with new combinations of traits — creating variation in the population.&quot;, &quot;👨‍👩‍👧&quot;, &quot;Grade 7&quot;],
      [&quot;Genetic Variation&quot;, &quot;🎨&quot;, &quot;Differences caused by genes&quot;, &quot;Differences among individuals come from genes. Variation is the raw material natural selection acts on.&quot;, &quot;🧬&quot;, &quot;Grade 7&quot;],
      [&quot;Natural Selection&quot;, &quot;🦎&quot;, &quot;Favorable traits increase over time&quot;, &quot;Individuals with traits better suited to their environment are more likely to survive and reproduce, passing those traits to offspring.&quot;, &quot;🌿&quot;, &quot;Grade 7&quot;],
      [&quot;Fossil Record&quot;, &quot;🦖&quot;, &quot;Evidence of life's history&quot;, &quot;Fossils show that many species once lived, some went extinct, and life forms have changed over Earth's history.&quot;, &quot;📖&quot;, &quot;Grade 7&quot;],
      [&quot;Evolutionary Relationships&quot;, &quot;🐒&quot;, &quot;Similarities show common ancestors&quot;, &quot;Species with similar anatomy, embryology, or DNA are more closely related. Whales and dolphins share ancestry with land mammals.&quot;, &quot;🧪&quot;, &quot;Grade 7&quot;],
      [&quot;Biodiversity&quot;, &quot;🌳&quot;, &quot;Variety of living things&quot;, &quot;The variety of species in an ecosystem. Higher biodiversity makes ecosystems more stable and productive.&quot;, &quot;🦋🐟&quot;, &quot;Grade 7&quot;],
      [&quot;Body Systems&quot;, &quot;🫀&quot;, &quot;Groups of organs working together&quot;, &quot;Organ systems (digestive, circulatory, nervous, etc.) work together. The body is a system of interacting subsystems.&quot;, &quot;🫁&quot;, &quot;Grade 7&quot;],

      // ===== GRADE 8 =====
      [&quot;Atom&quot;, &quot;⚛️&quot;, &quot;Smallest unit of an element&quot;, &quot;The basic building block of matter. Atoms contain a nucleus (protons + neutrons) surrounded by electrons.&quot;, &quot;🟢&quot;, &quot;Grade 8&quot;],
      [&quot;Molecule&quot;, &quot;🧪&quot;, &quot;Two or more atoms bonded&quot;, &quot;Atoms bonded together form molecules. Water (H₂O) = 2 hydrogen + 1 oxygen. Molecules make up most substances around us.&quot;, &quot;💠&quot;, &quot;Grade 8&quot;],
      [&quot;Periodic Table&quot;, &quot;📋&quot;, &quot;Elements arranged by properties&quot;, &quot;Elements are grouped so those in the same column (group) have similar chemical behavior. Patterns help predict properties.&quot;, &quot;🧬&quot;, &quot;Grade 8&quot;],
      [&quot;Chemical Reaction&quot;, &quot;💥&quot;, &quot;Atoms rearrange into new substances&quot;, &quot;Bonds break and re-form, creating new substances with different properties. Evidence: color change, temperature change, gas, precipitate.&quot;, &quot;🔥&quot;, &quot;Grade 8&quot;],
      [&quot;Conservation of Atoms&quot;, &quot;⚖️&quot;, &quot;Same atoms, different arrangement&quot;, &quot;In a chemical reaction, no atoms are created or destroyed — they're just rearranged. Mass is conserved.&quot;, &quot;🔄&quot;, &quot;Grade 8&quot;],
      [&quot;Thermal Energy&quot;, &quot;♨️&quot;, &quot;Related to particle motion&quot;, &quot;Thermal energy is the total kinetic energy of particles. Adding heat speeds up particles; removing heat slows them down.&quot;, &quot;🔥&quot;, &quot;Grade 8&quot;],
      [&quot;State Changes&quot;, &quot;🧊&quot;, &quot;Heating/cooling changes state&quot;, &quot;Adding thermal energy changes state: solid → liquid (melting) → gas (evaporating). Removing it reverses the process.&quot;, &quot;💧&quot;, &quot;Grade 8&quot;],
      [&quot;Newton's 2nd Law&quot;, &quot;🚗&quot;, &quot;F = m × a&quot;, &quot;The acceleration of an object depends on the force applied and its mass. More force = more acceleration; more mass = less acceleration.&quot;, &quot;📐&quot;, &quot;Grade 8&quot;],
      [&quot;Newton's 3rd Law&quot;, &quot;🚀&quot;, &quot;Equal and opposite reactions&quot;, &quot;For every action force, there is an equal and opposite reaction force. Push a wall, the wall pushes back just as hard.&quot;, &quot;↔️&quot;, &quot;Grade 8&quot;],
      [&quot;Gravitational Force&quot;, &quot;🌌&quot;, &quot;Attractive force between masses&quot;, &quot;All objects with mass attract each other. The force depends on their masses and distance. Larger masses = stronger attraction.&quot;, &quot;🌍🌙&quot;, &quot;Grade 8&quot;],
      [&quot;Electric &amp; Magnetic Forces&quot;, &quot;🧲&quot;, &quot;Act over distances&quot;, &quot;These forces depend on strength and distance. Like charges/poles repel; unlike ones attract. Stronger at closer distances.&quot;, &quot;⚡&quot;, &quot;Grade 8&quot;],
      [&quot;Fields&quot;, &quot;🌀&quot;, &quot;Forces act without contact&quot;, &quot;Fields (gravitational, electric, magnetic) allow forces to act on objects not touching — why magnets and gravity work through space.&quot;, &quot;🧲&quot;, &quot;Grade 8&quot;],
      [&quot;Kinetic Energy&quot;, &quot;🏃&quot;, &quot;Energy of motion&quot;, &quot;Depends on mass and speed: KE = ½mv². Faster and heavier = more kinetic energy. A speeding car has much more KE than a walking person.&quot;, &quot;💨&quot;, &quot;Grade 8&quot;],
      [&quot;Potential Energy&quot;, &quot;⛰️&quot;, &quot;Stored energy&quot;, &quot;Energy stored due to position or arrangement. A stretched spring, raised object, or charged battery all have potential energy.&quot;, &quot;🏹&quot;, &quot;Grade 8&quot;],
      [&quot;Waves&quot;, &quot;🌊&quot;, &quot;Carry energy, not matter&quot;, &quot;Waves transfer energy through a medium (or space). Amplitude = height of wave; greater amplitude = more energy carried.&quot;, &quot;📶&quot;, &quot;Grade 8&quot;],
      [&quot;Wave Behavior&quot;, &quot;🎶&quot;, &quot;Reflect, absorb, or transmit&quot;, &quot;When waves hit a material, they can bounce off (reflect), be taken in (absorb), or pass through (transmit) — depending on the material.&quot;, &quot;🪞&quot;, &quot;Grade 8&quot;],
      [&quot;Synthetic Materials&quot;, &quot;🧴&quot;, &quot;Human-made from natural resources&quot;, &quot;Plastics, medicines, and fabrics are made from natural resources through chemical processes. They impact society and the environment.&quot;, &quot;🏭&quot;, &quot;Grade 8&quot;]
    ]
  }
};
var fcDeck=null,fcOrder=[],fcIdx=0,fcFlipped=false,fcLearned={};
var fcMode=&quot;study&quot;,fc1P1=0,fc1P2=0,fc1CurPlayer=1,fc1PendingKey=null;

function fcRenderHome(){
  var grid=document.getElementById(&quot;fc-deck-grid&quot;);
  if(!grid)return;
  grid.innerHTML=&quot;&quot;;
  Object.keys(DECKS).forEach(function(key){
    var deck=DECKS[key];
    var el=document.createElement(&quot;div&quot;);
    el.className=&quot;fc-deck&quot;;
    el.innerHTML='&lt;div class=&quot;fc-deck-color&quot; style=&quot;background:linear-gradient(180deg,'+deck.color+','+deck.color+'CC)&quot;&gt;&lt;span class=&quot;fc-deck-num&quot;&gt;'+deck.icon+'&lt;/span&gt;&lt;/div&gt;'
      +'&lt;div class=&quot;fc-deck-body&quot;&gt;&lt;span class=&quot;fc-deck-bdg&quot; style=&quot;background:'+deck.color+'15;color:'+deck.color+'&quot;&gt;'+deck.cards.length+' cards&lt;/span&gt;'
      +'&lt;h3&gt;'+deck.title+'&lt;/h3&gt;&lt;p&gt;'+deck.subtitle+'&lt;/p&gt;&lt;span class=&quot;ar&quot;&gt;→&lt;/span&gt;&lt;/div&gt;';
    el.onclick=function(){fcOpen(key);};
    grid.appendChild(el);
  });
}
function fcOpen(key){
  fc1PendingKey=key;
  var deck=DECKS[key];
  document.getElementById(&quot;fc-mo-label&quot;).textContent=deck.title+&quot; — &quot;+deck.cards.length+&quot; cards&quot;;
  document.getElementById(&quot;fc-mode-overlay&quot;).classList.add(&quot;show&quot;);
}
function fcStart(m){
  closeOverlay(&quot;fc-mode-overlay&quot;);
  var key=fc1PendingKey;if(!key)return;
  fcDeck=key;fcMode=m;
  var deck=DECKS[key];
  fcOrder=deck.cards.map(function(_,i){return i;});
  if(m===&quot;1v1&quot;){
    // shuffle for fairness
    for(var i=fcOrder.length-1;i&gt;0;i--){var j=Math.floor(Math.random()*(i+1));var t=fcOrder[i];fcOrder[i]=fcOrder[j];fcOrder[j]=t;}
    fc1P1=0;fc1P2=0;fc1CurPlayer=1;
  }
  fcIdx=0;fcFlipped=false;
  if(!fcLearned[key])fcLearned[key]=[];
  document.getElementById(&quot;fc-qtl&quot;).textContent=deck.title+(m===&quot;1v1&quot;?&quot; — 1v1&quot;:&quot;&quot;);
  document.getElementById(&quot;fc-1v1Final&quot;).classList.remove(&quot;show&quot;);
  fcShow();
  show(&quot;s4&quot;);
}
function fcShow(){
  var deck=DECKS[fcDeck];
  var card=deck.cards[fcOrder[fcIdx]];
  var total=deck.cards.length;
  var learnedSize=fcLearned[fcDeck].length;
  document.getElementById(&quot;fc-card&quot;).classList.remove(&quot;flipped&quot;);
  fcFlipped=false;
  document.getElementById(&quot;fc-termE&quot;).textContent=card[1];
  document.getElementById(&quot;fc-termW&quot;).textContent=card[0];
  document.getElementById(&quot;fc-tagF&quot;).textContent=card[5];
  document.getElementById(&quot;fc-defV&quot;).textContent=card[4];
  document.getElementById(&quot;fc-defT&quot;).textContent=card[2];
  document.getElementById(&quot;fc-defX&quot;).textContent=card[3];
  document.getElementById(&quot;fc-tagB&quot;).textContent=card[5];
  document.getElementById(&quot;fc-scr&quot;).textContent=&quot;Card &quot;+(fcIdx+1)+&quot;/&quot;+total;
  document.getElementById(&quot;fc-pll&quot;).textContent=&quot;Card &quot;+(fcIdx+1)+&quot; of &quot;+total;
  // 1v1 mode UI toggling
  var pb=document.getElementById(&quot;fc-playerBar&quot;);
  var ansRow=document.getElementById(&quot;fc-ansRow&quot;);
  var navRow=document.getElementById(&quot;fc-navRow&quot;);
  var toolRow=document.getElementById(&quot;fc-toolRow&quot;);
  var cp=document.getElementById(&quot;fc-complete&quot;);
  if(fcMode===&quot;1v1&quot;){
    pb.className=&quot;fc-player-bar show &quot;+(fc1CurPlayer===1?&quot;p1&quot;:&quot;p2&quot;);
    pb.innerHTML=(fc1CurPlayer===1?&quot;🟢&quot;:&quot;🔵&quot;)+&quot; &lt;strong&gt;Player &quot;+fc1CurPlayer+&quot;'s Turn&lt;/strong&gt; — try to recall, then flip&quot;+
      &quot;&lt;span class=\&quot;fc-1v1-score\&quot;&gt;P1: &quot;+fc1P1+&quot; · P2: &quot;+fc1P2+&quot;&lt;/span&gt;&quot;;
    ansRow.classList.remove(&quot;show&quot;);
    navRow.style.display=&quot;none&quot;;
    toolRow.style.display=&quot;none&quot;;
    cp.classList.remove(&quot;show&quot;);
    // show percent based on turn progress, not learned count
    var pct=Math.round(((fcIdx)/total)*100);
    document.getElementById(&quot;fc-ppc&quot;).textContent=pct+&quot;% done&quot;;
    document.getElementById(&quot;fc-pf&quot;).style.width=pct+&quot;%&quot;;
  }else{
    pb.className=&quot;fc-player-bar&quot;;
    ansRow.classList.remove(&quot;show&quot;);
    navRow.style.display=&quot;flex&quot;;
    toolRow.style.display=&quot;flex&quot;;
    var pct=Math.round((learnedSize/total)*100);
    document.getElementById(&quot;fc-ppc&quot;).textContent=pct+&quot;% learned&quot;;
    document.getElementById(&quot;fc-pf&quot;).style.width=pct+&quot;%&quot;;
    document.getElementById(&quot;fc-prev&quot;).disabled=fcIdx===0;
    document.getElementById(&quot;fc-next&quot;).disabled=fcIdx===total-1;
    var lb=document.getElementById(&quot;fc-learnBtn&quot;);
    if(fcLearned[fcDeck].indexOf(fcOrder[fcIdx])&gt;=0){lb.classList.add(&quot;active&quot;);lb.innerHTML=&quot;✓ Learned&quot;;}
    else{lb.classList.remove(&quot;active&quot;);lb.innerHTML=&quot;✓ Mark Learned&quot;;}
    if(learnedSize===total)cp.classList.add(&quot;show&quot;);else cp.classList.remove(&quot;show&quot;);
  }
}
function fcFlip(){
  fcFlipped=!fcFlipped;
  document.getElementById(&quot;fc-card&quot;).classList.toggle(&quot;flipped&quot;,fcFlipped);
  // Show answer buttons when back is revealed in 1v1 mode
  if(fcMode===&quot;1v1&quot;){
    var ansRow=document.getElementById(&quot;fc-ansRow&quot;);
    if(fcFlipped)ansRow.classList.add(&quot;show&quot;);
    else ansRow.classList.remove(&quot;show&quot;);
  }
}
function fcAnswer(correct){
  if(fcMode!==&quot;1v1&quot;)return;
  if(correct){if(fc1CurPlayer===1)fc1P1++;else fc1P2++;}
  var total=DECKS[fcDeck].cards.length;
  if(fcIdx&gt;=total-1){fcFinish1v1();return;}
  fcIdx++;
  fc1CurPlayer=(fc1CurPlayer===1)?2:1;
  fcShow();
}
function fcFinish1v1(){
  var pb=document.getElementById(&quot;fc-playerBar&quot;);pb.className=&quot;fc-player-bar&quot;;
  document.getElementById(&quot;fc-ansRow&quot;).classList.remove(&quot;show&quot;);
  document.getElementById(&quot;fc-card&quot;).style.display=&quot;none&quot;;
  document.querySelector(&quot;#s4 .fc-card-scene&quot;).style.display=&quot;none&quot;;
  var final=document.getElementById(&quot;fc-1v1Final&quot;);
  var winEl=document.getElementById(&quot;fc-1v1Winner&quot;);
  if(fc1P1&gt;fc1P2)winEl.textContent=&quot;🎉 Player 1 wins!&quot;;
  else if(fc1P2&gt;fc1P1)winEl.textContent=&quot;🎉 Player 2 wins!&quot;;
  else winEl.textContent=&quot;🤝 It's a tie!&quot;;
  document.getElementById(&quot;fc-1v1Scores&quot;).textContent=&quot;Player 1: &quot;+fc1P1+&quot; correct · Player 2: &quot;+fc1P2+&quot; correct&quot;;
  final.classList.add(&quot;show&quot;);
}
function fcNext(){if(fcIdx&lt;DECKS[fcDeck].cards.length-1){fcIdx++;fcShow();}}
function fcPrev(){if(fcIdx&gt;0){fcIdx--;fcShow();}}
function fcShuffle(){for(var i=fcOrder.length-1;i&gt;0;i--){var j=Math.floor(Math.random()*(i+1));var t=fcOrder[i];fcOrder[i]=fcOrder[j];fcOrder[j]=t;}fcIdx=0;fcShow();}
function fcToggleLearn(){var k=fcOrder[fcIdx];var s=fcLearned[fcDeck];var p=s.indexOf(k);if(p&gt;=0)s.splice(p,1);else s.push(k);fcShow();}
function fcReset(){var deck=DECKS[fcDeck];fcOrder=deck.cards.map(function(_,i){return i;});fcIdx=0;fcLearned[fcDeck]=[];fcShow();}
document.addEventListener(&quot;keydown&quot;,function(e){
  if(document.getElementById(&quot;s4&quot;) &amp;&amp; document.getElementById(&quot;s4&quot;).classList.contains(&quot;active&quot;)){
    if(fcMode===&quot;1v1&quot;){
      // in 1v1 mode, only allow flip (Space/Enter); advancement is via buttons
      if(e.key===&quot; &quot;||e.key===&quot;Enter&quot;){e.preventDefault();fcFlip();}
    }else{
      if(e.key===&quot;ArrowRight&quot;)fcNext();
      else if(e.key===&quot;ArrowLeft&quot;)fcPrev();
      else if(e.key===&quot; &quot;||e.key===&quot;Enter&quot;){e.preventDefault();fcFlip();}
    }
  }
});

&lt;/script&gt;

    font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Site nav ---------- */
  nav.site-nav {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 1.1rem; color: var(--neutral);
    cursor: pointer; text-decoration: none;
  }
  .brand .logo-emoji { font-size: 1.6rem; }
  .nav-links { display: flex; gap: 6px; align-items: center; }
  .nav-link {
    padding: 8px 14px; border-radius: 8px;
    color: var(--muted); text-decoration: none;
    font-size: 0.92rem; font-weight: 600;
    cursor: pointer; background: none; border: none;
    transition: all 0.15s;
  }
  .nav-link:hover { background: #f1f5f9; color: var(--neutral); }
  .nav-link.tts-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border);
  }
  .nav-link.tts-toggle.on { background: #e6f6fc; color: var(--nwea-blue-dark); border-color: var(--nwea-blue); }

  /* ---------- App container ---------- */
  main.app { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }
  .screen { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ---------- Hero / practice header ---------- */
  header.practice-header {
    background: linear-gradient(135deg, var(--nwea-green), var(--nwea-green-dark));
    color: white; padding: 18px 24px; border-radius: 12px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    margin-bottom: 20px; gap: 16px; flex-wrap: wrap;
  }
  header.practice-header h1 { margin: 0; font-size: 1.3rem; letter-spacing: 0.3px; }
  header.practice-header .subtitle { font-size: 0.85rem; opacity: 0.9; }
  .progress-wrap { text-align: right; font-size: 0.88rem; min-width: 180px; }
  .progress-bar {
    width: 180px; height: 8px; background: rgba(255,255,255,0.3);
    border-radius: 10px; overflow: hidden; margin-top: 6px; margin-left: auto;
  }
  .progress-fill {
    height: 100%; background: white; width: 0%;
    transition: width 0.4s ease;
  }

  /* ---------- Cards ---------- */
  .card {
    background: var(--card); border-radius: 14px; padding: 28px;
    box-shadow: 0 4px 18px rgba(20,40,80,0.06);
    border: 1px solid var(--border);
  }
  .card + .card { margin-top: 18px; }

  /* ---------- Hero landing ---------- */
  .hero {
    text-align: center;
    padding: 40px 24px;
    background: linear-gradient(135deg, #eaf7fd 0%, #f1f9e7 100%);
    border-radius: 18px;
    margin-bottom: 24px;
  }
  .hero h1 {

  }
  .hero .tagline {
    color: var(--muted); font-size: 1.08rem; max-width: 600px;
    margin: 0 auto 8px; line-height: 1.5;
  }
  .hero-features {

  }
  .hero-feature {

  .hero-feature .check { color: var(--nwea-green); margin-right: 4px; }

  /* ---------- Grade picker ---------- */
  .grade-section h2 {
    text-align: center; color: var(--nwea-blue-dark);
    margin: 0 0 6px; font-size: 1.4rem;
  }
  .grade-section p {
    text-align: center; color: var(--muted); margin: 0 0 22px;

  /* ---------- Drag and drop ---------- */

  .stat-row {

  .stat-box {

  .stat-box .n { font-size: 1.8rem; font-weight: 700; color: var(--neutral); }

  .study-plan h3 { color: var(--nwea-blue-dark); }
  .study-item {
    display: flex; justify-content: space-between; align-items: center;

  /* ---------- Footer ---------- */

&lt;script&gt;
/* ==========================================================================
   Adaptive Math Practice — K-5
   Single-file web app, no external dependencies.
   Features: adaptive RIT engine, drag-drop, number input, clock reading,
   coordinate grid, ten-frame, text-to-speech (Web Speech API).

/* ====================== Khan Academy link builder ====================== */
function khanUrl(exerciseName) {
  return &quot;https://www.khanacademy.org/search?page_search_query=&quot; + encodeURIComponent(exerciseName);
}

/* ====================== Text-to-Speech module ====================== */
const TTS = {
  enabled: false,          // user toggle (off by default; auto-enables for K/G1 after they pick grade)
  supported: ('speechSynthesis' in window),
  voices: [],
  currentUtter: null,

  init() {
    if (!this.supported) {
      document.getElementById('ttsToggle').style.display = 'none';
      return;
    }
    const loadVoices = () =&gt; {
      this.voices = speechSynthesis.getVoices().filter(v =&gt; v.lang.startsWith('en'));
    };
    loadVoices();
    if (typeof speechSynthesis.onvoiceschanged !== 'undefined') {
      speechSynthesis.onvoiceschanged = loadVoices;
    }
  },

  toggle() {
    this.enabled = !this.enabled;
    this.updateUI();
    if (!this.enabled) this.stop();
    else if (State.currentQ) this.speakQuestion(State.currentQ);
  },

  updateUI() {
    const btn = document.getElementById('ttsToggle');
    const icon = document.getElementById('ttsIcon');
    const label = document.getElementById('ttsLabel');
    if (this.enabled) {
      btn.classList.add('on');
      icon.textContent = '🔊';
      label.textContent = 'Reading Aloud';
    } else {
      btn.classList.remove('on');
      icon.textContent = '🔇';
      label.textContent = 'Read Aloud';
    }
  },

  speak(text) {
    if (!this.enabled || !this.supported) return;
    this.stop();
    const utter = new SpeechSynthesisUtterance(this.prepText(text));
    utter.rate = 0.9;
    utter.pitch = 1.05;
    const preferred = this.voices.find(v =&gt;
      v.lang === 'en-US' &amp;&amp; /Samantha|Karen|Daniel|Google US English|Natural|Aaron|Nicky/i.test(v.name)
    ) || this.voices.find(v =&gt; v.lang === 'en-US') || this.voices[0];
    if (preferred) utter.voice = preferred;
    this.currentUtter = utter;
    utter.onend = () =&gt; {
      this.currentUtter = null;
      const btn = document.getElementById('currentSpeakBtn');
      if (btn) btn.classList.remove('speaking');
    };
    speechSynthesis.speak(utter);
  },

  speakQuestion(q) {
    if (!q) return;
    let text = q.speakPrompt || q.prompt;
    // For MC questions, also read choices when speaking the question
    if (q.type === 'mc' &amp;&amp; q.choices) {
      text += '. Choices: ' + q.choices.map((c, i) =&gt; String.fromCharCode(65 + i) + ', ' + c).join('. ');
    }
    const btn = document.getElementById('currentSpeakBtn');
    if (btn) btn.classList.add('speaking');
    this.speak(text);
  },

  stop() {
    if (this.supported) speechSynthesis.cancel();
    const btn = document.getElementById('currentSpeakBtn');
    if (btn) btn.classList.remove('speaking');
  },

  prepText(text) {
    if (!text) return '';
    return String(text)
      .replace(/×/g, ' times ')
      .replace(/÷/g, ' divided by ')
      .replace(/−/g, ' minus ')
      .replace(/\+/g, ' plus ')
      .replace(/=/g, ' equals ')
      .replace(/\$/g, ' dollars ')
      .replace(/¢/g, ' cents ')
      .replace(/(\d+)\s*\/\s*(\d+)/g, '$1 over $2')
      .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
      .replace(/[\u{2600}-\u{27BF}]/gu, '')
      .replace(/\s+/g, ' ')
      .trim();
  }
};

/* ====================== Question bank ======================
   Populated below; 25 items per grade (~150 total).
   Structure:
     { id, domain, rit, ccss, type, prompt, visual?, choices?, answer,
       khanExercise, lesson: {title, text, example}, speakPrompt? }
========================================================== */
const QUESTIONS = [];
QUESTIONS.push(
// ==================== RIT &lt;159  (Kindergarten, 25 items) ====================

// K.CC.B.5 Count objects
{id:&quot;k-cc-1a&quot;,domain:&quot;Counting&quot;,rit:142,ccss:&quot;K.CC.B.5&quot;,type:&quot;mc&quot;,
 prompt:&quot;Count the fish. How many are there?&quot;,
 visual:{type:&quot;emoji&quot;,content:&quot;🐟🐟🐟🐟&quot;},choices:[&quot;3&quot;,&quot;4&quot;,&quot;5&quot;,&quot;6&quot;],answer:1,
 khanExercise:&quot;Count objects 1&quot;,
 lesson:{title:&quot;Counting objects&quot;,text:&quot;Touch each object as you say a number: 1, 2, 3, 4. The last number you say is the total.&quot;,example:&quot;🐟🐟🐟🐟 = 4&quot;}},

{id:&quot;k-cc-1b&quot;,domain:&quot;Counting&quot;,rit:145,ccss:&quot;K.CC.B.5&quot;,type:&quot;mc&quot;,
 prompt:&quot;Count the apples. How many?&quot;,

            &lt;div class=&quot;question-text&quot;&gt;${q.prompt}&lt;/div&gt;
            ${TTS.supported ? `&lt;button id=&quot;currentSpeakBtn&quot; class=&quot;speak-btn&quot; onclick=&quot;TTS.speakQuestion(State.currentQ)&quot; aria-label=&quot;Read question aloud&quot; title=&quot;Read aloud&quot;&gt;🔊&lt;/button&gt;` : ''}
          &lt;/div&gt;
          ${visualHtml ? `&lt;div class=&quot;q-visual&quot;&gt;${visualHtml}&lt;/div&gt;` : ''}
          ${inputHtml}
          &lt;div id=&quot;feedback&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;actions&quot;&gt;
            &lt;button class=&quot;btn btn-secondary&quot; onclick=&quot;if(confirm('End this session and go home?')) Router.go('home')&quot;&gt;Exit&lt;/button&gt;
            &lt;button class=&quot;btn btn-primary&quot; id=&quot;submitBtn&quot; onclick=&quot;submitAnswer()&quot; disabled&gt;Submit&lt;/button&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/section&gt;
    `;
    wireInputForQuestion(q);
    // Auto-speak if TTS is enabled (tiny delay so voices are ready)
    if (TTS.enabled) {
      setTimeout(() =&gt; TTS.speakQuestion(q), 250);
    }
  },

  results() {
    const total = State.correct + State.incorrect;
    const pct = total ? Math.round(State.correct / total * 100) : 0;
    const estRIT = State.currentRIT;

    let domainRows = '';
    for (const [domain, s] of Object.entries(State.domainStats)) {
      const dpct = Math.round(s.correct / s.total * 100);
      const color = dpct &gt;= 70 ? 'var(--correct)' : dpct &gt;= 50 ? 'var(--warning)' : 'var(--incorrect)';
      domainRows += `
        &lt;div class=&quot;study-item&quot;&gt;
          &lt;div&gt;
            &lt;div class=&quot;topic&quot;&gt;${domain}&lt;/div&gt;
            &lt;div class=&quot;ccss&quot;&gt;${s.correct} of ${s.total} correct&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;font-weight:700;color:${color};font-size:1.2rem;&quot;&gt;${dpct}%&lt;/div&gt;
        &lt;/div&gt;`;
    }

    const seen = new Set();
    const uniqMissed = State.missedExercises.filter(m =&gt; {
      if (seen.has(m.exercise)) return false;
      seen.add(m.exercise); return true;
    });

    const studyRows = uniqMissed.length === 0
      ? `&lt;div style=&quot;padding:14px;background:var(--correct-bg);border-radius:8px;color:var(--correct);&quot;&gt;
           🎉 Perfect! No review topics. Try a harder grade level next.
         &lt;/div&gt;`
      : uniqMissed.map(m =&gt; `
          &lt;div class=&quot;study-item&quot;&gt;
            &lt;div&gt;
              &lt;div class=&quot;topic&quot;&gt;${m.exercise}&lt;/div&gt;
              &lt;div class=&quot;ccss&quot;&gt;${m.topic} · CCSS ${m.ccss}&lt;/div&gt;
            &lt;/div&gt;
            &lt;a href=&quot;${m.url}&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; class=&quot;btn btn-khan&quot;&gt;Practice →&lt;/a&gt;
          &lt;/div&gt;`).join('');

    document.getElementById('app').innerHTML = `
      &lt;section class=&quot;screen&quot;&gt;
        &lt;div class=&quot;card&quot;&gt;
          &lt;div class=&quot;results-hero&quot;&gt;
            &lt;div class=&quot;rit-label&quot;&gt;Your Estimated RIT Score&lt;/div&gt;
            &lt;div class=&quot;rit-score&quot;&gt;${estRIT}&lt;/div&gt;
            &lt;div class=&quot;rit-label&quot;&gt;Started at RIT ${State.gradeStart} · ${total} questions answered&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;stat-row&quot;&gt;
            &lt;div class=&quot;stat-box&quot;&gt;&lt;div class=&quot;n&quot;&gt;${State.correct}&lt;/div&gt;&lt;div class=&quot;l&quot;&gt;Correct&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;stat-box&quot;&gt;&lt;div class=&quot;n&quot;&gt;${State.incorrect}&lt;/div&gt;&lt;div class=&quot;l&quot;&gt;Incorrect&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;stat-box&quot;&gt;&lt;div class=&quot;n&quot;&gt;${pct}%&lt;/div&gt;&lt;div class=&quot;l&quot;&gt;Accuracy&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;stat-box&quot;&gt;&lt;div class=&quot;n&quot;&gt;${total}&lt;/div&gt;&lt;div class=&quot;l&quot;&gt;Total Items&lt;/div&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;h3 style=&quot;color:var(--nwea-blue-dark);margin-top:28px;&quot;&gt;Performance by Domain&lt;/h3&gt;
          ${domainRows}
          &lt;div class=&quot;study-plan&quot; style=&quot;margin-top:24px;&quot;&gt;
            &lt;h3&gt;📖 Your Khan Academy Study Plan&lt;/h3&gt;
            &lt;p style=&quot;color:var(--muted);font-size:0.92rem;&quot;&gt;
              Practice these exercises to build the skills behind the items you missed.
              Links go to the exercises from the official NWEA MAP → Khan Academy correlation.
            &lt;/p&gt;
            ${studyRows}
          &lt;/div&gt;
          &lt;div class=&quot;actions&quot;&gt;
            &lt;button class=&quot;btn btn-secondary&quot; onclick=&quot;Router.go('home')&quot;&gt;Choose Different Grade&lt;/button&gt;
            &lt;button class=&quot;btn btn-primary&quot; onclick=&quot;Router.go('practice', {rit:State.gradeStart, key:State.gradeKey})&quot;&gt;Try Again&lt;/button&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/section&gt;
    `;
  }
};

/* ====================== Adaptive question picker ====================== */
function pickQuestion() {
  const pool = QUESTIONS.filter(q =&gt; !State.asked.includes(q.id));
  if (pool.length === 0) return null;
  pool.sort((a, b) =&gt; Math.abs(a.rit - State.currentRIT) - Math.abs(b.rit - State.currentRIT));
  const topN = pool.slice(0, Math.min(4, pool.length));
  return topN[Math.floor(Math.random() * topN.length)];
}

/* ====================== Input rendering by type ====================== */
function renderInput(q) {
  if (q.type === 'mc' || q.type === 'mc-clock' || q.type === 'mc-coord') {
    return renderChoices(q.choices);
  }
  if (q.type === 'mc-shape') {
    return renderShapeChoices(q.shapes);
  }
  if (q.type === 'input') {
    return `&lt;div class=&quot;text-input-wrap&quot;&gt;
      &lt;input type=&quot;text&quot; id=&quot;textAnswer&quot; autocomplete=&quot;off&quot; autocapitalize=&quot;off&quot;
             inputmode=&quot;numeric&quot; placeholder=&quot;Your answer&quot;
             aria-label=&quot;Type your answer&quot;&gt;
    &lt;/div&gt;`;
  }
  if (q.type === 'dragdrop') return renderDragDrop(q);
  return '';
}

function renderVisual(q) {
  if (q.type === 'mc-clock') return renderClock(q.clockHour, q.clockMinute);
  if (q.type === 'mc-coord') return renderCoordGrid(q.gridPoints);
  if (!q.visual) return '';
  const v = q.visual;
  if (v.type === 'emoji') {
    return `&lt;div style=&quot;font-size:${v.size || '3rem'};letter-spacing:0.25rem;line-height:1.3;&quot; aria-hidden=&quot;true&quot;&gt;${v.content}&lt;/div&gt;`;
  }
  if (v.type === 'emoji-compare') {
    return `&lt;div style=&quot;display:flex;justify-content:center;gap:40px;font-size:2.4rem;flex-wrap:wrap;&quot;&gt;
      &lt;div style=&quot;padding:16px 20px;background:#fff7e0;border-radius:12px;border:2px solid var(--warning);min-width:110px;&quot;&gt;${v.left}&lt;/div&gt;
      &lt;div style=&quot;padding:16px 20px;background:#e6f6fc;border-radius:12px;border:2px solid var(--nwea-blue);min-width:110px;&quot;&gt;${v.right}&lt;/div&gt;
    &lt;/div&gt;`;
  }
  if (v.type === 'addition-emoji') {
    return `&lt;div style=&quot;display:inline-flex;align-items:center;gap:20px;font-size:2.4rem;padding:14px 18px;background:#f8fafc;border-radius:12px;&quot;&gt;
      &lt;span style=&quot;letter-spacing:0.15rem;&quot;&gt;${v.left}&lt;/span&gt;
      &lt;span style=&quot;color:var(--nwea-blue);font-weight:700;&quot;&gt;+&lt;/span&gt;
      &lt;span style=&quot;letter-spacing:0.15rem;&quot;&gt;${v.right}&lt;/span&gt;
    &lt;/div&gt;`;
  }
  if (v.type === 'ten-frame') return renderTenFrame(v.filled);
  if (v.type === 'size-compare') return renderSizeCompare(v);
  if (v.type === 'array') return renderArray(v.rows, v.cols, v.item || '🍎');
  if (v.type === 'bar-chart') return renderBarChart(v.data);
  if (v.type === 'rect-shaded') return renderRectShaded(v.total, v.shaded);
  if (v.type === 'money') return renderMoney(v.coins);
  if (v.type === 'number-line') return renderNumberLine(v);
  if (v.type === 'fraction-bar') return renderFractionBar(v.parts, v.shaded);
  if (v.type === 'big-number') return `&lt;div style=&quot;font-size:3.5rem;font-weight:800;color:var(--neutral);letter-spacing:4px;&quot;&gt;${v.n}&lt;/div&gt;`;
  if (v.type === 'html') return v.html;
  return '';
}

function renderChoices(choices) {
  const letters = ['A','B','C','D','E'];
  return `&lt;div class=&quot;choices&quot; id=&quot;choices&quot; role=&quot;radiogroup&quot; aria-label=&quot;Answer choices&quot;&gt;
    ${choices.map((c, i) =&gt; `
      &lt;button class=&quot;choice&quot; data-idx=&quot;${i}&quot; onclick=&quot;selectChoice(${i})&quot; role=&quot;radio&quot; aria-checked=&quot;false&quot;&gt;
        &lt;span class=&quot;choice-letter&quot; aria-hidden=&quot;true&quot;&gt;${letters[i]}&lt;/span&gt;
        &lt;span&gt;${c}&lt;/span&gt;
      &lt;/button&gt;
    `).join('')}
  &lt;/div&gt;`;
}

function renderShapeChoices(shapes) {
  const letters = ['A','B','C','D'];
  return `&lt;div class=&quot;choices&quot; id=&quot;choices&quot; role=&quot;radiogroup&quot;&gt;
    ${shapes.map((s, i) =&gt; `
      &lt;button class=&quot;choice&quot; data-idx=&quot;${i}&quot; onclick=&quot;selectChoice(${i})&quot; role=&quot;radio&quot; aria-checked=&quot;false&quot; aria-label=&quot;Choice ${letters[i]}&quot;&gt;
        &lt;span class=&quot;choice-letter&quot; aria-hidden=&quot;true&quot;&gt;${letters[i]}&lt;/span&gt;
        &lt;span class=&quot;shape-svg&quot;&gt;${renderShape(s)}&lt;/span&gt;
      &lt;/button&gt;
    `).join('')}
  &lt;/div&gt;`;
}

function selectChoice(idx) {
  State.selectedChoice = idx;
  document.querySelectorAll('.choice').forEach((el, i) =&gt; {
    el.classList.toggle('selected', i === idx);
    el.setAttribute('aria-checked', i === idx ? 'true' : 'false');
  });
  document.getElementById('submitBtn').disabled = false;
}

/* ---- Shape rendering ---- */
function renderShape(s) {
  if (s.type === 'rect4') {
    const parts = s.shaded.map((v, i) =&gt;
      `&lt;rect x=&quot;${i*30}&quot; y=&quot;0&quot; width=&quot;30&quot; height=&quot;50&quot; fill=&quot;${v ? '#78be21' : 'white'}&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;`
    ).join('');
    return `&lt;svg width=&quot;120&quot; height=&quot;50&quot; viewBox=&quot;0 0 120 50&quot;&gt;${parts}&lt;/svg&gt;`;
  }
  if (s.type === 'rect4-vlines') {
    const n = s.parts; const w = 120 / n;
    let lines = '';
    for (let i = 1; i &lt; n; i++) lines += `&lt;line x1=&quot;${i*w}&quot; y1=&quot;0&quot; x2=&quot;${i*w}&quot; y2=&quot;50&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;`;
    return `&lt;svg width=&quot;120&quot; height=&quot;50&quot; viewBox=&quot;0 0 120 50&quot;&gt;&lt;rect x=&quot;0&quot; y=&quot;0&quot; width=&quot;120&quot; height=&quot;50&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;${lines}&lt;/svg&gt;`;
  }
  if (s.type === 'square') return `&lt;svg width=&quot;60&quot; height=&quot;60&quot;&gt;&lt;rect x=&quot;5&quot; y=&quot;5&quot; width=&quot;50&quot; height=&quot;50&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'rectangle') return `&lt;svg width=&quot;100&quot; height=&quot;60&quot;&gt;&lt;rect x=&quot;5&quot; y=&quot;12&quot; width=&quot;90&quot; height=&quot;36&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'triangle') return `&lt;svg width=&quot;70&quot; height=&quot;60&quot;&gt;&lt;polygon points=&quot;35,5 65,55 5,55&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'circle') return `&lt;svg width=&quot;60&quot; height=&quot;60&quot;&gt;&lt;circle cx=&quot;30&quot; cy=&quot;30&quot; r=&quot;25&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'hexagon') return `&lt;svg width=&quot;70&quot; height=&quot;60&quot;&gt;&lt;polygon points=&quot;20,5 50,5 65,30 50,55 20,55 5,30&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'pentagon') return `&lt;svg width=&quot;70&quot; height=&quot;60&quot;&gt;&lt;polygon points=&quot;35,5 65,25 55,55 15,55 5,25&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'trapezoid') return `&lt;svg width=&quot;90&quot; height=&quot;60&quot;&gt;&lt;polygon points=&quot;20,10 70,10 85,50 5,50&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'rhombus') return `&lt;svg width=&quot;70&quot; height=&quot;60&quot;&gt;&lt;polygon points=&quot;35,5 65,30 35,55 5,30&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'parallelogram') return `&lt;svg width=&quot;90&quot; height=&quot;50&quot;&gt;&lt;polygon points=&quot;25,5 85,5 65,45 5,45&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'equilateral-triangle') return `&lt;svg width=&quot;70&quot; height=&quot;60&quot;&gt;&lt;polygon points=&quot;35,5 65,55 5,55&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'right-triangle') return `&lt;svg width=&quot;70&quot; height=&quot;60&quot;&gt;&lt;polygon points=&quot;5,5 5,55 65,55&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;polyline points=&quot;5,45 15,45 15,55&quot; fill=&quot;none&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;1.5&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'obtuse-triangle') return `&lt;svg width=&quot;90&quot; height=&quot;50&quot;&gt;&lt;polygon points=&quot;10,40 80,40 30,10&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  if (s.type === 'acute-triangle') return `&lt;svg width=&quot;70&quot; height=&quot;60&quot;&gt;&lt;polygon points=&quot;35,5 60,55 10,55&quot; fill=&quot;#e6f6fc&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;3&quot;/&gt;&lt;/svg&gt;`;
  return '?';
}

function renderTenFrame(filled) {
  const c = 44; let cells = '';
  for (let i = 0; i &lt; 10; i++) {
    const r = Math.floor(i/5), col = i%5;
    const x = col*c+2, y = r*c+2;
    cells += `&lt;rect x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${c-4}&quot; height=&quot;${c-4}&quot; fill=&quot;white&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;`;
    if (i &lt; filled) cells += `&lt;circle cx=&quot;${x+(c-4)/2}&quot; cy=&quot;${y+(c-4)/2}&quot; r=&quot;14&quot; fill=&quot;#78be21&quot;/&gt;`;
  }
  return `&lt;svg width=&quot;${c*5+4}&quot; height=&quot;${c*2+4}&quot; viewBox=&quot;0 0 ${c*5+4} ${c*2+4}&quot;&gt;${cells}&lt;/svg&gt;`;
}

function renderSizeCompare(v) {
  const maxH = 120;
  if (v.shape === 'bar') {
    const lH = v.leftSize*maxH, rH = v.rightSize*maxH;
    return `&lt;svg width=&quot;240&quot; height=&quot;${maxH+30}&quot; viewBox=&quot;0 0 240 ${maxH+30}&quot;&gt;
      &lt;rect x=&quot;50&quot; y=&quot;${maxH-lH}&quot; width=&quot;50&quot; height=&quot;${lH}&quot; fill=&quot;#f59e0b&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;
      &lt;text x=&quot;75&quot; y=&quot;${maxH+22}&quot; text-anchor=&quot;middle&quot; font-size=&quot;14&quot; font-weight=&quot;700&quot; fill=&quot;#1f2d3d&quot;&gt;A&lt;/text&gt;
      &lt;rect x=&quot;140&quot; y=&quot;${maxH-rH}&quot; width=&quot;50&quot; height=&quot;${rH}&quot; fill=&quot;#00a3e0&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;
      &lt;text x=&quot;165&quot; y=&quot;${maxH+22}&quot; text-anchor=&quot;middle&quot; font-size=&quot;14&quot; font-weight=&quot;700&quot; fill=&quot;#1f2d3d&quot;&gt;B&lt;/text&gt;
    &lt;/svg&gt;`;
  }
  if (v.shape === 'pencil') {
    // horizontal pencils for &quot;longer&quot; comparison
    const lW = v.leftSize*200, rW = v.rightSize*200;
    return `&lt;svg width=&quot;240&quot; height=&quot;80&quot; viewBox=&quot;0 0 240 80&quot;&gt;
      &lt;rect x=&quot;10&quot; y=&quot;15&quot; width=&quot;${lW}&quot; height=&quot;18&quot; fill=&quot;#f59e0b&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;
      &lt;text x=&quot;${10+lW+6}&quot; y=&quot;29&quot; font-size=&quot;14&quot; font-weight=&quot;700&quot; fill=&quot;#1f2d3d&quot;&gt;A&lt;/text&gt;
      &lt;rect x=&quot;10&quot; y=&quot;50&quot; width=&quot;${rW}&quot; height=&quot;18&quot; fill=&quot;#00a3e0&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;
      &lt;text x=&quot;${10+rW+6}&quot; y=&quot;64&quot; font-size=&quot;14&quot; font-weight=&quot;700&quot; fill=&quot;#1f2d3d&quot;&gt;B&lt;/text&gt;
    &lt;/svg&gt;`;
  }
  return '';
}

function renderArray(rows, cols, item) {
  let s = '';
  for (let r = 0; r &lt; rows; r++) {
    s += '&lt;div style=&quot;display:flex;gap:6px;justify-content:center;margin:2px 0;&quot;&gt;';
    for (let c = 0; c &lt; cols; c++) s += `&lt;span style=&quot;font-size:1.8rem;&quot;&gt;${item}&lt;/span&gt;`;
    s += '&lt;/div&gt;';
  }
  return `&lt;div style=&quot;display:inline-block;padding:12px 18px;background:#f8fafc;border-radius:10px;&quot; aria-hidden=&quot;true&quot;&gt;${s}&lt;/div&gt;`;
}

function renderBarChart(data) {
  // data: [{label, value, color}]
  const maxV = Math.max(...data.map(d =&gt; d.value));
  const barH = 140, barW = 50, gap = 20;
  const w = data.length * (barW + gap) + gap;
  let bars = '';
  data.forEach((d, i) =&gt; {
    const h = d.value / maxV * barH;
    const x = gap + i * (barW + gap);
    bars += `&lt;rect x=&quot;${x}&quot; y=&quot;${barH - h + 10}&quot; width=&quot;${barW}&quot; height=&quot;${h}&quot; fill=&quot;${d.color || '#00a3e0'}&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;1.5&quot;/&gt;`;
    bars += `&lt;text x=&quot;${x + barW/2}&quot; y=&quot;${barH + 30}&quot; text-anchor=&quot;middle&quot; font-size=&quot;13&quot; font-weight=&quot;600&quot;&gt;${d.label}&lt;/text&gt;`;
    bars += `&lt;text x=&quot;${x + barW/2}&quot; y=&quot;${barH - h + 4}&quot; text-anchor=&quot;middle&quot; font-size=&quot;12&quot; font-weight=&quot;600&quot;&gt;${d.value}&lt;/text&gt;`;
  });
  return `&lt;svg width=&quot;${w}&quot; height=&quot;${barH + 40}&quot; viewBox=&quot;0 0 ${w} ${barH + 40}&quot;&gt;
    &lt;line x1=&quot;${gap/2}&quot; y1=&quot;${barH + 10}&quot; x2=&quot;${w - gap/2}&quot; y2=&quot;${barH + 10}&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;
    ${bars}
  &lt;/svg&gt;`;
}

function renderRectShaded(total, shaded) {
  // a 2xN rectangle where some cells are shaded (for fraction visuals)
  const cols = total; const w = Math.min(60, 400/cols);
  let cells = '';
  for (let i = 0; i &lt; total; i++) {
    cells += `&lt;rect x=&quot;${i*w}&quot; y=&quot;0&quot; width=&quot;${w}&quot; height=&quot;${w}&quot; fill=&quot;${i &lt; shaded ? '#78be21' : 'white'}&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;`;
  }
  return `&lt;svg width=&quot;${total*w}&quot; height=&quot;${w}&quot; viewBox=&quot;0 0 ${total*w} ${w}&quot;&gt;${cells}&lt;/svg&gt;`;
}

function renderMoney(coins) {
  // coins: array of 'quarter','dime','nickel','penny'
  const map = { quarter: '25¢', dime: '10¢', nickel: '5¢', penny: '1¢', dollar: '$1' };
  const colors = { quarter: '#cbd5e1', dime: '#cbd5e1', nickel: '#cbd5e1', penny: '#d97706', dollar: '#a3e635' };
  let svg = '&lt;div style=&quot;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:10px;&quot;&gt;';
  coins.forEach(c =&gt; {
    svg += `&lt;div style=&quot;width:64px;height:64px;border-radius:50%;background:${colors[c]};border:3px solid #1f2d3d;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:0.95rem;&quot;&gt;${map[c]}&lt;/div&gt;`;
  });
  svg += '&lt;/div&gt;';
  return svg;
}

function renderNumberLine(v) {
  // v: { min, max, step, marks:[{val, label}] }
  const width = 520, pad = 30;
  const range = v.max - v.min;
  const unit = (width - pad*2) / range;
  let ticks = '';
  for (let i = v.min; i &lt;= v.max; i += (v.step || 1)) {
    const x = pad + (i - v.min) * unit;
    ticks += `&lt;line x1=&quot;${x}&quot; y1=&quot;40&quot; x2=&quot;${x}&quot; y2=&quot;50&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;1.5&quot;/&gt;`;
    ticks += `&lt;text x=&quot;${x}&quot; y=&quot;68&quot; text-anchor=&quot;middle&quot; font-size=&quot;12&quot;&gt;${i}&lt;/text&gt;`;
  }
  let marks = '';
  (v.marks || []).forEach(m =&gt; {
    const x = pad + (m.val - v.min) * unit;
    marks += `&lt;circle cx=&quot;${x}&quot; cy=&quot;45&quot; r=&quot;6&quot; fill=&quot;#c62828&quot; stroke=&quot;white&quot; stroke-width=&quot;2&quot;/&gt;`;
    if (m.label) marks += `&lt;text x=&quot;${x}&quot; y=&quot;28&quot; text-anchor=&quot;middle&quot; font-size=&quot;13&quot; font-weight=&quot;700&quot; fill=&quot;#c62828&quot;&gt;${m.label}&lt;/text&gt;`;
  });
  return `&lt;svg width=&quot;${width}&quot; height=&quot;80&quot; viewBox=&quot;0 0 ${width} 80&quot;&gt;
    &lt;line x1=&quot;${pad}&quot; y1=&quot;45&quot; x2=&quot;${width-pad}&quot; y2=&quot;45&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;
    ${ticks}${marks}
  &lt;/svg&gt;`;
}

function renderFractionBar(parts, shadedList) {
  // shadedList: boolean array of length parts
  const totalW = 360, h = 50;
  const w = totalW / parts;
  let rects = '';
  for (let i = 0; i &lt; parts; i++) {
    const filled = shadedList[i];
    rects += `&lt;rect x=&quot;${i*w}&quot; y=&quot;0&quot; width=&quot;${w}&quot; height=&quot;${h}&quot; fill=&quot;${filled ? '#78be21' : 'white'}&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;`;
  }
  return `&lt;svg width=&quot;${totalW}&quot; height=&quot;${h}&quot; viewBox=&quot;0 0 ${totalW} ${h}&quot;&gt;${rects}&lt;/svg&gt;`;
}

function renderClock(h, m) {
  const hourAngle = ((h % 12) * 30 + m * 0.5 - 90) * Math.PI / 180;
  const minAngle = (m * 6 - 90) * Math.PI / 180;
  const cx = 100, cy = 100, r = 85;
  const hx = cx + 45*Math.cos(hourAngle), hy = cy + 45*Math.sin(hourAngle);
  const mx = cx + 70*Math.cos(minAngle),  my = cy + 70*Math.sin(minAngle);
  let nums = '';
  for (let i = 1; i &lt;= 12; i++) {
    const a = (i*30 - 90) * Math.PI/180;
    nums += `&lt;text x=&quot;${cx + 70*Math.cos(a)}&quot; y=&quot;${cy + 70*Math.sin(a) + 5}&quot; text-anchor=&quot;middle&quot; font-size=&quot;16&quot; font-weight=&quot;700&quot; fill=&quot;#1f2d3d&quot;&gt;${i}&lt;/text&gt;`;
  }
  return `&lt;svg width=&quot;200&quot; height=&quot;200&quot; viewBox=&quot;0 0 200 200&quot; style=&quot;background:white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.1);&quot;&gt;
    &lt;circle cx=&quot;${cx}&quot; cy=&quot;${cy}&quot; r=&quot;${r}&quot; fill=&quot;white&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;4&quot;/&gt;
    ${nums}
    &lt;line x1=&quot;${cx}&quot; y1=&quot;${cy}&quot; x2=&quot;${hx}&quot; y2=&quot;${hy}&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;6&quot; stroke-linecap=&quot;round&quot;/&gt;
    &lt;line x1=&quot;${cx}&quot; y1=&quot;${cy}&quot; x2=&quot;${mx}&quot; y2=&quot;${my}&quot; stroke=&quot;#00a3e0&quot; stroke-width=&quot;4&quot; stroke-linecap=&quot;round&quot;/&gt;
    &lt;circle cx=&quot;${cx}&quot; cy=&quot;${cy}&quot; r=&quot;5&quot; fill=&quot;#1f2d3d&quot;/&gt;
  &lt;/svg&gt;`;
}

function renderCoordGrid(points) {
  const size = 280, pad = 30, gridN = 6;
  const step = (size - pad*2) / gridN;
  let g = '';
  for (let i = 0; i &lt;= gridN; i++) {
    const x = pad + i*step, y = pad + i*step;
    g += `&lt;line x1=&quot;${x}&quot; y1=&quot;${pad}&quot; x2=&quot;${x}&quot; y2=&quot;${size-pad}&quot; stroke=&quot;#d6dde4&quot;/&gt;`;
    g += `&lt;line x1=&quot;${pad}&quot; y1=&quot;${y}&quot; x2=&quot;${size-pad}&quot; y2=&quot;${y}&quot; stroke=&quot;#d6dde4&quot;/&gt;`;
  }
  g += `&lt;line x1=&quot;${pad}&quot; y1=&quot;${size-pad}&quot; x2=&quot;${size-pad}&quot; y2=&quot;${size-pad}&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;`;
  g += `&lt;line x1=&quot;${pad}&quot; y1=&quot;${pad}&quot; x2=&quot;${pad}&quot; y2=&quot;${size-pad}&quot; stroke=&quot;#1f2d3d&quot; stroke-width=&quot;2&quot;/&gt;`;
  let labels = '';
  for (let i = 0; i &lt;= gridN; i++) {
    labels += `&lt;text x=&quot;${pad + i*step}&quot; y=&quot;${size-pad+16}&quot; text-anchor=&quot;middle&quot; font-size=&quot;11&quot; fill=&quot;#64748b&quot;&gt;${i}&lt;/text&gt;`;
    if (i &gt; 0) labels += `&lt;text x=&quot;${pad-10}&quot; y=&quot;${size-pad-i*step+4}&quot; text-anchor=&quot;end&quot; font-size=&quot;11&quot; fill=&quot;#64748b&quot;&gt;${i}&lt;/text&gt;`;
  }
  let pts = '';
  points.forEach(p =&gt; {
    const cx = pad + p.x*step, cy = size - pad - p.y*step;
    pts += `&lt;circle cx=&quot;${cx}&quot; cy=&quot;${cy}&quot; r=&quot;7&quot; fill=&quot;#c62828&quot; stroke=&quot;white&quot; stroke-width=&quot;2&quot;/&gt;`;
    pts += `&lt;text x=&quot;${cx+10}&quot; y=&quot;${cy-8}&quot; font-size=&quot;14&quot; font-weight=&quot;700&quot; fill=&quot;#1f2d3d&quot;&gt;${p.label}&lt;/text&gt;`;
  });
  return `&lt;svg width=&quot;${size}&quot; height=&quot;${size}&quot; viewBox=&quot;0 0 ${size} ${size}&quot;&gt;${g}${labels}${pts}&lt;/svg&gt;`;
}

/* ---- Drag and drop ---- */
function renderDragDrop(q) {
  const slots = q.correctOrder.map((_, i) =&gt;
    `&lt;div class=&quot;dnd-slot&quot; data-idx=&quot;${i}&quot;&gt;
       &lt;span class=&quot;dnd-slot-label&quot;&gt;${q.dragSlotLabels[i]}&lt;/span&gt;
     &lt;/div&gt;`).join('');
  const shuffled = [...q.dragSources].sort(() =&gt; Math.random() - 0.5);
  const sources = shuffled.map(v =&gt;
    `&lt;div class=&quot;dnd-item&quot; draggable=&quot;true&quot; data-val=&quot;${v}&quot; tabindex=&quot;0&quot;&gt;${v}&lt;/div&gt;`).join('');
  const patternDisplay = q.fillInPattern
    ? `&lt;div style=&quot;text-align:center;margin:10px 0;font-size:1.05rem;color:var(--muted);&quot;&gt;
         Fill in the blanks: &lt;strong style=&quot;color:var(--text);&quot;&gt;${q.fillInPattern}&lt;/strong&gt;
       &lt;/div&gt;` : '';
  return `
    ${patternDisplay}
    &lt;div class=&quot;dnd-container&quot;&gt;
      &lt;div&gt;
        &lt;div style=&quot;font-size:0.85rem;color:var(--muted);margin-bottom:6px;text-align:center;&quot;&gt;Drag these into the slots below:&lt;/div&gt;
        &lt;div class=&quot;dnd-sources&quot; id=&quot;dndSources&quot;&gt;${sources}&lt;/div&gt;
      &lt;/div&gt;
      &lt;div&gt;
        &lt;div style=&quot;font-size:0.85rem;color:var(--muted);margin-bottom:20px;text-align:center;&quot;&gt;${q.dndInstruction || 'Drop in order — smallest to largest:'}&lt;/div&gt;
        &lt;div class=&quot;dnd-targets&quot; id=&quot;dndTargets&quot;&gt;${slots}&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  `;
}

function wireInputForQuestion(q) {
  if (q.type === 'input') {
    const inp = document.getElementById('textAnswer');
    if (!inp) return;
    inp.focus();
    inp.addEventListener('input', () =&gt; {
      document.getElementById('submitBtn').disabled = inp.value.trim() === '';
    });
    inp.addEventListener('keydown', e =&gt; {
      if (e.key === 'Enter' &amp;&amp; !document.getElementById('submitBtn').disabled) submitAnswer();
    });
    return;
  }
  if (q.type === 'dragdrop') {
    let draggedEl = null;
    document.querySelectorAll('.dnd-item').forEach(el =&gt; {
      el.addEventListener('dragstart', e =&gt; {
        draggedEl = el;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', () =&gt; {
        el.classList.remove('dragging');
        checkDndComplete(q);
      });
    });
    document.querySelectorAll('.dnd-slot').forEach(slot =&gt; {
      slot.addEventListener('dragover', e =&gt; { e.preventDefault(); slot.classList.add('drag-over'); });
      slot.addEventListener('dragleave', () =&gt; slot.classList.remove('drag-over'));
      slot.addEventListener('drop', e =&gt; {
        e.preventDefault();
        slot.classList.remove('drag-over');
        if (!draggedEl) return;
        const existing = slot.querySelector('.dnd-item');
        if (existing) document.getElementById('dndSources').appendChild(existing);
        slot.appendChild(draggedEl);
      });
    });
    const sourcesEl = document.getElementById('dndSources');
    sourcesEl.addEventListener('dragover', e =&gt; e.preventDefault());
    sourcesEl.addEventListener('drop', e =&gt; {
      e.preventDefault();
      if (draggedEl) sourcesEl.appendChild(draggedEl);
    });
    return;
  }
}

function checkDndComplete(q) {
  const slots = document.querySelectorAll('.dnd-slot');
  let allFilled = true;
  slots.forEach(s =&gt; { if (!s.querySelector('.dnd-item')) allFilled = false; });
  document.getElementById('submitBtn').disabled = !allFilled;
}

/* ====================== Submit and feedback ====================== */
function submitAnswer() {
  TTS.stop();
  const q = State.currentQ;
  let isCorrect = false;
  let userDisplay = '';

  if (q.type === 'mc' || q.type === 'mc-clock' || q.type === 'mc-coord' || q.type === 'mc-shape') {
    if (State.selectedChoice === null) return;
    isCorrect = State.selectedChoice === q.answer;
    userDisplay = q.choices ? q.choices[State.selectedChoice] : `Option ${String.fromCharCode(65 + State.selectedChoice)}`;
    document.querySelectorAll('.choice').forEach((el, i) =&gt; {
      el.classList.add('disabled'); el.disabled = true;
      if (i === q.answer) el.classList.add('correct');
      else if (i === State.selectedChoice &amp;&amp; !isCorrect) el.classList.add('incorrect');
    });
  }
  else if (q.type === 'input') {
    const val = document.getElementById('textAnswer').value.trim();
    userDisplay = val;
    const clean = val.replace(/\s|\$/g, '').toLowerCase();
    const ansClean = String(q.answer).replace(/\s|\$/g, '').toLowerCase();
    isCorrect = clean === ansClean;
    const inp = document.getElementById('textAnswer');
    inp.disabled = true;
    inp.style.borderColor = isCorrect ? 'var(--correct)' : 'var(--incorrect)';
  }
  else if (q.type === 'dragdrop') {
    const slots = document.querySelectorAll('.dnd-slot');
    const given = Array.from(slots).map(s =&gt; s.querySelector('.dnd-item')?.dataset.val);
    userDisplay = given.join(', ');
    isCorrect = given.every((v, i) =&gt; v === q.correctOrder[i]);
    document.querySelectorAll('.dnd-item').forEach(el =&gt; { el.draggable = false; el.style.cursor = 'default'; });
    slots.forEach((s, i) =&gt; {
      const it = s.querySelector('.dnd-item');
      if (it) {
        const ok = it.dataset.val === q.correctOrder[i];
        it.style.background = ok ? 'var(--correct-bg)' : 'var(--incorrect-bg)';
        it.style.borderColor = ok ? 'var(--correct)' : 'var(--incorrect)';
      }
    });
  }

  if (isCorrect) {
    State.correct++;
    State.currentRIT = Math.min(220, State.currentRIT + 3);
  } else {
    State.incorrect++;
    State.currentRIT = Math.max(140, State.currentRIT - 3);
    State.missedExercises.push({
      exercise: q.khanExercise, ccss: q.ccss, topic: q.domain, url: khanUrl(q.khanExercise)
    });
  }
  if (!State.domainStats[q.domain]) State.domainStats[q.domain] = { correct: 0, total: 0 };
  State.domainStats[q.domain].total++;
  if (isCorrect) State.domainStats[q.domain].correct++;

  renderFeedback(q, isCorrect);
}

function renderFeedback(q, isCorrect) {
  const fb = document.getElementById('feedback');
  const correctText = q.type === 'mc' ? q.choices[q.answer]
    : q.type === 'input' ? q.answer
    : q.type === 'dragdrop' ? q.correctOrder.join(', ')
    : q.choices ? q.choices[q.answer] : '';

  let html = `&lt;div class=&quot;feedback ${isCorrect ? 'correct' : 'incorrect'}&quot;&gt;`;
  if (isCorrect) {
    html += `&lt;h3&gt;✓ Correct!&lt;/h3&gt;&lt;div class=&quot;explanation&quot;&gt;Great work — you got it right.&lt;/div&gt;`;
  } else {
    html += `&lt;h3&gt;✗ Not quite&lt;/h3&gt;
             &lt;div class=&quot;explanation&quot;&gt;The correct answer is &lt;strong&gt;${correctText}&lt;/strong&gt;.&lt;/div&gt;`;
    if (q.lesson) {
      html += `&lt;div class=&quot;lesson&quot;&gt;
        &lt;h4&gt;📚 Let's review: ${q.lesson.title}&lt;/h4&gt;
        &lt;div&gt;${q.lesson.text}&lt;/div&gt;
        &lt;div class=&quot;example&quot;&gt;${q.lesson.example}&lt;/div&gt;
      &lt;/div&gt;`;
    }
    html += `&lt;div class=&quot;khan-box&quot;&gt;
      &lt;strong&gt;Practice more on Khan Academy:&lt;/strong&gt;&lt;br&gt;
      &lt;a href=&quot;${khanUrl(q.khanExercise)}&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;&gt;▶ ${q.khanExercise}&lt;/a&gt;
      &lt;span style=&quot;color:var(--muted);font-size:0.85rem;&quot;&gt; (CCSS ${q.ccss})&lt;/span&gt;
    &lt;/div&gt;`;
  }
  html += `&lt;/div&gt;`;
  fb.innerHTML = html;

  // speak feedback for TTS users
  if (TTS.enabled) {
    const summary = isCorrect
      ? 'Correct! Great work.'
      : `Not quite. The correct answer is ${correctText}. ${q.lesson ? q.lesson.title + '. ' + q.lesson.text : ''}`;
    setTimeout(() =&gt; TTS.speak(summary), 200);
  }

  const btn = document.getElementById('submitBtn');
  btn.textContent = State.asked.length &gt;= State.maxQuestions ? 'See Results →' : 'Next Question →';
  btn.disabled = false;
  btn.onclick = () =&gt; Screens.next();
}

/* ====================== Init ====================== */
TTS.init();
Router.go('home');
&lt;/script&gt;

<script>
(function () {
  var VALID = ['home', 'mca', 'nwea'];
  var tabs = document.querySelectorAll('.tab-btn');
  var panels = document.querySelectorAll('.tab-panel');

  function activate(tabName) {
    if (VALID.indexOf(tabName) === -1) return;
    tabs.forEach(function (t) {
      var on = t.dataset.tab === tabName;
      t.classList.toggle('active', on);
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    panels.forEach(function (p) {
      p.classList.toggle('active', p.dataset.tabPanel === tabName);
    });
    try { history.replaceState(null, '', '#' + tabName); } catch (e) {}
  }

  tabs.forEach(function (t) {
    t.addEventListener('click', function () { activate(t.dataset.tab); });
  });

  // Home page cards post messages to switch tabs.
  window.addEventListener('message', function (e) {
    if (e && e.data && e.data.type === 'switch-tab' && e.data.tab) {
      activate(e.data.tab);
    }
  });

  var initial = (location.hash || '').replace('#', '');
  if (initial) activate(initial);
})();
</script>
