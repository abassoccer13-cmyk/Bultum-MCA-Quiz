h texts argue that ferries should never have been used.", "Both texts are poems about fog and rain."], 0, 3], ["How does the heading in Text B help the reader of the Crossing the River texts?", ["It shows that Text B is a general story about any river in the world.", "It tells readers that the passage is an informational note focused on the East Ferry Route.", "It proves Ana wrote both texts herself.", "It adds dialogue from the people on the ferry."], 1, 3], ["What is one important difference in focus between the two Crossing the River texts?", ["Text A focuses on Ana's feelings during one trip, while Text B explains the ferry route more generally.", "Text A lists dates and records, while Text B tells how Ana felt.", "Text A explains bridge construction, while Text B describes market prices.", "Text A and Text B focus on exactly the same details in exactly the same way."], 0, 3], ["Which detail is included in the Crossing the River journal mainly because it is a firsthand account?", ["The route closed in 1924.", "The ferry connected farms and the market district.", "Ana's stomach lurched when the boat pulled away.", "City reports were used to study the route."], 2, 3], ["Why might a reader use Text B after reading the Crossing the River journal?", ["To learn the broader historical facts and context that Ana's journal does not explain", "To find out what Ana ate for breakfast that morning", "To hear direct dialogue from Tomas", "To read a fictional retelling of the ferry trip"], 0, 3], ["In the Crossing the River journal, what does the word 'lurched' most nearly mean?", ["moved suddenly and unevenly", "rested quietly", "shone brightly", "became lighter in weight"], 0, 3], ["Which text is more useful for finding the exact year the ferry route closed, and why?", ["Text A, because personal feelings are always more exact than records", "Text A, because journal entries usually include more dates than museum notes", "Text B, because it provides a specific historical date based on records and reports", "Text B, because it uses more descriptive language about fog"], 2, 3], ["What is the author's main claim in the repair club article?", ["The school should begin a repair club.", "The school should cancel all after-school clubs.", "Students should only repair items at home.", "Landfills are larger than most people realize."], 0, 4], ["Which summary best captures the repair club article?", ["The author explains that students like working with tools and should replace teachers in maintenance jobs.", "The author argues for a repair club because it could reduce waste, teach problem-solving, and be managed at a reasonable cost and time commitment.", "The author lists broken school items but does not suggest any solution.", "The author argues that schools should stop buying supplies and furniture."], 1, 4], ["How do the 'Some people may worry' and 'Another concern' paragraphs help the repair club article?", ["They show how the author addresses possible objections to the repair club.", "They switch the passage from opinion writing to poetry.", "They prove the author no longer supports the club.", "They provide a step-by-step set of repair instructions."], 0, 4], ["Which detail is the strongest evidence that a repair club could reduce waste?", ["Students already join sports and music clubs.", "Many broken items are thrown away even when only one small part needs fixing.", "Local businesses sometimes donate materials.", "Some tools are interesting to use."], 1, 4], ["Which statement from the repair club passage is mainly a claim that would need more evidence to be fully proved?", ["A repair club would also teach practical problem-solving.", "Many repairs require inexpensive materials such as thread and screws.", "Students already participate in sports, music, and homework help.", "Some items are too damaged or unsafe to fix at school."], 0, 4], ["How does the repair club author respond to the concern about cost?", ["By saying money does not matter", "By suggesting that repairs would require only expensive machines", "By explaining that many repairs use low-cost materials and the club could start small", "By arguing that the school should stop buying supplies for other classes"], 2, 4], ["What does the word 'manageable' most nearly mean in the repair club article?", ["easy to control", "ready to recycle", "completely free", "likely to disappear"], 0, 4], ["What is the central idea of the community garden news brief (Source A)?", ["The library is closing because the lot behind it is too empty.", "Neighbors are organizing a garden project and still need to learn more before planting.", "Students have already finished building the garden by themselves.", "The lot behind the library gets no sunlight at all."], 1, 5], ["What can a reader infer by combining Source A and Source C about the community garden?", ["The organizers should test the soil before deciding where and how to plant food crops.", "The garden can open only at night.", "Raised beds are useful only for flowers, not vegetables.", "The lot definitely cannot be used for any kind of garden."], 0, 5], ["Which statement from the volunteer day flyer is most clearly a persuasive claim rather than a fact?", ["Saturday, May 18 - 9:00 a.m. to 1:00 p.m.", "Bring: water bottle, work gloves, closed-toe shoes", "Tasks: clear litter, mark pathways, build two starter raised beds", "Let's make the best garden in the whole city!"], 3, 5], ["Which source provides the strongest evidence for what gardeners should do if the soil is unsafe for food crops?", ["Source A, because it mentions the library", "Source B, because it lists the volunteer schedule", "Source C, because it explains using raised beds with clean soil and compost", "None of the sources gives information about soil safety"], 2, 5], ["A student wants to know when volunteers should arrive and what to bring. Which source is most relevant?", ["Source A", "Source B", "Source C", "All three sources are equally useful"], 1, 5], ["Which community garden source is the most credible for deciding whether the soil is safe for growing vegetables?", ["Source A, because news briefs always replace lab testing", "Source B, because flyers are designed to persuade people", "Source C, because it comes from a county extension office and explains soil testing", "Source B, because it uses the strongest language"], 2, 5], ["Which community garden source is most likely to contain bias because its main purpose is to encourage participation?", ["Source A", "Source B", "Source C", "None of the sources has any purpose"], 1, 5]]}, "Math": [["What is 4.56 + 3.7?", ["7.93", "8.26", "8.13", "7.26"], 1], ["A rectangular prism has length 5 cm, width 3 cm, and height 4 cm. What is its volume?", ["12 cm³", "47 cm³", "60 cm³", "20 cm³"], 2], ["Write the fraction 3/5 as a decimal.", ["0.35", "0.53", "0.60", "0.06"], 2], ["What is 12.4 - 5.87?", ["6.53", "7.53", "6.47", "7.47"], 0], ["What is 2/3 x 3/4?", ["5/7", "6/12", "1/2", "5/12"], 2], ["What is 3.6 x 4?", ["12.4", "14.4", "13.6", "15.4"], 1], ["A bag has 3/4 pound of flour. A recipe needs 1/2 pound. How much flour is left?", ["1/4 lb", "1/2 lb", "3/8 lb", "1 lb"], 0], ["What is 500 x 0.3?", ["15", "150", "1,500", "1.5"], 1], ["What is the prime factorization of 36?", ["2 x 18", "4 x 9", "2² x 3²", "6 x 6"], 2], ["Write 0.75 as a fraction in simplest form.", ["75/100", "7/10", "3/4", "5/7"], 2], ["What is 1/2 / 1/4?", ["1/8", "2", "1/4", "4"], 1], ["A container holds 8.5 liters. You pour out 3.25 liters. How much is left?", ["4.75 L", "5.25 L", "5.75 L", "5.00 L"], 1], ["What is the value of 3 to the 3rd power?", ["9", "6", "27", "33"], 2], ["A square has a side length of 6.5 cm. What is its area?", ["26 cm²", "40.25 cm²", "42.25 cm²", "36 cm²"], 2], ["A number is multiplied by 10 to the 3rd power. How does this affect the decimal point?", ["Moves 3 places to the left", "Moves 3 places to the right", "Adds 3 to the number", "Divides the number by 3"], 1], ["What is 2/5 + 3/10?", ["5/15", "7/10", "5/10", "4/10"], 1], ["A classroom has 30 students. 2/5 are wearing glasses. How many students wear glasses?", ["10", "12", "15", "6"], 1], ["Round 47.386 to the nearest hundredth.", ["47.3", "47.38", "47.39", "47.4"], 2], ["A box is 4 cm x 5 cm x 6 cm. What is its volume?", ["100 cm³", "110 cm³", "120 cm³", "115 cm³"], 2], ["What is 9,000 / 300?", ["3", "30", "300", "0.3"], 1], ["Which expression has the greatest value?", ["4 + 3 x 2", "(4 + 3) x 2", "4 x 3 + 2", "4 x (3 + 2)"], 3], ["What is 5/6 - 1/3?", ["4/3", "1/2", "2/6", "4/6"], 1], ["A recipe needs 2 and 1/4 cups of sugar. How much for double the recipe?", ["4 cups", "4 and 1/4 cups", "4 and 1/2 cups", "3 and 1/2 cups"], 2], ["What is 6.25 x 10?", ["0.625", "6.250", "62.5", "625"], 2], ["The ordered pair (3, 5) is plotted on a coordinate plane. Which quadrant is it in?", ["Quadrant II", "Quadrant III", "Quadrant I", "Quadrant IV"], 2]], "Science": {"passages": [{"title": "Scenario 1 — Shadows Over the Playground", "text": "<p>A class measured the shadow of the school flagpole several times during one clear day. They also recorded how many hours of daylight the town had in different months. Their goal was to look for patterns they could use to make predictions.</p><p>The class also compared two identical camp lanterns. One lantern was 2 meters away. The other was 8 meters away. The closer lantern looked brighter even though both gave off the same kind of light.</p><table><caption><strong>Table 1. Flagpole Shadow Measurements</strong></caption><tr><th>Time</th><th>Shadow length</th><th>Direction shadow pointed</th></tr><tr><td>8:00 a.m.</td><td>18 feet</td><td>west</td></tr><tr><td>10:00 a.m.</td><td>10 feet</td><td>west</td></tr><tr><td>12:00 p.m.</td><td>6 feet</td><td>north</td></tr><tr><td>2:00 p.m.</td><td>9 feet</td><td>east</td></tr><tr><td>4:00 p.m.</td><td>16 feet</td><td>east</td></tr></table><table><caption><strong>Table 2. Average Daylight Hours</strong></caption><tr><th>Month</th><th>Average daylight hours</th></tr><tr><td>December</td><td>9.0 hours</td></tr><tr><td>March</td><td>12.0 hours</td></tr><tr><td>June</td><td>15.5 hours</td></tr><tr><td>September</td><td>12.5 hours</td></tr></table>"}, {"title": "Scenario 2 — Saving the School Hill from Erosion", "text": "<p>After heavy rain, soil washes down a grassy hill near the school playground. A student team built three small models to test which design would reduce erosion the most. Each model tray had the same slope, the same amount of soil, and the same amount of water poured on it during each trial.</p><p><strong>Design A</strong> used bare soil. <strong>Design B</strong> used strips of grass planted across the slope. <strong>Design C</strong> used a low stone barrier with small drain holes.</p><table><caption><strong>Table 3. Soil Washed Out After Three Trials</strong></caption><tr><th>Design</th><th>Trial 1</th><th>Trial 2</th><th>Trial 3</th><th>Average</th></tr><tr><td>A: Bare soil</td><td>220 g</td><td>210 g</td><td>225 g</td><td>218 g</td></tr><tr><td>B: Grass strips</td><td>95 g</td><td>88 g</td><td>92 g</td><td>92 g</td></tr><tr><td>C: Stone barrier with drain holes</td><td>130 g</td><td>124 g</td><td>128 g</td><td>127 g</td></tr></table>"}, {"title": "Scenario 3 — Finch Traits on Windy Island", "text": "<p>Scientists on Windy Island studied one kind of finch. Some finches had deeper beaks and some had shallower beaks. In one dry year, fewer soft seeds grew on the island, but many hard seeds remained. The scientists measured many birds instead of just one bird so they could learn about variation in the whole finch population.</p><table><caption><strong>Table 4. Finch Beak Types Before and After a Dry Year</strong></caption><tr><th>Beak type</th><th>Before dry year</th><th>After dry year</th></tr><tr><td>Shallow beak</td><td>24 finches</td><td>10 finches</td></tr><tr><td>Deep beak</td><td>16 finches</td><td>22 finches</td></tr></table><table><caption><strong>Table 5. Traits Observed in One Finch Chick</strong></caption><tr><th>Trait</th><th>Likely inherited or acquired?</th></tr><tr><td>Deep beak</td><td>Inherited</td></tr><tr><td>Brown feathers</td><td>Inherited</td></tr><tr><td>Mud on feet</td><td>Acquired</td></tr><tr><td>Scraped wing tip from a thorn</td><td>Acquired</td></tr></table>"}, {"title": "Scenario 4 — Wetland Food Web", "text": "<p>A wetland near a school includes cattails, algae, insects, snails, frogs, herons, and decomposers in the mud. During three dry years, the water level dropped and fewer cattails grew. Scientists tracked several populations and considered possible ways to help the wetland recover.</p><table><caption><strong>Food Web Notes</strong></caption><tr><th>Organism</th><th>Role in the wetland</th></tr><tr><td>Cattails and algae</td><td>Producers</td></tr><tr><td>Insects and snails</td><td>Consumers that eat plants or algae</td></tr><tr><td>Frogs</td><td>Consumers that eat insects</td></tr><tr><td>Herons</td><td>Consumers that eat frogs and fish</td></tr><tr><td>Decomposers in mud</td><td>Break down dead matter and return materials to the system</td></tr></table><table><caption><strong>Table 6. Population Data</strong></caption><tr><th>Year</th><th>Cattail patches</th><th>Frogs counted</th><th>Herons counted</th></tr><tr><td>Year 1</td><td>50</td><td>120</td><td>18</td></tr><tr><td>Year 2</td><td>38</td><td>85</td><td>15</td></tr><tr><td>Year 3</td><td>25</td><td>40</td><td>9</td></tr></table><table><caption><strong>Possible Solutions</strong></caption><tr><th>Option</th><th>Description</th></tr><tr><td>A</td><td>Plant native cattails and build shallow pond edges that hold water longer</td></tr><tr><td>B</td><td>Release more herons into the wetland right away</td></tr><tr><td>C</td><td>Pave a wide path across the wet area so people can walk there in all seasons</td></tr></table>"}, {"title": "Scenario 5 — What Happened to the Sugar?", "text": "<p>Students investigated matter using three small activities.</p><p><strong>Cup A:</strong> They stirred one spoon of sugar into warm water until the sugar could no longer be seen, but the water still tasted sweet.</p><p><strong>Cup B:</strong> They left the sugar water in a sunny window until the water disappeared and sugar crystals remained.</p><p><strong>Activity C:</strong> They pushed air into a syringe with the tip sealed and saw the air take up less space until they released the plunger.</p>"}, {"title": "Scenario 6 — Ramp Races", "text": "<p>Students rolled the same marble down ramps of different heights. After leaving the ramp, the marble hit an empty paper cup on a smooth floor. The class measured how far the cup moved after each collision.</p><table><caption><strong>Table 7. Ramp Test Results</strong></caption><tr><th>Ramp height</th><th>Cup movement after collision</th></tr><tr><td>10 cm</td><td>5 cm</td></tr><tr><td>20 cm</td><td>11 cm</td></tr><tr><td>30 cm</td><td>18 cm</td></tr></table>"}, {"title": "Scenario 7 — Where Does the Rabbit's Energy Come From?", "text": "<p>A meadow food-chain model showed this path:</p><p style='text-align:center;font-size:1.1rem;font-weight:700;padding:.5rem;background:#e8f5ef;border-radius:8px'>☀️ Sun → 🌿 Clover → 🐰 Rabbit → 🦊 Fox</p><p>Students discussed how the rabbit uses food energy for body warmth, growth, movement, and repair. They also asked what would happen if thick clouds blocked much of the sunlight for many days.</p>"}], "questions": [["At what time was the flagpole's shadow shortest?", ["8:00 a.m.", "10:00 a.m.", "12:00 p.m.", "4:00 p.m."], 2, 0], ["Which shadow pattern is best supported by the data?", ["The shadow always pointed north.", "The shadow pointed west in the morning and east in the afternoon.", "The shadow stayed the same length all day.", "The shadow became shorter every hour with no change later."], 1, 0], ["If students measured the flagpole shadow at 3:00 p.m., which result would be most reasonable?", ["A shadow pointing east that is longer than 9 feet but shorter than 16 feet", "A shadow pointing west that is shorter than 6 feet", "No shadow at all", "A shadow pointing north that is exactly 2 feet long"], 0, 0], ["During which month does the town have the most daylight?", ["December", "March", "June", "September"], 2, 0], ["Which statement best explains the daily shadow pattern?", ["The Sun moves under Earth each afternoon.", "Earth's rotation makes the Sun appear to move across the sky during the day.", "The flagpole changes height every few hours.", "Clouds pull the shadow across the ground."], 1, 0], ["What evidence best supports the claim that the Sun looks brighter than other stars because it is closer to Earth?", ["A closer lantern looked brighter than the same lantern placed farther away.", "The flagpole was taller than the students.", "June has more daylight than December.", "The shadow at noon was the shortest one."], 0, 0], ["Which erosion design reduced erosion the most?", ["Design A (bare soil), because it had the largest average", "Design B (grass strips), because it had the smallest average amount of soil washed out", "Design C (stone barrier), because stones are always better than plants", "All three designs reduced erosion equally"], 1, 1], ["What variable did the students change on purpose in the erosion investigation?", ["The design used on the slope", "The amount of water poured in each trial", "The steepness of the trays", "The amount of soil in each tray"], 0, 1], ["Why was it important to keep the slope of each tray the same in the erosion investigation?", ["So the students could make the test fair and compare only the designs", "So Design A would have a better chance to win", "So the water would not move at all", "So the students would not need to record data"], 0, 1], ["Which claim is best supported by the erosion data?", ["Plants can help slow erosion on a slope.", "Bare soil is always the safest design.", "Stone barriers stop every drop of water.", "The amount of water poured did not matter."], 0, 1], ["Which possible failure point should students think about for Design C (stone barrier with drain holes)?", ["Whether the drain holes could clog with mud and stop water from flowing through", "Whether grass is green", "Whether stones are heavier than feathers", "Whether the school bell rings during science class"], 0, 1], ["What is the best next step if students want stronger evidence for their erosion results?", ["Repeat the investigation again using the same controlled conditions", "Change all the variables at once", "Stop collecting data because three trials are enough forever", "Use only Design A from now on"], 0, 1], ["Which trait in the finch table is an acquired trait, not an inherited one?", ["deep beak", "brown feathers", "mud on feet", "beak shape"], 2, 2], ["Why did the scientists measure many finches instead of just one finch?", ["To learn about variation in the population", "Because one finch can never be measured", "To make the island windier", "Because all finches are exactly the same"], 0, 2], ["According to the finch data, which beak type became more common after the dry year?", ["shallow beak", "deep beak", "both stayed equal", "the table does not show beak types"], 1, 2], ["What is the best explanation for the change in finch beak types after the dry year?", ["Finches with deeper beaks were better able to crack hard seeds during the dry year.", "All shallow-beak finches forgot how to eat.", "Deep beaks change into shallow beaks every winter.", "Rainfall has no effect on food for finches."], 0, 2], ["Which evidence best shows variation within the finch species?", ["Some finches had deeper beaks and some had shallower beaks.", "All finches were birds.", "The island had wind.", "Scientists used a table."], 0, 2], ["Which question could be answered with the evidence in the finch traits table?", ["Which traits were likely inherited from the parents?", "How many eggs did the chick's mother lay?", "What was the island temperature every hour?", "How far can the chick fly in one day?"], 0, 2], ["Which new source would be most helpful for learning whether parent finches pass beak shape to their offspring?", ["A record comparing parent beak shapes with chick beak shapes", "A map of island hiking trails", "A drawing of clouds over the ocean", "A list of ferry departure times"], 0, 2], ["Which organism in the wetland food web is a producer?", ["frog", "heron", "cattail", "decomposer"], 2, 3], ["What do decomposers do in the wetland system?", ["They return materials from dead matter back to the wetland.", "They make sunlight brighter.", "They stop frogs from moving.", "They turn herons into producers."], 0, 3], ["If the frog population continues to decrease, what is the most likely effect on herons?", ["Herons may also decrease because one of their food sources is reduced.", "Herons will become producers.", "Herons will no longer need any food.", "Herons will make more cattails grow directly."], 0, 3], ["Which evidence best suggests that an environmental change affected several wetland populations?", ["Cattail patches, frog counts, and heron counts all decreased from Year 1 to Year 3.", "The wetland includes more than one organism.", "Scientists used tables to record data.", "A school is located nearby."], 0, 3], ["Which option is the best solution based on the wetland evidence?", ["Option A, because it helps restore water and plant habitat that support the rest of the system", "Option B, because adding more predators will always help prey increase", "Option C, because paving more ground will hold more wetland water", "Option B, because herons are the largest animals listed"], 0, 3], ["Why is Option B (releasing more herons) a weak solution for the wetland?", ["It adds more predators without first restoring the habitat and food needed by the wetland system.", "Herons do not live near wetlands.", "Predators never eat frogs.", "Large birds make producers grow faster."], 0, 3], ["Which statement best describes movement of matter in the wetland?", ["Matter moves among plants, animals, decomposers, and the environment.", "Matter disappears after an animal eats.", "Only frogs contain matter.", "Matter moves from herons straight into sunlight."], 0, 3], ["Why is the wetland considered a system?", ["It has related living and nonliving parts that affect one another.", "It contains only one kind of organism.", "It never changes over time.", "It does not depend on water."], 0, 3], ["Which observation best supports the idea that matter is made of particles too small to see?", ["The sugar seemed to disappear, but the water still tasted sweet.", "The sunny window was bright.", "The cup was made of glass.", "The plunger was plastic."], 0, 4], ["Which model would best explain why sugar disappears in water but the water still tastes sweet?", ["A drawing showing sugar particles spread out between water particles", "A drawing showing the sugar turned into light", "A drawing showing the sugar escaped from the cup as sound", "A drawing showing no particles in the water at all"], 0, 4], ["What happened to the sugar after the water evaporated in Cup B?", ["It turned into air forever.", "It was still there and formed crystals again.", "It changed into sunlight.", "It left the cup completely."], 1, 4], ["Which observation shows that air takes up space?", ["The plunger could compress the air into a smaller space when the tip was sealed.", "The syringe was clear.", "The students used their hands.", "The activity happened indoors."], 0, 4], ["What is one limitation of a simple particle drawing model?", ["It may not show the true number, size, or constant motion of all particles.", "It can never use arrows or labels.", "It always proves the particles are visible to the eye.", "It turns matter into energy."], 0, 4], ["Which question is best investigated using the ramp height and cup movement data?", ["How does ramp height relate to the amount of movement after a collision?", "Which color cup do students like best?", "How many marbles exist in the whole world?", "What is the weather next month?"], 0, 5], ["Which ramp likely gave the marble the most energy before the collision?", ["10 cm", "20 cm", "30 cm", "All ramps gave exactly the same energy"], 2, 5], ["Which statement is best supported by the ramp data?", ["As ramp height increased, the cup moved farther after the collision.", "Ramp height had no effect on cup movement.", "The marble got slower on taller ramps.", "The cup moved the farthest with the shortest ramp."], 0, 5], ["Where did the energy in the rabbit's food originally come from?", ["from the Sun", "from the rabbit's fur", "from the paper model only", "from the fox"], 0, 6], ["If many cloudy days reduced sunlight reaching the clover, what would most likely happen first?", ["The clover would have less energy available for growth.", "The fox would instantly become a producer.", "The rabbit would no longer need food.", "Sunlight would move from the rabbit back into the Sun."], 0, 6], ["Which model best shows how energy reaches the fox?", ["fox - rabbit - clover - Sun", "Sun - clover - rabbit - fox", "rabbit - Sun - fox - clover", "Sun - fox only"], 1, 6], ["Why can it be said that the fox's energy also began with the Sun?", ["Because the fox stores sunlight in its tail", "Because the rabbit got energy from clover, and the clover got energy from the Sun", "Because foxes create sunlight when they run", "Because only predators use energy"], 1, 6]]}, "Math Practice 1": [["Find the quotient: 684 ÷ 12", ["47", "57", "62", "72"], 1], ["What is 0.001 less than 7.40?", ["7.399", "7.409", "7.39", "6.499"], 0], ["A number line shows a jump of 3/4 then 1/8, ending at 7/8. Which equation does it model?", ["3/4 − 1/8 = 7/8", "3/4 + 1/8 = 7/8", "7/8 − 1/8 = 3/4", "7/8 + 1/8 = 1"], 1], ["Rule machine: Input 1,3,5 → Output 4,8,12. Output when x = 7?", ["14", "15", "16", "18"], 2], ["A rectangular prism is 6 cm × 3 cm × 4 cm. What is its volume?", ["13 cubic cm", "24 cubic cm", "72 cubic cm", "144 cubic cm"], 2], ["Find the mean of: 14, 16, 18, 12, 20", ["15", "16", "17", "18"], 1], ["Book fair sold 248 Mon, 317 Tue, 286 Wed. Each box holds 25. Least boxes needed?", ["34", "35", "36", "40"], 1], ["Round 18.467 to the nearest hundredth.", ["18.4", "18.46", "18.47", "18.5"], 2], ["If n = 8, which statement is true?", ["n + 5 < 12", "2n = 15", "3 + n > 12", "n − 3 = 5"], 3], ["Which figure has 6 faces, 8 vertices, and rectangle faces of different sizes?", ["cube", "rectangular prism", "triangular prism", "square pyramid"], 1], ["Double-bar graph shows fruit sold by two classes. Which fruit had the greatest combined total?", ["Apples", "Bananas", "Oranges", "Pears"], 2], ["What is 936 ÷ 12?", ["76", "78", "80", "82"], 1], ["Which decimal is equivalent to 7/20?", ["0.07", "0.20", "0.35", "0.70"], 2], ["Evaluate: 6 × (8 + 4) ÷ 3", ["20", "24", "28", "36"], 1], ["A triangle has base 10 units and height 6 units. What is its area?", ["16 sq units", "30 sq units", "60 sq units", "80 sq units"], 1], ["Line graph shows afternoon temps Mon–Fri. Greatest increase between which two days?", ["Monday to Tuesday", "Tuesday to Wednesday", "Wednesday to Thursday", "Thursday to Friday"], 2], ["Find the difference: 4 3/8 − 1 5/8", ["2 2/8", "2 3/4", "3 1/4", "3 6/8"], 1], ["Input 2,4,6 → Output 9,15,21. Which rule matches?", ["y = x + 7", "y = 3x + 3", "y = 4x + 1", "y = x + 3"], 1], ["A 125-meter ribbon is cut into 8-meter pieces. How many whole pieces can be cut?", ["15", "15 remainder 5", "15 5/8", "15.625"], 0], ["Find the median and range of: 3, 5, 9, 10, 12, 14, 18", ["median 9, range 15", "median 10, range 15", "median 10, range 18", "median 12, range 14"], 1], ["Evaluate 4a + 7 when a = 6.", ["24", "27", "31", "37"], 2], ["Which solid can be made from a net of 6 equal squares?", ["triangular prism", "cube", "rectangular prism", "square pyramid"], 1], ["Grid shows (1,3),(2,5),(3,7). Which ordered pair continues the pattern?", ["(4, 8)", "(4, 9)", "(5, 9)", "(5, 11)"], 1], ["Ellen has $12.50, buys a notebook ($3.75) and markers ($2.89). How much is left?", ["$5.84", "$5.86", "$6.14", "$6.36"], 1], ["Order from least to greatest: 0.58, 3/5, 0.62, 5/8", ["0.58, 0.62, 3/5, 5/8", "0.58, 3/5, 0.62, 5/8", "3/5, 0.58, 5/8, 0.62", "5/8, 0.62, 3/5, 0.58"], 1], ["Figure is a rectangle (8×4) plus a triangle (base 8, height 3). Total area?", ["36 sq units", "40 sq units", "44 sq units", "56 sq units"], 2], ["Jada has x stickers, buys 18 more, now has more than 50. Which inequality?", ["x + 18 > 50", "x − 18 > 50", "18x > 50", "x + 50 > 18"], 0], ["A rectangular prism has dimensions 4 cm × 3 cm × 2 cm. What is its surface area?", ["24 sq cm", "26 sq cm", "52 sq cm", "72 sq cm"], 2], ["Best whole-number estimate of 3 7/8 + 2 1/6?", ["5", "6", "7", "8"], 1], ["Which expression is equivalent to 7 × 18 + 7 × 2?", ["7 × 20", "7 + 18 + 2", "18 × 2 × 7", "7 × 16"], 0], ["Line graph shows plant height each week. During which time did the plant NOT grow?", ["Week 1 to Week 2", "Week 2 to Week 3", "Week 3 to Week 4", "Week 4 to Week 5"], 1], ["Five jars have 6, 10, 8, 12, 14 marbles. If shared equally, how many in each jar?", ["8", "9", "10", "12"], 2], ["The rule is y = 3x. Which ordered pair belongs to the graph?", ["(2, 5)", "(3, 6)", "(4, 12)", "(5, 20)"], 2], ["A rectangular prism has base area 12 sq cm and height 5 cm. What is its volume?", ["17 cubic cm", "60 cubic cm", "120 cubic cm", "300 cubic cm"], 1], ["What is the quotient of 425 ÷ 20?", ["21 remainder 5", "21.25", "22.5", "25.21"], 1], ["Museum sold t tickets Tuesday, 38 more Wednesday, 154 total. Which equation?", ["t + 38 = 154", "2t + 38 = 154", "t + (38 − t) = 154", "t − 38 = 154"], 1], ["What is 2 3/4 + 1 1/6?", ["3 7/12", "3 9/12", "3 11/12", "4 1/12"], 2], ["Which decimal is equivalent to 1 3/5?", ["1.3", "1.35", "1.6", "1.8"], 2], ["A solid has 1 pentagonal base and 5 triangular faces. What is the solid?", ["pentagonal prism", "pentagonal pyramid", "triangular prism", "cube"], 1], ["Students read 8,9,9,10,10,11,40 books. Which measure best describes a typical number?", ["mean, because it uses every number", "median, because 40 is an outlier", "range, because it shows spread", "maximum, because it shows the greatest"], 1], ["Which number is greatest: 1.68, 17/10, 1 3/4, 9/5?", ["1.68", "17/10", "1 3/4", "9/5"], 3], ["What value of x makes x + 19 = 54 true?", ["25", "35", "63", "73"], 1], ["A parallelogram has base 11 units and height 7 units. What is its area?", ["18 sq units", "38.5 sq units", "77 sq units", "154 sq units"], 2], ["A pattern starts with 5 tiles and increases by 4 each time. How many tiles in Figure 4?", ["15", "16", "17", "18"], 2], ["18 buses each holding 46 students; 597 have boarded. How many seats are empty?", ["221", "231", "241", "251"], 1], ["A recipe needs 2 1/2 cups flour. Elena has 1 3/4 cups. How much more does she need?", ["1/4 cup", "1/2 cup", "3/4 cup", "1 1/4 cups"], 2], ["Student estimates 3,968 ÷ 51 using 4,000 ÷ 50. Which estimate is closest?", ["40", "50", "80", "100"], 2], ["A bottle has 2.5 L. Sam drinks 3/4 L in the morning and 1 1/2 L at lunch. How much is left?", ["1/4 liter", "1/2 liter", "3/4 liter", "1 liter"], 0], ["What is 0.01 more than 6.309?", ["6.31", "6.319", "6.409", "7.309"], 1], ["A ribbon is 4 1/2 ft. Maya uses 1 3/4 ft and 1 1/2 ft. How much remains?", ["1/4 foot", "3/4 foot", "1 1/4 feet", "1 3/4 feet"], 2]]}}, "Grade 6": {"color": "#2E4057", "subjects": {"Reading": {"passages": [{"title": "Passage 1 — The Test Run", "text": "<p>When the robotics club rolled its machine onto the gym floor for the regional demonstration, everything looked ready. The code had been tested. The wheels had been tightened. The lifting arm had raised plastic blocks perfectly in practice. Yet as soon as the timer began, the robot spun in a quick circle and bumped the edge of the court. A few students in the bleachers laughed. Omar felt his face grow hot.</p><p>Back in the classroom, frustration settled over the team like a heavy coat. Priya wanted to rewrite the turning code. Ben thought the wheels had been mounted unevenly. Omar blamed himself for not noticing the problem sooner. Their adviser, Ms. Lin, did not rush to solve the puzzle for them. Instead, she asked each student to write down one observation and one question. At first the room stayed quiet. Then chairs scraped, pencils moved, and the team began comparing notes.</p><p>They soon noticed a pattern. The robot turned correctly when it carried no blocks, but drifted off course when the arm held weight on one side. That clue led the team to test the balance of the machine instead of the code alone. They shifted the battery pack, adjusted a wheel bracket, and ran the robot again. This time it crossed the taped line in a straight path.</p><p>The club did not win the demonstration that day, but the students left with something more useful than a ribbon. They had learned that failure can act like a flashlight. It does not feel comfortable when it shines on a mistake, yet it helps people see where to look next. Weeks later, when the club prepared for a second event, Omar kept Ms. Lin's question sheet folded in his notebook. The paper reminded him that good problem solving begins with careful noticing.</p>"}, {"title": "Passage 2 — Why Some City Streets Feel Hotter", "text": "<p>On a summer afternoon, two sidewalks in the same city can feel surprisingly different. One may lie beside a row of leafy trees and a patch of grass. The other may sit between a wide street and a dark parking lot. Even if both sidewalks receive the same sunlight, the second one often feels hotter. Scientists use the term <em>urban heat island</em> to describe this pattern. Built areas with many roofs, roads, and paved surfaces tend to hold more heat than nearby places with trees, soil, and water.</p><p>Materials help explain the difference. Dark pavement and rooftops absorb sunlight and store energy during the day. Later, they release that heat back into the air. Trees affect temperature in two ways. Their leaves provide shade, and they also release water vapor through a process called transpiration. That water vapor can help cool the surrounding air.</p><p>Heat islands matter because they can affect daily life. Higher temperatures can make outdoor work and exercise more tiring. Buildings may need more energy for air-conditioning. Extreme heat can also be dangerous for older adults, young children, and people who do not have easy access to cool spaces.</p><p>Communities use several strategies to reduce urban heat. Planting tree canopies is one. Creating green roofs, protecting parks, and using lighter-colored materials on some surfaces are others. None of these steps can erase summer heat entirely, but together they can make neighborhoods safer and more comfortable. In that sense, shade is not just pleasant. It is part of a city's infrastructure.</p>"}, {"title": "Passage 3 — Listen to the Object First", "text": "<p>My grandmother repairs things slowly, which is strange only if you believe speed is the same as skill. She studies a loose chair rung the way some people study a puzzle. She turns the chair upside down, presses the wood with both thumbs, and waits as if the answer might rise from the grain itself.</p><p>When I was younger, I thought her method took forever. If a drawer stuck, I wanted to tug harder. If a lamp would not switch on, I wanted to shake the cord and hope for the best. My grandmother would stop me every time. \"Listen to the object first,\" she would say. At the time, I found this irritating. Objects do not speak. They simply sit there, broken.</p><p>One rainy Saturday, my backpack zipper split open the night before a field trip. I was ready to declare the bag ruined. My grandmother asked me to set it on the table. She looked at the zipper teeth, slid the pull gently backward, and found a loose thread caught in the metal. After trimming the thread and rubbing a little soap on the zipper track, she worked the pull up and down until it moved cleanly again.</p><p>I still like quick solutions, especially when a deadline is close. But I understand now that my grandmother's patience is not slowness for its own sake. It is a kind of respect. She begins by paying attention. Often that first quiet minute saves many noisy mistakes later.</p>"}, {"title": "Passage 4 — Why Library Hours Matter", "text": "<p>Some students finish school, head home, and discover that the quietest place to study is the library. Others go there because they need internet access, help with homework, or a safe place to wait before a family member finishes work. For these students, the library is more than a room full of shelves. It is a bridge between the school day and everything that comes after it.</p><p>That is why public libraries should consider staying open later on school nights when budgets allow. Extended hours would not benefit every student in exactly the same way, but they would provide added flexibility for many families. A student who shares a crowded apartment, for example, might need a calm place to finish a project. Another student might need a computer to type an essay or apply for a summer program.</p><p>Of course, longer hours require staffing, utilities, and planning. Libraries already balance many needs, and each branch must make decisions based on community resources. Still, when leaders study how spaces are used, they should count the value of time as well as the value of materials. A library that closes early may technically own useful books and computers, yet those resources help fewer people if students cannot reach them when needed.</p><p>Later hours are not the only answer to educational inequity, but they are one practical step. When communities invest in access, they send a clear message: learning does not end when the final bell rings.</p>"}, {"title": "Passage 5 — Two Views of a River Cleanup (Paired Texts)", "text": "<strong class='source-label'>Text 1: News Brief</strong><p>Volunteers and city crews removed more than two tons of trash from the Pine River last Saturday. According to the Department of Water Resources, the cleanup focused on three miles of shoreline near public boat launches. Workers also installed new signs reminding visitors not to leave fishing line and food containers behind.</p><hr class='divider'/><strong class='source-label'>Text 2: Interview Excerpt</strong><p>\"I grew up fishing on this river,\" said local resident Elena Ruiz. \"When I was little, the water seemed endless and clean. Later, I started noticing bottles tucked in the reeds and old cans near the bank. The cleanup mattered, but the signs matter too. If people only remove trash once and keep dropping new trash every weekend, the river will not stay healthy for long.\"</p>"}, {"title": "Passage 6 — Choosing a Reliable Source (Media Literacy)", "text": "<strong class='source-label'>Source A: Museum Webpage</strong><p>The North County History Museum will open its new exhibit, <em>Makers of Main Street</em>, on May 18. Visitors can explore photographs, shop ledgers, and tools used by carpenters, printers, and dressmakers who worked in the town between 1890 and 1930. The exhibit was created with help from local historians and archived materials from the city library.</p><hr class='divider'/><strong class='source-label'>Source B: Sponsored Social Post</strong><p>Don't miss the most unbelievable exhibit ever created! <em>Makers of Main Street</em> will blow your mind and change the way you see history forever. Everyone in town is talking about it already. Buy souvenir items while they last, and bring your friends for the only experience that really matters this spring.</p><p><em>A student named Nora wants to write a short report about the exhibit for class. She needs the opening date, the kinds of materials on display, and a trustworthy explanation of who helped create the exhibit.</em></p>"}], "questions": [["What is the central idea of the robotics club (Test Run) passage?", ["A setback helps the robotics team learn a stronger problem-solving process.", "Competitive events are unfair to beginners.", "The robotics club loses because the students stop listening.", "Machines usually fail because of bad code only."], 0, 0], ["Which detail best shows that the robotics team started to think more carefully about the problem?", ["Omar felt his face grow hot.", "They each wrote down one observation and one question.", "Students in the bleachers laughed.", "The lifting arm had worked during practice."], 1, 0], ["In the Test Run passage, the word 'settled' most nearly means", ["disappeared", "moved quickly", "came to rest", "argued loudly"], 2, 0], ["How does the Test Run author develop the idea that failure can be useful?", ["by showing how the team's mistake revealed the real problem", "by listing awards the team won in the past", "by explaining how to buy robotics parts", "by comparing two different schools"], 0, 0], ["Why does the Test Run author include Ms. Lin's response instead of having her fix the robot immediately?", ["to show that she values teaching students how to think through a problem", "to show that the students wanted to quit", "to suggest that she does not understand robotics", "to prove that adults should stay out of competitions"], 0, 0], ["What perspective does Omar most likely have by the end of the Test Run passage?", ["Robots are too unpredictable to improve.", "Only advisers can solve technical problems.", "Competitions should be canceled.", "Mistakes can lead to better thinking if people study them carefully."], 3, 0], ["Which sentence best supports the claim that the robotics problem was not caused only by coding?", ["The code had been tested.", "The robot turned correctly when it carried no blocks, but drifted off course when the arm held weight on one side.", "A few students in the bleachers laughed.", "Omar felt his face grow hot."], 1, 0], ["What is the main idea of the article about why city streets feel hotter?", ["Only scientists can tell whether a place is hot.", "Parking lots are more useful than tree canopies.", "Urban heat islands happen when built surfaces hold heat, and communities can reduce the effect in several ways.", "All sidewalks in a city have the same temperature."], 2, 1], ["Which detail best explains why one sidewalk may feel hotter than another?", ["Young children often need cool spaces.", "Dark pavement and rooftops absorb sunlight and later release that heat.", "Scientists prefer grassy areas.", "Communities like to protect parks."], 1, 1], ["In the city streets article, the word 'infrastructure' most nearly means", ["systems and features that support a community", "a short weather report", "a kind of tree leaf", "an emergency hospital room"], 0, 1], ["How does paragraph 2 of the city streets article contribute to the article?", ["It argues that all cities should ban pavement.", "It tells a story about one hot afternoon only.", "It lists the names of famous scientists.", "It explains the science behind why built areas and tree-filled areas feel different."], 3, 1], ["Why does the city streets author discuss older adults, young children, and people without cool spaces?", ["to suggest that shade helps only certain people", "to prove that cities should close in the summer", "to compare schools with hospitals", "to show that extreme heat can affect some groups more seriously"], 3, 1], ["What is the author's purpose in writing the city streets article?", ["to argue that all weather is harmful", "to entertain readers with a fictional story", "to explain a city problem and present practical responses", "to sell a new kind of roof"], 2, 1], ["Which source would be most relevant for checking whether a neighborhood has fewer trees and higher temperatures?", ["an advertisement for sunglasses", "a menu from a downtown restaurant", "a city map that compares tree cover an found a loose thread caught in the metal.", "I thought her method took forever.", "It was raining on Saturday."], 1, 2], ["What is the author's main claim in the library hours argument?", ["Students should study only at home.", "Public libraries should consider staying open later on school nights when possible.", "Libraries should remove books and focus only on computers.", "School should end later each afternoon."], 1, 3], ["Which reason does the library hours author give for later library hours?", ["Libraries should compete with movie theaters.", "Books are easier to shelve at night.", "Some students need quiet places, internet access, or homework help after school.", "Every student dislikes studying at home."], 2, 3], ["In the library hours argument, the word 'technically' most nearly means", ["by using machines only", "with great excitement", "in a narrow or exact sense", "for a short time"], 2, 3], ["How does paragraph 3 of the library hours argument strengthen the argument?", ["It argues that books are outdated.", "It shows that budgets never matter.", "It changes the topic away from libraries.", "It acknowledges challenges and then explains why access still matters."], 3, 3], ["What is the author's perspective on access to learning resources in the library hours argument?", ["Communities should ignore how spaces are used.", "Access depends not only on what a community owns but also on when students can use it.", "Learning resources should be limited to school hours.", "Access matters only for students with strong grades."], 1, 3], ["What is the library hours author's purpose?", ["to entertain readers with jokes", "to tell a fictional story about a library card", "to persuade readers that later library hours could support students", "to explain how to build a library shelf"], 2, 3], ["Which source would be most credible for evaluating the library hours argument?", ["library attendance data showing how many students visit after school", "one anonymous online co "n ≤ 12", "n ≥ 12", "n > 12", "n < 12"], 1], ["Solve: 4x − 7 = 29", ["6", "7", "9", "11"], 2], ["Which expression is equivalent to 6m + 2m − 5?", ["6m − 3", "8m − 5", "12m − 5", "8m + 5"], 1], ["If y = 3x − 2, what is y when x = 6?", ["20", "12", "18", "16"], 3], ["Which situation is represented by 8n + 5?", ["n notebooks in 8 groups plus 5 extras", "8 more than 5 notebooks", "5 groups of 8 notebooks", "8 notebooks at n dollars plus a $5 fee"], 3], ["Car rental: $45 plus $0.20 per mile. Which equation gives total cost c for m miles?", ["c = 45 + 0.20m", "c = (45 + 0.20)m", "c = 45m + 0.20", "c = 45 − 0.20m"], 0], ["Point P is (4, −2). What is the value of x + y?", ["2", "−2", "−6", "6"], 0], ["Ordered pairs (1,4),(2,7),(3,10),(4,13). Why do they form a function?", ["outputs are all the same", "each input has exactly one output", "outputs should not change", "there are four points"], 1], ["Area of a triangle with base 12 cm and height 5 cm?", ["17", "24", "30", "60"], 2], ["Area of a parallelogram with base 9 m and height 4 m?", ["18", "45", "36", "26"], 2], ["Volume of a rectangular prism 8 cm × 3 cm × 5 cm?", ["96", "120", "16", "40"], 1], ["Surface area of a cube with side length 4 cm?", ["64", "24", "48", "96"], 3], ["A triangle has angles 48° and 67°. What is the third angle?", ["75", "115", "55", "65"], 3], ["Sum of interior angles of a quadrilateral?", ["540", "360", "270", "180"], 1], ["How many inches are in 3.5 feet?", ["42", "36", "40", "48"], 0], ["A figure is enlarged so every side doubles. Which statement is true?", ["The new figure is similar to the original.", "The new figure has the same area.", "The new figure is congruent to the original.", "The new figure has fewer sides."], 0], ["A garden path is 2 m wide and 15 m long. What is its perimeter?", ["30", "17", "34", "26"], 2], ["Most reasonable unit for the volume of a classroom?", ["meters", "degrees", "square centimeters", "cubic meters"], 3], ["A box is 10 in × 6 in × 4 in. What is its volume in cubic inches?", ["160", "200", "240", "280"], 2], ["P(blue) from a bag with 3 red, 5 blue, 2 green marbles?", ["5/3", "2/10", "3/10", "5/10"], 3], ["Probability of landing on A or C on a 4-equal-section spinner?", ["1/2", "2/3", "1/8", "1/4"], 0], ["A number cube lands on 6 nine times in 60 rolls. Experimental probability?", ["9/60", "1/6", "51/60", "6/60"], 0], ["Which event is impossible when rolling a standard number cube?", ["rolling less than 7", "rolling a 1", "rolling a 9", "rolling an even number"], 2], ["8 girls and 12 boys in a group. P(choosing a girl)?", ["1/2", "8/12", "2/5", "3/5"], 2], ["Which compares theoretical and experimental probability correctly?", ["Theoretical is based on actual trials.", "Experimental can never change.", "Experimental is based on actual trials.", "Theoretical depends on luck only."], 2], ["A coin flipped 50 times lands heads 28 times. Experimental probability of heads?", ["0.44", "0.56", "0.72", "0.5"], 1]]}}, "Grade 7": {"color": "#14532D", "subjects": {"Reading": {"passages": [{"title": "Passage 1 — In the Archive Basement", "text": "<p>The basement of the town museum smelled faintly of paper, dust, and metal shelves. When Talia first volunteered there, she expected polished displays and quiet tours. Instead, the curator handed her a box of uncatalogued postcards tied with string. Some had dates but no names. Others had names but no addresses. A few showed buildings that no longer existed.</p><p>At first the work felt less like history and more like sorting. Talia copied dates into a spreadsheet and slid postcards into protective sleeves. Then she found one card showing the old train depot after a flood. On the back, a note described neighbors carrying sacks of flour upstairs before the water rose. The card turned a fact from a textbook into an urgent human moment. Talia began wondering how many other stories were waiting inside ordinary-looking objects.</p><p>As the weeks passed, she learned that archives are not simply storage rooms. They are collections shaped by decisions: what gets saved, who gets named, which stories are explained, and which are left for later generations to piece together. Talia started noticing gaps as much as discoveries. One box held detailed records about business owners downtown, while another contained only fragments about the families who rented rooms above the shops.</p><p>By the end of the summer, Talia no longer thought of history as a finished story. It seemed more like a conversation between evidence and questions. Every label in a display case had begun as someone's effort to look closely, compare sources, and admit what remained uncertain. The museum had taught her facts, but it had also taught her how fragile facts can be when no one bothers to preserve them.</p>"}, {"title": "Passage 2 — What Migrating Cranes Need", "text": "<p>Each autumn, thousands of sandhill cranes cross parts of the Midwest during migration. Their calls can carry across fields before the birds come into view, and once they appear, the sky seems to move in loose gray patterns. These cranes do not migrate in a neat straight line. Instead, their journeys depend on weather, available wetlands, and places where they can rest and feed safely.</p><p>Wetlands matter because migrating birds need more than airspace. They need habitat on the ground. Shallow water offers protection from some predators, while nearby fields and marshes provide food. When wetlands are drained or heavily disturbed, birds may lose important stopping points. A migration route can survive only if the chain of resting places along the way also survives.</p><p>Scientists track crane migration in several ways. They observe flocks, record arrival dates, and, in some cases, use transmitters to follow movement. These data help researchers notice patterns over time. If cranes begin arriving earlier in spring or using different routes, scientists can compare those changes with weather conditions, water levels, or land use.</p><p>Migration often appears graceful from a distance, but it is also a demanding calculation. Birds must conserve energy, respond to shifting conditions, and locate habitat across a vast landscape. Protecting one marsh will not solve every problem cranes face. Still, each healthy stopover site strengthens the larger network that makes the long journey possible.</p>"}, {"title": "Passage 3 — What a Bike Lane Debate Is Really About", "text": "<p>A city council is debating whether to add protected bike lanes along two busy streets. Supporters argue that lanes separated from traffic would help more people choose biking for short trips. They point to studies from other cities showing that when routes feel safer, ridership often rises. Opponents worry about losing parking spaces and about construction costs in a budget year that already feels tight.</p><p>The discussion is really about more than paint and concrete. It is about how a city decides what kinds of movement it wants to make easier. Streets are limited spaces, and every design choice signals a priority. A wide turn lane suggests one set of values. A protected bike lane suggests another: that travel can be measured not only by speed for drivers, but also by safety and access for people using different forms of transportation.</p><p>Good planning requires evidence, not slogans. If leaders want to make a wise decision, they should examine traffic counts, crash data, parking use, and the destinations along the proposed routes. A lane that connects homes to schools, parks, and stores may serve a larger public purpose than one that exists only as a symbolic gesture. Likewise, supporters should not ignore trade-offs. Space given to one use cannot simultaneously serve another.</p><p>Still, the strongest arguments against bike lanes often focus on what would change immediately, while the strongest arguments for them focus on habits that could change over time. That difference matters. People rarely choose new ways of moving through a city until the design makes those choices feel realistic. In that sense, infrastructure does not merely respond to behavior. It helps shape it.</p>"}, {"title": "Passage 4 — Reading a Historical Journal Critically (Paired Texts)", "text": "<strong class='source-label'>Text 1: Journal Entry from 1872</strong><p>We reached the ridge by late afternoon and could see the river shining below us. The guide urged speed because clouds had gathered behind the hills, but several members of the party paused to sketch the view. By nightfall the rain struck so hard that the path dissolved into mud. Two crates of supplies slid from the wagon, and we spent the next hour hauling them back before darkness closed in.</p><hr class='divider'/><strong class='source-label'>Text 2: Historian's Commentary</strong><p>Journal entries from land surveys often mix observation with self-justification. They can offer vivid details about travel conditions, weather, and terrain, but they also reflect the writer's perspective and purpose. A surveyor or expedition member may emphasize hardship to highlight endurance, competence, or the importance of the mission. Historians therefore compare journals with maps, supply lists, official reports, and other records before drawing conclusions.</p>"}, {"title": "Passage 5 — What Recommendation Systems Really Do", "text": "<p>A recommendation system is a digital tool that suggests what a person might watch, read, or buy next. Streaming platforms use recommendation systems to guess which movie a viewer may want after finishing a series. Online stores use them to suggest products based on previous searches or purchases. These systems are designed to be useful, but they also shape attention.</p><p>That influence can be subtle. When a platform offers ten recommendations, it does not simply reveal a neutral list waiting in the world. It selects from a much larger pool and places certain options in front of the user first. A person remains free to choose, but the order and visibility of choices affect what is most likely to be noticed.</p><p>Recommendation systems can save time and help people discover music, books, or creators they might never have found on their own. At the same time, systems trained on past behavior can narrow a user's experience. If a viewer clicks on one kind of video repeatedly, the platform may keep presenting similar content, even if the viewer's interests are broader than the record suggests.</p><p>For that reason, digital literacy involves more than learning how to search. It also involves asking why certain results appear first, what data may have influenced them, and which possibilities remain hidden. In other words, users should not mistake personalization for completeness.</p>"}, {"title": "Passage 6 — Selecting a Reliable School Source (Media Literacy)", "text": "<strong class='source-label'>Source A: School District Announcement</strong><p>Beginning in September, all middle school students will have access to a new online tutoring platform in math, reading, and science. The service will be available from 4 p.m. to 8 p.m. on weekdays. According to the district, students can log in with their school accounts, and family information sessions will be offered in August.</p><hr class='divider'/><strong class='source-label'>Source B: Promotional Email from StudySprint</strong><p>Get the fastest score gains anywhere with StudySprint! Students who join now can unlock elite academic performance in just weeks. Don't settle for average support when your family deserves the very best. Sign up before Friday for premium benefits.</p><p><em>A student journalist wants to write a short article explaining when tutoring is available, how students can access it, and whether the district has announced family support.</em></p>"}], "questions": [["What is the central idea of the archive basement passage?", ["Working in the archive teaches Talia that history depends on preserved evidence and unanswered questions.", "Old postcards are more important than all other sources.", "Museums are mostly places for tourists to rest.", "Spreadsheets make history simple and complete."], 0, 0], ["Which detail best shows why the postcards become meaningful to Talia?", ["The curator gives her a box tied with string.", "One card describes neighbors carrying flour upstairs before a flood rose.", "The postcards are placed in protective sleeves.", "The basement smells like paper and dust."], 1, 0], ["In the archive passage, the word 'fragments' most nearly means", ["careful explanations", "official laws", "new discoveries", "incomplete pieces"], 3, 0], ["How does paragraph 3 of the archive passage deepen the main idea?", ["It shows that archives reflect choices and can contain important gaps.", "It proves that museums should stop collecting objects.", "It introduces a completely unrelated summer job.", "It explains how floods damage buildings only."], 0, 0], ["What perspective does Talia most likely have by the end of the archive passage?", ["History is fully complete once one archive is organized.", "History requires both evidence and careful questioning.", "Facts are unimportant compared with stories.", "Only museums are allowed to interpret the past."], 1, 0], ["Why does the archive passage author contrast 'sorting' with 'history' early in the passage?", ["to prove that spreadsheets are inaccurate", "to suggest that museum work is boring and should be avoided", "to show how Talia's understanding of archival work changes over time", "to compare two different buildings"], 2, 0], ["Which sentence from the archive passage best supports the idea that preserving records affects what later generations can know?", ["The basement smelled faintly of paper.", "They are collections shaped by decisions: what gets saved, who gets named, which stories are explained, and which are left for later generations to piece together.", "The curator handed her a box.", "A few postcards showed buildings that no longer existed."], 1, 0], ["What is the main idea of the migrating cranes article?", ["Wetlands matter only in spring.", "Scientists can control where cranes migrate.", "Sandhill crane migration depends on a network of safe habitats as well as changing environmental conditions.", "Cranes travel in perfectly straight lines each season."], 2, 1], ["Which detail best explains why wetlands are important to cranes?", ["Cranes always nest in city parks.", "Transmitters are attached to every bird.", "Wetlands make the sky look darker.", "Wetlands provide protected resting places and access to food."], 3, 1], ["In the cranes article, the word 'conserve' most nearly means", ["save and use carefully", "spread widely", "forget completely", "measure exactly"], 0, 1], ["How does paragraph 3 of the cranes article contribute to the article?", ["It argues that cranes should stay in one place all year.", "It explains how scientists gather evidence about migration patterns.", "It tells a fictional story about a lost flock.", "It lists only the names of wetlands."], 1, 1], ["Why does the cranes author describe migration as 'a demanding calculation'?", ["to suggest cranes solve math problems in the air", "to emphasize that birds must respond to many challenges during the journey", "to show that migration is easy once a flock begins flying", "to argue that only one wetland is important"], 1, 1], ["What is the cranes article author's purpose?", ["to criticize all farming near wetlands", "to persuade readers to keep cranes as pets", "to explain how migration works and why habitat protection matters", "to entertain readers with a fantasy adventure"], 2, 1], ["Which source would be most relevant for confirming whether crane arrival dates have changed over time?", ["a poster of crane artwork", "a recipe from a marsh festival", "an advertisement for binoculars", "a long-term field record comparing arrival dates across many years"], 3, 1], ["What is the author's main point in the bike lane debate passage?", ["Bike lanes should be added to every road no matter the cost.", "Decisions about protected bike lanes should be based on evidence and on the long-term effects of street design.", "Traffic counts are less useful than opinions.", "Parking is the only important use of city streets."], 1, 2], ["Which detail best shows the bike lane author's balanced approach?", ["The author says supporters should not ignore trade-offs.", "The author explains that cities have councils.", "The author mentions busy streets.", "The author says concrete exists."], 0, 2], ["In the bike lane passage, the word 'priority' most nearly means", ["a painted street sign", "a private opinion kept secret", "something considered especially important", "a short delay"], 2, 2], ["How does paragraph 3 of the bike lane passage strengthen the argument?", ["It ignores the question of public purpose.", "It claims that every street needs the same design.", "It replaces the debate with a fictional example.", "It identifies specific types of evidence leaders should examine."], 3, 2], ["What perspective does the bike lane author express about infrastructure?", ["Infrastructure has no effect on behavior.", "Infrastructure influences how people choose to move through a city.", "Infrastructure should change every month.", "Infrastructure matters only to cyclists."], 1, 2], ["What is the bike lane author's purpose?", ["to explain how to repair roads", "to entertain readers with a travel story", "to analyze a policy debate and argue for thoughtful, evidence-based decision making", "to advertise bicycles for sale"], 2, 2], ["Which source would be most credible for checking whether protected bike lanes reduce crashes?", ["a bike shop coupon", "a rumor shared online", "a poster saying Bikes are the future", "a transportation study comparing crash data before and after installation"], 3, 2], ["What idea is supported by both the 1872 journal entry and the historian's commentary?", ["Journal writers never describe real events.", "Official reports are always more vivid than journals.", "Firsthand accounts can be valuable, but they should be read carefully.", "Weather did not affect travel in the 1800s."], 2, 3], ["Which detail from the 1872 journal best shows the travelers faced difficulty?", ["Two crates of supplies slid from the wagon, and the party had to haul them back.", "The river was shining below the ridge.", "Some members paused to sketch the view.", "The guide urged speed."], 0, 3], ["In the historian's commentary, the word 'emphasize' most nearly means", ["hide completely", "give special attention to", "measure precisely", "argue against"], 1, 3], ["How does the historian's commentary affect a reader's understanding of the 1872 journal?", ["It proves the journal is false.", "It changes the setting to a different region.", "It reminds the reader to consider the writer's purpose and compare the journal with other sources.", "It shows the rain never happened."], 2, 3], ["Why might an expedition member describe hardship in detail, according to the historian's commentary?", ["to present the mission or the travelers in a certain light", "to avoid recording weather", "to make maps unnecessary", "to hide the route from future readers"], 0, 3], ["Which text is more useful for learning what one traveler saw and felt at a specific moment?", ["the historian's commentary", "neither text", "the 1872 journal entry", "both texts equally"], 2, 3], ["If a researcher wanted to verify the route the expedition followed, which additional source would be most relevant?", ["a list of river fish", "a modern backpack advertisement", "a poem about mountains", "a map or survey record from the same expedition"], 3, 3], ["What is the central idea of the recommendation systems passage?", ["Recommendation systems can be helpful, but they also influence what users notice and may limit what they see.", "Online stores never use recommendation systems.", "Recommendation systems are
