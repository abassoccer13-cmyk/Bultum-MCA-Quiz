in&quot;, &quot;A straight line not through the origin&quot;, &quot;A curve&quot;, &quot;A vertical line&quot;], 0, &quot;Step 1: A proportional relationship has the form y = kx.\nStep 2: Its graph is a straight line that passes through the origin (0, 0).&quot;], [&quot;If y = 4x, what is y when x = 3?&quot;, [&quot;7&quot;, &quot;10&quot;, &quot;12&quot;, &quot;14&quot;], 2, &quot;Step 1: Substitute x = 3: y = 4(3).\nStep 2: y = 12.&quot;], [&quot;If y is directly proportional to x and y = 15 when x = 5, what is y when x = 8?&quot;, [&quot;18&quot;, &quot;20&quot;, &quot;24&quot;, &quot;40&quot;], 2, &quot;Step 1: Find k = y ÷ x = 15 ÷ 5 = 3. So y = 3x.\nStep 2: When x = 8, y = 3(8) = 24.&quot;], [&quot;Solve:  2x + 7 = 19&quot;, [&quot;5&quot;, &quot;6&quot;, &quot;7&quot;, &quot;13&quot;], 1, &quot;Step 1: Subtract 7 from both sides: 2x = 12.\nStep 2: Divide by 2: x = 6.&quot;], [&quot;Solve:  5x − 8 = 17&quot;, [&quot;4&quot;, &quot;5&quot;, &quot;6&quot;, &quot;7&quot;], 1, &quot;Step 1: Add 8 to both sides: 5x = 25.\nStep 2: Divide by 5: x = 5.&quot;], [&quot;Solve:  x/3 + 4 = 9&quot;, [&quot;9&quot;, &quot;12&quot;, &quot;15&quot;, &quot;27&quot;], 2, &quot;Step 1: Subtract 4 from both sides: x/3 = 5.\nStep 2: Multiply by 3: x = 15.&quot;], [&quot;Which inequality is true for all values of n less than 4?&quot;, [&quot;3n + 2 &lt; 14&quot;, &quot;3n + 2 &gt; 14&quot;, &quot;n + 4 &gt; 10&quot;, &quot;2n − 1 &gt; 0&quot;], 0, &quot;Step 1: If n &lt; 4, then 3n &lt; 12 (multiply both sides by 3).\nStep 2: Add 2: 3n + 2 &lt; 14.\nStep 3: Only option A is always true for all n &lt; 4.&quot;], [&quot;Which value is a solution to 2m − 3 ≥ 9?&quot;, [&quot;4&quot;, &quot;5&quot;, &quot;6&quot;, &quot;2&quot;], 2, &quot;Step 1: Solve the inequality: 2m ≥ 12, so m ≥ 6.\nStep 2: Of the choices, 6 satisfies m ≥ 6.&quot;], [&quot;What is the slope of the line through (1, 2) and (5, 10)?&quot;, [&quot;1/2&quot;, &quot;2&quot;, &quot;4&quot;, &quot;8&quot;], 1, &quot;Step 1: Slope = (y₂ − y₁) / (x₂ − x₁).\nStep 2: (10 − 2) / (5 − 1) = 8/4 = 2.&quot;], [&quot;In the equation y = 2x + 1, what is the y-intercept?&quot;, [&quot;2&quot;, &quot;1&quot;, &quot;−1&quot;, &quot;0&quot;], 1, &quot;Step 1: In slope-intercept form y = mx + b, b is the y-intercept.\nStep 2: Here b = 1.&quot;], [&quot;If y = 4x − 5, what is y when x = 6?&quot;, [&quot;9&quot;, &quot;14&quot;, &quot;19&quot;, &quot;29&quot;], 2, &quot;Step 1: Substitute x = 6: y = 4(6) − 5.\nStep 2: y = 24 − 5 = 19.&quot;], [&quot;Write the equation of a line with slope 3 and y-intercept −2.&quot;, [&quot;y = −2x + 3&quot;, &quot;y = 3x + 2&quot;, &quot;y = 3x − 2&quot;, &quot;y = −3x + 2&quot;], 2, &quot;Step 1: Slope-intercept form is y = mx + b.\nStep 2: With m = 3 and b = −2, the equation is y = 3x − 2.&quot;], [&quot;Which table represents a linear relationship?&quot;, [&quot;x: 1,2,3 and y: 2,4,8&quot;, &quot;x: 1,2,3 and y: 5,7,9&quot;, &quot;x: 1,2,3 and y: 1,4,9&quot;, &quot;x: 1,2,3 and y: 2,3,5&quot;], 1, &quot;Step 1: A linear table has a constant rate of change.\nStep 2: In option B: 7 − 5 = 2 and 9 − 7 = 2, constant.\nStep 3: Options A, C, D have changing differences.&quot;], [&quot;Apples cost $2.50 per pound. Which equation shows the total cost c for p pounds?&quot;, [&quot;c = 2.5p&quot;, &quot;c = p + 2.5&quot;, &quot;c = 2.5 + p²&quot;, &quot;c = p ÷ 2.5&quot;], 0, &quot;Step 1: Total cost = rate × amount.\nStep 2: c = 2.5 · p = 2.5p.&quot;], [&quot;Plan A charges $10 plus $2 per visit. Plan B charges $5 plus $3 per visit. After 4 visits, which statement is true?&quot;, [&quot;Plan A costs less&quot;, &quot;Plan B costs less&quot;, &quot;They cost the same&quot;, &quot;There is not enough information&quot;], 1, &quot;Step 1: Plan A: 10 + 2(4) = $18.\nStep 2: Plan B: 5 + 3(4) = $17.\nStep 3: Plan B costs less.&quot;], [&quot;Which expression is equivalent to 3(x + 4) − 2?&quot;, [&quot;3x + 2&quot;, &quot;3x + 10&quot;, &quot;7x − 2&quot;, &quot;3x + 14&quot;], 1, &quot;Step 1: Distribute the 3: 3x + 12.\nStep 2: Subtract 2: 3x + 12 − 2 = 3x + 10.&quot;], [&quot;On a map, 1 centimeter represents 5 kilometers. If two towns are 3 centimeters apart on the map, how far apart are they really?&quot;, [&quot;8 km&quot;, &quot;10 km&quot;, &quot;15 km&quot;, &quot;30 km&quot;], 2, &quot;Step 1: Each cm = 5 km, so multiply map distance by 5.\nStep 2: 3 × 5 = 15 km.&quot;], [&quot;Two similar rectangles have side lengths 6 and 9 on the first and 9 and ? on the second. What is the missing side length?&quot;, [&quot;4&quot;, &quot;6&quot;, &quot;12&quot;, &quot;13.5&quot;], 3, &quot;Step 1: Scale factor from 6 to 9 is 9 ÷ 6 = 1.5.\nStep 2: Multiply the other side: 9 × 1.5 = 13.5.&quot;], [&quot;If one angle in a supplementary pair measures 68°, what is the other angle?&quot;, [&quot;22°&quot;, &quot;68°&quot;, &quot;102°&quot;, &quot;112°&quot;], 3, &quot;Step 1: Supplementary angles sum to 180°.\nStep 2: 180 − 68 = 112°.&quot;], [&quot;If two lines intersect and one angle measures 47°, what is the measure of the vertical angle across from it?&quot;, [&quot;43°&quot;, &quot;47°&quot;, &quot;133°&quot;, &quot;180°&quot;], 1, &quot;Step 1: Vertical angles (opposite angles formed by intersecting lines) are congruent.\nStep 2: The vertical angle across from 47° is also 47°.&quot;], [&quot;A circular garden has diameter 12 feet. About how far is it around? Use π = 3.14.&quot;, [&quot;18.84 feet&quot;, &quot;37.68 feet&quot;, &quot;75.36 feet&quot;, &quot;113.04 feet&quot;], 1, &quot;Step 1: 'Around' means circumference = π × diameter.\nStep 2: 3.14 × 12 = 37.68 feet.&quot;], [&quot;A scale drawing uses 1 inch to represent 4 feet. If a wall is 7 inches long on the drawing, how long is the real wall?&quot;, [&quot;11 feet&quot;, &quot;21 feet&quot;, &quot;28 feet&quot;, &quot;32 feet&quot;], 2, &quot;Step 1: Each inch = 4 feet.\nStep 2: 7 × 4 = 28 feet.&quot;], [&quot;What is the median of 3, 5, 7, 7, 9?&quot;, [&quot;5&quot;, &quot;6&quot;, &quot;7&quot;, &quot;8&quot;], 2, &quot;Step 1: The numbers are in order already.\nStep 2: Middle value of 5 numbers is the 3rd: 7.&quot;], [&quot;What is the mean of 3, 5, 7, 7, and 9?&quot;, [&quot;6&quot;, &quot;6.2&quot;, &quot;7&quot;, &quot;7.2&quot;], 1, &quot;Step 1: Add: 3 + 5 + 7 + 7 + 9 = 31.\nStep 2: Divide by the count (5): 31 ÷ 5 = 6.2.&quot;], [&quot;In a data set, an outlier is a value that is&quot;, [&quot;exactly the same as every other value&quot;, &quot;much larger or smaller than most of the data&quot;, &quot;always the median&quot;, &quot;never part of the data&quot;], 1, &quot;Step 1: An outlier is a value that lies far from the rest of the data.\nStep 2: It can be much larger OR much smaller than most other values.&quot;], [&quot;Which display is most useful for showing categories as parts of a whole?&quot;, [&quot;Line graph&quot;, &quot;Circle graph&quot;, &quot;Timeline&quot;, &quot;Stem-and-leaf plot&quot;], 1, &quot;Step 1: A circle graph (pie chart) divides a whole into sector slices.\nStep 2: Each sector represents one category's share.&quot;], [&quot;A histogram is most useful for showing&quot;, [&quot;the order of events in time&quot;, &quot;how many data values fall within intervals&quot;, &quot;parts of a whole&quot;, &quot;a location on a map&quot;], 1, &quot;Step 1: A histogram groups numeric data into intervals (bins).\nStep 2: The bar height shows the frequency for each interval.&quot;], [&quot;A bag has 3 red marbles, 5 blue marbles, and 2 green marbles. What is the probability of choosing a red marble?&quot;, [&quot;1/10&quot;, &quot;2/5&quot;, &quot;3/10&quot;, &quot;1/2&quot;], 2, &quot;Step 1: Total marbles: 3 + 5 + 2 = 10.\nStep 2: P(red) = 3/10.&quot;], [&quot;A spinner is spun 40 times and lands on green 14 times. What is the experimental probability of landing on green?&quot;, [&quot;14/40&quot;, &quot;1/2&quot;, &quot;26/40&quot;, &quot;14/26&quot;], 0, &quot;Step 1: Experimental probability = favorable ÷ total trials.\nStep 2: 14 ÷ 40 = 14/40.&quot;], [&quot;Which survey is most likely to give a biased sample?&quot;, [&quot;Asking every seventh student in the lunch line&quot;, &quot;Asking only members of the chess club whether students like sports&quot;, &quot;Randomly choosing names from the school roster&quot;, &quot;Surveying students from each grade level&quot;], 1, &quot;Step 1: A biased sample overrepresents a particular group.\nStep 2: Chess-club members may not represent the views of all students about sports.&quot;], [&quot;A circle graph shows that 25% of a class chose soccer. If there are 32 students in the class, how many chose soccer?&quot;, [&quot;6&quot;, &quot;8&quot;, &quot;12&quot;, &quot;16&quot;], 1, &quot;Step 1: 25% = 1/4.\nStep 2: One fourth of 32 is 32 ÷ 4 = 8.&quot;], [&quot;A random sample of 50 students shows that 18 prefer paper books over e-books. About how many out of 200 students would you predict prefer paper books?&quot;, [&quot;36&quot;, &quot;54&quot;, &quot;72&quot;, &quot;90&quot;], 2, &quot;Step 1: Sample fraction: 18 ÷ 50 = 0.36.\nStep 2: Predict: 0.36 × 200 = 72 students.&quot;]]}}, &quot;Grade 8&quot;: {&quot;color&quot;: &quot;#3B1A5A&quot;, &quot;subjects&quot;: {&quot;Math&quot;: [[&quot;What is the slope of the line passing through (2, 3) and (6, 11)?&quot;, [&quot;1&quot;, &quot;2&quot;, &quot;3&quot;, &quot;4&quot;], 1, &quot;Step 1: Slope = (y₂-y₁)/(x₂-x₁).\nStep 2: (11-3)/(6-2) = 8/4 = 2.&quot;], [&quot;Which of the following is an irrational number?&quot;, [&quot;1/3&quot;, &quot;square root of 4&quot;, &quot;square root of 7&quot;, &quot;0.75&quot;], 2, &quot;Step 1: Rational numbers can be written as fractions. Irrational cannot.\nStep 2: √7 cannot be written as a fraction — it's a non-repeating, non-terminating decimal.\nAnswer: √7 is irrational.&quot;], [&quot;If a = 6 and b = 8, what is c in the equation a squared + b squared = c squared?&quot;, [&quot;10&quot;, &quot;12&quot;, &quot;14&quot;, &quot;100&quot;], 0, &quot;Step 1: a²+b²=c². Plug in: 6²+8²=c².\nStep 2: 36+64=100. c²=100.\nStep 3: c=√100=10.&quot;], [&quot;Solve: 4x + 3 = 2x + 11&quot;, [&quot;x = 2&quot;, &quot;x = 4&quot;, &quot;x = 8&quot;, &quot;x = 3&quot;], 1, &quot;Step 1: Subtract 2x from both sides: 2x+3=11.\nStep 2: Subtract 3: 2x=8.\nStep 3: Divide by 2: x=4.&quot;], [&quot;What is the y-intercept of y = 3x - 5?&quot;, [&quot;3&quot;, &quot;−5&quot;, &quot;5&quot;, &quot;−3&quot;], 1, &quot;Step 1: In y=mx+b, b is the y-intercept.\nStep 2: y=3x-5, so b=-5.\nAnswer: -5&quot;], [&quot;Simplify: square root of 144&quot;, [&quot;11&quot;, &quot;12&quot;, &quot;13&quot;, &quot;14&quot;], 1, &quot;Step 1: √144 means 'what number times itself equals 144?'\nStep 2: 12×12=144, so √144=12.&quot;], [&quot;Two lines are parallel. Line 1 has slope 2. What is the slope of Line 2?&quot;, [&quot;−2&quot;, &quot;1/2&quot;, &quot;2&quot;, &quot;−1/2&quot;], 2, &quot;Step 1: Parallel lines have the same slope.\nStep 2: Line 1 has slope 2, so Line 2 also has slope 2.&quot;], [&quot;Which transformation moves a figure without changing its size or shape?&quot;, [&quot;Dilation&quot;, &quot;Translation&quot;, &quot;Stretching&quot;, &quot;Shearing&quot;], 1, &quot;Step 1: Translation = slide (moves without rotating or resizing).\nTip: Dilation changes size. Rotation turns. Translation slides.&quot;], [&quot;Solve the system: y = 2x + 1 and y = -x + 7&quot;, [&quot;(2, 5)&quot;, &quot;(3, 4)&quot;, &quot;(1, 3)&quot;, &quot;(4, 9)&quot;], 0, &quot;Step 1: Set equations equal: 2x+1=-x+7.\nStep 2: Add x: 3x+1=7. Subtract 1: 3x=6. x=2.\nStep 3: y=2(2)+1=5.\nAnswer: (2,5)&quot;], [&quot;What is 3.6 x 10 to the 4th power in standard form?&quot;, [&quot;360&quot;, &quot;3,600&quot;, &quot;36,000&quot;, &quot;360,000&quot;], 2, &quot;Step 1: 3.6 × 10⁴ = 3.6 × 10,000.\nStep 2: Move decimal 4 places right: 36,000.&quot;], [&quot;A right triangle has legs of 5 and 12. What is the length of the hypotenuse?&quot;, [&quot;11&quot;, &quot;13&quot;, &quot;15&quot;, &quot;17&quot;], 1, &quot;Step 1: a²+b²=c². 5²+12²=c².\nStep 2: 25+144=169. c=√169=13.&quot;], [&quot;What is the slope of a horizontal line?&quot;, [&quot;Undefined&quot;, &quot;1&quot;, &quot;0&quot;, &quot;−1&quot;], 2, &quot;Step 1: A horizontal line has no rise (only run).\nStep 2: Slope = rise/run = 0/run = 0.&quot;], [&quot;Which function is linear?&quot;, [&quot;y = x squared&quot;, &quot;y = 2x + 3&quot;, &quot;y = 1/x&quot;, &quot;y = square root of x&quot;], 1, &quot;Step 1: Linear functions have x to the first power only.\nStep 2: y=2x+3 is linear (no exponents, no fractions with x).&quot;], [&quot;Solve: 2(3x - 4) = 16&quot;, [&quot;x = 3&quot;, &quot;x = 4&quot;, &quot;x = 6&quot;, &quot;x = 2&quot;], 1, &quot;Step 1: Distribute: 6x-8=16.\nStep 2: Add 8: 6x=24.\nStep 3: Divide by 6: x=4.&quot;], [&quot;What is 5.2 x 10 to the negative 3rd power in standard form?&quot;, [&quot;52,000&quot;, &quot;5,200&quot;, &quot;0.0052&quot;, &quot;0.052&quot;], 2, &quot;Step 1: 5.2 × 10⁻³ means move decimal 3 places left.\nStep 2: 5.2 → 0.52 → 0.052 → 0.0052.&quot;], [&quot;A scatter plot shows that as study time increases, test scores also increase. This is:&quot;, [&quot;Negative correlation&quot;, &quot;No correlation&quot;, &quot;Positive correlation&quot;, &quot;Inverse relationship&quot;], 2, &quot;Step 1: Both variables increase together.\nStep 2: When one goes up and the other goes up = positive correlation.&quot;], [&quot;What is the volume of a cone with radius 3 and height 9? (Use pi = 3.14)&quot;, [&quot;84.78&quot;, &quot;254.34&quot;, &quot;56.52&quot;, &quot;28.26&quot;], 0, &quot;Step 1: V = ⅓πr²h.\nStep 2: ⅓ × 3.14 × 9 × 9 = ⅓ × 254.34 = 84.78.&quot;], [&quot;A line passes through (0, 4) and (2, 8). What is the equation of the line?&quot;, [&quot;y = 4x&quot;, &quot;y = 2x + 4&quot;, &quot;y = 4x + 2&quot;, &quot;y = x + 4&quot;], 1, &quot;Step 1: Slope = (8-4)/(2-0) = 4/2 = 2.\nStep 2: y-intercept = 4 (the point where x=0).\nAnswer: y = 2x + 4&quot;], [&quot;How many solutions does this system have? y = 2x + 1 and y = 2x + 5&quot;, [&quot;One&quot;, &quot;Two&quot;, &quot;Infinitely many&quot;, &quot;No solution&quot;], 3, &quot;Step 1: Both lines have slope 2 but different y-intercepts.\nStep 2: Same slope = parallel lines = they never cross.\nAnswer: No solution.&quot;], [&quot;When two parallel lines are cut by a transversal, angles at the same position on each line are called:&quot;, [&quot;Supplementary angles&quot;, &quot;Corresponding angles&quot;, &quot;Vertical angles&quot;, &quot;Adjacent angles&quot;], 1, &quot;Step 1: Corresponding angles are in the same position at each intersection.\nTip: They look like they're in matching spots — both top-right, or both bottom-left, etc.&quot;], [&quot;What is the distance between points (1, 2) and (4, 6)?&quot;, [&quot;3&quot;, &quot;4&quot;, &quot;5&quot;, &quot;7&quot;], 2, &quot;Step 1: Distance = √[(x₂-x₁)²+(y₂-y₁)²].\nStep 2: √[(4-1)²+(6-2)²] = √[9+16] = √25 = 5.&quot;], [&quot;Which number is NOT irrational?&quot;, [&quot;square root of 2&quot;, &quot;pi&quot;, &quot;square root of 9&quot;, &quot;square root of 5&quot;], 2, &quot;Step 1: √9 = 3, which is a whole number (rational).\nStep 2: √2, π, and √5 are all irrational.\nAnswer: √9&quot;], [&quot;A function is defined as f(x) = 3x - 2. What is f(5)?&quot;, [&quot;11&quot;, &quot;13&quot;, &quot;15&quot;, &quot;17&quot;], 1, &quot;Step 1: f(5) = 3(5)-2 = 15-2 = 13.&quot;], [&quot;Simplify: (2 to the 3rd power) to the 2nd power&quot;, [&quot;2 to the 5th&quot;, &quot;2 to the 6th&quot;, &quot;2 to the 8th&quot;, &quot;2 to the 16th&quot;], 1, &quot;Step 1: Power of a power rule: multiply exponents.\nStep 2: (2³)² = 2^(3×2) = 2⁶ = 64.&quot;], [&quot;The line y = -1/2 x + 3 has a slope of:&quot;, [&quot;3&quot;, &quot;−1/2&quot;, &quot;1/2&quot;, &quot;−3&quot;], 1, &quot;Step 1: In y=mx+b, m is the slope.\nStep 2: y=-½x+3, so slope = -½.&quot;]], &quot;Reading&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Passage 1 — What Mina Heard at the Public Meeting&quot;, &quot;text&quot;: &quot;&lt;p&gt;At the start of the semester, the civics class treated the public hearing like one more assignment with a deadline. Their teacher had divided the class into teams, and each team was supposed to research a local issue, listen to community comments, and present a brief summary afterward. Most students assumed the evening meeting would be predictable: adults reading prepared remarks while everyone else waited to go home.&lt;/p&gt;&lt;p&gt;Mina changed her mind halfway through the hearing. The topic was a proposal to convert an empty lot into a community food market and garden. One speaker described the plan as a chance to sell fresh produce in a neighborhood with few grocery options. Another warned that the project might increase traffic near a bus stop used by elementary students. A third speaker said she liked the garden idea but worried that the market booths would become too noisy on weekends.&lt;/p&gt;&lt;p&gt;What surprised Mina was not that people disagreed, but that many of them agreed on the same facts while reaching different conclusions. Nearly everyone wanted the lot to become useful. Nearly everyone said children should be safe and residents should have access to fresh food. Yet they weighed those goals differently. The hearing was less like a contest between right and wrong than a demonstration of how public decisions become complicated once real lives enter the discussion.&lt;/p&gt;&lt;p&gt;When the class met the next day, several students complained that the council had not solved anything. Mina disagreed. She had gone expecting a fast answer and instead found a slower kind of progress: people naming trade-offs in public. The meeting had not erased conflict, but it had made the conflict clearer. For Mina, that clarity felt like the beginning of citizenship rather than a failure of it.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 2 — Why Scientists Notice Freshwater Mussels&quot;, &quot;text&quot;: &quot;&lt;p&gt;Freshwater mussels are easy to overlook because they spend most of their lives partly buried in riverbeds and lake bottoms. To many people, they appear to be little more than dark shells resting in mud. Yet scientists often pay close attention to mussel populations because the animals can reveal important information about water quality and ecosystem health.&lt;/p&gt;&lt;p&gt;Mussels are filter feeders. They draw in water, trap tiny particles such as algae and organic matter, and then release cleaner water back into the environment. In that sense, a healthy mussel bed can act like a living filtration system. Mussels do not solve every pollution problem, but their presence can support a balanced aquatic habitat.&lt;/p&gt;&lt;p&gt;They are also sensitive to environmental change. Excess sediment, chemical pollution, and altered stream flow can make survival difficult. Some mussel species depend on specific fish during part of their life cycle, so when fish populations decline or movement is blocked, mussels may suffer too. Because of these connections, scientists use mussels as indicator species: their condition can signal broader changes in an ecosystem.&lt;/p&gt;&lt;p&gt;Protecting mussels means protecting more than one organism. It often involves restoring riverbanks, improving water management, reducing runoff, and preserving habitat for fish and other aquatic life. A shell in the mud may seem unremarkable at first glance, but in ecological terms it can represent an entire network of relationships.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 3 — How Should Service-Learning Be Designed?&quot;, &quot;text&quot;: &quot;&lt;p&gt;Some schools have proposed requiring students to complete service-learning hours before graduation. Supporters argue that this requirement can help students connect classroom knowledge to real community needs. A student studying environmental science might work on stream monitoring. A student learning about local history might help preserve oral histories or assist at a museum.&lt;/p&gt;&lt;p&gt;The strongest version of this argument is not simply that service is morally good. It is that structured service-learning can deepen academic understanding when students reflect on what they do, why the work matters, and how it connects to larger systems. In that model, service is not a separate charity project attached to school. It is part of the learning itself.&lt;/p&gt;&lt;p&gt;Critics, however, raise serious questions. If schools require service without providing transportation, flexibility, or meaningful options, the policy can place a heavier burden on some students than on others. A teenager caring for siblings after school may not have the same schedule as a classmate with more free time. A requirement meant to build civic engagement should not ignore unequal access to time and resources.&lt;/p&gt;&lt;p&gt;For that reason, the debate should focus less on whether service matters in the abstract and more on the design of the program. Reflection, choice, support, and fairness determine whether service-learning becomes transformative or merely another checkbox. Good civic education requires more than good intentions.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 4 — Reading an Industrial-Era Letter (Paired Texts)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Text 1: Letter from a Mill Owner, 1911&lt;/strong&gt;&lt;p&gt;Production slowed again this week after the third power failure this month. I do not object to progress, but the city cannot expect manufacturers to modernize without reliable electric service. Our workers lose hours each time the machines stop, and delayed orders harm both wages and reputation. If officials want industry to expand, they must build infrastructure capable of supporting it.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Text 2: Historian's Analysis&lt;/strong&gt;&lt;p&gt;Business letters can reveal how industrial leaders understood modernization, but they often frame public issues through the lens of private interest. A mill owner writing to city officials may emphasize economic losses and present local policy as urgent. Such a source can be valuable, especially when compared with city records, labor reports, and newspapers that show how the same problem affected workers and residents.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 5 — Why Images Need Context&quot;, &quot;text&quot;: &quot;&lt;p&gt;Digital images now move quickly through messages, social feeds, and news alerts, but speed does not guarantee trustworthiness. A striking image can appear persuasive simply because it seems immediate and concrete. Yet images can be cropped, captioned misleadingly, or shared without the context needed to interpret them accurately.&lt;/p&gt;&lt;p&gt;This does not mean images are useless as evidence. On the contrary, photographs and videos can document events, preserve details, and support reporting. The challenge is that visual evidence still requires source evaluation. Who took the image? When and where was it captured? Has it been edited? What does the frame include, and what does it leave out?&lt;/p&gt;&lt;p&gt;Context matters especially when an image circulates separately from its original setting. A photo from one protest, storm, or fire may be reposted during a different event and falsely presented as current. In such cases, the image itself may be real, but the claim attached to it may be false. Verifying visual media therefore involves checking both the content and the accompanying narrative.&lt;/p&gt;&lt;p&gt;Media literacy in the digital age requires slowing down at the moment when a post is designed to make users react quickly. Before sharing, readers can compare captions with reporting from reliable outlets, look for original publication dates, or search for the image in other contexts. A compelling image deserves attention, but not automatic belief.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 6 — Planning with the Most Reliable Source (Media Literacy)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Source A: State Park Notice&lt;/strong&gt;&lt;p&gt;The east trail at Cedar Bluffs State Park will close from June 3 through June 21 while crews replace two footbridges and repair erosion damage after spring storms. Hikers may still use the west trail and the visitor center parking lot. Updated trail maps and reopening notices will be posted on the park website.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Source B: Adventure Blog Post&lt;/strong&gt;&lt;p&gt;Cedar Bluffs is about to get its biggest trail upgrade ever! This is exactly the kind of bold outdoor investment our state needs. Once the work is done, the park will probably become one of the most exciting hiking destinations anywhere in the region. If you care about nature, you should celebrate this project.&lt;/p&gt;&lt;p&gt;&lt;em&gt;A student is preparing a short informational handout for classmates planning a June hiking trip. The handout needs accurate closure dates, alternate access information, and a trustworthy source for updates.&lt;/em&gt;&lt;/p&gt;&quot;}], &quot;questions&quot;: [[&quot;What is the central idea of the public meeting passage?&quot;, [&quot;Mina learns that public decision making often involves balancing shared goals that lead to different conclusions.&quot;, &quot;Students should never attend evening meetings.&quot;, &quot;The hearing proves that local government is useless.&quot;, &quot;The council quickly solved the lot proposal.&quot;], 0, 0], [&quot;Which detail best reveals why Mina changes her mind about the hearing?&quot;, [&quot;She hears speakers agree on some facts but disagree about which concerns matter most.&quot;, &quot;The teacher divides the class into teams.&quot;, &quot;Students meet in class the next day.&quot;, &quot;The assignment has a deadline.&quot;], 0, 0], [&quot;In paragraph 4, the word 'clarity' most nearly means:&quot;, [&quot;a final victory&quot;, &quot;a louder argument&quot;, &quot;a clearer understanding&quot;, &quot;a written rule&quot;], 2, 0], [&quot;How does paragraph 3 develop the author's message in the public meeting passage?&quot;, [&quot;It explains that disagreement can grow from different priorities rather than ignorance of the facts.&quot;, &quot;It lists the price of garden tools.&quot;, &quot;It changes the setting to a different city.&quot;, &quot;It proves only one speaker was correct.&quot;], 0, 0], [&quot;What perspective does Mina express at the end of the passage?&quot;, [&quot;Trade-offs are signs that no plan should move forward.&quot;, &quot;Community meetings should happen in secret.&quot;, &quot;Public discussion has value even before it produces a final answer.&quot;, &quot;Citizenship works only when everyone agrees immediately.&quot;], 2, 0], [&quot;Why does the author describe the hearing as 'the beginning of citizenship'?&quot;, [&quot;to prove that teachers assign too much homework&quot;, &quot;to argue that students should replace the council&quot;, &quot;to suggest that civic life includes open disagreement and careful listening&quot;, &quot;to show that market booths always cause noise&quot;], 2, 0], [&quot;Which sentence best supports the claim that speakers shared some goals while disagreeing?&quot;, [&quot;The class was divided into teams.&quot;, &quot;Several students complained the council had not solved anything.&quot;, &quot;Nearly everyone wanted the lot to become useful.&quot;, &quot;Most students assumed the meeting would be predictable.&quot;], 2, 0], [&quot;What is the main idea of the freshwater mussels article?&quot;, [&quot;Indicator species can survive any environmental change.&quot;, &quot;Scientists study mussels only because they are easy to see.&quot;, &quot;Freshwater mussels help filter water and can signal the health of an aquatic ecosystem.&quot;, &quot;Mussels are useful mainly as decorations on shorelines.&quot;], 2, 1], [&quot;Which detail best explains why scientists call mussels indicator species?&quot;, [&quot;Some people overlook them.&quot;, &quot;Their condition can signal broader changes in the ecosystem.&quot;, &quot;They release cleaner water after filtering.&quot;, &quot;Their shells are dark and partly buried.&quot;], 1, 1], [&quot;In paragraph 2 of the mussels article, the word 'trap' most nearly means:&quot;, [&quot;break into pieces&quot;, &quot;catch and hold&quot;, &quot;hide from view&quot;, &quot;set a trick for&quot;], 1, 1], [&quot;How does paragraph 3 build on the mussels article's main idea?&quot;, [&quot;It shows that mussels respond to environmental change and are linked to other species.&quot;, &quot;It gives directions for raising mussels at home.&quot;, &quot;It argues that mussels are the only important river organisms.&quot;, &quot;It changes the topic from water to desert climate.&quot;], 0, 1], [&quot;Why does the mussels article author mention fish populations?&quot;, [&quot;to compare fish shells with mussel shells&quot;, &quot;to suggest that fish cause all pollution&quot;, &quot;to explain that mussel survival depends on other parts of the ecosystem&quot;, &quot;to argue that fish matter more than mussels&quot;], 2, 1], [&quot;What is the author's purpose in the mussels article?&quot;, [&quot;to advertise a new aquarium&quot;, &quot;to persuade readers to collect mussel shells&quot;, &quot;to explain the ecological importance of freshwater mussels&quot;, &quot;to entertain readers with a fantasy river story&quot;], 2, 1], [&quot;Which source would be most relevant for checking whether a river's mussel population has changed over time?&quot;, [&quot;a long-term survey of mussel counts and water conditions&quot;, &quot;a poem about a lake at night&quot;, &quot;a menu from a seafood restaurant&quot;, &quot;a travel brochure about nearby parks&quot;], 0, 1], [&quot;What is the author's main claim in the service-learning passage?&quot;, [&quot;Community service has no academic value.&quot;, &quot;Whether service-learning helps students depends heavily on how fairly and thoughtfully the program is designed.&quot;, &quot;Service requirements should always be rejected.&quot;, &quot;Schools should remove reflection from all civic programs.&quot;], 1, 2], [&quot;Which detail best supports the idea that service-learning can deepen academic understanding?&quot;, [&quot;Museums preserve artifacts.&quot;, &quot;Students can connect fieldwork and reflection to what they study in class.&quot;, &quot;Many students have after-school plans.&quot;, &quot;Graduation rules often change over time.&quot;], 1, 2], [&quot;In paragraph 4 of the service-learning passage, the word 'transformative' most nearly means:&quot;, [&quot;brief and unimportant&quot;, &quot;able to produce meaningful change&quot;, &quot;hard to observe&quot;, &quot;expensive to maintain&quot;], 1, 2], [&quot;How does paragraph 3 strengthen the service-learning argument?&quot;, [&quot;It gives a fictional example unrelated to school.&quot;, &quot;It changes the discussion to college admissions.&quot;, &quot;It proves that service is never useful.&quot;, &quot;It introduces equity concerns that complicate a simple requirement.&quot;], 3, 2], [&quot;What perspective does the service-learning author express about civic education?&quot;, [&quot;Civic education should combine purpose with fairness and practical support.&quot;, &quot;Civic education should avoid community contact.&quot;, &quot;Civic education works best when every student does identical tasks.&quot;, &quot;Civic education matters only outside school.&quot;], 0, 2], [&quot;What is the author's purpose in the service-learning passage?&quot;, [&quot;to explain how graduation robes are made&quot;, &quot;to entertain readers with a student memoir&quot;, &quot;to analyze an educational proposal and argue for a more careful way of judging it&quot;, &quot;to advertise volunteer positions&quot;], 2, 2], [&quot;Which source would be most useful for evaluating the equity concerns in paragraph 3?&quot;, [&quot;data showing which students completed required hours and what barriers they reported&quot;, &quot;a list of school mascots&quot;, &quot;a poster saying Service Matters&quot;, &quot;a speech with no evidence&quot;], 0, 2], [&quot;What idea is conveyed by both the 1911 mill letter and the historian's analysis?&quot;, [&quot;Power failures mattered only to businesses.&quot;, &quot;Primary sources can provide insight, but they also reflect the writer's interests.&quot;, &quot;Factory owners always gave neutral public advice.&quot;, &quot;Historians reject all business letters as useless.&quot;], 1, 3], [&quot;Which detail from the mill letter best shows the mill owner's concern?&quot;, [&quot;The city expects manufacturers to modernize.&quot;, &quot;Power failed three times in one month.&quot;, &quot;The letter is dated 1911.&quot;, &quot;Delayed orders harm both wages and reputation.&quot;], 3, 3], [&quot;In Text 2, 'through the lens of private interest' most nearly means:&quot;, [&quot;with the help of a camera&quot;, &quot;in a completely objective manner&quot;, &quot;without any evidence&quot;, &quot;from a viewpoint shaped by personal or business concerns&quot;], 3, 3], [&quot;How does Text 2 affect a reader's interpretation of the mill letter?&quot;, [&quot;It shows the city had already solved the problem.&quot;, &quot;It changes the date of the power failures.&quot;, &quot;It encourages the reader to compare the letter with other sources before drawing conclusions.&quot;, &quot;It proves the letter was forged.&quot;], 2, 3], [&quot;Why might the mill owner stress the effects on wages as well as business reputation?&quot;, [&quot;to deny that workers existed&quot;, &quot;to strengthen the argument by showing broader consequences&quot;, &quot;to praise city officials&quot;, &quot;to avoid mentioning modernization&quot;], 1, 3], [&quot;Which text is more useful for understanding one industrial leader's immediate reaction to power failures?&quot;, [&quot;neither text&quot;, &quot;Text 1 (the letter)&quot;, &quot;Text 2 (historian's analysis)&quot;, &quot;both texts equally&quot;], 1, 3], [&quot;If a researcher wants to know how power failures affected workers, which source is most relevant?&quot;, [&quot;a labor report or newspaper interview with workers from the period&quot;, &quot;a tourist map&quot;, &quot;a modern appliance advertisement&quot;, &quot;a weather forecast for this week&quot;], 0, 3], [&quot;What is the central idea of the 'Why Images Need Context' passage?&quot;, [&quot;Visual media can be powerful evidence, but images still need careful source and context checks.&quot;, &quot;Only edited images can mislead viewers.&quot;, &quot;Images should never be used in news reporting.&quot;, &quot;Captions always tell the whole truth.&quot;], 0, 4], [&quot;Which detail best supports the idea that a real image can still mislead people?&quot;, [&quot;Images move quickly through social feeds.&quot;, &quot;Videos can preserve details.&quot;, &quot;A photo from one event may be reposted during a different event and falsely presented as current.&quot;, &quot;Some posts include bright colors.&quot;], 2, 4], [&quot;In paragraph 4 of the images passage, the word 'compelling' most nearly means:&quot;, [&quot;completely reliable&quot;, &quot;difficult to print&quot;, &quot;politically neutral&quot;, &quot;strong enough to attract attention&quot;], 3, 4], [&quot;How does paragraph 2 of the images passage contribute to it?&quot;, [&quot;It shifts the topic to written fiction.&quot;, &quot;It proves that captions are unnecessary.&quot;, &quot;It balances caution by explaining that images can still be valuable evidence.&quot;, &quot;It argues that all photos are fake.&quot;], 2, 4], [&quot;What perspective does the images passage author express about media literacy?&quot;, [&quot;Media literacy means rejecting all emotional images.&quot;, &quot;Media literacy matters only for professional journalists.&quot;, &quot;Media literacy involves resisting quick reactions long enough to verify what is being shown.&quot;, &quot;Media literacy depends mainly on camera quality.&quot;], 2, 4], [&quot;What is the author's purpose in the images passage?&quot;, [&quot;to compare two camera brands&quot;, &quot;to advertise a photo-editing app&quot;, &quot;to explain how readers should evaluate images before trusting or sharing them&quot;, &quot;to narrate a historical event&quot;], 2, 4], [&quot;Which source would be most relevant for checking whether a viral image is being reused from an older event?&quot;, [&quot;a comment saying the image looks real&quot;, &quot;a slogan about truth&quot;, &quot;a list of camera models&quot;, &quot;a reverse-image search result showing where and when the image first appeared&quot;], 3, 4], [&quot;Which source should a student rely on most for a handout about a June hiking trip near the closed trail?&quot;, [&quot;both sources equally&quot;, &quot;Source B (adventure blog)&quot;, &quot;neither source&quot;, &quot;Source A (state park notice)&quot;], 3, 5], [&quot;Which detail from Source A is most relevant for students who still want to visit the park during the closure?&quot;, [&quot;Storms caused erosion damage.&quot;, &quot;Hikers may still use the west trail and the visitor center parking lot.&quot;, &quot;The trail closure begins in June.&quot;, &quot;Updated maps will be posted.&quot;], 1, 5], [&quot;In Source B, 'biggest trail upgrade ever' creates a tone that is:&quot;, [&quot;uncertain and cautious&quot;, &quot;formal and legal&quot;, &quot;neutral and technical&quot;, &quot;enthusiastic and promotional&quot;], 3, 5], [&quot;How do the two hiking sources differ in purpose?&quot;, [&quot;Both sources are equally factual park notices.&quot;, &quot;Source B gives more dates and logistics than Source A.&quot;, &quot;Source A provides planning information, while Source B offers opinion and encouragement.&quot;, &quot;Source A tells a personal story, while Source B gives official instructions.&quot;], 2, 5], [&quot;Which source is more credible for checking trail closure dates?&quot;, [&quot;Source B&quot;, &quot;Source A&quot;, &quot;both are equally credible&quot;, &quot;neither source&quot;], 1, 5], [&quot;Why is Source B less useful for the student's handout?&quot;, [&quot;It predicts and praises the project but does not provide the practical details students need.&quot;, &quot;It says the region has hiking destinations.&quot;, &quot;It mentions nature.&quot;, &quot;It is shorter than Source A.&quot;], 0, 5], [&quot;If a student wants the most up-to-date information before leaving for the trip, what is the best next step?&quot;, [&quot;Reread the blog post several times.&quot;, &quot;Check the park website listed in Source A for updated reopening notices.&quot;, &quot;Look for hiking photos on social media.&quot;, &quot;Ask a random visitor at another park.&quot;], 1, 5]]}, &quot;Science&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Scenario 1 — Lake Superior&quot;, &quot;text&quot;: &quot;&lt;p&gt;About 10,000 years ago, the last glaciers melted around the Lake Superior area and filled the lake with water. For the past few hundred years, agricultural and manufacturing developments have caused pollution in the lake.&lt;/p&gt;&lt;p&gt;To learn more about the pollution in Lake Superior, scientists travel in a boat to collect samples from different areas of the lake. Before going out on the lake, the scientists must study the local weather in order to safely travel on the lake.&lt;/p&gt;&lt;p&gt;The scientists on the boat discover many pollutants in the lake sediment, including arsenic, cadmium, chromium, copper, lead, mercury, pesticides, and zinc.&lt;/p&gt;&lt;p&gt;Mercury is one pollutant found in Lake Superior. The largest source of mercury pollution comes from burning coal in power plants. Data shows that air currents can carry pollutants from power plants that are hundreds of miles away.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Air Pressure Data&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Time of Day&lt;/th&gt;&lt;th&gt;Air Pressure (millibars)&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;6 a.m.&lt;/td&gt;&lt;td&gt;978&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Noon&lt;/td&gt;&lt;td&gt;1,010&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;6 p.m.&lt;/td&gt;&lt;td&gt;1,010&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Midnight&lt;/td&gt;&lt;td&gt;1,010&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 2 — Water Bottle Rockets&quot;, &quot;text&quot;: &quot;&lt;p&gt;Water bottle rockets are made by adding water to a bottle and pumping air into it. The flight time and height depend on the shape and the size of the water bottle rocket and the amounts of water and air you pump into the bottle.&lt;/p&gt;&lt;p&gt;To build and launch a water bottle rocket, select a bottle. Select the amount of water in milliliters (mL) you want to add and the pressure of air in kilopascals (kPa) you want to pump into the bottle. Then select “Run.” The water bottle rocket will launch, and data will be recorded in the table.&lt;/p&gt;&lt;p&gt;Some of the air that is pumped into the bottle dissolves in the water. Gravity acts on the water bottle rocket during flight.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Flight Time vs. Volume of Water (2-liter bottle, 300 kPa)&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Volume of Water (mL)&lt;/th&gt;&lt;th&gt;Flight Time (seconds)&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;100&lt;/td&gt;&lt;td&gt;4.3&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;200&lt;/td&gt;&lt;td&gt;4.8&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;300&lt;/td&gt;&lt;td&gt;5.1&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;400&lt;/td&gt;&lt;td&gt;5.3&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;500&lt;/td&gt;&lt;td&gt;5.4&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 3 — Pea Plant Experiment&quot;, &quot;text&quot;: &quot;&lt;p&gt;A student plants pea seeds in containers. Each container has the same type of soil and receives the same amounts of water and light. The pea seeds grow into mature plants.&lt;/p&gt;&lt;p&gt;The student collects the seeds from the mature pea plants. Some of the seeds are green and some are yellow.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Number of Pea Seeds&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Color&lt;/th&gt;&lt;th&gt;Count&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Green&lt;/td&gt;&lt;td&gt;245&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Yellow&lt;/td&gt;&lt;td&gt;255&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;p&gt;The student uses yellow pea seeds for a different experiment. The student divides these seeds into 2 groups. One group receives half as much water as the other group. After 1 month, the group of plants that received less water is shorter than the other group.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 4 — Satellites&quot;, &quot;text&quot;: &quot;&lt;p&gt;Satellites are natural or artificial objects that orbit a planet or star. The Moon and Earth are both natural satellites. For thousands of years, humans have used natural satellites and stars to determine the time of day and predict the change of the seasons.&lt;/p&gt;&lt;p&gt;The first artificial satellite, Sputnik, was launched in 1957. Since then, many other countries, including the United States, have launched artificial satellites. These satellites are powered by an energy source such as batteries or the Sun.&lt;/p&gt;&lt;p&gt;Communication is a common use of artificial satellites. They receive and send electromagnetic waves to transmit radio, telephone, and television signals. Internet services use satellite signals.&lt;/p&gt;&lt;p&gt;Scientific research also uses artificial satellites. Scientists use images from satellites to observe changes in the sizes of glaciers.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Glacier Size over Time&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Year&lt;/th&gt;&lt;th&gt;Area (km²)&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;1960&lt;/td&gt;&lt;td&gt;9&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;1980&lt;/td&gt;&lt;td&gt;6&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;2000&lt;/td&gt;&lt;td&gt;3&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;p&gt;As the glacier melts, the volume of water in the lake near the glacier increases. Every 3 square kilometers of ice that melts adds 1,000,000 liters of water to the lake. The lake had 10 million liters in 1960.&lt;/p&gt;&lt;p&gt;The global positioning system, known as GPS, uses artificial satellites. A compass and a GPS device have similar features (both show which direction is north) and different features (cost, number of functions, includes a map).&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Scenario 5 — Dung Beetle Starlight Orientation&quot;, &quot;text&quot;: &quot;&lt;p&gt;The dung beetle &lt;em&gt;Scarabaeus satyrus&lt;/em&gt; rolls balls of dung to use as food for itself and its larvae. A rolled ball of dung provides food for the adults and growing larvae. Males may also cover dung balls with a chemical that attracts a mate.&lt;/p&gt;&lt;p&gt;Rolling a dung ball in a straight line is important because it reduces the chance of the ball being stolen by another beetle. Scientists discovered that these beetles use starlight to navigate in straight lines.&lt;/p&gt;&lt;p&gt;In an experiment, scientists placed cardboard hats on some beetles to block their view of the sky. Beetles with hats could not see starlight and rolled their dung balls along much less straight paths.&lt;/p&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Graph 1: Time to Roll a Dung Ball (Natural Night Sky)&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Condition&lt;/th&gt;&lt;th&gt;Average Time (seconds)&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Full starry sky&lt;/td&gt;&lt;td&gt;40&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Moonless night&lt;/td&gt;&lt;td&gt;55&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Overcast sky (no stars)&lt;/td&gt;&lt;td&gt;120&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;table&gt;&lt;caption&gt;&lt;strong&gt;Graph 2: Time to Roll a Dung Ball (Simulated Sky, Indoors)&lt;/strong&gt;&lt;/caption&gt;&lt;tr&gt;&lt;th&gt;Condition&lt;/th&gt;&lt;th&gt;Average Time (seconds)&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;4,000 stars visible&lt;/td&gt;&lt;td&gt;55&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;1,000 stars visible&lt;/td&gt;&lt;td&gt;65&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;200 stars visible&lt;/td&gt;&lt;td&gt;80&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;No stars visible&lt;/td&gt;&lt;td&gt;115&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;p&gt;Light pollution is caused by streetlights and lights used by cars and businesses. Light pollution can increase night sky brightness by at least 8%, making it difficult to see natural starlight. A map of global light pollution shows that the amount of light pollution at 30°N latitude is greater than at 30°S latitude.&lt;/p&gt;&quot;}], &quot;questions&quot;: [[&quot;Which observation suggests that Minnesota was covered by glaciers in the past?&quot;, [&quot;Rocks have fossils&quot;, &quot;Rocks show wind erosion&quot;, &quot;Rocks show chemical weathering&quot;, &quot;Rocks have scrapes and striations&quot;], 3, 0, &quot;Step 1: Glaciers are massive sheets of ice that move slowly across land.\nStep 2: As glaciers move, rocks frozen in the ice scrape against bedrock below.\nStep 3: These scrapes leave marks called striations on the rock surface.\nTip: Fossils, wind erosion, and chemical weathering can happen without glaciers. Only striations are direct evidence of glacial movement.&quot;], [&quot;Based on the air pressure data showing readings stabilizing at 1,010 millibars, which two weather predictions will most likely be accurate?&quot;, [&quot;Strong winds and heavy rain&quot;, &quot;Fair weather and cirrus clouds&quot;, &quot;Stratus clouds and heavy rain&quot;, &quot;Strong winds and stratus clouds&quot;], 1, 0, &quot;Step 1: Look at the air pressure data — it stabilized at 1,010 millibars.\nStep 2: High pressure (above ~1,013) is associated with calm, clear conditions.\nStep 3: High pressure = fair weather and thin cirrus clouds.\nTip: Low pressure brings storms; high pressure brings clear skies.&quot;], [&quot;Based on the data collected from lake sediment samples listing types of pollutants, which testable question are the scientists trying to answer?&quot;, [&quot;What is the source of the pollution?&quot;, &quot;Which pollutants are found in the lake?&quot;, &quot;Which pollutants have been in the water the longest?&quot;, &quot;What effect does the pollution have on the lake ecosystem?&quot;], 1, 0, &quot;Step 1: The data collected was a list of pollutant types found in sediment.\nStep 2: This data answers: 'Which pollutants are present?' — not where they came from or their effects.\nStep 3: To answer source, duration, or ecosystem effect, you'd need different data.\nTip: Match the question to what the data actually measures.&quot;], [&quot;If people began to use less energy, how would the amount of coal burned, amount of mercury released, and condition of the lake most likely change?&quot;, [&quot;Increases, increases, declines&quot;, &quot;Decreases, decreases, improves&quot;, &quot;Decreases, increases, declines&quot;, &quot;Increases, decreases, improves&quot;], 1, 0, &quot;Step 1: Less energy use → less coal burned in power plants.\nStep 2: Less coal burned → less mercury released into the air.\nStep 3: Less mercury in the environment → the lake's condition improves.\nTip: Follow the chain: energy → coal → mercury → lake. Less at the start = less at the end.&quot;], [&quot;Some of the air pumped into the bottle dissolves in the water. What type of change happens when air dissolves in water?&quot;, [&quot;Chemical&quot;, &quot;Color&quot;, &quot;Molecular&quot;, &quot;Physical&quot;], 3, 1, &quot;Step 1: Dissolving is a physical change — no new substance is created.\nStep 2: The air molecules spread out between water molecules.\nStep 3: Chemical changes create new substances (like rust or burning). Dissolving does not.\nTip: If you can reverse it (like boiling the water to release the air), it's physical.&quot;], [&quot;650 milliliters of water is put into the water bottle. How many liters is 650 milliliters?&quot;, [&quot;6.5 liters&quot;, &quot;65 liters&quot;, &quot;0.065 liters&quot;, &quot;0.65 liters&quot;], 3, 1, &quot;Step 1: Use the conversion: 1,000 mL = 1 liter.\nStep 2: Divide: 650 ÷ 1,000 = 0.65 liters.\nStep 3: Move the decimal point 3 places to the left.\nTip: Milli- means 1/1,000, so divide by 1,000 to convert mL to L.&quot;], [&quot;As the student pumps air into the bottle, what happens to the pressure and the distance between particles?&quot;, [&quot;Pressure increases, distance increases&quot;, &quot;Pressure decreases, distance decreases&quot;, &quot;Pressure increases, distance stays the same&quot;, &quot;Pressure increases, distance decreases&quot;], 3, 1, &quot;Step 1: Pumping air adds more air particles to the same space.\nStep 2: More particles in the same space = higher pressure.\nStep 3: The particles are pushed closer together, so the distance between them decreases.\nTip: Pressure and particle spacing have an inverse relationship.&quot;], [&quot;Gravity acts on the water bottle rocket during flight. In which direction does gravity act on the rocket?&quot;, [&quot;Upward, away from Earth&quot;, &quot;In different directions at different times&quot;, &quot;Sideways, toward the wind&quot;, &quot;Downward, toward Earth’s surface&quot;], 3, 1, &quot;Step 1: Gravity is a force that pulls objects toward Earth's center.\nStep 2: This means gravity always acts downward, toward the ground.\nStep 3: During flight, gravity pulls the rocket down the entire time — that's why it eventually falls.\nTip: Gravity's direction never changes, no matter which way the rocket moves.&quot;], [&quot;What is the average speed of the water bottle rocket when it travels 20 meters in 5 seconds?&quot;, [&quot;4 meters per second&quot;, &quot;15 meters per second&quot;, &quot;25 meters per second&quot;, &quot;100 meters per second&quot;], 0, 1, &quot;Step 1: Speed = distance ÷ time.\nStep 2: Distance = 20 meters, time = 5 seconds.\nStep 3: 20 ÷ 5 = 4 meters per second.\nTip: Always divide distance by time to find speed.&quot;], [&quot;Using a 1-liter bottle at 300 kPa with different amounts of water, which statement is supported by the experiment results?&quot;, [&quot;As water volume increases, the maximum height of the rocket decreases&quot;, &quot;As water volume increases, the maximum height stays constant&quot;, &quot;As water volume increases, the maximum height increases and then decreases&quot;, &quot;As water volume increases, the maximum height decreases and then increases&quot;], 2, 1, &quot;Step 1: At low water volumes, adding more water increases thrust and height.\nStep 2: But at high volumes, too much water makes the rocket heavy.\nStep 3: So height increases at first, then decreases — a rise-then-fall pattern.\nTip: There's an optimal amount of water — not too little, not too much.&quot;], [&quot;Using a 2-liter bottle at 300 kPa, which set of flight time data for 100, 200, 300, 400, and 500 mL of water is correct?&quot;, [&quot;4.3s, 4.8s, 5.1s, 5.3s, 5.4s&quot;, &quot;5.4s, 5.3s, 5.1s, 4.8s, 4.3s&quot;, &quot;4.3s, 4.3s, 4.3s, 4.3s, 4.3s&quot;, &quot;5.9s, 5.7s, 5.5s, 5.3s, 5.1s&quot;], 0, 1, &quot;Step 1: Look at the data table for a 2-liter bottle at 300 kPa.\nStep 2: 100mL=4.3s, 200mL=4.8s, 300mL=5.1s, 400mL=5.3s, 500mL=5.4s.\nStep 3: These values are read directly from the table.\nTip: Always refer back to the data table for exact values.&quot;], [&quot;In a controlled experiment testing how the amount of water affects the height of the rocket flight, which variable should be changed across the three trials?&quot;, [&quot;Bottle size and air pressure&quot;, &quot;Only the amount of water&quot;, &quot;Only the air pressure&quot;, &quot;Both the water amount and bottle size&quot;], 1, 1, &quot;Step 1: A controlled experiment changes only ONE variable at a time.\nStep 2: The question asks about water amount, so only water should change.\nStep 3: Bottle size and air pressure must stay the same across all three trials.\nTip: Change one thing, measure the result, keep everything else the same.&quot;], [&quot;What two substances do plants take in to make sugars during photosynthesis?&quot;, [&quot;Soil and light&quot;, &quot;Water and oxygen&quot;, &quot;Soil and carbon dioxide&quot;, &quot;Water and carbon dioxide&quot;], 3, 2, &quot;Step 1: Photosynthesis is how plants make sugar (food).\nStep 2: The inputs are: water (from roots) + carbon dioxide (from air) + sunlight (energy).\nStep 3: Soil provides support and minerals but is NOT used to make sugar.\nTip: The equation: water + CO₂ + sunlight → sugar + oxygen.&quot;], [&quot;A student records 245 green pea seeds and 255 yellow pea seeds. Which type of graph best shows this proportional data?&quot;, [&quot;A circle graph with switched values (Yellow: 245, Green: 255)&quot;, &quot;A line graph showing number of seeds over time&quot;, &quot;A circle graph correctly showing Green: 245 and Yellow: 255&quot;, &quot;A scatter plot of seed colors&quot;], 2, 2, &quot;Step 1: The data shows two categories (green and yellow) with counts.\nStep 2: A circle (pie) graph is best for showing parts of a whole.\nStep 3: The correct graph must show Green=245 and Yellow=255 (not switched).\nTip: Circle graphs show proportions — perfect for comparing two groups.&quot;], [&quot;Reproduction is important for a species to survive. Which pairing correctly shows how a factor affects a species’ chance of survival?&quot;, [&quot;Large genetic diversity → decreased survival&quot;, &quot;Small number of organisms → increased survival&quot;, &quot;Negative change in environment → decreased survival&quot;, &quot;Large genetic diversity → no chance of survival&quot;], 2, 2, &quot;Step 1: Think about what helps a species survive environmental changes.\nStep 2: A negative change in environment (drought, pollution, habitat loss) makes survival harder.\nStep 3: So negative environmental change → decreased chance of survival.\nTip: Also correct: large genetic diversity → increased survival; small population → decreased survival.&quot;], [&quot;In the experiment where one group of pea plants receives half as much water, what is the independent (changed) variable?&quot;, [&quot;Height of plant&quot;, &quot;Size of container&quot;, &quot;Amount of light&quot;, &quot;Amount of water&quot;], 3, 2, &quot;Step 1: The independent variable is what the scientist changes on purpose.\nStep 2: One group got full water, the other got half water — so water amount was changed.\nStep 3: Height of plant was measured (dependent variable). Container size and light were kept the same (controlled).\nTip: Changed = independent. Measured = dependent. Same = controlled.&quot;], [&quot;Which two properties keep satellites moving in regular, predictable patterns?&quot;, [&quot;Density and friction&quot;, &quot;Gravity and inertia&quot;, &quot;Magnetism and speed&quot;, &quot;Friction and speed&quot;], 1, 3, &quot;Step 1: Objects in orbit stay there because of two things working together.\nStep 2: Gravity pulls the satellite toward the planet (keeps it from flying away).\nStep 3: Inertia keeps the satellite moving forward (keeps it from falling straight down).\nTip: Gravity + inertia = orbit. Without both, the satellite would crash or fly away.&quot;], [&quot;When a rocket is launched, the energy stored in fuel cells is what type, the energy of the moving rocket is what type, and the energy released into the atmosphere is what type?&quot;, [&quot;Electrical, chemical, mechanical&quot;, &quot;Chemical, mechanical, heat&quot;, &quot;Mechanical, heat, chemical&quot;, &quot;Heat, electrical, chemical&quot;], 1, 3, &quot;Step 1: Fuel cells store chemical energy (energy in the bonds of fuel molecules).\nStep 2: A moving rocket has mechanical energy (energy of motion).\nStep 3: The hot gases released into the atmosphere are heat energy.\nAnswer: Chemical → mechanical → heat.&quot;], [&quot;The glacier in a satellite image appears white and the land appears brown. Which statement explains why objects appear to be different colors?&quot;, [&quot;Objects reflect all wavelengths of light&quot;, &quot;Objects refract all wavelengths of light&quot;, &quot;Objects reflect some wavelengths of light and absorb others&quot;, &quot;Objects refract some wavelengths of light and absorb others&quot;], 2, 3, &quot;Step 1: When white light hits an object, some wavelengths are absorbed and some are reflected.\nStep 2: The reflected wavelengths are what your eyes see as color.\nStep 3: A glacier reflects all wavelengths (appears white). Land absorbs some and reflects brown wavelengths.\nTip: Color = the wavelengths of light that bounce back to your eyes.&quot;], [&quot;Assuming the glacier melts at the same rate through 2020, what should the lake water volume bars show for 1980, 2000, and 2020 (in millions of liters)?&quot;, [&quot;11, 12, 13&quot;, &quot;12, 13, 14&quot;, &quot;10, 10, 10&quot;, &quot;14, 18, 22&quot;], 0, 3, &quot;Step 1: The glacier loses 3 km² every 20 years (9→6→3→0). Each 3 km² adds 1M liters to the lake.\nStep 2: Lake started at 10M liters in 1960. By 1980: 10 + 1 = 11M liters.\nStep 3: By 2000: 11 + 1 = 12M. By 2020: 12 + 1 = 13M.\nAnswer: 11, 12, 13 (millions of liters).&quot;], [&quot;Internet services use satellite signals. Which items in a home can people replace by using the Internet?&quot;, [&quot;Refrigerator and stove&quot;, &quot;Books and newspapers&quot;, &quot;Lamp and stove&quot;, &quot;Refrigerator and lamp&quot;], 1, 3, &quot;Step 1: The Internet provides information and entertainment digitally.\nStep 2: Books and newspapers deliver information — the Internet can replace that function.\nStep 3: Refrigerators, stoves, and lamps serve physical purposes the Internet cannot replace.\nTip: The Internet replaces information-delivery devices, not physical appliances.&quot;], [&quot;Which statement describes why sound waves cannot travel beyond Earth’s atmosphere to the satellites?&quot;, [&quot;Sound waves need light to move&quot;, &quot;Sound waves cannot travel in air&quot;, &quot;Sound waves need particles to move&quot;, &quot;Sound waves cannot travel fast enough&quot;], 2, 3, &quot;Step 1: Sound travels by vibrating particles (molecules of air, water, etc.).\nStep 2: In outer space, there's a vacuum — almost no particles.\nStep 3: With no particles to vibrate, sound waves can't travel.\nTip: Sound needs a medium (solid, liquid, or gas). Space has none.&quot;], [&quot;A compass and a GPS device have similar and different features. Which feature is similar between the two?&quot;, [&quot;Cost&quot;, &quot;Number of functions&quot;, &quot;Shows which direction is north&quot;, &quot;Includes a map&quot;], 2, 3, &quot;Step 1: Both a compass and GPS can tell you which direction is north.\nStep 2: But they differ in cost, number of functions, and whether they include a map.\nStep 3: 'Shows which direction is north' is the shared feature.\nTip: Similar = what they have in common. Different = where they don't match.&quot;], [&quot;Which statement best explains how the dung beetle’s ball-rolling behavior increases its chance of reproduction?&quot;, [&quot;A rolled ball of dung can be stored above ground as food only&quot;, &quot;A rolled ball provides food for adults and growing larvae&quot;, &quot;A rolled ball increases competition among beetles for food&quot;, &quot;Rolling a dung ball has no direct connection to reproduction&quot;], 1, 4, &quot;Step 1: The beetle rolls dung into a ball to store food.\nStep 2: This food feeds both the adult beetles AND their growing larvae (babies).\nStep 3: By providing food for larvae, the beetle directly increases its reproductive success.\nTip: Males also use dung balls to attract mates with chemicals.&quot;], [&quot;Based on the experiment, what most likely happened to beetles that were wearing cardboard hats?&quot;, [&quot;The beetles could more easily move in a straight line&quot;, &quot;The beetles’ ability to see the light of stars increased&quot;, &quot;The beetles could more easily find underground storage&quot;, &quot;The beetles’ risk of having their dung ball stolen increased&quot;], 3, 4, &quot;Step 1: Cardboard hats blocked the beetles' view of the sky and stars.\nStep 2: Without starlight, beetles couldn't roll in a straight line.\nStep 3: A wobbly path takes longer, giving other beetles more time to steal the dung ball.\nAnswer: The beetles' risk of having their dung ball stolen increased.&quot;], [&quot;The experiment using cardboard hats shows that a ___ in the amount of starlight that reaches a dung beetle affects the beetle’s ability to ___.&quot;, [&quot;decrease … feed larvae&quot;, &quot;increase … feed larvae&quot;, &quot;decrease … steal a ball&quot;, &quot;increase … steal a ball&quot;], 0, 4, &quot;Step 1: The hats blocked starlight (a decrease in starlight reaching the beetle).\nStep 2: Without starlight, beetles can't navigate well and take longer to bury their dung.\nStep 3: If they can't bury the dung, they can't feed their larvae.\nAnswer: A decrease in starlight affects the beetle's ability to feed larvae.&quot;], [&quot;Using data about natural starlight and beetle behavior, which statement correctly describes the effect of bright starlight?&quot;, [&quot;Bright starlight increases the time to move a ball and increases theft risk&quot;, &quot;Bright starlight decreases the time to move a ball and decreases theft risk&quot;, &quot;Bright starlight increases the time to move a ball and decreases theft risk&quot;, &quot;Bright starlight has no effect on beetle ball-rolling behavior&quot;], 1, 4, &quot;Step 1: Look at Graph 1: full starry sky = 40 seconds, overcast = 120 seconds.\nStep 2: Bright starlight → beetles roll faster (less time) → less chance of theft.\nStep 3: Both time AND theft risk decrease with bright starlight.\nTip: Faster rolling = less exposure to competitors.&quot;], [&quot;Based on the simulated sky data (Graph 2), what can the scientists conclude?&quot;, [&quot;A dung beetle cannot survive without starlight&quot;, &quot;As the number of stars increases, rolling time increases&quot;, &quot;As brightness of starlight increases, rolling time increases&quot;, &quot;As the number of stars increases, rolling time decreases&quot;], 3, 4, &quot;Step 1: Look at Graph 2: 4,000 stars = 55s, 1,000 = 65s, 200 = 80s, 0 = 115s.\nStep 2: As the number of visible stars increases, the rolling time decreases.\nStep 3: More stars help the beetle navigate more efficiently.\nTip: The pattern shows an inverse relationship — more stars = less time.&quot;], [&quot;Which statement is the best inference from the information provided in both Graph 1 and Graph 2?&quot;, [&quot;In the absence of starlight, some dung beetle larvae are less likely to survive&quot;, &quot;The number of stars visible has no effect on dung beetle ball rolling&quot;, &quot;A natural and simulated starry night have the same effect on ball rolling&quot;, &quot;The dung beetle rolls a ball more quickly indoors than outdoors&quot;], 0, 4, &quot;Step 1: Both graphs show that less starlight = longer rolling time.\nStep 2: Longer rolling time = more risk of theft = less food for larvae.\nStep 3: If larvae don't get food, they're less likely to survive.\nAnswer: In the absence of starlight, some larvae are less likely to survive.&quot;], [&quot;Light pollution at 30°N latitude is greater than at 30°S. How would this most likely affect S. satyrus beetle populations at 30°N?&quot;, [&quot;Populations would increase because light helps beetles see better&quot;, &quot;Populations would decrease because light pollution reduces their ability to navigate&quot;, &quot;Populations would stay the same because beetles do not use starlight&quot;, &quot;Populations would increase because light pollution attracts more mates&quot;], 1, 4, &quot;Step 1: Light pollution at 30°N is greater than at 30°S (from the map).\nStep 2: More light pollution = harder to see stars = beetles can't navigate well.\nStep 3: Poor navigation = more theft, less food for larvae, fewer surviving beetles.\nAnswer: Populations would decrease at 30°N due to reduced navigation ability.&quot;], [&quot;How does the ball-rolling behavior of the S. satyrus beetle increase its probability of successful reproduction?&quot;, [&quot;Rolling attracts predators that protect the beetles from competition&quot;, &quot;Ball-rolling provides food energy for mating and larvae, and rolling in a straight line using starlight reduces theft&quot;, &quot;Ball-rolling helps beetles avoid sunlight during the daytime hours&quot;, &quot;Rolling dung balls increases competition, which makes beetles physically stronger&quot;], 1, 4, &quot;Step 1: Ball-rolling provides food energy needed for mating and feeding larvae.\nStep 2: Using starlight to roll in a straight line reduces the chance of the ball being stolen.\nStep 3: Both factors — food for reproduction AND efficient navigation — increase reproductive success.\nTip: The behavior connects to reproduction through food security AND predator/competitor avoidance.&quot;]]}, &quot;Math Practice 1&quot;: [[&quot;Which number is irrational?&quot;, [&quot;3/8&quot;, &quot;0.25&quot;, &quot;−7&quot;, &quot;√2&quot;], 3, &quot;Step 1: √2 = 1.41421... — it never ends or repeats.\nAnswer: √2 is irrational.&quot;], [&quot;Which number is rational?&quot;, [&quot;π&quot;, &quot;√5&quot;, &quot;0.125&quot;, &quot;√10&quot;], 2, &quot;Step 1: 0.125 = 125/1000 = 1/8. It can be written as a fraction.\nAnswer: 0.125 is rational.&quot;], [&quot;Which integer is closest to √50?&quot;, [&quot;8&quot;, &quot;7&quot;, &quot;6&quot;, &quot;10&quot;], 1, &quot;Step 1: 7²=49 and 8²=64.\nStep 2: 50 is between 49 and 64, closer to 49.\nAnswer: √50 ≈ 7.&quot;], [&quot;What is (2³)(2⁴)?&quot;, [&quot;2¹²&quot;, &quot;4⁷&quot;, &quot;2⁷&quot;, &quot;2¹&quot;], 2, &quot;Step 1: When multiplying same bases, add exponents.\nStep 2: 2³×2⁴ = 2^(3+4) = 2⁷.&quot;], [&quot;What is 3.2 × 10⁴ in standard form?&quot;, [&quot;3.2&quot;, &quot;32,000&quot;, &quot;320,000&quot;, &quot;3,200&quot;], 1, &quot;Step 1: 3.2 × 10⁴. Move decimal 4 places right.\nStep 2: 3.2 → 32,000.&quot;], [&quot;Which value equals 7.5 × 10⁻³?&quot;, [&quot;0.0075&quot;, &quot;7500&quot;, &quot;0.075&quot;, &quot;0.00075&quot;], 0, &quot;Step 1: 10⁻³ means move decimal 3 places left.\nStep 2: 7.5 → 0.75 → 0.075 → 0.0075.&quot;], [&quot;Which estimate is closest to √20?&quot;, [&quot;4.0&quot;, &quot;4.5&quot;, &quot;5.0&quot;, &quot;5.5&quot;], 1, &quot;Step 1: 4²=16 and 5²=25. 20 is between.\nStep 2: 4.5²=20.25 ≈ 20.\nAnswer: √20 ≈ 4.5&quot;], [&quot;Which relation is a function?&quot;, [&quot;{(2,4),(2,6),(3,8)}&quot;, &quot;{(1,3),(1,5),(2,7)}&quot;, &quot;{(1,3),(2,5),(3,7)}&quot;, &quot;{(0,1),(0,2),(0,3)}&quot;], 2, &quot;Step 1: A function has no repeated x-values.\nStep 2: {(1,3),(2,5),(3,7)} — all x-values are different ✓.&quot;], [&quot;In y = 4x − 1, what is the output when x = 3?&quot;, [&quot;10&quot;, &quot;7&quot;, &quot;13&quot;, &quot;11&quot;], 3, &quot;Step 1: y=4x-1. When x=3: y=4(3)-1=12-1=11.&quot;], [&quot;Which table represents a linear function?&quot;, [&quot;y: 2,4,8,16&quot;, &quot;y: 1,4,9,16&quot;, &quot;y: 5,8,11,14&quot;, &quot;y: 3,3,6,12&quot;], 2, &quot;Step 1: Linear functions have constant differences.\nStep 2: y: 5,8,11,14 — each increases by 3 ✓.&quot;], [&quot;Slope of function pick(idx){
  const q=cQs[qi],cor=q[2],correct=idx===cor;
  if(mode===&quot;1v1&quot;){if(curPlayer===1&amp;&amp;correct)p1sc++;else if(curPlayer===2&amp;&amp;correct)p2sc++;}
  else{
    if(correct)sc++;
    // Streak (solo mode only)
    if(correct){streak++;if(streak&gt;bestStreak)bestStreak=streak;}
    else{streak=0;}
    const se=document.getElementById(&quot;streak&quot;);
    if(streak&gt;=2){se.classList.add(&quot;show&quot;);se.textContent=&quot;🔥 &quot;+streak;se.classList.add(&quot;pulse&quot;);setTimeout(()=&gt;se.classList.remove(&quot;pulse&quot;),250);}
    else{se.classList.remove(&quot;show&quot;);}
  }
  ua.push({chosen:idx,correct:cor,qt:q[0],ct:q[1][cor],cht:q[1][idx],player:curPlayer,qRef:q});
  document.querySelectorAll(&quot;.cb&quot;).forEach((b,i)=&gt;{
    b.disabled=true;
    if(i===cor){b.classList.add(&quot;correct&quot;);b.querySelector(&quot;.ci&quot;).textContent=&quot;✓&quot;;}
    else if(i===idx&amp;&amp;idx!==cor){b.classList.add(&quot;wrong&quot;);b.querySelector(&quot;.ci&quot;).textContent=&quot;✗&quot;;}
    else b.classList.add(&quot;faded&quot;);
  });
  const fb=document.getElementById(&quot;fb&quot;);
  if(correct){fb.className=&quot;fb show correct&quot;;document.getElementById(&quot;fbi&quot;).textContent=&quot;✓&quot;;document.getElementById(&quot;fbt&quot;).textContent=&quot;Correct! Great job!&quot;;document.getElementById(&quot;fb-exp&quot;).className=&quot;fb-exp&quot;;}
  else{fb.className=&quot;fb show wrong&quot;;document.getElementById(&quot;fbi&quot;).textContent=&quot;✗&quot;;document.getElementById(&quot;fbt&quot;).innerHTML=&quot;Not quite. The correct answer is &lt;strong&gt;&quot;+q[1][cor]+&quot;&lt;/strong&gt;.&quot;;
    var expIdx=hasPassages?4:3;if(q.length&gt;expIdx&amp;&amp;q[expIdx]){document.getElementById(&quot;fb-exp-text&quot;).textContent=q[expIdx];document.getElementById(&quot;fb-exp&quot;).className=&quot;fb-exp show&quot;;}else{document.getElementById(&quot;fb-exp&quot;).className=&quot;fb-exp&quot;;}
  }  document.getElementById(&quot;scr&quot;).textContent=mode===&quot;1v1&quot;?(&quot;P1:&quot;+p1sc+&quot; P2:&quot;+p2sc):(&quot;Score: &quot;+sc+&quot;/&quot;+(qi+1));
  const nx=document.getElementById(&quot;nx&quot;);nx.className=&quot;nx show&quot;;
  nx.textContent=qi&lt;cQs.length-1?&quot;Next Question →&quot;:&quot;See Results →&quot;;
}

function nextQ(){
  qi++;
  if(qi&gt;=cQs.length){showRes();return;}
  if(mode===&quot;1v1&quot;){
    const nextP=(qi%2===0)?1:2;
    const prevP=nextP===1?2:1;
    document.getElementById(&quot;ho-icon&quot;).textContent=nextP===1?&quot;🟢&quot;:&quot;🔵&quot;;
    document.getElementById(&quot;ho-title&quot;).textContent=&quot;Pass to Player &quot;+nextP+&quot;!&quot;;
    document.getElementById(&quot;ho-msg&quot;).textContent=`Player ${prevP} answered. Now it's Player ${nextP}'s turn.`;
    document.getElementById(&quot;ho-scores-div&quot;).innerHTML=
      '&lt;div class=&quot;ho-score-box p1&quot;&gt;🟢 Player 1&lt;br&gt;&lt;strong&gt;'+p1sc+' pts&lt;/strong&gt;&lt;/div&gt;'+
      '&lt;div class=&quot;ho-score-box p2&quot;&gt;🔵 Player 2&lt;br&gt;&lt;strong&gt;'+p2sc+' pts&lt;/strong&gt;&lt;/div&gt;';
    document.getElementById(&quot;ho-btn&quot;).textContent=&quot;Player &quot;+nextP+&quot; Ready →&quot;;
    document.getElementById(&quot;handoff-overlay&quot;).classList.add(&quot;show&quot;);
  } else {renderQ();}
}

function continueHandoff(){closeOverlay(&quot;handoff-overlay&quot;);renderQ();}

function showRes(){
  const tot=cQs.length;
  const p1q=Math.ceil(tot/2),p2q=Math.floor(tot/2);
  let badge,msg,sub,bc;
  if(mode===&quot;1v1&quot;){
    const p1pct=p1q&gt;0?Math.round(p1sc/p1q*100):0;
    const p2pct=p2q&gt;0?Math.round(p2sc/p2q*100):0;
    if(p1pct&gt;p2pct){badge=&quot;🏆&quot;;msg=&quot;Player 1 Wins!&quot;;sub=&quot;Congratulations Player 1!&quot;;bc=&quot;#1A6B4A&quot;;}
    else if(p2pct&gt;p1pct){badge=&quot;🏆&quot;;msg=&quot;Player 2 Wins!&quot;;sub=&quot;Congratulations Player 2!&quot;;bc=&quot;#7C3AED&quot;;}
    else{badge=&quot;🤝&quot;;msg=&quot;It's a Tie!&quot;;sub=&quot;Both players scored equally — well done!&quot;;bc=&quot;#D97706&quot;;}
    document.getElementById(&quot;rb&quot;).textContent=badge;
    document.getElementById(&quot;rsc&quot;).textContent=p1sc+&quot; – &quot;+p2sc;
    document.getElementById(&quot;rl2&quot;).textContent=&quot;Player 1 vs Player 2&quot;;
    document.getElementById(&quot;rm&quot;).textContent=msg;
    document.getElementById(&quot;rsb&quot;).textContent=sub;
    const bar=document.getElementById(&quot;rba&quot;);bar.style.background=bc;bar.style.width=&quot;0%&quot;;
    setTimeout(()=&gt;bar.style.width=Math.max(p1pct,p2pct)+&quot;%&quot;,100);
    const dr=document.getElementById(&quot;duel-res&quot;);dr.style.display=&quot;block&quot;;
    const p1win=p1pct&gt;p2pct,p2win=p2pct&gt;p1pct;
    document.getElementById(&quot;duel-scores&quot;).innerHTML=
      '&lt;div class=&quot;ds-box p1'+(p1win?&quot; winner&quot;:&quot;&quot;)+'&quot;&gt;&lt;div class=&quot;ds-name p1&quot;&gt;🟢 Player 1&lt;/div&gt;&lt;div class=&quot;ds-score&quot;&gt;'+p1sc+&quot;/&quot;+p1q+'&lt;/div&gt;&lt;div class=&quot;ds-pct&quot;&gt;'+p1pct+'%&lt;/div&gt;'+(p1win?'&lt;div class=&quot;winner-badge&quot;&gt;👑 WINNER&lt;/div&gt;':&quot;&quot;)+
      '&lt;/div&gt;&lt;div class=&quot;ds-box p2'+(p2win?&quot; winner&quot;:&quot;&quot;)+'&quot;&gt;&lt;div class=&quot;ds-name p2&quot;&gt;🔵 Player 2&lt;/div&gt;&lt;div class=&quot;ds-score&quot;&gt;'+p2sc+&quot;/&quot;+p2q+'&lt;/div&gt;&lt;div class=&quot;ds-pct&quot;&gt;'+p2pct+'%&lt;/div&gt;'+(p2win?'&lt;div class=&quot;winner-badge&quot;&gt;👑 WINNER&lt;/div&gt;':&quot;&quot;)+
      &quot;&lt;/div&gt;&quot;;
  } else {
    document.getElementById(&quot;duel-res&quot;).style.display=&quot;none&quot;;
    const pct=Math.round(sc/tot*100);
    if(pct&gt;=90){badge=&quot;🏆&quot;;msg=&quot;Outstanding!&quot;;sub=&quot;You are really ready for the MCA!&quot;;bc=&quot;#16A34A&quot;;}
    else if(pct&gt;=75){badge=&quot;⭐&quot;;msg=&quot;Great job!&quot;;sub=&quot;Strong performance — review the questions you missed.&quot;;bc=&quot;#27AE72&quot;;}
    else if(pct&gt;=60){badge=&quot;👍&quot;;msg=&quot;Good effort!&quot;;sub=&quot;Keep reviewing and try again!&quot;;bc=&quot;#D97706&quot;;}
    else{badge=&quot;📚&quot;;msg=&quot;Keep practicing!&quot;;sub=&quot;Review with your teacher and try again!&quot;;bc=&quot;#DC2626&quot;;}
    document.getElementById(&quot;rb&quot;).textContent=badge;
    document.getElementById(&quot;rsc&quot;).textContent=sc+&quot; / &quot;+tot;
    document.getElementById(&quot;rl2&quot;).textContent=pct+&quot;% Correct&quot;;
    document.getElementById(&quot;rm&quot;).textContent=msg;
    document.getElementById(&quot;rsb&quot;).textContent=sub;
    const bar=document.getElementById(&quot;rba&quot;);bar.style.background=bc;bar.style.width=&quot;0%&quot;;
    setTimeout(()=&gt;bar.style.width=pct+&quot;%&quot;,100);
  }
  // Review Missed button: solo mode only, only if there are any misses
  const rbBtn=document.getElementById(&quot;review-btn&quot;);
  const missedCount=ua.filter(a=&gt;a.chosen!==a.correct).length;
  if(mode!==&quot;1v1&quot;&amp;&amp;missedCount&gt;0&amp;&amp;missedCount&lt;ua.length){
    rbBtn.style.display=&quot;&quot;;
    rbBtn.textContent=&quot;🎯 Review Missed (&quot;+missedCount+&quot;)&quot;;
  }else{rbBtn.style.display=&quot;none&quot;;}
  const bd=document.getElementById(&quot;bdd&quot;);bd.innerHTML=&quot;&lt;h4&gt;Question Review&lt;/h4&gt;&quot;;
  ua.forEach((a,i)=&gt;{
    const ok=a.chosen===a.correct,el=document.createElement(&quot;div&quot;);el.className=&quot;bdi&quot;;
    const qt=a.qt.length&gt;75?a.qt.substring(0,75)+&quot;...&quot;:a.qt;
    const plabel=mode===&quot;1v1&quot;?&quot; (P&quot;+a.player+&quot;)&quot;:&quot;&quot;;
    el.innerHTML='&lt;div class=&quot;bn '+(ok?&quot;ok&quot;:&quot;bad&quot;)+'&quot;&gt;'+(i+1)+'&lt;/div&gt;&lt;div class=&quot;bq&quot;&gt;'+qt+plabel+'&lt;/div&gt;&lt;div&gt;'+(ok?&quot;&quot;:'&lt;span class=&quot;bwr&quot;&gt;'+a.cht+&quot;&lt;/span&gt;&quot;)+'&lt;span class=&quot;ba&quot;&gt;'+a.ct+&quot;&lt;/span&gt;&lt;/div&gt;&quot;;
    bd.appendChild(el);
  });
  show(&quot;s3&quot;);
}
function retry(){_startQuiz();}
function retryMissed(){
  // Rebuild cQs from only the missed questions, keep passages so passage-linked questions still work
  const missed=ua.filter(a=&gt;a.chosen!==a.correct).map(a=&gt;a.qRef);
  if(missed.length===0)return;
  cQs=missed;
  qi=0;sc=0;ua=[];p1sc=0;p2sc=0;curPlayer=1;curPassageIdx=-1;passageOpen=true;
  streak=0;bestStreak=0;
  document.getElementById(&quot;streak&quot;).classList.remove(&quot;show&quot;);
  document.getElementById(&quot;qtl&quot;).textContent=cG+&quot; — &quot;+cS+&quot; · Review&quot;;
  show(&quot;s2&quot;);renderQ();
}
