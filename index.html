&lt;script&gt;
const D={&quot;Grade 3&quot;: {&quot;color&quot;: &quot;#1F3864&quot;, &quot;subjects&quot;: {&quot;Reading&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Section 1 — The Library Card&quot;, &quot;text&quot;: &quot;&lt;p&gt;On Tuesday, Ms. Kim held up a stack of small envelopes. \&quot;Your new library cards are here,\&quot; she said. Every student in Room 12 cheered. Ava had been waiting all week. She loved the school library, but this card meant she could visit the public library after dinner and on weekends too.&lt;/p&gt;&lt;p&gt;When Ms. Kim called Ava's name, Ava opened her envelope quickly. Inside was a bright blue card with her name printed in black letters. She smiled so hard her cheeks felt warm. Then she heard a tiny sigh from the desk beside her. Her friend Leo was staring at an empty envelope.&lt;/p&gt;&lt;p&gt;\&quot;Maybe it fell out,\&quot; Ava whispered. Leo looked under his desk and inside his backpack. He checked the floor two times. No card. His shoulders drooped. \&quot;My grandma said we could go tonight,\&quot; he said quietly.&lt;/p&gt;&lt;p&gt;At recess, Ava could not stop thinking about Leo's face. She wanted to race home and show her card to her older sister, but she also wanted to help. After lunch, Ava asked Ms. Kim if there was a list of students who had not received their cards yet. Ms. Kim checked the office and found that Leo's card had been placed in the envelope for another class by mistake.&lt;/p&gt;&lt;p&gt;The next morning, Leo hurried into the room before the bell rang. He held up his library card like a tiny flag. \&quot;I used it last night!\&quot; he said. \&quot;I checked out a book about space rocks.\&quot; Ava laughed. She still loved her own blue card, but now it seemed even better that Leo had his too.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Section 2 — How Seeds Travel&quot;, &quot;text&quot;: &quot;&lt;p&gt;Plants cannot walk to new places, but their seeds can travel. A seed that moves away from its parent plant has a better chance of finding sunlight, water, and space to grow. Different plants use different ways to send seeds on a trip.&lt;/p&gt;&lt;p&gt;Some seeds travel by wind. Dandelion seeds have soft, feathery tops that act like tiny parachutes. When the wind blows, the seeds lift into the air and drift away. Maple trees also use wind. Their seeds spin as they fall, which helps them stay in the air longer.&lt;/p&gt;&lt;p&gt;Other seeds travel by water. A coconut can float across the ocean because it has a thick outer covering filled with air. Some plants near rivers drop seeds into the water, and the current carries the seeds downstream.&lt;/p&gt;&lt;p&gt;Animals can move seeds too. A burr may cling to a dog's fur or a hiker's sock. Later, the burr falls off in a new place. Birds also help. They eat fruit, fly to another area, and drop the seeds there.&lt;/p&gt;&lt;p&gt;No matter how a seed moves, its goal is the same: to land in a place where a new plant can grow.&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;th&gt;Plant&lt;/th&gt;&lt;th&gt;How the seed travels&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Dandelion&lt;/td&gt;&lt;td&gt;Wind lifts the seed through the air&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Coconut&lt;/td&gt;&lt;td&gt;Water carries the seed&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Burr plant&lt;/td&gt;&lt;td&gt;Animal fur moves the seed&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&quot;}, {&quot;title&quot;: &quot;Section 3 — Rain on the Porch (Poem)&quot;, &quot;text&quot;: &quot;&lt;p style='font-style:italic;line-height:2'&gt;Rain taps the porch rail,&lt;br&gt;soft as fingers on a drum.&lt;br&gt;A robin hops once, then waits.&lt;br&gt;The garden holds its breath.&lt;br&gt;&lt;br&gt;Then puddles bloom on the walk.&lt;br&gt;The old red bucket shines.&lt;br&gt;Grandpa says the beans will cheer&lt;br&gt;when the clouds are done.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Section 4 — A Trip to the Farm (Paired Texts)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Text A: Mia's Journal&lt;/strong&gt;&lt;p&gt;Today our class visited Sunny Hill Farm. The barn smelled like hay and warm wood. I laughed when one goat tried to nibble the corner of my map. My favorite part was feeding the chickens. They rushed toward the grain so fast that I stepped back and almost bumped into Mrs. Torres. I was nervous at first, but by the end I wanted to stay longer.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Text B: Farm Visitor Guide&lt;/strong&gt;&lt;p&gt;Sunny Hill Farm welcomes school groups in spring and fall. Visitors may tour the barn, learn how chickens and goats are cared for, and see the vegetable garden. For safety, guests must walk slowly, listen to the guide, and keep food in the containers provided by staff. The most popular student activity is feeding the chickens during the morning tour.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Section 5 — Why Our School Needs More Recess&quot;, &quot;text&quot;: &quot;&lt;p&gt;Our school should add ten more minutes of recess each day. Recess is not just a break from class. It helps students return to learning with fresh energy.&lt;/p&gt;&lt;p&gt;First, more recess gives students more time to move. Running, climbing, and playing games help children stretch their bodies after sitting in class. When students have a chance to move, they often come back to the classroom ready to focus.&lt;/p&gt;&lt;p&gt;Second, recess helps students practice solving small problems on their own. During a game, children decide rules, take turns, and work through disagreements. These are important skills to use in class too.&lt;/p&gt;&lt;p&gt;Some people may worry that more recess would shorten learning time. But ten extra minutes could help students pay better attention later in the day. A short break can make work time stronger, not weaker.&lt;/p&gt;&lt;p&gt;Adding a little more recess would help students move, think, and work together. That is why our school should make room for it.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Section 6 — Learning About Pet Rabbits (Multi-Source)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Source A: Kids' Magazine Note&lt;/strong&gt;&lt;p&gt;Rabbits need fresh water, safe places to hide, and room to hop. A rabbit that sits in a tiny space all day can become stressed. Owners should make sure the rabbit has time to move and explore in a safe area.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Source B: Pet Store Poster&lt;/strong&gt;&lt;p&gt;\&quot;Our bunny kit has everything your rabbit will ever need!\&quot;&lt;br&gt;Includes: bowl, brush, toy ball, and small starter cage&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Source C: Animal Shelter Care Sheet&lt;/strong&gt;&lt;p&gt;Before bringing home a rabbit, ask how much space it needs as an adult and what foods a veterinarian recommends. Rabbits need hay every day, fresh water, and a place to hide. A shelter or veterinarian can help families choose supplies that fit the rabbit's size and needs.&lt;/p&gt;&quot;}], &quot;questions&quot;: [[&quot;What lesson does Ava learn in the library card story?&quot;, [&quot;A small act of help can make someone else's day better.&quot;, &quot;It is best to keep quiet when a problem happens.&quot;, &quot;Library cards should stay at school only.&quot;, &quot;Recess is the best time to solve every problem.&quot;], 0, 0], [&quot;Which summary best tells the most important events from the library card story?&quot;, [&quot;Ava gets her library card, notices Leo is missing his, asks for help, and Leo gets his card the next day.&quot;, &quot;Ava loses her library card at recess and finds it in the office.&quot;, &quot;Leo teaches Ava how to check out a book about space rocks.&quot;, &quot;Ms. Kim gives every student two library cards instead of one.&quot;], 0, 0], [&quot;Why does the author include the part about recess in the library card story?&quot;, [&quot;To show that Ava keeps thinking about Leo and decides to help&quot;, &quot;To explain the rules of the playground game&quot;, &quot;To prove that Ava forgot about the library&quot;, &quot;To tell why Leo missed school the day before&quot;], 0, 0], [&quot;How does the story's point of view help the reader in the library card story?&quot;, [&quot;It lets the reader understand what Ava notices and why she decides to act.&quot;, &quot;It tells the reader what every student in every class is thinking.&quot;, &quot;It makes Leo the narrator of the story.&quot;, &quot;It turns the story into a set of directions.&quot;], 0, 0], [&quot;What does the word 'drooped' most likely mean when Leo's shoulders drooped?&quot;, [&quot;stood up tall&quot;, &quot;fell down in a tired or sad way&quot;, &quot;moved quickly&quot;, &quot;shook with laughter&quot;], 1, 0], [&quot;Why is 'tiny flag' a strong comparison when Leo holds up his library card?&quot;, [&quot;It shows Leo is holding his card high because he feels proud and excited.&quot;, &quot;It proves the card is made from cloth.&quot;, &quot;It means Leo wants to hide the card from Ava.&quot;, &quot;It shows the card is bigger than a book.&quot;], 0, 0], [&quot;What does 'cheered' mean when students cheered for their library cards?&quot;, [&quot;asked a question&quot;, &quot;became worried&quot;, &quot;showed excitement&quot;, &quot;walked away&quot;], 2, 0], [&quot;What is the main idea of the article about how seeds travel?&quot;, [&quot;Seeds all travel in exactly the same way.&quot;, &quot;Plants use several different ways to move seeds to new places.&quot;, &quot;Only water can carry seeds far away.&quot;, &quot;Birds are the fastest animals in the world.&quot;], 1, 1], [&quot;Which detail best supports the main idea about seeds traveling?&quot;, [&quot;A seed needs sunlight, water, and space to grow.&quot;, &quot;Dandelion seeds have soft tops, coconuts can float, and burrs cling to fur.&quot;, &quot;Plants cannot walk to new places.&quot;, &quot;Some plants live near rivers.&quot;], 1, 1], [&quot;How does the chart in the seed travel article help the reader?&quot;, [&quot;It gives a quick way to compare plants and how their seeds move.&quot;, &quot;It tells a made-up story about a seed.&quot;, &quot;It explains how to grow a tree indoors.&quot;, &quot;It proves coconuts are the only seeds in the world.&quot;], 0, 1], [&quot;How is the seed travel article organized?&quot;, [&quot;It tells one long story about a single seed.&quot;, &quot;It explains one travel method at a time.&quot;, &quot;It lists plant names in alphabetical order only.&quot;, &quot;It gives directions for building a parachute.&quot;], 1, 1], [&quot;What is the author's purpose for writing the seed travel article?&quot;, [&quot;To entertain readers with a silly poem&quot;, &quot;To explain ways seeds move from place to place&quot;, &quot;To convince readers never to touch plants&quot;, &quot;To tell readers to buy coconuts&quot;], 1, 1], [&quot;What does the word 'drift' mean when dandelion seeds drift away?&quot;, [&quot;move gently through the air&quot;, &quot;fall straight down like a rock&quot;, &quot;grow new roots&quot;, &quot;hide under leaves&quot;], 0, 1], [&quot;Which source would be most useful to learn whether water can move seeds?&quot;, [&quot;A chart showing which seeds float and where they were found&quot;, &quot;A poster about favorite fruits&quot;, &quot;A joke book about trees&quot;, &quot;A painting of a river&quot;], 0, 1], [&quot;What idea does the rain poem share?&quot;, [&quot;Rain can make an ordinary place feel lively.&quot;, &quot;Rain always ruins a day outdoors.&quot;, &quot;Birds dislike every storm.&quot;, &quot;Buckets should never be left outside.&quot;], 0, 2], [&quot;Why does the poet use short lines in the rain poem?&quot;, [&quot;To make the poem feel calm and easy to picture&quot;, &quot;To tell a long list of facts&quot;, &quot;To turn the poem into a news report&quot;, &quot;To confuse the reader on purpose&quot;], 0, 2], [&quot;What does the poet mean by 'puddles bloom' in the rain poem?&quot;, [&quot;Flowers are growing inside the puddles.&quot;, &quot;Puddles seem to appear and spread like blossoms.&quot;, &quot;The puddles are making a loud boom sound.&quot;, &quot;The walkway is covered in leaves.&quot;], 1, 2], [&quot;How does the speaker seem to feel about the rain in the poem?&quot;, [&quot;The speaker notices the rain with interest and calm.&quot;, &quot;The speaker is angry at the clouds.&quot;, &quot;The speaker is bored by the garden.&quot;, &quot;The speaker is afraid to go near the porch.&quot;], 0, 2], [&quot;What does 'holds its breath' suggest about the garden in the rain poem?&quot;, [&quot;The garden is waiting very still.&quot;, &quot;The garden is running away.&quot;, &quot;The garden is shouting loudly.&quot;, &quot;The garden is full of smoke.&quot;], 0, 2], [&quot;Why is 'soft as fingers on a drum' a helpful comparison in the rain poem?&quot;, [&quot;It shows the rain sounds gentle, not heavy.&quot;, &quot;It proves the rain is making music on purpose.&quot;, &quot;It means the porch rail is made of cloth.&quot;, &quot;It shows the rain falls only once.&quot;], 0, 2], [&quot;What changes from the first stanza to the second in the rain poem?&quot;, [&quot;The poem moves from silence to signs of the rain's effects.&quot;, &quot;The poem changes from rain to bright sunshine only.&quot;, &quot;The poem changes from a porch to a city bus.&quot;, &quot;The poem stops describing nature at all.&quot;], 0, 2], [&quot;What is true about both the farm journal and the farm visitor guide?&quot;, [&quot;Both texts help the reader understand a visit to Sunny Hill Farm.&quot;, &quot;Both texts are poems about chickens.&quot;, &quot;Both texts explain how to build a barn.&quot;, &quot;Both texts are written by Mrs. Torres.&quot;], 0, 3], [&quot;How does the heading 'Farm Visitor Guide' help the reader?&quot;, [&quot;It shows Text B gives information and directions for visitors.&quot;, &quot;It proves Mia wrote the guide.&quot;, &quot;It tells the reader the farm is closed.&quot;, &quot;It makes the text rhyme.&quot;], 0, 3], [&quot;Which detail belongs in a firsthand account like Mia's journal?&quot;, [&quot;Visitors may tour the barn in spring and fall.&quot;, &quot;Guests must walk slowly and listen to the guide.&quot;, &quot;I almost bumped into Mrs. Torres when the chickens rushed forward.&quot;, &quot;The most popular activity is feeding the chickens.&quot;], 2, 3], [&quot;How is the Farm Visitor Guide different from Mia's journal?&quot;, [&quot;Text B gives general facts and rules, while Text A shares personal feelings.&quot;, &quot;Text B is made-up fiction, while Text A is a science article.&quot;, &quot;Text B is only about goats, while Text A is only about chickens.&quot;, &quot;Text B tells what Mia thought, while Text A gives safety rules.&quot;], 0, 3], [&quot;Why might a reader use the Farm Visitor Guide after reading Mia's journal?&quot;, [&quot;To learn the rules for visiting the farm safely&quot;, &quot;To find out how Mia felt at the end of the trip&quot;, &quot;To hear the goat chewing the map&quot;, &quot;To read a poem about hay&quot;], 0, 3], [&quot;In Mia's journal, what does 'nibble' most likely mean?&quot;, [&quot;take small bites&quot;, &quot;run in circles&quot;, &quot;sleep quietly&quot;, &quot;jump very high&quot;], 0, 3], [&quot;Which text would be more useful for finding out the farm's safety rules?&quot;, [&quot;Text A, because journals always list rules&quot;, &quot;Text A, because it tells about Mia's favorite part&quot;, &quot;Text B, because it directly gives visitor directions and rules&quot;, &quot;Text B, because it has more feelings in it&quot;], 2, 3], [&quot;What is the author's opinion in the recess passage?&quot;, [&quot;The school should add ten more minutes of recess each day.&quot;, &quot;The school should cancel recess during winter.&quot;, &quot;Students should do homework at recess.&quot;, &quot;Recess should happen only once a week.&quot;], 0, 4], [&quot;Which summary best matches the recess article?&quot;, [&quot;The author argues for more recess because it can help students move, focus, and solve problems together.&quot;, &quot;The author explains how to build a playground.&quot;, &quot;The author lists every game students play at recess.&quot;, &quot;The author says recess should be replaced with extra tests.&quot;], 0, 4], [&quot;Why does the author include the words 'First' and 'Second' in the recess article?&quot;, [&quot;To organize the reasons clearly for the reader&quot;, &quot;To make the passage sound like a poem&quot;, &quot;To show the author changed the topic completely&quot;, &quot;To tell the exact times of recess&quot;], 0, 4], [&quot;Which detail best supports the idea that recess can help students focus later?&quot;, [&quot;A short break can make work time stronger.&quot;, &quot;Children decide rules during games.&quot;, &quot;Students sit in class.&quot;, &quot;Recess happens each day.&quot;], 0, 4], [&quot;Which statement from the recess article is mostly a claim that would need more proof?&quot;, [&quot;More recess helps students return to learning with fresh energy.&quot;, &quot;Running and climbing are kinds of movement.&quot;, &quot;Children take turns during games.&quot;, &quot;A day has twenty-four hours.&quot;], 0, 4], [&quot;How does the author answer the worry about less learning time in the recess article?&quot;, [&quot;By saying learning time does not matter&quot;, &quot;By explaining that a short break can help students pay attention better later&quot;, &quot;By changing the topic to lunch&quot;, &quot;By saying recess should last an hour&quot;], 1, 4], [&quot;What does the word 'focus' most nearly mean in the recess article?&quot;, [&quot;pay attention&quot;, &quot;run faster&quot;, &quot;feel sleepy&quot;, &quot;forget directions&quot;], 0, 4], [&quot;What is the main idea of Source A about pet rabbits?&quot;, [&quot;Rabbits can live safely in any small box.&quot;, &quot;Rabbits need water, hiding places, and room to move.&quot;, &quot;Rabbits should eat toy balls.&quot;, &quot;Rabbits do not need care every day.&quot;], 1, 5], [&quot;What can the reader learn by using Source A and Source C about pet rabbits together?&quot;, [&quot;Rabbits need space and daily care, so families should choose supplies carefully.&quot;, &quot;Toy balls are the only important item for a rabbit.&quot;, &quot;Rabbits do best without water.&quot;, &quot;A pet store poster is the same as a care sheet.&quot;], 0, 5], [&quot;Which sentence from the pet store poster sounds most like a persuasive claim?&quot;, [&quot;Includes: bowl, brush, toy ball, and small starter cage&quot;, &quot;Our bunny kit has everything your rabbit will ever need!&quot;, &quot;Pet Store Poster&quot;, &quot;small starter cage&quot;], 1, 5], [&quot;Which source gives the best support for what a rabbit should eat every day?&quot;, [&quot;Source A only&quot;, &quot;Source B only&quot;, &quot;Source C, because it mentions hay, water, and veterinarian advice&quot;, &quot;None of the sources talks about food&quot;], 2, 5], [&quot;Which source is most useful if a student wants advice from experts about rabbit care?&quot;, [&quot;Source A&quot;, &quot;Source B&quot;, &quot;Source C&quot;, &quot;All sources are equally expert&quot;], 2, 5], [&quot;Which source about pet rabbits is most likely to show bias because it is trying to sell something?&quot;, [&quot;Source A&quot;, &quot;Source B&quot;, &quot;Source C&quot;, &quot;None of them&quot;], 1, 5], [&quot;A student wants to know whether a small cage is enough for a rabbit. Which source is most relevant?&quot;, [&quot;Source A, because it says rabbits need room to hop&quot;, &quot;Source B, because it uses big letters&quot;, &quot;Source C only because it mentions water&quot;, &quot;None of the sources say anything about space&quot;], 0, 5]]}, &quot;Math Practice 1&quot;: [[&quot;What is 47 + 36?&quot;, [&quot;73&quot;, &quot;83&quot;, &quot;93&quot;, &quot;74&quot;], 1, &quot;Step 1: Add the ones: 7 + 6 = 13. Write 3, carry 1.\nStep 2: Add the tens: 4 + 3 + 1 = 8.\nAnswer: 83&quot;], [&quot;There are 4 groups of 6 apples. How many apples are there in all?&quot;, [&quot;10&quot;, &quot;20&quot;, &quot;24&quot;, &quot;28&quot;], 2, &quot;Step 1: This is a multiplication problem: 4 groups × 6 apples.\nStep 2: 4 × 6 = 24 apples.\nTip: Skip count by 6: 6, 12, 18, 24.&quot;], [&quot;Which fraction is equivalent to 1/2?&quot;, [&quot;1/4&quot;, &quot;2/4&quot;, &quot;3/4&quot;, &quot;3/8&quot;], 1, &quot;Step 1: To find a fraction equal to 1/2, multiply top and bottom by the same number.\nStep 2: 1×2 = 2 and 2×2 = 4, so 1/2 = 2/4.\nTip: If you divide a shape in 4 parts and shade 2, that's the same as shading half.&quot;], [&quot;What is 8 x 7?&quot;, [&quot;54&quot;, &quot;56&quot;, &quot;63&quot;, &quot;48&quot;], 1, &quot;Step 1: Multiply 8 × 7.\nStep 2: Think of it as 8 × 5 = 40, plus 8 × 2 = 16.\nStep 3: 40 + 16 = 56.&quot;], [&quot;A rectangle has length 5 cm and width 3 cm. What is its perimeter?&quot;, [&quot;8 cm&quot;, &quot;15 cm&quot;, &quot;16 cm&quot;, &quot;10 cm&quot;], 2, &quot;Step 1: Perimeter = add all sides: 5 + 3 + 5 + 3.\nStep 2: 5 + 5 = 10 and 3 + 3 = 6.\nStep 3: 10 + 6 = 16 cm.\nTip: Perimeter means the distance around the shape.&quot;], [&quot;Round 374 to the nearest hundred.&quot;, [&quot;300&quot;, &quot;370&quot;, &quot;380&quot;, &quot;400&quot;], 3, &quot;Step 1: Look at the hundreds digit: 3.\nStep 2: Look at the tens digit: 7. Since 7 ≥ 5, round up.\nStep 3: 374 rounds up to 400.&quot;], [&quot;What is 81 / 9?&quot;, [&quot;7&quot;, &quot;8&quot;, &quot;9&quot;, &quot;10&quot;], 2, &quot;Step 1: Think: what times 9 equals 81?\nStep 2: 9 × 9 = 81, so 81 ÷ 9 = 9.\nTip: Division is the opposite of multiplication.&quot;], [&quot;Which number is even?&quot;, [&quot;37&quot;, &quot;51&quot;, &quot;84&quot;, &quot;99&quot;], 2, &quot;Step 1: An even number ends in 0, 2, 4, 6, or 8.\nStep 2: Check each: 37 ends in 7 (odd), 51 ends in 1 (odd), 84 ends in 4 (even!), 99 ends in 9 (odd).\nAnswer: 84&quot;], [&quot;3 out of 8 equal parts are shaded. What fraction is shaded?&quot;, [&quot;3/5&quot;, &quot;5/8&quot;, &quot;3/8&quot;, &quot;8/3&quot;], 2, &quot;Step 1: 3 parts are shaded out of 8 total parts.\nStep 2: Write it as a fraction: 3/8.\nTip: The bottom number is the total parts, the top is how many are shaded.&quot;], [&quot;24 marbles are shared equally among 6 friends. How many does each friend get?&quot;, [&quot;3&quot;, &quot;4&quot;, &quot;6&quot;, &quot;18&quot;], 1, &quot;Step 1: This is a division problem: 24 ÷ 6.\nStep 2: Think: 6 × ? = 24. Since 6 × 4 = 24, each friend gets 4.\nTip: Division means sharing equally.&quot;], [&quot;The hour hand is on 3 and the minute hand is on 12. What time is it?&quot;, [&quot;12:03&quot;, &quot;3:00&quot;, &quot;3:12&quot;, &quot;12:15&quot;], 1, &quot;Step 1: The hour hand points to the hour number.\nStep 2: Hour hand on 3 = 3 o'clock. Minute hand on 12 = :00.\nAnswer: 3:00&quot;], [&quot;Which symbol makes this true? 456 ___ 465&quot;, [&quot;&gt;&quot;, &quot;&lt;&quot;, &quot;=&quot;, &quot;+&quot;], 1, &quot;Step 1: Compare digit by digit from left to right.\nStep 2: Both start with 4. Next digit: 5 vs 6. Since 5 &lt; 6, we know 456 &lt; 465.\nAnswer: &lt; (less than)&quot;], [&quot;A rectangle has length 7 units and width 4 units. What is its area?&quot;, [&quot;11 sq units&quot;, &quot;22 sq units&quot;, &quot;28 sq units&quot;, &quot;14 sq units&quot;], 2, &quot;Step 1: Area = length × width.\nStep 2: 7 × 4 = 28 square units.\nTip: Area tells how many unit squares fit inside.&quot;], [&quot;What is 500 - 263?&quot;, [&quot;237&quot;, &quot;247&quot;, &quot;337&quot;, &quot;763&quot;], 0, &quot;Step 1: Subtract starting from the ones place: 0 - 3 → borrow. 10 - 3 = 7.\nStep 2 angle&quot;], 1, &quot;Step 1: Count sides — Triangle has 3, circle has 0, pentagon has 5, hexagon has 6, oval has 0.\nStep 2: Square has 4 sides ✓ and rectangle has 4 sides ✓.\nAnswer: Square and rectangle.&quot;], [&quot;If 4 x 6 = 24, what is 24 / 4?&quot;, [&quot;4&quot;, &quot;5&quot;, &quot;6&quot;, &quot;8&quot;], 2, &quot;Step 1: If 4 × 6 = 24, then division is the opposite.\nStep 2: 24 ÷ 4 = 6.\nTip: Fact families! 4×6=24, 6×4=24, 24÷4=6, 24÷6=4.&quot;], [&quot;A number line shows jumps of 3 starting at 0. What is the 5th number?&quot;, [&quot;12&quot;, &quot;15&quot;, &quot;18&quot;, &quot;5&quot;], 1, &quot;Step 1: Start at 0 and jump by 3: 0→3→6→9→12→15.\nStep 2: Count the jumps: 1st=3, 2nd=6, 3rd=9, 4th=12, 5th=15.\nAnswer: The 5th number is 15.&quot;], [&quot;What is the missing number? 7 x ___ = 63&quot;, [&quot;7&quot;, &quot;8&quot;, &quot;9&quot;, &quot;6&quot;], 2, &quot;Step 1: Think: 7 × ? = 63.\nStep 2: Try: 7 × 9 = 63 ✓\nTip: Use your 7s multiplication table!&quot;], [&quot;Which shape has exactly 1 line of symmetry?&quot;, [&quot;Square&quot;, &quot;Rectangle&quot;, &quot;Isosceles triangle&quot;, &quot;Circle&quot;], 2, &quot;Step 1: A line of symmetry divides a shape into two matching halves.\nStep 2: A square has 4 lines. A rectangle has 2. A circle has infinite.\nStep 3: An isosceles triangle has exactly 1 line of symmetry (down the middle).&quot;]], &quot;Math Practice 2&quot;: [[&quot;Choose the symbol that makes this true: 76,880 __ 70,332&quot;, [&quot;&gt;&quot;, &quot;&lt;&quot;, &quot;=&quot;, &quot;?&quot;], 0, &quot;Step 1: Compare the ten-thousands place: 7 vs 7 (same).\nStep 2: Compare the thousands: 6 vs 0. Since 6 &gt; 0, 76,880 &gt; 70,332.\nAnswer: &gt;&quot;], [&quot;Which rule matches the table? (Input-Output: 2-4, 4-8)&quot;, [&quot;Add 2&quot;, &quot;Multiply by 3&quot;, &quot;Subtract 2&quot;, &quot;Multiply by 2&quot;], 3, &quot;Step 1: Test the rule with each input. Input 2 → Output 4: 2 × 2 = 4 ✓\nStep 2: Input 4 → o greatest: 3/4, 1/2, 7/8&quot;, [&quot;7/8, 3/4, 1/2&quot;, &quot;1/2, 3/4, 7/8&quot;, &quot;3/4, 1/2, 7/8&quot;, &quot;1/2, 7/8, 3/4&quot;], 1, &quot;Step 1: Convert to same denominator: 1/2=4/8, 3/4=6/8, 7/8=7/8.\nStep 2: Order: 4/8 &lt; 6/8 &lt; 7/8.\nAnswer: 1/2, 3/4, 7/8&quot;], [&quot;What is 1/3 + 1/3?&quot;, [&quot;2/6&quot;, &quot;2/3&quot;, &quot;1/6&quot;, &quot;3/6&quot;], 1, &quot;Step 1: Same denominators, so just add numerators: 1+1=2.\nStep 2: 1/3 + 1/3 = 2/3.&quot;], [&quot;A movie starts at 2:15 PM and lasts 1 hour 45 minutes. What time does it end?&quot;, [&quot;3:45 PM&quot;, &quot;4:00 PM&quot;, &quot;3:00 PM&quot;, &quot;4:15 PM&quot;], 1, &quot;Step 1: 2:15 + 1 hour = 3:15.\nStep 2: 3:15 + 45 minutes = 4:00 PM.\nTip: 15 min + 45 min = 60 min = 1 hour.&quot;], [&quot;Which number has the digit 5 in the ten-thousands place?&quot;, [&quot;52,000&quot;, &quot;5,200&quot;, &quot;500&quot;, &quot;50&quot;], 0, &quot;Step 1: 52,000: 5 is in the ten-thousands place ✓\nStep 2: 5,200: 5 is in thousands. 500: 5 is in hundreds. 50: 5 is in tens.\nAnswer: 52,000&quot;], [&quot;What is 3 x 247?&quot;, [&quot;631&quot;, &quot;641&quot;, &quot;741&quot;, &quot;731&quot;], 2, &quot;Step 1: 3 × 247. Break apart: 3×200=600, 3×40=120, 3×7=21.\nStep 2: 600+120+21 = 741.&quot;], [&quot;What is the area of a square with side length 8 cm?&quot;, [&quot;32 cm²&quot;, &quot;64 cm²&quot;, &quot;16 cm²&quot;, &quot;24 cm²&quot;], 1, &quot;Step 1: Area of a square = side × side.\nStep 2: 8 × 8 = 64 cm².&quot;], [&quot;A school collects 1,250 cans in January and 875 in February. How many total?&quot;, [&quot;2,025&quot;, &quot;2,125&quot;, &quot;2,100&quot;, &quot;2,105&quot;], 1, &quot;Step 1: 1,250 + 875.\nStep 2: 0+5=5, 5+7=12 carry 1, 2+8+1=11 carry 1, 1+0+1=2.\nAnswer: 2,125&quot;], [&quot;What is 5/8 - 3/8?&quot;, [&quot;2/0&quot;, &quot;2/16&quot;, &quot;2/8&quot;, &quot;8/8&quot;], 2, &quot;Step 1: Same denominators, subtract numerators: 5-3=2.\nStep 2: 5/8 - 3/8 = 2/8.\nTip: You can simplify 2/8 to 1/4.&quot;], [&quot;Pattern: 3, 6, 12, 24, ___. What is the next number?&quot;, [&quot;36&quot;, &quot;40&quot;, &quot;48&quot;, &quot;30&quot;], 2, &quot;Step 1: Find the pattern: 3→6 (×2), 6→12 (×2), 12→24 (×2).\nStep 2: 24 × 2 = 48.\nAnswer: 48&quot;], [&quot;How many lines of symmetry does a regular hexagon have?&quot;, [&quot;2&quot;, &quot;4&quot;, &quot;6&quot;, &quot;8&quot;], 2, &quot;Step 1: A regular hexagon has 6 lines of symmetry.\nStep 2: One through each vertex pair, one through each side pair.\nAnswer: 6&quot;], [&quot;What is 25 x 40?&quot;, [&quot;800&quot;, &quot;1,000&quot;, &quot;900&quot;, &quot;1,100&quot;], 1, &quot;Step 1: 25 × 40. Think: 25 × 4 = 100, then × 10 = 1,000.\nAnswer: 1,000&quot;], [&quot;Round 4,672 to the nearest thousand.&quot;, [&quot;4,000&quot;, &quot;4,600&quot;, &quot;4,700&quot;, &quot;5,000&quot;], 3, &quot;Step 1: Look at hundreds digit: 6. The tens digit is 7.\nStep 2: Since 7 ≥ 5, round up: 4,672 → 5,000.&quot;], [&quot;A right triangle has legs 3 cm and 4 cm, hypotenuse 5 cm. What is the perimeter?&quot;, [&quot;10 cm&quot;, &quot;12 cm&quot;, &quot;7 cm&quot;, &quot;14 cm&quot;], 1, &quot;Step 1: Perimeter = sum of all sides.\nStep 2: 3 + 4 + 5 = 12 cm.&quot;], [&quot;What is 5 x (3 + 4)?&quot;, [&quot;19&quot;, &quot;35&quot;, &quot;23&quot;, &quot;32&quot;], 1, &quot;Step 1: Parentheses first: 3 + 4 = 7.\nStep 2: Then multiply: 5 × 7 = 35.&quot;], [&quot;Which pair of fractions is equivalent?&quot;, [&quot;1/2 and 2/5&quot;, &quot;2/3 and 4/6&quot;, &quot;3/4 and 5/8&quot;, &quot;1/3 and 2/5&quot;], 1, &quot;Step 1: Check each: 1/2=3/6 and 2/5=? Not equal. 2/3=4/6 ✓\nStep 2: 2×2=4 and 3×2=6, so 2/3 = 4/6.\nAnswer: 2/3 and 4/6 are equivalent.&quot;]], &quot;Reading&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Passage 1 — The Rain Barrel Idea&quot;, &quot;text&quot;: &quot;&lt;p&gt;By the second week of June, the garden behind Valley View School looked tired. The lettuce leaves drooped. The bean vines curled at the edges. Every afternoon, the sun pressed down on the raised beds until the soil felt warm and crumbly. Ms. Romero, the garden leader, carried watering cans back and forth, but she knew the plants needed more than a quick splash.&lt;/p&gt;&lt;p&gt;Lena watched from the sidewalk while she waited for her older brother. She liked the garden because each class planted something different. Her class had planted marigolds near the tomatoes. The bright flowers made the garden look cheerful even on hot days. Lena wanted to help, but most of the jobs seemed too big.&lt;/p&gt;&lt;p&gt;One evening, Lena noticed her grandfather rinsing peaches in a bowl instead of under running water. When he finished, he poured the leftover water into a flower pot. \&quot;Plants do not care if water comes from a hose or a bowl,\&quot; he said with a smile. That sentence stayed in Lena's mind all night.&lt;/p&gt;&lt;p&gt;The next day, Lena brought an idea to school. She asked Ms. Romero if the garden club could collect rainwater in a barrel under the roof gutter. Ms. Romero said the club would need to ask the custodian and the principal first. Lena made a neat drawing that showed where the barrel could stand. She labeled the gutter, the lid, and a small spout at the bottom. The principal liked the plan because it saved water and gave students a chance to learn.&lt;/p&gt;&lt;p&gt;The barrel arrived the next week. After the first summer storm, the club hurried outside. They lifted the lid and peered in. The barrel held enough water to fill several cans. By July, the lettuce stood tall again, the beans had straightened, and the marigolds glowed like little suns. Lena grinned each time she turned the spout. Her idea had started as one small question, but it had grown into something the whole school could use.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 2 — Why Bees Matter&quot;, &quot;text&quot;: &quot;&lt;p&gt;Many people notice bees because of their black-and-yellow stripes, but bees do much more than buzz from flower to flower. As a bee searches for nectar, it brushes against the dusty pollen inside a blossom. Some of that pollen sticks to the bee's body. When the bee lands on the next flower, a little pollen rubs off. This movement helps plants make seeds and fruit. The process is called pollination.&lt;/p&gt;&lt;p&gt;Pollination matters to gardens, farms, and even forests. Apple trees, pumpkin vines, blueberry bushes, and many wildflowers depend on pollinators. Without help from insects, some plants would make fewer fruits, and some would not grow seeds at all. Bees are not the only pollinators. Butterflies, beetles, flies, and even hummingbirds carry pollen too. Still, bees are especially important because they visit many flowers in one trip.&lt;/p&gt;&lt;p&gt;Bees need safe places to live. Some bees build hives, but many kinds live alone. A few nest in hollow stems or tiny holes in wood. Others dig small tunnels in the ground. When people leave a patch of bare soil, plant many kinds of flowers, and avoid spraying harmful chemicals, they create friendlier spaces for pollinators.&lt;/p&gt;&lt;p&gt;A garden that attracts bees often becomes healthier in more than one way. Flowers bloom, fruits develop, and seeds form for the next season. That is why some schools plant pollinator gardens with native flowers that open at different times of year. These gardens give bees food from spring through fall. They also give students a closer look at how living things depend on one another.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 3 — The Library on Wheels&quot;, &quot;text&quot;: &quot;&lt;p&gt;Before families could stream movies or order books with a few taps, getting reading materials was not always easy. In some rural parts of the United States, the nearest library building was many miles away. Roads could be muddy in spring and icy in winter. For children who loved stories, that distance felt much longer.&lt;/p&gt;&lt;p&gt;To solve the problem, some communities created bookmobiles. A bookmobile was a traveling library, often built inside a truck or bus. Shelves lined the walls. Bins held picture books, chapter books, magazines, and sometimes puzzles. On certain days, the bookmobile stopped in small towns, at country schools, or near community centers. Families knew the schedule and waited for its arrival.&lt;/p&gt;&lt;p&gt;Bookmobiles did more than deliver books. They also connected neighbors. Librarians learned what readers liked and brought special titles for them. If one child loved animal stories and another wanted books about space, the librarian might set those books aside before the next visit. Children returned finished books, checked out new ones, and talked with friends about what they had read.&lt;/p&gt;&lt;p&gt;Today, many libraries still use bookmobiles, but the vehicles may carry more than books. Some have computers, internet hotspots, or activity kits. Others visit neighborhoods after school and offer story times on the steps outside. The wheels may be the same idea as before, but the mission remains simple: bring information and stories to the people who need them.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 4 — Two Texts About a Park Cleanup (Paired)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Text 1: Neighborhood Cleanup Flyer&lt;/strong&gt;&lt;p&gt;&lt;strong&gt;Saturday, April 20&lt;/strong&gt;&lt;br&gt;Meet at 9:00 a.m. at Maple Park.&lt;br&gt;Volunteers will pick up litter, pull weeds, and plant flowers near the playground. Gloves and trash bags will be provided. Students who attend can earn one hour of community service. Bring a water bottle and wear closed-toe shoes.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Text 2: Maya's Journal&lt;/strong&gt;&lt;p&gt;This morning I almost stayed home because the sky looked gray. I thought the cleanup might be boring too. But when I got to Maple Park, people were already working in teams. Mr. Chen showed us how to separate recycling from trash, and my friend Alina helped me plant purple flowers near the bench by the swings. By the end of the morning, the park looked brighter. I was muddy and tired, but I also felt proud when a little kid ran straight to the cleaned-up slide.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 5 — Why Our School Should Compost&quot;, &quot;text&quot;: &quot;&lt;p&gt;Every day after lunch, our school throws away piles of fruit peels, sandwich crusts, napkins, and paper trays. Some of that waste must go in the trash, but much of it could be composted instead. Compost is made from natural materials that break down into dark, crumbly soil. Schools that compost can use the finished material in gardens and flower beds.&lt;/p&gt;&lt;p&gt;Starting a compost program would take teamwork, but the rewards are worth it. First, students and adults would need to learn which items belong in compost bins. Banana peels, apple cores, and leaves are good choices. Plastic wrappers and metal cans are not. Clear signs near the cafeteria bins could help everyone sort correctly.&lt;/p&gt;&lt;p&gt;A compost program could also become part of science lessons. Students could observe how food scraps change over time, measure temperature inside the pile, and compare how different materials break down. Instead of treating lunch waste as something useless, students could see it as part of a cycle.&lt;/p&gt;&lt;p&gt;Some people worry that compost bins smell bad or attract pests. Those are real concerns, but they can be managed. Bins need lids, the right mix of wet and dry materials, and regular turning. Many schools already compost successfully by following these steps. Our school should join them and turn more of our lunch leftovers into something useful.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 6 — Which Source Should You Trust? (Media Literacy)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Source A: City Park Department Webpage&lt;/strong&gt;&lt;p&gt;The city plans to add a new climbing structure and two shade trees to Oak Street Playground this summer. Construction is expected to begin in July and finish before school starts in the fall. The project will be paid for with money from the city's parks improvement fund. During construction, the playground area will be fenced off for safety, but the walking path will stay open.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Source B: SunnyFun Playsets Advertisement&lt;/strong&gt;&lt;p&gt;Oak Street families deserve the biggest and brightest playground in the county! Our Mega Mountain set will make every child stronger, faster, and happier. No other playset comes close. Ask your city leaders to buy SunnyFun products right away. If they choose anything else, children will miss out on the best summer ever.&lt;/p&gt;&quot;}], &quot;questions&quot;: [[&quot;What is the best theme of the Rain Barrel story?&quot;, [&quot;Children should not ask adults questions.&quot;, &quot;Gardens only grow well in the rain.&quot;, &quot;School projects should always be easy.&quot;, &quot;A small idea can grow into a helpful change.&quot;], 3, 0], [&quot;Which detail best shows that the garden in the Rain Barrel story needed help?&quot;, [&quot;The lettuce leaves drooped and the bean vines curled.&quot;, &quot;Lena waited for her older brother.&quot;, &quot;The principal liked careful drawings.&quot;, &quot;The marigolds were bright flowers.&quot;], 0, 0], [&quot;In the Rain Barrel story, the word 'drooped' most nearly means&quot;, [&quot;became stronger&quot;, &quot;changed color&quot;, &quot;grew taller&quot;, &quot;hung down&quot;], 3, 0], [&quot;Why does the author include the sentence about Lena's grandfather pouring water into a flower pot?&quot;, [&quot;It tells readers that Ms. Romero needed more helpers.&quot;, &quot;It explains what gave Lena her idea.&quot;, &quot;It shows Lena would rather be at home than at school.&quot;, &quot;It proves peaches are grown in the school garden.&quot;], 1, 0], [&quot;How does the Rain Barrel story's structure help readers understand Lena's success?&quot;, [&quot;It compares two gardens in different states.&quot;, &quot;It lists random garden facts in no order.&quot;, &quot;It shows the problem first and then the steps Lena takes to solve it.&quot;, &quot;It tells the ending before the problem begins.&quot;], 2, 0], [&quot;Which sentence best describes Ms. Romero's perspective on Lena's plan?&quot;, [&quot;She believes the plan will never work.&quot;, &quot;She thinks the plan is worth trying if the school approves it.&quot;, &quot;She wants Lena to keep the idea secret.&quot;, &quot;She thinks students should not help with the garden.&quot;], 1, 0], [&quot;Which detail gives the strongest evidence that the rain barrel helped the garden?&quot;, [&quot;By July, the lettuce stood tall again and the beans had straightened.&quot;, &quot;Lena made a neat drawing with labels.&quot;, &quot;The club hurried outside after the storm.&quot;, &quot;The barrel stood under the roof gutter.&quot;], 0, 0], [&quot;What is the main idea of the article about bees?&quot;, [&quot;All insects build hives in trees.&quot;, &quot;Forests do not need pollinators.&quot;, &quot;Bees help many plants grow by carrying pollen from flower to flower.&quot;, &quot;Only honeybees matter to gardens.&quot;], 2, 1], [&quot;According to the bee article, what happens during pollination?&quot;, [&quot;Bees make nectar inside flowers.&quot;, &quot;Seeds turn into blossoms overnight.&quot;, &quot;Pollen moves from one flower to another.&quot;, &quot;Roots carry water into the sky.&quot;], 2, 1], [&quot;In the bee article, the word 'avoid' most nearly means&quot;, [&quot;measure&quot;, &quot;gather more of&quot;, &quot;paint over&quot;, &quot;stay away from&quot;], 3, 1], [&quot;Why does the bee article mention butterflies, beetles, flies, and hummingbirds?&quot;, [&quot;to prove hummingbirds are better than bees&quot;, &quot;to list animals that eat flowers&quot;, &quot;to explain how to build a beehive&quot;, &quot;to show that bees are important but not the only pollinators&quot;], 3, 1], [&quot;How does paragraph 3 of the bee article support the main idea?&quot;, [&quot;It explains ways people can protect places where pollinators live.&quot;, &quot;It describes how fruits are sold at a market.&quot;, &quot;It tells a story about a bee lost in a garden.&quot;, &quot;It gives the life cycle of one apple tree.&quot;], 0, 1], [&quot;What is the author's purpose in writing the bee article?&quot;, [&quot;to persuade readers to buy honey from one farm&quot;, &quot;to entertain readers with a made-up bee adventure&quot;, &quot;to explain why pollinators matter and how people can help them&quot;, &quot;to warn readers never to plant flowers&quot;], 2, 1], [&quot;Which detail from the bee article best supports the claim that pollinator gardens are useful?&quot;, [&quot;A few bees live in wood.&quot;, &quot;Native flowers that bloom at different times give bees food from spring through fall.&quot;, &quot;Some bees have black-and-yellow stripes.&quot;, &quot;Many people notice bees buzzing.&quot;], 1, 1], [&quot;What is the central idea of the bookmobile article?&quot;, [&quot;Children stopped reading once movies became popular.&quot;, &quot;Rural roads were easy to travel in all seasons.&quot;, &quot;Bookmobiles were created to bring library services to people who lived far from a library.&quot;, &quot;Libraries were replaced by buses in every town.&quot;], 2, 2], [&quot;Which detail best explains why bookmobiles were needed?&quot;, [&quot;Shelves lined the walls of the truck.&quot;, &quot;Librarians enjoyed talking with children.&quot;, &quot;In some places, the nearest library building was many miles away.&quot;, &quot;Some bookmobiles had puzzles.&quot;], 2, 2], [&quot;In the bookmobile article, the word 'mis
