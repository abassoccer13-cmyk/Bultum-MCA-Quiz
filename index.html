ees&quot;, &quot;square centimeters&quot;, &quot;cubic meters&quot;], 3, &quot;Step 1: Volume is 3D space, measured in cubic units.\nAnswer: Cubic meters.&quot;], [&quot;A box is 10 in × 6 in × 4 in. What is its volume in cubic inches?&quot;, [&quot;160&quot;, &quot;200&quot;, &quot;240&quot;, &quot;280&quot;], 2, &quot;Step 1: Volume = 10×6×4 = 240 cubic inches.&quot;], [&quot;P(blue) from a bag with 3 red, 5 blue, 2 green marbles?&quot;, [&quot;5/3&quot;, &quot;2/10&quot;, &quot;3/10&quot;, &quot;5/10&quot;], 3, &quot;Step 1: P(blue) = 5/10 = 1/2.\nTip: Simplify: 5÷5=1, 10÷5=2.&quot;], [&quot;Probability of landing on A or C on a 4-equal-section spinner?&quot;, [&quot;1/2&quot;, &quot;2/3&quot;, &quot;1/8&quot;, &quot;1/4&quot;], 0, &quot;Step 1: P(A or C) = 2 sections out of 4 = 2/4 = 1/2.&quot;], [&quot;A number cube lands on 6 nine times in 60 rolls. Experimental probability?&quot;, [&quot;9/60&quot;, &quot;1/6&quot;, &quot;51/60&quot;, &quot;6/60&quot;], 0, &quot;Step 1: Experimental probability = outcomes ÷ trials.\nStep 2: 9/60 = 3/20.&quot;], [&quot;Which event is impossible when rolling a standard number cube?&quot;, [&quot;rolling less than 7&quot;, &quot;rolling a 1&quot;, &quot;rolling a 9&quot;, &quot;rolling an even number&quot;], 2, &quot;Step 1: A standard die has numbers 1-6. You cannot roll a 9.\nAnswer: Rolling a 9 is impossible.&quot;], [&quot;8 girls and 12 boys in a group. P(choosing a girl)?&quot;, [&quot;1/2&quot;, &quot;8/12&quot;, &quot;2/5&quot;, &quot;3/5&quot;], 2, &quot;Step 1: P(girl) = 8/20. Simplify: 8÷4=2, 20÷4=5.\nAnswer: 2/5&quot;], [&quot;Which compares theoretical and experimental probability correctly?&quot;, [&quot;Theoretical is based on actual trials.&quot;, &quot;Experimental can never change.&quot;, &quot;Experimental is based on actual trials.&quot;, &quot;Theoretical depends on luck only.&quot;], 2, &quot;Step 1: Theoretical = what should happen. Experimental = what actually happened.\nAnswer: Experimental is based on actual trials.&quot;], [&quot;A coin flipped 50 times lands heads 28 times. Experimental probability of heads?&quot;, [&quot;0.44&quot;, &quot;0.56&quot;, &quot;0.72&quot;, &quot;0.5&quot;], 1, &quot;Step 1: Experimental probability = heads/total = 28/50 = 0.56.&quot;]], &quot;Math Practice 2&quot;: [[&quot;Which number is greatest?&quot;, [&quot;0.875&quot;, &quot;7/8&quot;, &quot;88%&quot;, &quot;0.87&quot;], 2, &quot;Step 1: Convert to decimals. 7/8 = 0.875, 88% = 0.88, 0.87 = 0.87, 0.875 = 0.875.\nStep 2: Compare: 0.88 &gt; 0.875 &gt; 0.87.\nStep 3: The greatest value is 88%.&quot;], [&quot;Which value is equivalent to 45%?&quot;, [&quot;4.5&quot;, &quot;0.45&quot;, &quot;45/10&quot;, &quot;0.045&quot;], 1, &quot;Step 1: Percent means 'per hundred.' 45% = 45/100.\nStep 2: 45/100 = 0.45.&quot;], [&quot;What is 30% of 250?&quot;, [&quot;30&quot;, &quot;60&quot;, &quot;75&quot;, &quot;90&quot;], 2, &quot;Step 1: 30% = 0.30.\nStep 2: 0.30 × 250 = 75.&quot;], [&quot;Which ratio is equivalent to 4:7?&quot;, [&quot;8:11&quot;, &quot;12:21&quot;, &quot;16:30&quot;, &quot;20:21&quot;], 1, &quot;Step 1: Multiply both terms of 4:7 by 3: 4×3 = 12 and 7×3 = 21.\nStep 2: 4:7 = 12:21.&quot;], [&quot;What is the least common multiple of 9 and 12?&quot;, [&quot;18&quot;, &quot;24&quot;, &quot;36&quot;, &quot;72&quot;], 2, &quot;Step 1: List multiples: 9, 18, 27, 36, 45, ... and 12, 24, 36, 48, ...\nStep 2: The smallest multiple in both lists is 36.&quot;], [&quot;What is 5/6 + 1/3?  Write in simplest form.&quot;, [&quot;6/9&quot;, &quot;7/9&quot;, &quot;1 1/6&quot;, &quot;5/18&quot;], 2, &quot;Step 1: Find a common denominator. 1/3 = 2/6.\nStep 2: Add: 5/6 + 2/6 = 7/6.\nStep 3: Simplify 7/6 = 1 1/6.&quot;], [&quot;What is 7/8 − 3/4?&quot;, [&quot;1/8&quot;, &quot;2/8&quot;, &quot;3/8&quot;, &quot;4/8&quot;], 0, &quot;Step 1: Find a common denominator. 3/4 = 6/8.\nStep 2: Subtract: 7/8 − 6/8 = 1/8.&quot;], [&quot;What is 2.4 × 0.5?&quot;, [&quot;0.12&quot;, &quot;1.2&quot;, &quot;12&quot;, &quot;2.9&quot;], 1, &quot;Step 1: 0.5 is one half.\nStep 2: Half of 2.4 is 1.2.&quot;], [&quot;What is 3/5 × 20?&quot;, [&quot;8&quot;, &quot;10&quot;, &quot;12&quot;, &quot;15&quot;], 2, &quot;Step 1: One fifth of 20 is 20 ÷ 5 = 4.\nStep 2: Three fifths is 3 × 4 = 12.&quot;], [&quot;What is (2/3) ÷ (1/6)?&quot;, [&quot;3&quot;, &quot;4&quot;, &quot;6&quot;, &quot;9&quot;], 1, &quot;Step 1: Dividing by a fraction = multiplying by its reciprocal.\nStep 2: (2/3) × (6/1) = 12/3 = 4.&quot;], [&quot;A backpack costs $48 and is on sale for 25% off. What is the sale price?&quot;, [&quot;$12&quot;, &quot;$24&quot;, &quot;$36&quot;, &quot;$42&quot;], 2, &quot;Step 1: Find the discount: 25% of 48 = 0.25 × 48 = $12.\nStep 2: Subtract: $48 − $12 = $36.&quot;], [&quot;A recipe uses 2 cups of flour for every 3 batches of muffins. How many cups of flour are needed for 15 batches?&quot;, [&quot;8 cups&quot;, &quot;10 cups&quot;, &quot;12 cups&quot;, &quot;15 cups&quot;], 1, &quot;Step 1: 15 ÷ 3 = 5. So 15 batches is 5 times the recipe.\nStep 2: Multiply: 2 × 5 = 10 cups.&quot;], [&quot;Which number is least?&quot;, [&quot;0.62&quot;, &quot;5/8&quot;, &quot;61%&quot;, &quot;0.605&quot;], 3, &quot;Step 1: Convert each to a decimal. 5/8 = 0.625; 61% = 0.61.\nStep 2: Compare: 0.605 &lt; 0.61 &lt; 0.62 &lt; 0.625.\nStep 3: Least = 0.605.&quot;], [&quot;A bag has 48 marbles. Three eighths of the marbles are blue. How many blue marbles are in the bag?&quot;, [&quot;12&quot;, &quot;16&quot;, &quot;18&quot;, &quot;24&quot;], 2, &quot;Step 1: One eighth of 48 = 48 ÷ 8 = 6.\nStep 2: Three eighths = 3 × 6 = 18 marbles.&quot;], [&quot;A container holds 3.5 liters of juice. If 1.2 liters are poured out, how much juice remains?&quot;, [&quot;1.3 liters&quot;, &quot;2.1 liters&quot;, &quot;2.3 liters&quot;, &quot;4.7 liters&quot;], 2, &quot;Step 1: Subtract: 3.5 − 1.2.\nStep 2: 3.5 − 1.2 = 2.3 liters.&quot;], [&quot;Which expression means '6 less than n'?&quot;, [&quot;6n&quot;, &quot;n − 6&quot;, &quot;6 − n&quot;, &quot;n + 6&quot;], 1, &quot;Step 1: 'Less than' means subtraction, with the amount subtracted FROM n.\nStep 2: '6 less than n' is n − 6.&quot;], [&quot;Evaluate 4a + 3 when a = 5.&quot;, [&quot;20&quot;, &quot;21&quot;, &quot;23&quot;, &quot;28&quot;], 2, &quot;Step 1: Substitute a = 5: 4(5) + 3.\nStep 2: 20 + 3 = 23.&quot;], [&quot;Solve:  x + 17 = 45&quot;, [&quot;26&quot;, &quot;27&quot;, &quot;28&quot;, &quot;29&quot;], 2, &quot;Step 1: Subtract 17 from both sides: x = 45 − 17.\nStep 2: x = 28.&quot;], [&quot;Solve:  3y = 27&quot;, [&quot;6&quot;, &quot;8&quot;, &quot;9&quot;, &quot;12&quot;], 2, &quot;Step 1: Divide both sides by 3.\nStep 2: y = 27 ÷ 3 = 9.&quot;], [&quot;Solve:  2m + 5 = 19&quot;, [&quot;6&quot;, &quot;7&quot;, &quot;8&quot;, &quot;12&quot;], 1, &quot;Step 1: Subtract 5 from both sides: 2m = 14.\nStep 2: Divide by 2: m = 7.&quot;], [&quot;Which value makes the inequality n &lt; 12 true?&quot;, [&quot;12&quot;, &quot;13&quot;, &quot;11&quot;, &quot;20&quot;], 2, &quot;Step 1: 'n &lt; 12' means n is strictly less than 12.\nStep 2: 11 is less than 12; 12 is not less than 12 (it is equal).&quot;], [&quot;A table follows the rule y = 3x − 1. What is y when x = 6?&quot;, [&quot;16&quot;, &quot;17&quot;, &quot;18&quot;, &quot;19&quot;], 1, &quot;Step 1: Substitute x = 6: y = 3(6) − 1.\nStep 2: y = 18 − 1 = 17.&quot;], [&quot;Which expression is equivalent to 5(p + 2)?&quot;, [&quot;5p + 2&quot;, &quot;5p + 10&quot;, &quot;10p + 2&quot;, &quot;p + 10&quot;], 1, &quot;Step 1: Distribute the 5 to each term inside: 5·p + 5·2.\nStep 2: 5p + 10.&quot;], [&quot;Which expression is equivalent to 3x + 4x?&quot;, [&quot;7&quot;, &quot;7x&quot;, &quot;12x&quot;, &quot;x&quot;], 1, &quot;Step 1: 3x and 4x are like terms (same variable).\nStep 2: Add the coefficients: 3 + 4 = 7, so 3x + 4x = 7x.&quot;], [&quot;Which expression is equivalent to 6(a + 3)?&quot;, [&quot;6a + 3&quot;, &quot;9a&quot;, &quot;6a + 18&quot;, &quot;18a&quot;], 2, &quot;Step 1: Distribute the 6: 6·a + 6·3.\nStep 2: 6a + 18.&quot;], [&quot;On a coordinate grid, which ordered pair has an x-coordinate of 4 and a y-coordinate of 2?&quot;, [&quot;(2, 4)&quot;, &quot;(4, 2)&quot;, &quot;(4, 4)&quot;, &quot;(2, 2)&quot;], 1, &quot;Step 1: Ordered pairs are written (x, y). The x-coordinate comes first.\nStep 2: x = 4 and y = 2 gives (4, 2).&quot;], [&quot;If y = 2x + 1, what is y when x = 4?&quot;, [&quot;7&quot;, &quot;8&quot;, &quot;9&quot;, &quot;10&quot;], 2, &quot;Step 1: Substitute x = 4: y = 2(4) + 1.\nStep 2: y = 8 + 1 = 9.&quot;], [&quot;A notebook costs $1.25. Which equation shows the total cost c for x notebooks?&quot;, [&quot;c = x + 1.25&quot;, &quot;c = 1.25x&quot;, &quot;c = 1.25 + x²&quot;, &quot;c = x ÷ 1.25&quot;], 1, &quot;Step 1: Total cost = price per notebook × number of notebooks.\nStep 2: c = 1.25 · x = 1.25x.&quot;], [&quot;Solve:  4 + n/2 = 10&quot;, [&quot;3&quot;, &quot;6&quot;, &quot;10&quot;, &quot;12&quot;], 3, &quot;Step 1: Subtract 4 from both sides: n/2 = 6.\nStep 2: Multiply both sides by 2: n = 12.&quot;], [&quot;Which expression is equivalent to 2(x + 4) + 3?&quot;, [&quot;2x + 7&quot;, &quot;2x + 8&quot;, &quot;2x + 11&quot;, &quot;x + 11&quot;], 2, &quot;Step 1: Distribute the 2: 2x + 8.\nStep 2: Add 3: 2x + 8 + 3 = 2x + 11.&quot;], [&quot;What is the perimeter of a rectangle with side lengths 6 m and 9 m?&quot;, [&quot;15 m&quot;, &quot;30 m&quot;, &quot;54 m&quot;, &quot;24 m&quot;], 1, &quot;Step 1: Perimeter = 2(length + width) = 2(6 + 9).\nStep 2: 2 × 15 = 30 m.&quot;], [&quot;What is the volume of a rectangular prism with length 7, width 4, and height 3?&quot;, [&quot;14 cu units&quot;, &quot;28 cu units&quot;, &quot;84 cu units&quot;, &quot;96 cu units&quot;], 2, &quot;Step 1: Volume = length × width × height.\nStep 2: 7 × 4 = 28.\nStep 3: 28 × 3 = 84 cubic units.&quot;], [&quot;A circle has diameter 10 inches. What is its circumference if π = 3.14?&quot;, [&quot;15.7 inches&quot;, &quot;31.4 inches&quot;, &quot;62.8 inches&quot;, &quot;100 inches&quot;], 1, &quot;Step 1: Circumference = π × diameter.\nStep 2: 3.14 × 10 = 31.4 inches.&quot;], [&quot;Two angles form a straight line. If one angle measures 65°, what is the other angle?&quot;, [&quot;25°&quot;, &quot;65°&quot;, &quot;105°&quot;, &quot;115°&quot;], 3, &quot;Step 1: Angles on a straight line add to 180°.\nStep 2: 180 − 65 = 115°.&quot;], [&quot;Two angles are complementary. If one angle measures 28°, what is the other angle?&quot;, [&quot;52°&quot;, &quot;62°&quot;, &quot;72°&quot;, &quot;152°&quot;], 1, &quot;Step 1: Complementary angles add to 90°.\nStep 2: 90 − 28 = 62°.&quot;], [&quot;How many centimeters are in 2.5 meters?&quot;, [&quot;25&quot;, &quot;250&quot;, &quot;2,500&quot;, &quot;0.25&quot;], 1, &quot;Step 1: 1 meter = 100 centimeters.\nStep 2: 2.5 × 100 = 250 cm.&quot;], [&quot;A floor design is made from two rectangles. One is 8 by 3 and the other is 4 by 2. What is the total area?&quot;, [&quot;24 sq units&quot;, &quot;28 sq units&quot;, &quot;32 sq units&quot;, &quot;40 sq units&quot;], 2, &quot;Step 1: First rectangle: 8 × 3 = 24.\nStep 2: Second rectangle: 4 × 2 = 8.\nStep 3: Total: 24 + 8 = 32 sq units.&quot;], [&quot;A box is 12 inches long, 5 inches wide, and 2 inches high. What is its volume in cubic inches?&quot;, [&quot;19&quot;, &quot;60&quot;, &quot;120&quot;, &quot;144&quot;], 2, &quot;Step 1: Volume = length × width × height.\nStep 2: 12 × 5 = 60.\nStep 3: 60 × 2 = 120 cubic inches.&quot;], [&quot;What is the mean of 5, 7, 8, and 10?&quot;, [&quot;7&quot;, &quot;7.5&quot;, &quot;8&quot;, &quot;8.5&quot;], 1, &quot;Step 1: Add: 5 + 7 + 8 + 10 = 30.\nStep 2: Divide by the count (4): 30 ÷ 4 = 7.5.&quot;], [&quot;What is the median of 12, 4, 9, 6, and 7?&quot;, [&quot;6&quot;, &quot;7&quot;, &quot;8&quot;, &quot;9&quot;], 1, &quot;Step 1: Order the numbers: 4, 6, 7, 9, 12.\nStep 2: The middle value (3rd of 5) is 7.&quot;], [&quot;What is the range of 3, 8, 5, and 9?&quot;, [&quot;4&quot;, &quot;5&quot;, &quot;6&quot;, &quot;9&quot;], 2, &quot;Step 1: Range = greatest − least.\nStep 2: 9 − 3 = 6.&quot;], [&quot;A bar graph shows 12 red marbles, 15 blue marbles, 9 green marbles, and 6 yellow marbles. How many more blue marbles are there than yellow marbles?&quot;, [&quot;7&quot;, &quot;8&quot;, &quot;9&quot;, &quot;21&quot;], 2, &quot;Step 1: Blue count is 15; yellow count is 6.\nStep 2: Subtract: 15 − 6 = 9.&quot;], [&quot;A number cube is rolled 50 times and lands on 6 a total of 8 times. What is the experimental probability of rolling a 6?&quot;, [&quot;8/50&quot;, &quot;1/6&quot;, &quot;6/50&quot;, &quot;42/50&quot;], 0, &quot;Step 1: Experimental probability = favorable outcomes ÷ total trials.\nStep 2: 8 rolls out of 50 = 8/50.&quot;], [&quot;Which display is best for showing how one whole group is split into parts?&quot;, [&quot;Timeline&quot;, &quot;Circle graph&quot;, &quot;Number line&quot;, &quot;Map&quot;], 1, &quot;Step 1: A circle graph (pie chart) shows portions of a whole.\nStep 2: Timelines show time order, number lines show numeric position, maps show location.&quot;]]}}, &quot;Grade 7&quot;: {&quot;color&quot;: &quot;#14532D&quot;, &quot;subjects&quot;: {&quot;Math&quot;: [[&quot;What is 30% of 150?&quot;, [&quot;30&quot;, &quot;45&quot;, &quot;50&quot;, &quot;55&quot;], 1, &quot;Step 1: 30% = 0.30.\nStep 2: 0.30 × 150 = 45.&quot;], [&quot;Solve: -3 + (-7) = ?&quot;, [&quot;10&quot;, &quot;4&quot;, &quot;−10&quot;, &quot;−4&quot;], 2, &quot;Step 1: Both numbers are negative, so add their absolute values.\nStep 2: 3+7=10, keep negative sign.\nAnswer: -10&quot;], [&quot;A triangle has angles of 45 degrees and 65 degrees. What is the measure of the third angle?&quot;, [&quot;60°&quot;, &quot;70°&quot;, &quot;80°&quot;, &quot;90°&quot;], 1, &quot;Step 1: Angles in a triangle sum to 180°.\nStep 2: 180-45-65=70°.&quot;], [&quot;Solve: 3x - 4 = 11&quot;, [&quot;x = 4&quot;, &quot;x = 5&quot;, &quot;x = 7&quot;, &quot;x = 3&quot;], 1, &quot;Step 1: Add 4 to both sides: 3x=15.\nStep 2: Divide by 3: x=5.&quot;], [&quot;What is -6 x (-4)?&quot;, [&quot;−24&quot;, &quot;24&quot;, &quot;−10&quot;, &quot;10&quot;], 1, &quot;Step 1: Negative × negative = positive.\nStep 2: 6×4=24, both negative so answer is +24.&quot;], [&quot;A store marks up a $40 item by 25%. What is the new price?&quot;, [&quot;$45&quot;, &quot;$50&quot;, &quot;$55&quot;, &quot;$60&quot;], 1, &quot;Step 1: 25% of $40 = 0.25×40 = $10 markup.\nStep 2: $40+$10=$50.&quot;], [&quot;What is the circumference of a circle with radius 7? (Use pi = 3.14)&quot;, [&quot;21.98&quot;, &quot;43.96&quot;, &quot;153.86&quot;, &quot;22&quot;], 1, &quot;Step 1: Circumference = 2πr.\nStep 2: 2 × 3.14 × 7 = 43.96.&quot;], [&quot;Solve: 2(x + 3) = 14&quot;, [&quot;x = 4&quot;, &quot;x = 5.5&quot;, &quot;x = 8&quot;, &quot;x = 7&quot;], 0, &quot;Step 1: Divide both sides by 2: x+3=7.\nStep 2: Subtract 3: x=4.&quot;], [&quot;What is -15 / 3?&quot;, [&quot;5&quot;, &quot;−5&quot;, &quot;45&quot;, &quot;−45&quot;], 1, &quot;Step 1: Negative ÷ positive = negative.\nStep 2: 15÷3=5, so -15÷3=-5.&quot;], [&quot;A map has a scale of 1 inch = 50 miles. Two cities are 3.5 inches apart. How far apart are they?&quot;, [&quot;150 miles&quot;, &quot;175 miles&quot;, &quot;200 miles&quot;, &quot;165 miles&quot;], 1, &quot;Step 1: Distance = scale × measurement.\nStep 2: 3.5 × 50 = 175 miles.&quot;], [&quot;What is the area of a circle with diameter 10? (Use pi = 3.14)&quot;, [&quot;31.4&quot;, &quot;78.5&quot;, &quot;314&quot;, &quot;62.8&quot;], 1, &quot;Step 1: Area = πr². Diameter=10, so r=5.\nStep 2: 3.14 × 5² = 3.14 × 25 = 78.5.&quot;], [&quot;A shirt costs $36 after a 10% discount. What was the original price?&quot;, [&quot;$38&quot;, &quot;$40&quot;, &quot;$42&quot;, &quot;$45&quot;], 1, &quot;Step 1: After discount, price = 90% of original.\nStep 2: 0.90 × original = $36. Original = 36÷0.90 = $40.&quot;], [&quot;What is 4/5 of 75?&quot;, [&quot;50&quot;, &quot;60&quot;, &quot;70&quot;, &quot;45&quot;], 1, &quot;Step 1: 4/5 of 75 = (4×75)÷5 = 300÷5 = 60.&quot;], [&quot;Simplify: -2(3x - 5)&quot;, [&quot;−6x − 10&quot;, &quot;−6x + 10&quot;, &quot;6x − 10&quot;, &quot;6x + 10&quot;], 1, &quot;Step 1: Distribute -2: -2(3x)=-6x, -2(-5)=+10.\nAnswer: -6x + 10&quot;], [&quot;A bag has 5 red and 3 blue chips. What is the probability of NOT picking red?&quot;, [&quot;5/8&quot;, &quot;3/8&quot;, &quot;1/2&quot;, &quot;3/5&quot;], 1, &quot;Step 1: P(NOT red) = 1-P(red) = 1-5/8 = 3/8.\nTip: Or count non-red: 3 blue out of 8 total.&quot;], [&quot;What is the surface area of a cube with side 5 cm?&quot;, [&quot;25 cm²&quot;, &quot;100 cm²&quot;, &quot;125 cm²&quot;, &quot;150 cm²&quot;], 3, &quot;Step 1: SA of cube = 6 × side².\nStep 2: 6 × 5² = 6 × 25 = 150 cm².&quot;], [&quot;Solve: x/4 + 2 = 6&quot;, [&quot;x = 8&quot;, &quot;x = 16&quot;, &quot;x = 12&quot;, &quot;x = 10&quot;], 1, &quot;Step 1: Subtract 2: x/4=4.\nStep 2: Multiply by 4: x=16.&quot;], [&quot;Which is a proportional relationship?&quot;, [&quot;y = 3x + 2&quot;, &quot;y = 4x&quot;, &quot;y = x squared + 1&quot;, &quot;y = 2x - 5&quot;], 1, &quot;Step 1: Proportional means y=kx (passes through origin, no added constant).\nStep 2: y=4x has no constant added.\nAnswer: y=4x&quot;], [&quot;What is the volume of a cylinder with radius 3 and height 10? (Use pi = 3.14)&quot;, [&quot;94.2&quot;, &quot;282.6&quot;, &quot;942&quot;, &quot;188.4&quot;], 1, &quot;Step 1: V = πr²h = 3.14 × 9 × 10 = 282.6.&quot;], [&quot;The temperature drops from 4 degrees F to -11 degrees F. What is the change in temperature?&quot;, [&quot;−7°F&quot;, &quot;−15°F&quot;, &quot;7°F&quot;, &quot;15°F&quot;], 1, &quot;Step 1: Change = final-initial = -11-4 = -15°F.\nTip: Going from positive to negative means a drop of 15°.&quot;], [&quot;A data set is: 2, 4, 4, 6, 8, 10. What is the mode?&quot;, [&quot;2&quot;, &quot;4&quot;, &quot;6&quot;, &quot;8&quot;], 1, &quot;Step 1: Mode = most frequent value.\nStep 2: 4 appears twice; all others appear once.\nAnswer: Mode = 4&quot;], [&quot;Evaluate: -3 squared + 4 x 2&quot;, [&quot;17&quot;, &quot;−1&quot;, &quot;1&quot;, &quot;−17&quot;], 0, &quot;Step 1: (-3)²=9 (squaring makes it positive).\nStep 2: 4×2=8. Then 9+8=17.\nTip: Square the number first, then multiply.&quot;], [&quot;A rectangle's length is 3 more than twice its width. If the width is 5, what is the area?&quot;, [&quot;55&quot;, &quot;65&quot;, &quot;60&quot;, &quot;45&quot;], 1, &quot;Step 1: Length = 2(5)+3=13. Width=5.\nStep 2: Area = 13×5 = 65.&quot;], [&quot;What is 15% of 200?&quot;, [&quot;20&quot;, &quot;30&quot;, &quot;25&quot;, &quot;35&quot;], 1, &quot;Step 1: 15% = 0.15.\nStep 2: 0.15 × 200 = 30.&quot;], [&quot;Solve for y: 5y - 3 = 2y + 9&quot;, [&quot;y = 2&quot;, &quot;y = 4&quot;, &quot;y = 6&quot;, &quot;y = 12&quot;], 1, &quot;Step 1: Subtract 2y: 3y-3=9.\nStep 2: Add 3: 3y=12.\nStep 3: Divide by 3: y=4.&quot;]], &quot;Reading&quot;: {&quot;passages&quot;: [{&quot;title&quot;: &quot;Passage 1 — In the Archive Basement&quot;, &quot;text&quot;: &quot;&lt;p&gt;The basement of the town museum smelled faintly of paper, dust, and metal shelves. When Talia first volunteered there, she expected polished displays and quiet tours. Instead, the curator handed her a box of uncatalogued postcards tied with string. Some had dates but no names. Others had names but no addresses. A few showed buildings that no longer existed.&lt;/p&gt;&lt;p&gt;At first the work felt less like history and more like sorting. Talia copied dates into a spreadsheet and slid postcards into protective sleeves. Then she found one card showing the old train depot after a flood. On the back, a note described neighbors carrying sacks of flour upstairs before the water rose. The card turned a fact from a textbook into an urgent human moment. Talia began wondering how many other stories were waiting inside ordinary-looking objects.&lt;/p&gt;&lt;p&gt;As the weeks passed, she learned that archives are not simply storage rooms. They are collections shaped by decisions: what gets saved, who gets named, which stories are explained, and which are left for later generations to piece together. Talia started noticing gaps as much as discoveries. One box held detailed records about business owners downtown, while another contained only fragments about the families who rented rooms above the shops.&lt;/p&gt;&lt;p&gt;By the end of the summer, Talia no longer thought of history as a finished story. It seemed more like a conversation between evidence and questions. Every label in a display case had begun as someone's effort to look closely, compare sources, and admit what remained uncertain. The museum had taught her facts, but it had also taught her how fragile facts can be when no one bothers to preserve them.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 2 — What Migrating Cranes Need&quot;, &quot;text&quot;: &quot;&lt;p&gt;Each autumn, thousands of sandhill cranes cross parts of the Midwest during migration. Their calls can carry across fields before the birds come into view, and once they appear, the sky seems to move in loose gray patterns. These cranes do not migrate in a neat straight line. Instead, their journeys depend on weather, available wetlands, and places where they can rest and feed safely.&lt;/p&gt;&lt;p&gt;Wetlands matter because migrating birds need more than airspace. They need habitat on the ground. Shallow water offers protection from some predators, while nearby fields and marshes provide food. When wetlands are drained or heavily disturbed, birds may lose important stopping points. A migration route can survive only if the chain of resting places along the way also survives.&lt;/p&gt;&lt;p&gt;Scientists track crane migration in several ways. They observe flocks, record arrival dates, and, in some cases, use transmitters to follow movement. These data help researchers notice patterns over time. If cranes begin arriving earlier in spring or using different routes, scientists can compare those changes with weather conditions, water levels, or land use.&lt;/p&gt;&lt;p&gt;Migration often appears graceful from a distance, but it is also a demanding calculation. Birds must conserve energy, respond to shifting conditions, and locate habitat across a vast landscape. Protecting one marsh will not solve every problem cranes face. Still, each healthy stopover site strengthens the larger network that makes the long journey possible.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 3 — What a Bike Lane Debate Is Really About&quot;, &quot;text&quot;: &quot;&lt;p&gt;A city council is debating whether to add protected bike lanes along two busy streets. Supporters argue that lanes separated from traffic would help more people choose biking for short trips. They point to studies from other cities showing that when routes feel safer, ridership often rises. Opponents worry about losing parking spaces and about construction costs in a budget year that already feels tight.&lt;/p&gt;&lt;p&gt;The discussion is really about more than paint and concrete. It is about how a city decides what kinds of movement it wants to make easier. Streets are limited spaces, and every design choice signals a priority. A wide turn lane suggests one set of values. A protected bike lane suggests another: that travel can be measured not only by speed for drivers, but also by safety and access for people using different forms of transportation.&lt;/p&gt;&lt;p&gt;Good planning requires evidence, not slogans. If leaders want to make a wise decision, they should examine traffic counts, crash data, parking use, and the destinations along the proposed routes. A lane that connects homes to schools, parks, and stores may serve a larger public purpose than one that exists only as a symbolic gesture. Likewise, supporters should not ignore trade-offs. Space given to one use cannot simultaneously serve another.&lt;/p&gt;&lt;p&gt;Still, the strongest arguments against bike lanes often focus on what would change immediately, while the strongest arguments for them focus on habits that could change over time. That difference matters. People rarely choose new ways of moving through a city until the design makes those choices feel realistic. In that sense, infrastructure does not merely respond to behavior. It helps shape it.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 4 — Reading a Historical Journal Critically (Paired Texts)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Text 1: Journal Entry from 1872&lt;/strong&gt;&lt;p&gt;We reached the ridge by late afternoon and could see the river shining below us. The guide urged speed because clouds had gathered behind the hills, but several members of the party paused to sketch the view. By nightfall the rain struck so hard that the path dissolved into mud. Two crates of supplies slid from the wagon, and we spent the next hour hauling them back before darkness closed in.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Text 2: Historian's Commentary&lt;/strong&gt;&lt;p&gt;Journal entries from land surveys often mix observation with self-justification. They can offer vivid details about travel conditions, weather, and terrain, but they also reflect the writer's perspective and purpose. A surveyor or expedition member may emphasize hardship to highlight endurance, competence, or the importance of the mission. Historians therefore compare journals with maps, supply lists, official reports, and other records before drawing conclusions.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 5 — What Recommendation Systems Really Do&quot;, &quot;text&quot;: &quot;&lt;p&gt;A recommendation system is a digital tool that suggests what a person might watch, read, or buy next. Streaming platforms use recommendation systems to guess which movie a viewer may want after finishing a series. Online stores use them to suggest products based on previous searches or purchases. These systems are designed to be useful, but they also shape attention.&lt;/p&gt;&lt;p&gt;That influence can be subtle. When a platform offers ten recommendations, it does not simply reveal a neutral list waiting in the world. It selects from a much larger pool and places certain options in front of the user first. A person remains free to choose, but the order and visibility of choices affect what is most likely to be noticed.&lt;/p&gt;&lt;p&gt;Recommendation systems can save time and help people discover music, books, or creators they might never have found on their own. At the same time, systems trained on past behavior can narrow a user's experience. If a viewer clicks on one kind of video repeatedly, the platform may keep presenting similar content, even if the viewer's interests are broader than the record suggests.&lt;/p&gt;&lt;p&gt;For that reason, digital literacy involves more than learning how to search. It also involves asking why certain results appear first, what data may have influenced them, and which possibilities remain hidden. In other words, users should not mistake personalization for completeness.&lt;/p&gt;&quot;}, {&quot;title&quot;: &quot;Passage 6 — Selecting a Reliable School Source (Media Literacy)&quot;, &quot;text&quot;: &quot;&lt;strong class='source-label'&gt;Source A: School District Announcement&lt;/strong&gt;&lt;p&gt;Beginning in September, all middle school students will have access to a new online tutoring platform in math, reading, and science. The service will be available from 4 p.m. to 8 p.m. on weekdays. According to the district, students can log in with their school accounts, and family information sessions will be offered in August.&lt;/p&gt;&lt;hr class='divider'/&gt;&lt;strong class='source-label'&gt;Source B: Promotional Email from StudySprint&lt;/strong&gt;&lt;p&gt;Get the fastest score gains anywhere with StudySprint! Students who join now can unlock elite academic performance in just weeks. Don't settle for average support when your family deserves the very best. Sign up before Friday for premium benefits.&lt;/p&gt;&lt;p&gt;&lt;em&gt;A student journalist wants to write a short article explaining when tutoring is available, how students can access it, and whether the district has announced family support.&lt;/em&gt;&lt;/p&gt;&quot;}], &quot;questions&quot;: [[&quot;What is the central idea of the archive basement passage?&quot;, [&quot;Working in the archive teaches Talia that history depends on preserved evidence and unanswered questions.&quot;, &quot;Old postcards are more important than all other sources.&quot;, &quot;Museums are mostly places for tourists to rest.&quot;, &quot;Spreadsheets make history simple and complete.&quot;], 0, 0], [&quot;Which detail best shows why the postcards become meaningful to Talia?&quot;, [&quot;The curator gives her a box tied with string.&quot;, &quot;One card describes neighbors carrying flour upstairs before a flood rose.&quot;, &quot;The postcards are placed in protective sleeves.&quot;, &quot;The basement smells like paper and dust.&quot;], 1, 0], [&quot;In the archive passage, the word 'fragments' most nearly means&quot;, [&quot;careful explanations&quot;, &quot;official laws&quot;, &quot;new discoveries&quot;, &quot;incomplete pieces&quot;], 3, 0], [&quot;How does paragraph 3 of the archive passage deepen the main idea?&quot;, [&quot;It shows that archives reflect choices and can contain important gaps.&quot;, &quot;It proves that museums should stop collecting objects.&quot;, &quot;It introduces a completely unrelated summer job.&quot;, &quot;It explains how floods damage buildings only.&quot;], 0, 0], [&quot;What perspective does Talia most likely have by the end of the archive passage?&quot;, [&quot;History is fully complete once one archive is organized.&quot;, &quot;History requires both evidence and careful questioning.&quot;, &quot;Facts are unimportant compared with stories.&quot;, &quot;Only museums are allowed to interpret the past.&quot;], 1, 0], [&quot;Why does the archive passage author contrast 'sorting' with 'history' early in the passage?&quot;, [&quot;to prove that spreadsheets are inaccurate&quot;, &quot;to suggest that museum work is boring and should be avoided&quot;, &quot;to show how Talia's understanding of archival work changes over time&quot;, &quot;to compare two different buildings&quot;], 2, 0], [&quot;Which sentence from the archive passage best supports the idea that preserving records affects what later generations can know?&quot;, [&quot;The basement smelled faintly of paper.&quot;, &quot;They are collections shaped by decisions: what gets saved, who gets named, which stories are explained, and which are left for later generations to piece together.&quot;, &quot;The curator handed her a box.&quot;, &quot;A few postcards showed buildings that no longer existed.&quot;], 1, 0], [&quot;What is the main idea of the migrating cranes article?&quot;, [&quot;Wetlands matter only in spring.&quot;, &quot;Scientists can control where cranes migrate.&quot;, &quot;Sandhill crane migration depends on a network of safe habitats as well as changing environmental conditions.&quot;, &quot;Cranes travel in perfectly straight lines each season.&quot;], 2, 1], [&quot;Which detail best explains why wetlands are important to cranes?&quot;, [&quot;Cranes always nest in city parks.&quot;, &quot;Transmitters are attached to every bird.&quot;, &quot;Wetlands make the sky look darker.&quot;, &quot;Wetlands provide protected resting places and access to food.&quot;], 3, 1], [&quot;In the cranes article, the word 'conserve' most nearly means&quot;, [&quot;save and use carefully&quot;, &quot;spread widely&quot;, &quot;forget completely&quot;, &quot;measure exactly&quot;], 0, 1], [&quot;How does paragraph 3 of the cranes article contribute to the article?&quot;, [&quot;It argues that cranes should stay in one place all year.&quot;, &quot;It explains how scientists gather evidence about migration patterns.&quot;, &quot;It tells a fictional story about a lost flock.&quot;, &quot;It lists only the names of wetlands.&quot;], 1, 1], [&quot;Why does the cranes author describe migration as 'a demanding calculation'?&quot;, [&quot;to suggest cranes solve math problems in the air&quot;, &quot;to emphasize that birds must respond to many challenges during the journey&quot;, &quot;to show that migration is easy once a flock begins flying&quot;, &quot;to argue that only one wetland is important&quot;], 1, 1], [&quot;What is the cranes article author's purpose?&quot;, [&quot;to criticize all farming near wetlands&quot;, &quot;to persuade readers to keep cranes as pets&quot;, &quot;to explain how migration works and why habitat protection matters&quot;, &quot;to entertain readers with a fantasy adventure&quot;], 2, 1], [&quot;Which source would be most relevant for confirming whether crane arrival dates have changed over time?&quot;, [&quot;a poster of crane artwork&quot;, &quot;a recipe from a marsh festival&quot;, &quot;an advertisement for binoculars&quot;, &quot;a long-term field record comparing arrival dates across many years&quot;], 3, 1], [&quot;What is the author's main point in the bike lane debate passage?&quot;, [&quot;Bike lanes should be added to every road no matter the cost.&quot;, &quot;Decisions about protected bike lanes should be based on evidence and on the long-term effects of street design.&quot;, &quot;Traffic counts are less useful than opinions.&quot;, &quot;Parking is the only important use of city streets.&quot;], 1, 2], [&quot;Which detail best shows the bike lane author's balanced approach?&quot;, [&quot;The author says supporters should not ignore trade-offs.&quot;, &quot;The author explains that cities have councils.&quot;, &quot;The author mentions busy streets.&quot;, &quot;The author says concrete exists.&quot;], 0, 2], [&quot;In the bike lane passage, the word 'priority' most nearly means&quot;, [&quot;a painted street sign&quot;, &quot;a private opinion kept secret&quot;, &quot;something considered especially important&quot;, &quot;a short delay&quot;], 2, 2], [&quot;How does paragraph 3 of the bike lane passage strengthen the argument?&quot;, [&quot;It ignores the question of public purpose.&quot;, &quot;It claims that every street needs the same design.&quot;, &quot;It replaces the debate with a fictional example.&quot;, &quot;It identifies specific types of evidence leaders should examine.&quot;], 3, 2], [&quot;What perspective does the bike lane author express about infrastructure?&quot;, [&quot;Infrastructure has no effect on behavior.&quot;, &quot;Infrastructure influences how people choose to move through a city.&quot;, &quot;Infrastructure should change every month.&quot;, &quot;Infrastructure matters only to cyclists.&quot;], 1, 2], [&quot;What is the bike lane author's purpose?&quot;, [&quot;to explain how to repair roads&quot;, &quot;to entertain readers with a travel story&quot;, &quot;to analyze a policy debate and argue for thoughtful, evidence-based decision making&quot;, &quot;to advertise bicycles for sale&quot;], 2, 2], [&quot;Which source would be most credible for checking whether protected bike lanes reduce crashes?&quot;, [&quot;a bike shop coupon&quot;, &quot;a rumor shared online&quot;, &quot;a poster saying Bikes are the future&quot;, &quot;a transportation study comparing crash data before and after installation&quot;], 3, 2], [&quot;What idea is supported by both the 1872 journal entry and the historian's commentary?&quot;, [&quot;Journal writers never describe real events.&quot;, &quot;Official reports are always more vivid than journals.&quot;, &quot;Firsthand accounts can be valuable, but they should be read carefully.&quot;, &quot;Weather did not affect travel in the 1800s.&quot;], 2, 3], [&quot;Which detail from the 1872 journal best shows the travelers faced difficulty?&quot;, [&quot;Two crates of supplies slid from the wagon, and the party had to haul them back.&quot;, &quot;The river was shining below the ridge.&quot;, &quot;Some members paused to sketch the view.&quot;, &quot;The guide urged speed.&quot;], 0, 3], [&quot;In the historian's commentary, the word 'emphasize' most nearly means&quot;, [&quot;hide completely&quot;, &quot;give special attention to&quot;, &quot;measure precisely&quot;, &quot;argue against&quot;], 1, 3], [&quot;How does the historian's commentary affect a reader's understanding of the 1872 journal?&quot;, [&quot;It proves the journal is false.&quot;, &quot;It changes the setting to a different region.&quot;, &quot;It reminds the reader to consider the writer's purpose and compare the journal with other sources.&quot;, &quot;It shows the rain never happened.&quot;], 2, 3], [&quot;Why might an expedition member describe hardship in detail, according to the historian's commentary?&quot;, [&quot;to present the mission or the travelers in a certain light&quot;, &quot;to avoid recording weather&quot;, &quot;to make maps unnecessary&quot;, &quot;to hide the route from future readers&quot;], 0, 3], [&quot;Which text is more useful for learning what one traveler saw and felt at a specific moment?&quot;, [&quot;the historian's commentary&quot;, &quot;neither text&quot;, &quot;the 1872 journal entry&quot;, &quot;both texts equally&quot;], 2, 3], [&quot;If a researcher wanted to verify the route the expedition followed, which additional source would be most relevant?&quot;, [&quot;a list of river fish&quot;, &quot;a modern backpack advertisement&quot;, &quot;a poem about mountains&quot;, &quot;a map or survey record from the same expedition&quot;], 3, 3], [&quot;What is the central idea of the recommendation systems passage?&quot;, [&quot;Recommendation systems can be helpful, but they also influence what users notice and may limit what they see.&quot;, &quot;Online stores never use recommendation systems.&quot;, &quot;Recommendation systems are impossible to understand.&quot;, &quot;Personalization always gives a complete set of choices.&quot;], 0, 4], [&quot;Which detail best supports the idea that recommendation systems shape attention?&quot;, [&quot;Platforms place some options in front of users first.&quot;, &quot;People can still make choices.&quot;, &quot;Creators make different kinds of content.&quot;, &quot;Music and books exist online.&quot;], 0, 4], [&quot;In the recommendation systems passage, the word 'completeness' most nearly means&quot;, [&quot;having bright colors&quot;, &quot;moving very quickly&quot;, &quot;including everything important&quot;, &quot;being easy to read&quot;], 2, 4], [&quot;How does paragraph 3 of the recommendation systems passage contribute to the passage?&quot;, [&quot;It gives the history of television only.&quot;, &quot;It describes how to build computer hardware.&quot;, &quot;It presents both the advantages and the drawbacks of recommendation systems.&quot;, &quot;It argues that all algorithms should be banned.&quot;], 2, 4], [&quot;What perspective does the recommendation systems author express about digital literacy?&quot;, [&quot;Digital literacy includes questioning why certain results appear and what may be missing.&quot;, &quot;Digital literacy is the same as memorizing passwords.&quot;, &quot;Digital literacy means accepting top results without question.&quot;, &quot;Digital literacy matters only for computer programmers.&quot;], 0, 4], [&quot;What is the recommendation systems author's purpose?&quot;, [&quot;to review a single movie&quot;, &quot;to persuade readers to subscribe to one platform&quot;, &quot;to explain how recommendation systems work and encourage critical thinking about them&quot;, &quot;to entertain readers with a fictional robot story&quot;], 2, 4], [&quot;Which additional source would be most relevant for learning what kinds of data a platform uses to generate recommendations?&quot;, [&quot;a movie poster&quot;, &quot;a weather forecast ore trustworthy source about the tutoring program, which would be best?&quot;, [&quot;a sports schedule&quot;, &quot;an interview with the district staff member coordinating the tutoring program&quot;, &quot;a coupon for school supplies&quot;, &quot;an anonymous comment saying tutoring sounds useful&quot;], 1, 5]]}, &quot;Math Practice 1&quot;: [[&quot;Which number is least: −0.25, 1/4, −3/4, −0.5?&quot;, [&quot;−0.25&quot;, &quot;1/4&quot;, &quot;−3/4&quot;, &quot;−0.5&quot;], 2, &quot;Step 1: Convert all to decimals: -0.25, 0.25, -0.75, -0.5.\nStep 2: -0.75 is the furthest left on the number line.\nAnswer: -3/4&quot;], [&quot;What is −8 + 13?&quot;, [&quot;5&quot;, &quot;−5&quot;, &quot;21&quot;, &quot;−21&quot;], 0, &quot;Step 1: Start at -8, move 13 right: -8+13=5.&quot;], [&quot;What is 6 − 14?&quot;, [&quot;−20&quot;, &quot;−8&quot;, &quot;20&quot;, &quot;8&quot;], 1, &quot;Step 1: 6-14. Start at 6, move 14 left: 6-14=-8.&quot;], [&quot;What is (−3)(9)?&quot;, [&quot;−27&quot;, &quot;6&quot;, &quot;27&quot;, &quot;−12&quot;], 0, &quot;Step 1: Negative × positive = negative.\nStep 2: 3×9=27, so (-3)(9)=-27.&quot;], [&quot;What is 24 ÷ (−6)?&quot;, [&quot;−30&quot;, &quot;30&quot;, &quot;−4&quot;, &quot;4&quot;], 2, &quot;Step 1: Positive ÷ negative = negative.\nStep 2: 24÷6=4, so 24÷(-6)=-4.&quot;], [&quot;Which value equals |−11|?&quot;, [&quot;11&quot;, &quot;−11&quot;, &quot;0&quot;, &quot;1/11&quot;], 0, &quot;Step 1: Absolute value = distance from zero.\nStep 2: |-11|=11.&quot;], [&quot;A phone battery loses 7% per hour. Starting at 100%, what percent remains after 3 hours?&quot;, [&quot;21&quot;, &quot;79&quot;, &quot;93&quot;, &quot;72&quot;], 1, &quot;Step 1: Each hour loses 7%: after 3 hours, lost 3×7=21%.\nStep 2: 100-21=79%.&quot;], [&quot;A $40 sweatshirt is on sale for 15% off. What is the sale price?&quot;, [&quot;25&quot;, &quot;34&quot;, &quot;46&quot;, &quot;6&quot;], 1, &quot;Step 1: 15% of $40 = 0.15×40=$6 off.\nStep 2: $40-$6=$34.&quot;], [&
